<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B787 Flows Trainer</title>
<style>
  :root{
    --midnight:#01416e;
    --atlas:#007cba;
    --blue:#00b2d6;
    --breeze:#bfe9f4;
    --ice:#E8F3FA;
    --good:#b1d887;
    --red:#C8102E;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:"Segoe UI",Arial,Helvetica,sans-serif;
    background:var(--ice);
    color:var(--midnight);
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding:20px;
  }
  h1{
    background:var(--midnight);color:#fff;padding:10px 24px;
    font-size:20px;letter-spacing:1px;margin-bottom:4px;
  }
  .src{font-size:11px;color:var(--atlas);margin-bottom:14px;text-align:center;}
  .topbar{display:flex;gap:14px;align-items:center;margin-bottom:14px;flex-wrap:wrap;justify-content:center;}
  .modes,.seat{display:flex;gap:0;}
  .modes button,.seat button{
    background:#fff;border:1.5px solid var(--blue);color:var(--blue);
    padding:6px 16px;font-size:13px;font-weight:700;cursor:pointer;
  }
  .seat button{border-color:var(--midnight);color:var(--midnight);}
  .modes button.active{background:var(--blue);color:#fff;}
  .seat button.active{background:var(--midnight);color:#fff;}
  .controls{margin-bottom:14px;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:760px;}
  .controls button{
    background:#fff;border:1.5px solid var(--midnight);color:var(--midnight);
    padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer;
  }
  .controls button.active{background:var(--midnight);color:#fff;}
  .fl-item{color:var(--midnight);cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .fl-item b{color:var(--good);}
  .fl-item:hover{text-decoration:underline;}
  .fl-item.open b{text-decoration:underline;}
  .fl-detail{display:none;color:var(--midnight);font-size:12.5px;line-height:1.45;
    background:#fff;border-left:3px solid var(--good);padding:7px 10px;margin:5px 0 7px;}
  .fl-detail.shown{display:block;}
  @media (max-width:480px){
    .modes button,.seat button{
      min-height:44px;padding:10px 16px;
      display:inline-flex;align-items:center;justify-content:center;
    }
    .controls button{
      min-height:44px;padding:10px 12px;
      display:inline-flex;align-items:center;justify-content:center;
    }
  }
  .layout{
    display:grid;
    grid-template-columns:minmax(280px,45%) 1fr;
    gap:14px;
    max-width:1024px;
    width:100%;
    align-items:start;
  }
  @media (max-width:740px){
    .layout{grid-template-columns:1fr;}
  }
  .card{
    background:#fff;border:2px solid var(--midnight);
    flex:1;min-width:320px;max-width:560px;min-height:320px;
    padding:22px;display:flex;flex-direction:column;
  }
  .mapbox{background:#fff;border:2px solid var(--midnight);width:100%;box-sizing:border-box;padding:10px;}
  .mapbox .shapename{font-size:12px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:2px;}
  .mapbox .mnemonic{font-size:13px;color:var(--atlas);text-align:center;margin-bottom:6px;font-style:italic;}
  .mnemonic b{color:var(--midnight);font-style:normal;}
  .tag{font-size:12px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1px;}
  .who{font-size:11px;color:var(--atlas);margin-bottom:12px;}
  .done{font-size:13px;color:var(--atlas);line-height:1.55;margin-bottom:12px;}
  .done .step{display:block;}
  .done .step b{color:#6fae3d;} .done .step:hover b{text-decoration:underline;}
  .q{font-size:18px;font-weight:700;flex:1;}
  .a{
    font-size:16px;font-weight:600;margin-top:14px;padding:13px;
    background:var(--breeze);border-left:4px solid var(--blue);
    display:none;white-space:pre-line;
  }
  .a.shown{display:block;}
  .detail{
    font-size:13px;font-weight:400;color:#111;margin-top:10px;padding:12px 14px;
    background:#f4f0fa;border-left:4px solid #4B2D89;display:none;
    white-space:pre-line;line-height:1.65;border-radius:0 4px 4px 0;
  }
  .detail.shown{display:block;}
  .actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
  .actions button{
    flex:1;min-width:105px;padding:13px;font-size:15px;font-weight:700;
    border:none;cursor:pointer;color:#fff;background:var(--atlas);
    -webkit-tap-highlight-color:transparent;
  }
  #reveal{background:var(--blue);}
  
  #nextBtn{background:var(--midnight);}
  .count{margin-top:12px;font-size:12px;color:var(--atlas);}
  .fulllist{max-width:680px;width:100%;}
  .flowblock{background:#fff;border:2px solid var(--midnight);margin-bottom:14px;}
  .flowblock header{background:var(--midnight);color:#fff;padding:6px 10px;font-weight:700;display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;}
  .flowblock header span:last-child{color:var(--breeze);font-size:12px;font-weight:600;}
  .flowblock .mn{padding:5px 10px;font-size:13px;font-style:italic;color:var(--atlas);border-bottom:1px dashed var(--blue);}
  .flowblock .mn b{color:var(--midnight);font-style:normal;}
  .flowblock .body{display:flex;gap:8px;align-items:flex-start;padding:8px;}
  .flowblock ol{padding:0 6px 4px 30px;font-size:13px;line-height:1.65;flex:1;}
  .flowblock svg{flex-shrink:0;}
  .hidden{display:none !important;}
  svg .zone{fill:var(--ice);stroke:var(--atlas);stroke-width:1;}
  svg .zonelabel{font-size:9px;fill:var(--atlas);font-weight:700;letter-spacing:1px;}
  svg .trace{fill:none;stroke:#F9423A;stroke-width:4;stroke-linejoin:round;stroke-linecap:round;}
  svg .ghost{fill:none;stroke:#8d8d8d;stroke-width:2.5;stroke-linejoin:round;stroke-dasharray:4 4;opacity:0.95;}
  svg .dot{fill:#fff;stroke:var(--midnight);stroke-width:1.5;}
  svg .dot.donept{fill:var(--breeze);}
  svg .dot.startpt{fill:#b1d887;stroke:#6fae3d;}
  svg .dot.endpt{fill:#d9534f;stroke:#b52b27;}
  svg .num{font-size:9px;fill:var(--midnight);font-weight:700;}
  svg .dot.roleCA{fill:#4B2D89;stroke:#3a2169;}
  svg .dot.roleFO{fill:#CE0C88;stroke:#9D178D;}
  svg .dot.rolePF{fill:#007cba;stroke:#01416e;}
  svg .dot.rolePM{fill:#00b2d6;stroke:#0a8fb0;}
  svg .dot.roleIRO{fill:#aaaaaa;stroke:#888;}
  svg .dot.roleBOTH{fill:#fff;stroke:#01416e;}
  svg .dot.inactive{fill:#dcdcdc;stroke:#bdbdbd;opacity:.55;}
  svg .dot.current{fill:#8fd9ef;stroke:var(--midnight);stroke-width:2;}
  .legend{display:flex;gap:5px;flex-wrap:wrap;align-items:center;font-size:10px;color:#333;margin-top:6px;}
  .legend span{display:flex;align-items:center;gap:4px;}
  .xref{color:#007cba;text-decoration:underline;cursor:pointer;font-weight:600;}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block;border:1.5px solid #01416e;flex-shrink:0;}
  .miniBtns{position:absolute;top:10px;right:12px;display:flex;gap:6px;}
  .miniBtns button{font-size:14px;padding:6px 12px;background:#fff;color:var(--midnight);border:1.5px solid var(--midnight);border-radius:4px;cursor:pointer;}
  .miniBtns button:hover{background:var(--midnight);color:#fff;}
  svg .numlight{font-size:9px;fill:#fff;font-weight:700;}
  svg .dot, svg .num, svg .numlight{cursor:pointer;}
</style>
</head>

<script>
// role: CA | FO | BOTH | PF | PM. Seat filter CA hides pure-FO items; FO hides pure-CA. PF/PM shown to both seats.
// Mnemonics: first letters bold-capped via <b> markup, matching the items in order (for the seat=Both view).

const FLOWS = [
 {
  "n": "1. Prelim Preflight",
  "who": "CA/FO",
  "ref": "NP.21.1-2",
  "shape": "The Cane",
  "mnemonic": "<b>I</b>n <b>S</b>ims, <b>E</b>very <b>C</b>aptain <b>L</b>ogs <b>E</b>mergency <b>P</b>rocedures",
  "items": [
   {
    "item": "IRS selectors",
    "act": "OFF 30 seconds, then ON",
    "role": "BOTH",
    "x": 88.0,
    "y": 68.0,
    "d": "[FCOM NP.21.1-2:]\n• OFF 30 seconds then ON. Verify the ON BAT light is extinguished\n• The 30-second OFF cycle clears the IRS memory before alignment begins\n• Assumes Electrical Power Up (SP.6) is complete"
   },
   {
    "item": "STATUS display",
    "act": "Check",
    "role": "BOTH",
    "x": 148.0,
    "y": 202.0,
    "d": "[FCOM NP.21.1:]\n• Verify that only expected messages are shown\n• Verify that the following are sufficient for flight: oxygen pressure, hydraulic quantity, engine oil quantity\n• Where to look: oxygen and hydraulic quantity on the STATUS display; engine oil quantity on the secondary engine display"
   },
   {
    "item": "EICAS display",
    "act": "Check",

function showXref(key){
  const x = XREFS[key]; if(!x) return;
  const existing = document.getElementById("xrefBox");
  if(existing){ existing.remove(); return; }
  const box = document.createElement("div");
  box.id = "xrefBox";
  box.style.cssText = "margin-top:8px;padding:10px 12px;background:#fff8e7;border-left:4px solid #e6a817;border-radius:0 4px 4px 0;font-size:13px;white-space:pre-line;line-height:1.6;";
  box.innerHTML = "<b style='font-size:11px;color:#888;'>" + x.title + "</b>\n" + x.body;
  document.getElementById("detail").after(box);
}

function fmtLine(l){
  if(l.startsWith("#")) return "<span style='color:#4B2D89;font-weight:600;'>" + linkRefs(l) + "</span>";
  if(l.startsWith("[")) return "<span style='color:#888;font-size:11px;font-weight:600;'>" + l + "</span>";
  if(l.startsWith("\u2705")) return "<span style='color:#2a7a2a;font-weight:700;'>" + l + "</span>";
  if(l.startsWith("•")){
    return l.replace(/^(• )([^:]+)(:.*)$/, function(m,p,label,rest){
      return p + "<b>" + label + "</b>" + rest;
    });
  }
  return linkRefs(l);
}
function linkRefs(t){
  t = t.replace(/\b(WARNING)\b/g, '<b style="color:#d9534f;">$1</b>');
  t = t.replace(/\b(CAUTION)\b/g, '<b style="color:#e6a817;">$1</b>');
  t = t.replace(/\b(ADVISORY)\b/g, '&#8594; <b style="color:#c8880a;">$1</b>');
  t = t.replace(/\b(MEMO)\b/g, '<b style="color:#00b2d6;">$1</b>');
  t = t.replace(/([A-Z]{2,}(?:\s[A-Z0-9\/]{2,}){1,4})/g, function(m){
    if(/</.test(m)||m==='FCOM'||m==='FCTM'||m==='EICAS'||m==='AFDS'||m==='LNAV'||m==='VNAV'||m==='FLCH'||m==='BOTH') return m;
    return '<span style="color:#e6a817;font-weight:600;">'+m+'</span>';
  });
  t = t.replace(/\b(SP\.\d+(?:\.\d+)?)\b/g, function(m){
    if(XREFS[m]) return '<span class="xref" onclick="showXref(\''+m+'\');">'+m+'</span>';
    return m;
  });
  return t;
}

let flowIdx = 0;
let stepIdx = 0;
let revealed = false;
let seat = "CA"; // CA | FO | BOTH

function activeItems(f){
  // sequence items only (drilled); inactive ones are drawn greyed on the map
  return f.items.filter(it=>!isOff(it));
}
function isOff(it){
  if(seat==="BOTH") return false;
  if(it.role==="IRO") return true; // always shown greyed (observer items)
  if(seat==="CA") return it.role==="FO";
  return it.role==="CA";
}

function zoneSvg(){
  return `<image href="${BG}" x="0" y="0" width="300" height="437" opacity="1"/>`;
}
// Path builder: straight runs stay direct, but any segment that reverses
// course (>~100 degree turn) bows out to the side so it never overdraws
// the lines already on the map.
function flowPath(P){
  if(P.length<2) return "";
  let d = `M${P[0][0]},${P[0][1]}`;
  for(let i=1;i<P.length;i++){
    const a=P[i-1], b=P[i];
    const vx=b[0]-a[0], vy=b[1]-a[1];
    const segLen=Math.hypot(vx,vy);
    let reverse=false;
    if(i>1 && segLen>0){
      const ux=a[0]-P[i-2][0], uy=a[1]-P[i-2][1];
      const ulen=Math.hypot(ux,uy);
      if(ulen>0 && (ux*vx+uy*vy)/(ulen*segLen) < -0.3) reverse=true;
    }
    if(reverse){
      const nx=-vy/segLen, ny=vx/segLen;
      const off=Math.min(42, 16+segLen*0.22);
      const mx=(a[0]+b[0])/2, my=(a[1]+b[1])/2;
      let cx=mx+nx*off, cy=my+ny*off;
      const cx2=mx-nx*off, cy2=my-ny*off;
      if(Math.abs(cx2-150)>Math.abs(cx-150)){cx=cx2; cy=cy2;}
      cx=Math.max(8,Math.min(292,cx)); cy=Math.max(8,Math.min(429,cy));
      d += ` Q${cx.toFixed(1)},${cy.toFixed(1)} ${b[0]},${b[1]}`;
    } else {
      d += ` L${b[0]},${b[1]}`;
    }
  }
  return d;
}
function mapPt(x,y){ return [x,y]; }

// smooth hand-motion curve through points (Catmull-Rom -> cubic Bezier)
function smoothPath(P){
  if(P.length<2) return "";
  if(P.length===2) return `M${P[0][0]},${P[0][1]} L${P[1][0]},${P[1][1]}`;
  let d = `M${P[0][0]},${P[0][1]}`;
  for(let i=0;i<P.length-1;i++){
    const p0 = P[Math.max(i-1,0)], p1 = P[i], p2 = P[i+1], p3 = P[Math.min(i+2,P.length-1)];
    const c1 = [p1[0]+(p2[0]-p0[0])/6, p1[1]+(p2[1]-p0[1])/6];
    const c2 = [p2[0]-(p3[0]-p1[0])/6, p2[1]-(p3[1]-p1[1])/6];
    d += ` C${c1[0].toFixed(1)},${c1[1].toFixed(1)} ${c2[0].toFixed(1)},${c2[1].toFixed(1)} ${p2[0]},${p2[1]}`;
  }
  return d;
}

function getViewBox(flow){
  const all = flow.items;
  if(!all.length) return "0 0 300 437";
  const xs = all.map(i=>i.x), ys = all.map(i=>i.y);
  const pad = 30;
  let x0=Math.max(0,Math.min(...xs)-pad), y0=Math.max(0,Math.min(...ys)-pad);
  let x1=Math.min(300,Math.max(...xs)+pad), y1=Math.min(437,Math.max(...ys)+pad);
  // minimum size 90x90 so small flows aren't absurdly zoomed
  const minW=90, minH=90;
  if(x1-x0<minW){const cx=(x0+x1)/2; x0=Math.max(0,cx-minW/2); x1=Math.min(300,cx+minW/2);}
  if(y1-y0<minH){const cy=(y0+y1)/2; y0=Math.max(0,cy-minH/2); y1=Math.min(437,cy+minH/2);}
  return `${x0} ${y0} ${x1-x0} ${y1-y0}`;
}

function drawMap(svgEl, flow, upto, showAll){
  const vb = getViewBox(flow);
  svgEl.setAttribute("viewBox", vb);
  const seq = flow.items.filter(it=>!isOff(it));
  const off = flow.items.filter(it=>isOff(it));
  const P = seq.map(it=>[it.x,it.y]);
  let s = zoneSvg();
  s += `<path class="ghost" d="${flowPath(P)}"/>`;
  if(upto>1 || showAll){
    const PD = showAll ? P : P.slice(0, Math.max(upto,1));
    s += `<path class="trace" d="${flowPath(PD)}"/>`;
  }
  off.forEach(it=>{ s += `<circle class="dot inactive" cx="${it.x}" cy="${it.y}" r="6"/>`; });
  const last = seq.length-1;
  seq.forEach((it,i)=>{
    let cls = "dot role"+it.role;
    let lightNum = ["CA","FO","PF","PM"].includes(it.role);
    if(i===0){cls="dot startpt"; lightNum=false;}
    else if(i===last){cls="dot endpt"; lightNum=true;}
    if(!showAll && i===upto && i!==0 && i!==last){cls+=" current"; lightNum=false;}
    s += `<circle class="${cls}" data-i="${i}" cx="${it.x}" cy="${it.y}" r="8"/>`;
    s += `<text class="${lightNum?'numlight':'num'}" data-i="${i}" x="${it.x-3}" y="${it.y+3.5}">${i+1}</text>`;
  });
  svgEl.innerHTML = s;
}
const LEGEND = '<span><i style="background:#4B2D89;border-color:#3a2169"></i>CA</span><span><i style="background:#CE0C88;border-color:#9D178D"></i>FO</span><span><i style="background:#007cba;border-color:#01416e"></i>PF</span><span><i style="background:#00b2d6;border-color:#0a8fb0"></i>PM</span><span><i style="background:#fff"></i>Both</span><span style="color:#aaa;padding:0 4px;">|</span><span><i style="background:#b1d887;border-color:#6fae3d"></i>Start</span><span><i style="background:#d9534f;border-color:#b52b27"></i>End</span>';
document.getElementById("legend").innerHTML = LEGEND;

function render(){
  const f = FLOWS[flowIdx];
  const items = activeItems(f);
  document.getElementById("tag").textContent = f.n + "  [" + f.ref + "]";
  document.getElementById("who").textContent = f.who + " \u00b7 viewing: " + (seat==="BOTH"?"both seats":seat+" items");
  
  if(items.length===0){
    document.getElementById("q").textContent = "No " + seat + " items in this flow. Switch seat or flow.";
    document.getElementById("done").innerHTML = "";
    document.getElementById("a").textContent = "";
    drawMap(document.getElementById("cockpitMap"), f, 0, true);
    return;
  }
  if(stepIdx > items.length) stepIdx = 0;

  drawMap(document.getElementById("cockpitMap"), f, stepIdx, false);

  const doneDiv = document.getElementById("done");
  doneDiv.innerHTML = "";
  for(let i=0;i<stepIdx;i++){
    const s = document.createElement("span");
    s.className = "step";
    s.style.cursor = "pointer";
    s.title = "Tap to view FCOM detail";
    s.innerHTML = (i+1) + ". <b>" + items[i].item + "</b> - " + items[i].act + " <small>(" + items[i].role + ")</small>";
    (function(d){ s.onclick = ()=>{ (function(){
  const existing2 = document.getElementById("xrefBox"); if(existing2) existing2.remove();
  const html = d.split("\n").map(fmtLine).join("\n");
  document.getElementById("detail").innerHTML = html;
})(); document.getElementById("detail").classList.toggle("shown"); }; })(items[i].d || "");
    doneDiv.appendChild(s);
  }
  if(stepIdx < items.length){
    document.getElementById("q").textContent = "Step " + (stepIdx+1) + " of " + items.length + "... ?";
    document.getElementById("a").textContent = items[stepIdx].item + " - " + items[stepIdx].act + "  (" + items[stepIdx].role + ")";
    (function(){
  const raw = items[stepIdx].d || "No additional amplified detail for this item.";
  const existing = document.getElementById("xrefBox"); if(existing) existing.remove();
  const html = raw.split("\n").map(fmtLine).join("\n");
  document.getElementById("detail").innerHTML = html;
})();
    document.getElementById("detail").classList.add("shown");
  } else {
    drawMap(document.getElementById("cockpitMap"), f, items.length, true);
    document.getElementById("q").textContent = "\u2708\uFE0F";
    document.getElementById("a").textContent = "";
    document.getElementById("detail").textContent = "";
    document.getElementById("detail").classList.remove("shown");
  }
  document.getElementById("a").classList.remove("shown");
  document.getElementById("detail").classList.remove("shown");
  revealed = false;
  document.getElementById("reveal").textContent = (stepIdx < items.length) ? "Reveal" : "Restart flow";
  document.getElementById("count").textContent = f.n + " \u00b7 " + seat + " \u00b7 step " + Math.min(stepIdx+1, items.length) + "/" + items.length;
}

document.getElementById("reveal").onclick = ()=>{
  const items = activeItems(FLOWS[flowIdx]);
  if(revealed){ nextStep(); return; }
  if(stepIdx >= items.length){ nextStep(); return; }
  document.getElementById("a").classList.add("shown");
  document.getElementById("a").style.cursor="pointer";
  // detailBtn always visible
  drawMap(document.getElementById("cockpitMap"), FLOWS[flowIdx], stepIdx+1, false);
  revealed = true;
  document.getElementById("reveal").textContent = "Next step";
};

function nextStep(){
  const items = activeItems(FLOWS[flowIdx]);
  if(stepIdx >= items.length){ stepIdx = 0; } else { stepIdx++; }
  render();
}
document.getElementById("a").onclick = ()=>{
  document.getElementById("detail").classList.toggle("shown");
};

document.getElementById("prevBtn").onclick = ()=>{
  if(stepIdx>0){ stepIdx--; render(); }
};
document.getElementById("restartBtn").onclick = ()=>{ stepIdx = 0; render(); };
document.getElementById("cockpitMap").addEventListener("click", e=>{
  const t = e.target.closest("[data-i]");
  if(!t) return;
  stepIdx = +t.getAttribute("data-i");
  render();
  document.getElementById("reveal").click();
  document.getElementById("detail").classList.add("shown");
});
document.addEventListener("keydown",e=>{
  if(e.code==="Space"){e.preventDefault(); revealed?nextStep():document.getElementById("reveal").click();}
  if(e.code==="KeyD" && revealed){document.getElementById("detail").classList.toggle("shown");}
});

// Seat toggle
function setSeat(s, btn){
  seat = s; stepIdx = 0;
  document.querySelectorAll(".seat button").forEach(x=>x.classList.remove("active"));
  btn.classList.add("active");
  const btns = document.querySelectorAll("#filters button");
  btns[2].style.display = (seat==="CA") ? "none" : "";   // 3. Preflight - FO
  btns[3].style.display = (seat==="FO") ? "none" : "";   // 4. Preflight - CA
  if(seat==="CA" && flowIdx===2) flowIdx = 3;
  if(seat==="FO" && flowIdx===3) flowIdx = 2;
  btns.forEach((x,i)=>x.classList.toggle("active", i===flowIdx));
  buildFullList();
  render();
}
document.getElementById("seatCA").onclick = e=>setSeat("CA", e.target);
document.getElementById("seatFO").onclick = e=>setSeat("FO", e.target);
document.getElementById("seatBoth").onclick = e=>setSeat("BOTH", e.target);

// Full Flows mode
const listDiv = document.getElementById("fullList");
function buildFullList(){
  listDiv.innerHTML = "";
  FLOWS.forEach(f=>{
    const items = activeItems(f);
    if(items.length===0) return;
    const block = document.createElement("div");
    block.className = "flowblock";
    const h = document.createElement("header");
    h.innerHTML = "<span>"+f.n+"</span><span>"+f.who+" \u00b7 "+f.ref+"</span>";
    block.appendChild(h);
    const body = document.createElement("div");
    body.className = "body";
    const ol = document.createElement("ol");
    items.forEach(it=>{
      const li = document.createElement("li");
      const head = document.createElement("div");
      head.className = "fl-item";
      head.innerHTML = "<b>"+it.item+"</b> \u2014 "+it.act+" <small>("+it.role+")</small>";
      const det = document.createElement("div");
      det.className = "fl-detail";
      det.textContent = it.d && it.d.trim() ? it.d : "No amplified FCOM note for this step. Ref: "+f.ref;
      head.onclick = ()=>{ det.classList.toggle("shown"); head.classList.toggle("open"); };
      li.appendChild(head);
      li.appendChild(det);
      ol.appendChild(li);
    });
    const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
    svg.setAttribute("viewBox", getViewBox(f));
    svg.setAttribute("width","170");
    svg.setAttribute("height","170");
    drawMap(svg, f, items.length, true);
    const dets = Array.from(ol.querySelectorAll(".fl-detail"));
    const heads = Array.from(ol.querySelectorAll(".fl-item"));
    svg.addEventListener("click", e=>{
      const t = e.target.closest("[data-i]");
      if(!t) return;
      const i = +t.getAttribute("data-i");
      if(dets[i]){ dets[i].classList.add("shown"); heads[i].classList.add("open");
        heads[i].scrollIntoView({behavior:"smooth", block:"center"}); }
    });
    body.appendChild(ol);
    body.appendChild(svg);
    block.appendChild(body);
    listDiv.appendChild(block);
  });
}
buildFullList();

document.getElementById("modeDrill").onclick = ()=>{
  document.getElementById("modeDrill").classList.add("active");
  document.getElementById("modeList").classList.remove("active");
  document.getElementById("drillLayout").classList.remove("hidden");
  document.getElementById("count").classList.remove("hidden");
  listDiv.classList.add("hidden");
};
document.getElementById("modeList").onclick = ()=>{
  document.getElementById("modeList").classList.add("active");
  document.getElementById("modeDrill").classList.remove("active");
  document.getElementById("drillLayout").classList.add("hidden");
  document.getElementById("count").classList.add("hidden");
  listDiv.classList.remove("hidden");
};

render();
</script>

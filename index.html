<style>
  :root{--midnight:#01416e;--atlas:#007cba;--blue:#00b2d6;--breeze:#bfe9f4;--ice:#E8F3FA;--good:#b1d887;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Segoe UI",Arial,Helvetica,sans-serif;background:var(--ice);min-height:100vh;display:flex;flex-direction:column;align-items:center;}

  .menu a small{display:block;font-size:12px;font-weight:400;color:#555;margin-top:3px;}
  .menu a:hover,.menu a:active{background:var(--midnight);color:#fff;}
  .menu a:hover small,.menu a:active small{color:var(--breeze);}
  .menu a .arrow{font-size:22px;}
  footer{margin-top:auto;padding:14px;color:#888;font-size:11px;}
</style>

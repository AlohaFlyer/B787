<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B787 Systems Jeopardy</title>
<link rel="icon" href="favicon.ico">
<style>
:root{
  --midnight:#01426A; --atlas:#0074C8; --breeze:#E8F2F9; --green:#b1d887;
  --board2:#060CE9; --tile:#0a1fd6; --tilehi:#1838ff;
  --gold:#f3c44b; --ink:#06243b; --line:#cfe1f0;
  --sans:'Segoe UI',Arial,Helvetica,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#eaf4fc 0%,#dcecf8 100%);color:var(--ink);
  font-family:var(--sans);min-height:100vh;-webkit-text-size-adjust:100%;}
.portal-back-wrap{position:fixed;top:0;left:12px;z-index:9999;}
.portal-back-wrap a{display:inline-block;font-family:var(--sans);font-size:12px;font-weight:700;
  color:#fff;background:#01416e;padding:5px 14px;border-radius:0 0 6px 6px;text-decoration:none;}
.wrap{max-width:1080px;margin:0 auto;padding:42px 14px 10px;}
header.gamehead{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
.title-blk h1{margin:0;font-size:1.5rem;font-weight:900;color:var(--midnight);letter-spacing:.5px;}
.title-blk h1 .pop{color:var(--atlas)}
.title-blk .sub{font-size:.72rem;color:#557;font-weight:700;letter-spacing:.12em;text-transform:uppercase;opacity:.7}
.stats{font-size:.72rem;color:var(--midnight);text-align:right;font-weight:700;line-height:1.5}
.stats b{color:var(--atlas)}
.host{display:flex;align-items:center;gap:12px;background:#fff;border:2px solid var(--atlas);
  border-radius:16px;padding:10px 14px;margin:6px 0 16px;box-shadow:0 4px 12px rgba(1,66,106,.08);}
.host svg{flex:0 0 auto}
.host .line{font-size:.95rem;font-weight:600;color:var(--midnight);line-height:1.35}
.players{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
.player{flex:1;min-width:150px;max-width:260px;background:#fff;border:2px solid var(--line);border-radius:16px;
  padding:10px 12px;display:flex;align-items:center;gap:10px;transition:transform .2s, box-shadow .2s, border-color .2s;}
.player.active{border-color:var(--gold);box-shadow:0 0 0 3px rgba(243,196,75,.35)}
.player.you{border-color:var(--atlas)}
.player .meta{flex:1;min-width:0}
.player .nm{font-weight:800;font-size:.92rem;color:var(--midnight);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player .sc{font-weight:900;font-size:1.25rem;color:var(--midnight);transition:color .2s}
.player .sc.neg{color:#c0392b}
.player .badge{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#fff;
  background:var(--atlas);border-radius:6px;padding:1px 6px;display:inline-block;margin-top:2px}
.player.buzzed{animation:pop .35s ease}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}
.scorebump{animation:bump .5s ease}
@keyframes bump{0%{transform:scale(1)}30%{transform:scale(1.35)}100%{transform:scale(1)}}
.board{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;background:var(--midnight);
  padding:8px;border-radius:14px;box-shadow:0 8px 24px rgba(1,66,106,.25)}
.cat{background:var(--board2);color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;
  text-align:center;font-weight:900;font-size:.72rem;line-height:1.15;padding:8px 4px;min-height:62px;
  text-transform:uppercase;letter-spacing:.02em;text-shadow:1px 1px 0 rgba(0,0,0,.4)}
.tile{background:var(--tile);color:var(--gold);border:none;border-radius:8px;min-height:58px;
  font-weight:900;font-size:1.15rem;cursor:pointer;font-family:var(--sans);
  text-shadow:1px 1px 0 rgba(0,0,0,.45);transition:transform .12s, background .12s;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
.tile:hover:not(:disabled){background:var(--tilehi);transform:translateY(-2px)}
.tile:disabled{background:#0a1a6b;color:#0a1a6b;cursor:default;text-shadow:none;opacity:.55}
.overlay{position:fixed;inset:0;background:rgba(2,18,40,.78);z-index:9998;display:none;
  align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.overlay.show{display:flex}
.clue{background:var(--board2);color:#fff;border-radius:18px;max-width:640px;width:100%;
  padding:26px 24px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.5);border:3px solid var(--gold);
  position:relative;animation:cluein .25s ease}
@keyframes cluein{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.clue .cval{font-size:.8rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)}
.clue .ctxt{font-size:1.35rem;font-weight:800;line-height:1.4;margin:14px 0 8px;min-height:48px;text-shadow:1px 1px 0 rgba(0,0,0,.4)}
.clue .ans{font-size:1.15rem;font-weight:800;color:var(--green);margin:10px 0 4px;display:none}
.clue .ans.show{display:block;animation:cluein .3s ease}
.buzzwrap{margin:14px 0 6px}
.buzzbar{height:12px;background:rgba(255,255,255,.18);border-radius:8px;overflow:hidden}
.buzzfill{height:100%;width:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:8px;transform-origin:left}
.buzzlabel{font-size:.7rem;color:#cfe1f0;margin-top:5px;font-weight:700;letter-spacing:.04em}
.btnrow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.btn{padding:11px 20px;border:none;border-radius:10px;font-weight:800;font-size:.95rem;cursor:pointer;
  font-family:var(--sans);transition:transform .1s, filter .12s}
.btn:active{transform:scale(.96)}
.btn.buzz{background:var(--gold);color:#5a3d00;font-size:1.1rem;padding:13px 30px;box-shadow:0 4px 0 #c79b1f}
.btn.buzz:hover{filter:brightness(1.05)}
.btn.right{background:var(--green);color:#264a07}
.btn.wrong{background:#e7745f;color:#fff}
.btn.cont{background:#fff;color:var(--midnight)}
.btn.ghost{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.35)}
.feedmsg{font-size:1.05rem;font-weight:800;margin-top:10px;min-height:24px}
.feedmsg.good{color:var(--green)}
.feedmsg.bad{color:#ffb3a3}
.wager{display:none;margin:12px 0}
.wager.show{display:block}
.wager input{width:140px;font-size:1.1rem;font-weight:800;padding:8px;border-radius:8px;border:2px solid var(--gold);
  text-align:center;font-family:var(--sans)}
.dd-banner{font-size:1.3rem;font-weight:900;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;
  animation:ddflash 1s ease infinite alternate;margin-bottom:8px}
@keyframes ddflash{from{opacity:.6}to{opacity:1;text-shadow:0 0 14px rgba(243,196,75,.8)}}
.clue.flash-good{animation:fg .6s ease}
.clue.flash-bad{animation:fb .5s ease}
@keyframes fg{0%,100%{box-shadow:0 12px 40px rgba(0,0,0,.5)}30%{box-shadow:0 0 0 6px var(--green),0 12px 40px rgba(0,0,0,.5)}}
@keyframes fb{0%,100%{transform:translateX(0)}15%{transform:translateX(-10px)}30%{transform:translateX(9px)}45%{transform:translateX(-7px)}60%{transform:translateX(5px)}75%{transform:translateX(-3px)}}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:10001;overflow:hidden;display:none}
.confetti.show{display:block}
.confetti i{position:absolute;width:9px;height:14px;top:-20px;opacity:.95;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9}}
.endscreen{position:fixed;inset:0;background:rgba(1,30,55,.96);z-index:10000;display:none;
  align-items:center;justify-content:center;padding:20px;text-align:center}
.endscreen.show{display:flex}
.endcard{background:#fff;border-radius:22px;padding:30px 26px;max-width:520px;width:100%;
  box-shadow:0 16px 50px rgba(0,0,0,.5);animation:cluein .35s ease}
.endcard h2{margin:0 0 4px;font-size:1.8rem;color:var(--midnight);font-weight:900}
.endcard .crown{font-size:3rem;line-height:1}
.endcard .winner{font-size:1.3rem;font-weight:900;color:var(--atlas);margin:6px 0 16px}
.endcard .finalrow{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;
  border-radius:10px;margin:6px 0;font-weight:800;background:var(--breeze);color:var(--midnight)}
.endcard .finalrow.win{background:var(--green);color:#264a07}
.endcard .finalrow .v{font-size:1.15rem}
.endcard .alltime{font-size:.8rem;color:#557;margin:14px 0 6px;font-weight:700}
footer{width:100%;max-width:980px;display:flex;flex-direction:column;align-items:center;gap:8px;margin:28px auto 0;padding:0 12px}
@media (max-width:620px){
  .board{gap:4px;padding:5px}
  .cat{font-size:.56rem;min-height:50px;padding:5px 2px}
  .tile{font-size:.92rem;min-height:48px}
  .clue .ctxt{font-size:1.1rem}
  .title-blk h1{font-size:1.2rem}
  .players{gap:6px}
  .player{min-width:0;padding:7px 8px}
  .player .sc{font-size:1.05rem}
}
@media (max-width:430px){
  .board{overflow-x:auto}
  #boardInner{display:grid;grid-template-columns:repeat(6,minmax(58px,1fr));gap:4px;min-width:380px}
}
</style>
</head>

/* ===== Clue pool: sourced verbatim from the vetted B787 systems_quiz.html question bank (system, q, a). ===== */
const POOL = {"Fuel":[{"q":"How many AC-powered fuel pumps does each fuel tank contain?","a":"Two."},{"q":"Where is total fuel quantity displayed?","a":"Primary EICAS display."},{"q":"What is the total fuel tank capacity of all three tanks on the B787?","a":"223,646 lbs."},{"q":"What is the long-term consequence of continued use of the crossfeed valve?","a":"Progressive fuel imbalance."},{"q":"How many fuel tanks does the 787 have, and what are they called?","a":"Three: L MAIN, R MAIN, and CENTER."},{"q":"On the expanded EICAS fuel display, in what left-to-right order are tank quantities shown?","a":"L MAIN | CENTER | R MAIN."},{"q":"In what order is center tank fuel used relative to wing (main) tank fuel?","a":"Center tank fuel is used before wing tank fuel."},{"q":"What fuel quantity does the Jettison ARM switch initialize the \"fuel to remain\" value to?","a":"The MLW (maximum landing weight) fuel quantity."},{"q":"Which EICAS fuel messages are alert (caution) level and require checklist action?","a":"FUEL QTY LOW, FUEL FLOW ENG, FUEL IMBALANCE, INSUFFICIENT FUEL."},{"q":"What flight risk exists when an engine is on suction feed at altitude?","a":"Thrust deterioration or engine flameout may occur due to fuel flow reduction."},{"q":"When the Jettison ARM switch is pushed, what display is replaced by the \"fuel to remain\" readout?","a":"The fuel temperature and static air temperature displays are replaced."},{"q":"What valve connects L MAIN and R MAIN tanks, and what is its normal position?","a":"CROSSFEED valve. Normally CLOSED. Opening it allows any tank pump to supply either engine."},{"q":"Under what conditions does a flashing white imbalance pointer appear?","a":"Main tank fuel differs by more than 200 lbs AND either the crossfeed valve is open OR the balance system is ON."},{"q":"What type of pumps are the center tank fuel pumps, and what is special about their output pressure?","a":"Override/jettison pumps. Higher output pressure than main tank pumps — center fuel is used before wing fuel."}],"Aircraft General":[{"q":"Is CCS operation automatic or manual?","a":"Automatic"},{"q":"What is the maximum nose wheel steering angle?","a":"70 degrees"},{"q":"What is the tail height of the Boeing 787-9?","a":"55 ft 10 in (17.0 m)"},{"q":"What is the nose gear to main gear wheelbase of the 787-9?","a":"84 ft 9 in (25.83 m)"},{"q":"What is the main component of the CCS?","a":"The Common Computing Resource (CCR)"},{"q":"How close to the wing tip must you avoid turning away from an obstacle?","a":"Within 15 ft of the wing tip"},{"q":"What is the name of the panel with selectable pages for VHF, HF, SAT, CAB, GPWS, WXR, and XPDR?","a":"Tuning and Control Panel (TCP)"},{"q":"What are DUs and how are they labeled on the 787?","a":"Display Units; labeled outboard, inboard, and lower DUs"},{"q":"By what percentage does the 787 reduce fuel use and emissions compared to previous generation aircraft?","a":"25% Turning Radius (FCOM VOL II 1.10.2)"},{"q":"What does the amber call light above the OFCR entrance do when STEADY?","a":"An attendant call button on a crew rest PCU has been pushed"},{"q":"Does the EICAS SMOKE REST UPR DR 1 message clear when HORN SHUT OFF is pushed?","a":"No -- it remains until the smoke detection system is RESET"},{"q":"What does a green letter \"A\" on the door synoptic mean?","a":"Passenger door is closed, latched, and locked; slide is in AUTOMATIC mode"},{"q":"What are the OFCR occupancy restrictions during taxi, takeoff, and landing?","a":"Seat, bunk, and common area may NOT be occupied; OFCR door must be LATCHED CLOSED"},{"q":"Where is passenger and flight attendant oxygen stored?","a":"In small high-pressure gaseous oxygen cylinders in the Passenger Service Units (PSU) in the ceiling panels"}],"Air Systems":[{"q":"What is the bulk cargo heat target temperature when AUTO is selected?","a":"70 deg F."},{"q":"What is the temperature range of the FLT DECK TEMP control?","a":"65 deg F to 85 deg F."},{"q":"What EICAS message indicates the aft equipment cooling system is in override mode?","a":"EQUIP CLG OVRD AFT."},{"q":"What temperature does the forward cargo A/C control target at the 12 o'clock (mid) position?","a":"Approximately 60 deg F."},{"q":"During a depressurization event with a takeoff/landing airport below 9,500 ft, at what cabin altitude will the outflow valves begin to open?","a":"11,500 ft."},{"q":"What is the LDG ALT selector range?","a":"-2,000 ft (below sea level) to 14,000 ft above sea level."},{"q":"What is the temperature range and increment of the forward cargo A/C control?","a":"40 deg F to 80 deg F, in 2 deg F increments."},{"q":"What data does the pressurization system use to calculate the cabin pressurization schedule?","a":"Ambient pressure and flight plan data from the FMC."},{"q":"How many zonal dryers make up the crown dehumidification system, and where are they?","a":"Two -- one in the forward crown area, one in the aft area."},{"q":"What type of air does the flight deck receive if one pack is off and the associated lower recirculation fan is on?","a":"Some recirculated air is supplied to the flight deck."},{"q":"What controls the pack outlet temperature in the trim air system?","a":"The zone requiring the COOLEST temperature controls the pack outlet temperature."},{"q":"How many liquid cooling loops does PECS have, and how many pumps per loop?","a":"Two independent loops; each loop has one pump package containing two fully redundant pumps."},{"q":"Can a single CAC operate its associated pack in all operating modes?","a":"Yes -- a single CAC provides sufficient air to operate its associated pack in all operating modes."},{"q":"What is the per-flight limit on PACK resets?","a":"A reset of a single PACK is limited to once per flight. Some PACK reset attempts are restricted above 34,000 ft."}],"Anti-Ice & Rain":[{"q":"How many AOA probes does the B787 have?","a":"Two (2)."},{"q":"What energy source does engine anti-ice use?","a":"Bleed air."},{"q":"Below what airspeed is wing anti-ice inhibited on the ground?","a":"Below 75 kts."},{"q":"What is the maximum duration that wing anti-ice power can be momentarily shed?","a":"30 seconds."},{"q":"What does the WIPER selector in OFF do to the wiper?","a":"The wiper is off and stowed."},{"q":"What type of heating does wing anti-ice use?","a":"Electrical -- thermal anti-icing mats."},{"q":"Which windows have BACKUP window heat switches?","a":"Forward windows only -- BACKUP L FWD and R FWD."},{"q":"What does the pack inlet anti-ice system protect?","a":"Both ram air inlets for the cabin air compressors."},{"q":"What type of heater is used for pack inlet anti-ice?","a":"An electric heater on the leading edge of each inlet."},{"q":"How are the PIDS ice detectors kept from icing over themselves on the ground?","a":"They are heated electrically after engine start."},{"q":"What protection do the side windows have?","a":"Interior surface antifogging protection only -- no exterior anti-icing."},{"q":"What EICAS message appears if the automatic ice detection system fails?","a":"[checklist box] ICE DETECTORS (amber caution with checklist box)."},{"q":"Where specifically are the wing anti-ice thermal mats located?","a":"On the leading edge slats -- specifically the 4 slats outboard of each engine pylon."},{"q":"What does the PIDS measure to determine if icing conditions exist?","a":"Liquid water content, using TAT and other air data information and temperature sources."}],"APU":[{"q":"What EICAS message type is APU LIMIT?","a":"Caution."},{"q":"What is the APU fuel burn rate during typical ground operations?","a":"480 lb/hr."},{"q":"Is there a cooldown period when the APU shuts down in attended mode due to a fault?","a":"No."},{"q":"From which manifold is APU fuel supplied?","a":"The left fuel manifold."},{"q":"Which battery powers the APU controller (APUC), air inlet door, and right starter?","a":"The APU battery."},{"q":"How many consecutive start attempts will the APU battery support?","a":"2 consecutive start attempts."},{"q":"At what RPM does the APUC command the air inlet door to close during shutdown?","a":"15% RPM. APU Operating Modes"},{"q":"How do you shut down the APU if the automatic start condition is no longer valid?","a":"Position the selector to ON, then OFF."},{"q":"Up to what altitude in flight can the APU be started with no pumps operating?","a":"14,000 ft pressure altitude. APU Automatic Start"},{"q":"What two things does APU selector OFF accomplish?","a":"Initiates normal shutdown and resets the auto shutdown fault logic."},{"q":"What power sources can energize an APU starter?","a":"Forward external power or an engine generator. APU Selector / Controls"},{"q":"Can the APU be restarted during the cooldown cycle, and if so how?","a":"Yes. Place the APU selector back to ON at any time during the 2-minute cooldown."},{"q":"In general, how does the APU fuel flow penalty change with altitude?","a":"The penalty increases as altitude decreases (530 lb/hr at 5,000 ft vs. 190 lb/hr at 43,000 ft)."},{"q":"What is simulated at the end of the cooldown period to complete shutdown?","a":"An overspeed condition is simulated to test the overspeed and fuel shutoff protection, which shuts off fuel."}],"Communications":[{"q":"How many ATSPs can be inhibited at one time on the ADS page?","a":"Only one."},{"q":"After a Datalink System Reset, which VHF radio is selected as default?","a":"The center VHF radio."},{"q":"How long before a VHF radio is automatically disabled on the ground due to a stuck mic?","a":"Approximately 35 seconds."},{"q":"What does ADS EMERGENCY do?","a":"Sends an alert to ATC indicating an emergency situation."},{"q":"What are the four SATCOM call priority levels?","a":"EMG (Emergency), HGH (High), LOW (Low), PUB (Public)."},{"q":"What marker beacon audio note applies to all ACP positions?","a":"Marker beacon audio is available in all ACP positions."},{"q":"Where is the flight number displayed on the outboard PFD, and where is it set?","a":"The FLT # data block; it is set on the RTE 1/X page."},{"q":"How is a SATCOM call terminated?","a":"When the CALL light extinguishes (ground party hang-up or pilot ends call)."},{"q":"When you push a CAB transmitter select switch twice within one second on the ACP, what happens?","a":"It places a priority call to a selected cabin station."},{"q":"When is the oxygen mask microphone enabled?","a":"When the oxygen mask stowage doors are open (boom mic is disabled at the same time)."},{"q":"How do you cancel a conditional clearance monitor?","a":"Select CONDITIONAL CLEARANCES from the ATC menu, then choose DELETE on the CONDITIONAL MONITOR page."},{"q":"How do you answer an incoming SATCOM call?","a":"Press the respective transmitter select switch on the ACP to connect the call to the pilot headset/hand mic."},{"q":"What is the important note regarding the second push of the CAB select switch?","a":"It deselects the transmitter and receiver audio only after 1 second has elapsed from the first push."},{"q":"What are the three ways to transmit on the B787?","a":"(1) MIC/INT switch on the control wheel or ACP, (2) control wheel push-to-talk (PTT) switch, (3) glareshield MIC switch."}],"Electrical":[{"q":"How many RPDUs does the B787 have?","a":"17."},{"q":"With external power selected ON, how many DUs show?","a":"All 5 DUs show."},{"q":"What material and thickness are the battery enclosures?","a":"1/8-inch stainless steel."},{"q":"Where is the aft external power receptacle located?","a":"On the fuselage aft of the left wing."},{"q":"What EICAS message indicates a main 235 Vac bus is inoperative?","a":"ELEC AC BUS (L1, L2, R1, or R2). PECS"},{"q":"What do TRUs convert?","a":"Variable frequency 235V AC to 28V DC (feeds the 28V DC buses)."},{"q":"Where are the forward external power receptacles located?","a":"Two receptacles (L and R) on the left forward fuselage."},{"q":"What does the APU battery power on the ground?","a":"APU start, and navigation lights when Towing Power mode is active."},{"q":"When using external power for engine start without the APU, which engine must be started first to benefit from the aft power source?","a":"The right engine must be started first."},{"q":"Does connecting the aft receptacle reduce engine start time?","a":"No -- it only reduces load shedding; it does not decrease engine start time."},{"q":"What do CMSCs do?","a":"Convert +/- 270V DC to the specific AC voltage and frequency required by the motor being controlled."},{"q":"With battery power only, which display units are active and what do they show?","a":"Captain's inboard DU (EICAS) and lower center DU (default CDU display) -- 2 DUs total."},{"q":"What is the difference in CBIC capability between ECBs and TCBs?","a":"ECBs: indication AND control (can open/close). TCBs: indication only (cannot reset thermal CBs via CBIC)."},{"q":"How are load shed items indicated on synoptics?","a":"In white on the affected system synoptic, with \"LOAD SHED\" text next to the affected equipment symbol on the electrical synoptic."}],"Engines":[{"q":"What rotor does the EEC monitor for overspeed protection?","a":"N2"},{"q":"What type of actuation does the B787 thrust reverser use?","a":"Hydraulic"},{"q":"What drives the engine accessory gearbox?","a":"The high speed N2 shaft"},{"q":"When does the EEC command the TBV to open?","a":"During above idle acceleration"},{"q":"What does REV displayed in green mean?","a":"The thrust reverser is fully deployed"},{"q":"What are the three EEC idle modes?","a":"Minimum idle, approach idle, and icing idle"},{"q":"When does the EEC select icing idle?","a":"When engine anti-ice is on Ice Crystal Anti-Ice (ICA)"},{"q":"If the TBV fails open before reverser deployment, what is the result?","a":"The associated thrust reverser becomes inhibited"},{"q":"Can B787 engines be started manually (non-autostart)?","a":"No - engines can only be started using the autostart system"},{"q":"What components make up the N1 rotor?","a":"Fan, low-pressure compressor, and low-pressure turbine on a common shaft"},{"q":"How long does the ICA function remain active at minimum, and in what increments can it continue?","a":"At least 30 minutes; may continue in 15-minute increments"},{"q":"What commands starter cutout during an engine start?","a":"The EEC, when the engine reaches idle speed; the START selector then releases to NORM"},{"q":"Can automatically-displayed secondary engine indications be cleared while the triggering condition is still present?","a":"No - they cannot be cleared until the condition is no longer present EEC"},{"q":"What is the difference between \"soft\" and \"hard\" EEC alternate mode?","a":"Soft - EEC automatically switches to alternate mode; Hard - ALTN manually selected on the EEC mode switch"}],"Fire Protection":[{"q":"How many APU fire extinguisher bottles are there?","a":"One."},{"q":"How many fire detector loops does the APU compartment have?","a":"Two (dual loops)."},{"q":"What EICAS message indicates the APU fire detection system has failed?","a":"DET FIRE APU -- advisory."},{"q":"When the APU fire switch is pulled out, what does it do to the APU air inlet?","a":"Closes the APU air inlet door."},{"q":"What EICAS message indicates cargo smoke detection is inoperative?","a":"DET FIRE CARGO (FWD or AFT) -- advisory."},{"q":"What happens to the NGS when a CARGO FIRE ARM switch is armed?","a":"The Nitrogen Generation System (NGS) is turned off."},{"q":"Which zones on the B787 have BOTH fire detection AND fire extinguishing systems?","a":"APU, cargo compartments, engines, and lavatories."},{"q":"If the aircraft lands within the 15-minute delay period, what happens to the remaining bottles?","a":"One bottle discharges at the reduced rate on touchdown."},{"q":"How many sensors are in each main wheel well, and how many detectors does each sensor have?","a":"Six sensors per well; each sensor has two detectors (A and B)."},{"q":"How many smoke detectors are installed in the aft cargo compartment system, and how are they distributed?","a":"11 total -- 9 in the aft compartment and 2 in the bulk compartment."},{"q":"How many fire extinguisher bottles does each lavatory have, and how does it discharge?","a":"One bottle; discharges automatically through two nozzles into the waste container."},{"q":"When the engine fire switch is pulled out, what happens to the hydraulic system?","a":"Shuts off hydraulic fluid to and depressurizes the associated engine-driven hydraulic pump."},{"q":"What are the indications of an engine overheat?","a":"Caution beeper sounds; master CAUTION lights illuminate; EICAS caution message OVERHEAT ENG (L or R) displayed."},{"q":"What two indications confirm the APU extinguisher bottle has discharged or has low pressure?","a":"APU BTL DISCH light illuminates (amber) and EICAS advisory message BOTTLE DISCH APU is displayed."}],"Flight Controls":[{"q":"What powers the elevator?","a":"Hydraulic power."},{"q":"In what mode are flight envelope protections available?","a":"Normal mode only."},{"q":"Does trim move the control column?","a":"No. Trim never moves the column."},{"q":"What EICAS message indicates Secondary mode is active?","a":"FLIGHT CONTROL MODE (advisory)"},{"q":"What autopilot modes are required for vertical gust suppression?","a":"Altitude hold or VNAV level modes."},{"q":"How many flap panels are there per wing, and how are they arranged?","a":"2 per wing (one inboard, one outboard)."},{"q":"What hydraulic requirement must be met before flaps move on the ground?","a":"All 3 hydraulic systems must be pressurized."},{"q":"How many spoilers does the B787 have total, and how are they numbered?","a":"14 spoilers (7 per side), numbered 1 through 14."},{"q":"Are there any EICAS messages or crew procedures associated with LAM?","a":"No. No associated crew procedures or alert messages."},{"q":"What is the Trim Reference Speed?","a":"The airspeed at which the aircraft is stable with no control column inputs."},{"q":"Can Direct mode be manually selected?","a":"Yes. Move the Primary Flight Computers switch to DISC (normal position is AUTO)."},{"q":"What replaces autogap in Secondary mode, and why?","a":"Pregap replaces autogap because the system is too slow for autogap in secondary mode."},{"q":"During an engine failure above 60 knots groundspeed, what does asymmetry compensation do and do the pedals move?","a":"Most (but not all) yaw is countered; in this situation the pedals DO move."},{"q":"What is slat load relief and what triggers it?","a":"Part of slat pregap functionality; retracts fully extended slats to middle position when airspeed exceeds 240 KIAS."}],"Flight Instruments":[{"q":"What does BARO minimums represent in feet?","a":"Feet MSL."},{"q":"What shape is the NPS Deviation Pointer?","a":"A magenta triangle."},{"q":"What is displayed on the airspeed tape if V speeds are not entered on the CDU?","a":"NO VSPD."},{"q":"What color does the current airspeed box turn when airspeed is below minimum maneuvering speed?","a":"Amber."},{"q":"In what increments does the altitude display in meters when MTRS is selected?","a":"10 meter increments."},{"q":"When does the Rising Runway symbol move toward the airplane symbol?","a":"Below 200 ft radio altitude."},{"q":"On what scale is the NPS vertical deviation pointer only displayed?","a":"Only in the descent phase of flight."},{"q":"What information does the ISFD display?","a":"Attitude, airspeed, altitude, ILS, GLS, and heading."},{"q":"At what time from projected terrain impact does the voice \"CAUTION OBSTACLE\" sound?","a":"40 to 60 seconds from projected impact."},{"q":"How is the VSD selected for display?","a":"From the map information selections on the MAP mode drop-down menu."},{"q":"Where can EFIS control panel functions be accessed if the EFIS control panel fails?","a":"Through the backup EFIS/DSP display on the SYS page."},{"q":"When does the NPS Deviation Pointer become unfilled?","a":"When parked at deflection limit and lateral deviation continues to increase."},{"q":"What three limiting values determine the Maximum Speed (red/black bar) on the airspeed tape?","a":"The lowest of: VMO/MMO, landing gear placard speed, or flap placard speed."},{"q":"What does no checklist icon on an EICAS message indicate?","a":"The checklist is complete, there is no checklist for the message, or another checklist inhibits the icon."}],"HUD":[{"q":"Where is HUD takeoff guidance selected?","a":"On the FMC."},{"q":"In which HUD display mode do runway edge lines appear?","a":"Decluttered mode only."},{"q":"What deviation does one rectangle equal on the expanded localizer scale?","a":"0.5 dot deviation."},{"q":"On the HUD NAV Performance Scales, what do the bars represent?","a":"ANP (Actual Navigation Performance)."},{"q":"How does the guidance cue change during a windshear alert?","a":"It changes from hollow to solid (filled)."},{"q":"What are the projected runway dimensions used for the HUD runway edge lines symbol?","a":"8,000 feet long by 200 feet wide."},{"q":"What does the flight path acceleration symbol above the wing of the flight path vector indicate?","a":"The airplane is accelerating."},{"q":"What activates the HUD projector and displays symbology?","a":"Deploying the combiner. There is no ON/OFF switch."},{"q":"How does the BARO minimums line behave when the airplane descends below minimums?","a":"It flashes for 3 seconds, then goes steady."},{"q":"What do the two tick marks on the runway edge lines symbol represent?","a":"The touchdown aiming point (glideslope intercept point)."},{"q":"What is the purpose of the flight path slip/skid indicator?","a":"To provide additional yaw reference in the case of an engine failure."},{"q":"Why is the speed error tape not displayed immediately on takeoff?","a":"To prevent incorrect interpretation -- it is not displayed until the first flap retraction."},{"q":"What three conditions cause the ground deceleration scale to be removed?","a":"Ground speed decreases below 25 knots, the airplane begins accelerating, or the airplane lifts off."},{"q":"To follow flight director guidance on the HUD, how should you position the flight path vector symbol?","a":"Position the circular body of the flight path vector symbol around the guidance cue (small circle)."}],"Hydraulics":[{"q":"The RAT UNLOCKED EICAS message is what level?","a":"Advisory."},{"q":"What does OF (white) mean on the hydraulic synoptic?","a":"Reservoir is over-full."},{"q":"During landing rollout, at what groundspeed do center demand pumps stop?","a":"Less than 60 knots."},{"q":"What type of primary pump does the Right hydraulic system use?","a":"Engine Driven Pump (EDP)."},{"q":"What does the amber UNLKD light on the RAT switch indicate?","a":"The RAT is not stowed and locked."},{"q":"The HYD PRESS SYS L+C+R caution message indicates what condition?","a":"All hydraulic system pressures are low."},{"q":"What does a reservoir QTY indication of 1.00 represent?","a":"Normal service level (100% of normal fill level)."},{"q":"What are the reservoir capacities for the Left, Center, and Right hydraulic systems?","a":"Left = 5 gal; Center = 11 gal; Right = 5 gal."},{"q":"Is the LO reservoir quantity indication inhibited in flight?","a":"No - LO is NOT inhibited in flight, and an ECL must be accomplished."},{"q":"What are the three conditions that illuminate a hydraulic pump FAULT light?","a":"Low pump pressure; excessive fluid temperature; pump selected OFF."},{"q":"What components does the Left hydraulic system power?","a":"Flight controls, left engine thrust reverser, and left and right wing spoilers."},{"q":"What components does the Right hydraulic system power?","a":"Flight controls, right engine thrust reverser, and right and left wing spoilers."},{"q":"What does the FAIL light on a flight control lockout switch indicate?","a":"The switch is in LOCK position but one or more of the associated surfaces did not lock."},{"q":"What is the difference in landing approach logic between L/R and center demand pumps?","a":"L/R uses OR logic (gear down OR RA <1000 ft); center uses AND logic (gear down AND RA <2000 ft)."}],"Landing Gear":[{"q":"What color indicates a tire pressure above or below normal range?","a":"Amber."},{"q":"How long does the UP indication remain displayed before blanking after gear retraction?","a":"10 seconds."},{"q":"Where are the weight-on-wheels sensors located?","a":"On each main landing gear beam."},{"q":"How do you release the parking brake?","a":"Simultaneously depress both brake pedals."},{"q":"What is the maximum nosewheel deflection achievable with the tiller?","a":"70 degrees in either direction."},{"q":"What does the antiskid system use for touchdown and hydroplaning protection?","a":"Airplane inertial groundspeed."},{"q":"How does the antiskid system provide locked wheel protection?","a":"By comparison with other wheel speeds."},{"q":"Where is the PARKING BRAKE lever located?","a":"On the control stand to the right of the Captain."},{"q":"What color and style does the EICAS gear indication show when gear is in transit?","a":"White crosshatch (in-transit indication)."},{"q":"What happens if the rudder pedal adjust crank is not stowed after use?","a":"The rudder pedals may move out of the desired position."},{"q":"What two conditions must be met before autobrake application begins after landing?","a":"Both thrust levers retarded to idle AND wheels have spun up."},{"q":"What is the recommended action regarding the parking brake if there is a BRAKE TEMP EICAS message?","a":"It is recommended not to set the parking brake, unless needed."},{"q":"Which spoilers provide wheel well cooling, and how are they activated?","a":"Spoilers 6 and 9 - activated automatically when temperatures reach a certain value."},{"q":"What triggers the EICAS TIRE PRESS advisory?","a":"Any tire pressure above or below normal range, OR an excessive pressure difference between two tires on the same axle."}],"Nav & FMS":[{"q":"What is the altitude window range?","a":"0 to 50,000 feet."},{"q":"What is the maximum IRS alignment time at high latitudes?","a":"Up to 17 minutes."},{"q":"What CDU page displays the VOR and DME pair used for FMC position updates?","a":"POS REF page 2/4."},{"q":"How long does the AFDS use inertial data to allow the localizer signal to resolve?","a":"Up to 20 seconds."},{"q":"At what altitude above the runway does VNAV activate?","a":"400 feet above runway elevation."},{"q":"What is the CDU page used to inhibit GPS navigation data?","a":"POS REF page 3/4 (GPS NAV prompt)."},{"q":"How long is ILS autotuning inhibited after initial takeoff?","a":"10 minutes (to prevent clutter on PFD)."},{"q":"What is the relationship between the ADRS and the IRS?","a":"The ADRS is completely independent of the IRS."},{"q":"What is the BANK LIMIT AUTO range and what does it depend on?","a":"Varies between 15 and 25 degrees depending on TAS."},{"q":"What annunciation indicates the return to magnetic reference when leaving polar regions?","a":"A green box around \"MAG\" on the ND and PFD."},{"q":"In polar operations, what does a \"T\" next to leg course data on the CDU RTE LEGS page indicate?","a":"The airplane is operating in true north reference."},{"q":"What does pushing the MCP altitude selector do within 50 NM of the T/D point with the altitude window set below cruise altitude?","a":"Initiates the DES NOW (descend now) feature."},{"q":"What are the two major hardware components of the IRS?","a":"Two inertial reference units (IRUs) and two attitude heading reference units (AHRUs)."},{"q":"When the crew manually enters two VOR identifiers on the NAV RADIO page, what does the FMC lose the ability to do?","a":"Autotune any other station for VOR/DME updates. (FMC continues to tune DME/DME pairs.)"}],"Warnings":[{"q":"Can Memo messages be canceled by the CANC/RCL switch?","a":"No"},{"q":"What color are Advisory messages on the EICAS display?","a":"Amber"},{"q":"Can Advisory messages be canceled by pressing the CANC/RCL switch?","a":"Yes"},{"q":"What color is the BELOW G/S light on the Alerting and Transponder Panel?","a":"Amber"},{"q":"What color are the RA pitch regions to avoid displayed on the attitude indicator?","a":"Red outline"},{"q":"What is the stall warning device on the B787?","a":"Left and right stick shakers"},{"q":"What symbol represents a Traffic Advisory (TA) on the TCAS display?","a":"A filled amber (yellow/orange) circle"},{"q":"What EICAS message (level and color) is triggered when the landing gear is not down for landing?","a":"CONFIG GEAR -- Warning level (red)"},{"q":"How is the CONFIG GEAR message cleared?","a":"Thrust levers are advanced, OR landing gear is down and locked"},{"q":"What is the EICAS message for speedbrakes extended during landing, and what is its alert level?","a":"SPEEDBRAKE EXTENDED -- Caution level (amber)"},{"q":"Under what two conditions does the TCAS TRAFFIC display show automatically on the ND?","a":"An RA or TA is occurring AND the respective ND is in MAP or MAP CTR mode"},{"q":"What hardware components make up the Tail Strike Detection System?","a":"A 2-inch blade target and two frangible wires installed on the aft body of the airplane"},{"q":"Name four conditions that reset the G/S INHIBIT function.","a":"On the ground; after a touch and go landing; after a go-around; when deselected by the flight crew"},{"q":"What visual indication accompanies the altitude alert when approaching the MCP selected altitude?","a":"A highlighted white box around both the selected altitude and the current altitude on the PFD"}],"Limitations":[{"q":"What is MMO?","a":"0.90 MACH"},{"q":"What is the minimum flight weight?","a":"244,000 lbs"},{"q":"What is the maximum takeoff weight?","a":"561,500 lbs"},{"q":"What is the maximum tank fuel temperature at takeoff?","a":"49 degrees C"},{"q":"Under TALPA, what is the landing crosswind limit for RCC 4 (Good to Medium)?","a":"35 KTS"},{"q":"What is VLE (maximum landing gear extended speed)?","a":"270 KIAS / 0.82 MACH"},{"q":"At what crosswind component are sideslip-only (zero crab) landings not recommended?","a":"Above 25 KTS"},{"q":"Is intentional selection of reverse thrust in flight permitted? (memorize)","a":"No, it is prohibited."},{"q":"What is the maximum allowable difference between the CA or FO altitude display and field elevation prior to takeoff?","a":"75 feet"},{"q":"Is knowing the exact wording of a memorized limitation required?","a":"No, exact wording is not required."},{"q":"What EICAS message(s) must NOT be displayed for takeoff?","a":"\"FLIGHT CONTROL MODE\" or \"PRI FLIGHT COMPUTERS\""},{"q":"When must crosswind limits be reduced by 5 knots on wet or contaminated runways?","a":"Whenever asymmetric reverse thrust is used"},{"q":"When tailwind exceeds 5 KTS and surface winds exceed 35 KTS, what is the thrust restriction?","a":"Limit thrust to a setting normally used for taxi (45% N1)"},{"q":"How is the OFCR training requirement met at Alaska/Hawaiian Airlines?","a":"By use of the 787 Jumpseat and Crew Rest Briefing Card in the Content App or in the aircraft"}],"General Ops":[{"q":"What is the nose turning radius of the 787?","a":"110 ft 0 in."},{"q":"Are aerial flares approved for day use, night use, or both?","a":"Both day and night."},{"q":"How long is oxygen available from the passenger oxygen system?","a":"Approximately 22 minutes."},{"q":"What happens to inflation valves on the raft when the handpump is removed?","a":"They are self-closing."},{"q":"Where are the two CCR RESET switches located?","a":"On the overhead panel (labeled L and R)."},{"q":"What EICAS message appears when smoke is detected in the OFCR?","a":"SMOKE REST UPR DR 1 (caution message)."},{"q":"What EICAS message is generated when the flight deck overhead door is not closed and secure?","a":"DOOR FD OVHD (advisory message)."},{"q":"On takeoff, between what airspeeds does the ENG FAIL alert display if thrust is less than commanded?","a":"Between 65 knots and 6 knots prior to V1."},{"q":"How many PED fire containment bags are on the 787, and where are they located?","a":"3 bags total: 1 in the flight deck and 2 in the cabin."},{"q":"Can EICAS warning messages be canceled using the CANC/RCL switch?","a":"No. Warning messages cannot be canceled by the CANC/RCL switch."},{"q":"How many smoke detectors are installed in the OFCR, and how are they distributed?","a":"4 total: 2 in the entrance area and 1 in each of the 2 bunk areas."},{"q":"What happens to OFCR ventilation in the event of an OFCR smoke detection activation?","a":"OFCR air supply valves are closed and area exhaust valves are opened."},{"q":"What physical components make up the 787 tail strike detection system?","a":"A two-inch blade target and two frangible wires installed on the aft body of the airplane."},{"q":"When are MCP selected altitude alerts inhibited?","a":"When glideslope or glidepath is captured, OR when landing flaps are selected and landing gear is down and locked."}],"SV Ground School":[{"q":"How many static discharge wicks are on each wing?","a":"12."},{"q":"Where is the QRC stored?","a":"Under the MCP glareshield."},{"q":"Below what ground speed is the automatic ice detection system inhibited?","a":"Below 75 knots."},{"q":"How many static dischargers are on the rudder?","a":"3 at the tip and 7 on the trailing edge."},{"q":"If brake overheat occurs after takeoff, what action should be taken?","a":"Extend the gear for at least 12 minutes."},{"q":"How do you convert a climb gradient from ft/NM to a percentage?","a":"Divide by 60 (representing 6,000 ft per NM, rounded)."},{"q":"What must happen before the Load Closeout (final numbers) will be sent to the aircraft?","a":"\"Fit-For-Duty\" must be submitted and acknowledged."},{"q":"When can the active ECL database be changed?","a":"On the ground when both engines are off. The key is inhibited in flight."},{"q":"Does the B789 have grey water drain masts?","a":"No. Grey water is contained in two storage tanks located aft of the bulk cargo."},{"q":"At what altitude does the CHKL INCOMPLETE NORM \"landing phase\" trigger occur?","a":"When the airplane descends below 500 feet above the FMC landing altitude."},{"q":"What two figures are compared during the LCO crosscheck?","a":"Planned Takeoff Weight on the Dispatch Release vs. Actual Takeoff Weight on the Load Closeout."},{"q":"When should a brake wear indicator pin be written up?","a":"When the indicator is flush with the guide. (Indicator extending OUT of the guide = brakes are good.)"},{"q":"When should brake temperature indication on the MFD be used to determine cooling schedule?","a":"10 to 15 minutes after the airplane has come to a complete stop, or in flight with gear retracted."},{"q":"Does lateral gust suppression cause control column or rudder pedal movement?","a":"No. Operation does not result in control wheel, control column, or rudder pedal movement. Only available in normal mode."}],"SFTD 1":[{"q":"How many PBEs are carried on the B787 flight deck?","a":"1"},{"q":"What is the maximum altitude with flaps extended?","a":"20,000 feet"},{"q":"What is VHF L configured for?","a":"Voice communication only"},{"q":"What EICAS message is displayed for a dual FMC failure?","a":"SINGLE FMC (advisory)"},{"q":"What is the takeoff thrust rating of each GEnx-1B74/75 engine?","a":"74,100 lbs (FCOM verified)"},{"q":"What does an HF antenna tuning tone lasting more than 7 seconds indicate?","a":"Failure of the system to tune"},{"q":"Is it permissible to operate HF radios during refueling?","a":"No - do not operate HF radios when refueling"},{"q":"Between what radio altimeter heights does the autothrottle begin retarding thrust levers to idle during the flare?","a":"Between 25 and 50 feet RA"},{"q":"How many VHF radios can operate in data mode simultaneously on the B787?","a":"Only one VHF radio can operate in data mode at a time"},{"q":"What data inputs does the B787 pressurization system use to calculate the cabin pressurization schedule?","a":"Ambient pressure and flight plan data from the FMC"},{"q":"If TO/GA is not pushed below 50 knots, when is autothrottle operation available?","a":"Autothrottle operation is inhibited until reaching 400 feet altitude"},{"q":"What are the requirements for the Systems Validation (SV) exam?","a":"100 questions, 3-hour time limit, open book, 80% passing score, plus a Memory Items Quiz"},{"q":"Can a single CAC operate its associated PACK in all modes?","a":"Yes - a single CAC provides sufficient air to operate its associated PACK in all operating modes"},{"q":"In the NAV AIR DATA SYS degraded mode, what is the effect on flight controls and automation?","a":"Primary Flight Controls enter Secondary Mode; AFDS is INOP; Autopilot is INOP; Autothrottles are INOP"}],"SFTD 2":[{"q":"What is the maximum altitude for flap extension on the B787?","a":"20,000 feet. (L.10.6)"},{"q":"What EICAS message indicates a triple FMC failure?","a":"FMC (advisory). (FCOM 11.32.6)"},{"q":"Without LAND 2 or LAND 3 annunciated, below what altitude AGL must the autopilot be disengaged?","a":"135 feet AGL. (L.10.4)"},{"q":"How long after an engine reaches idle does the RUNNING indication on the Secondary Engine Display blank?","a":"30 seconds. (FCOM 7.10.8)"},{"q":"What happens to LNAV and VNAV if either TO/GA switch is pushed above 80 knots?","a":"LNAV and VNAV are disarmed. (FCOM 4.10.21)"},{"q":"Following a triple FMC failure, are autothrottles available?","a":"Yes, autothrottles are still available. (FCOM 11.32.6)"},{"q":"Which EICAS message types CAN be canceled with the CANC/RCL switch?","a":"Caution Messages and Advisory Messages. (FCOM 15.10.1)"},{"q":"What does the rectangle icon preceding an EICAS alert message indicate?","a":"That the message has associated procedural steps. (FCOM 15.10.1)"},{"q":"Which EICAS message types CANNOT be canceled with the CANC/RCL switch?","a":"Warning Messages, Communication Messages, and Memo Messages. (FCOM 15.10.1)"},{"q":"What is the ECL Checklist Condition field used for?","a":"It defines the EICAS message (what triggered the procedure). (FCOM 10.60.2 / slide 23)"},{"q":"With BACKUP WINDOW HEAT switches ON, what happens if the primary window heat fails?","a":"Backup anti-fogging is commanded on for the selected windows. (FCOM 3.10.3)"},{"q":"Takeoff is permitted in Normal, Secondary, or Direct flight control mode. Which is correct?","a":"Normal mode ONLY. Takeoff is prohibited in Secondary and Direct modes. (L.10.6)"},{"q":"What does the APU battery provide power for on the ground?","a":"APU start and navigation lights when Towing Power mode is active. It does NOT power the aircraft brakes. (FCOM 6.20.4)"},{"q":"During a NAV AIR DATA SYS failure, what is the impact on flight control mode and automation?","a":"Primary flight controls enter Secondary Mode; AFDS, Autopilot, and Autothrottles are all INOP. (FCOM 11.20.8)"}]};

function rand(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;}
const LS='b787_jeopardy_stats';
function getStats(){try{return JSON.parse(localStorage.getItem(LS))||{wins:0,losses:0,ties:0,high:0,games:0};}catch(e){return{wins:0,losses:0,ties:0,high:0,games:0};}}
function setStats(s){try{localStorage.setItem(LS,JSON.stringify(s));}catch(e){}}
function renderStats(){
  const s=getStats();
  $('stats').innerHTML='Record <b>'+s.wins+'</b>W &ndash; <b>'+s.losses+'</b>L'+(s.ties?' &ndash; '+s.ties+'T':'')+
    '<br>High score <b>$'+s.high.toLocaleString()+'</b>';
}
function newGame(){
  PLAYERS.forEach(p=>p.score=0);
  const cats=shuffle(Object.keys(POOL)).slice(0,NCOLS);
  board=cats.map(cat=>{
    let clues=shuffle(POOL[cat]);
    clues=clues.slice().sort((a,b)=>(a.a.length+a.q.length*0.4)-(b.a.length+b.q.length*0.4));
    const picked=[];
    for(let i=0;i<NROWS;i++){picked.push(clues[Math.floor(i*clues.length/NROWS)]);}
    return {cat:cat, clues:picked.map((c,i)=>({q:c.q,a:c.a,val:VALUES[i],done:false}))};
  });
  ddCol=Math.floor(Math.random()*NCOLS);
  ddRow=Math.floor(Math.random()*NROWS);
  tilesLeft=NCOLS*NROWS;
  renderBoard();
  renderPlayers();
  renderStats();
  setHost(rand(HOST_PICK));
  $('endScreen').classList.remove('show');
}
function setHost(html){$('hostline').innerHTML=html;}
function renderPlayers(active){
  $('players').innerHTML=PLAYERS.map(p=>(
    '<div class="player '+(p.human?'you':'')+(active===p.id?' active':'')+'" id="pl_'+p.id+'">'+
      p.avatar()+
      '<div class="meta"><div class="nm">'+p.name+(p.human?'':' <span class="badge">AI</span>')+'</div>'+
      '<div class="sc'+(p.score<0?' neg':'')+'" id="sc_'+p.id+'">$'+p.score.toLocaleString()+'</div></div>'+
    '</div>'
  )).join('');
}
function renderBoard(){
  const inner=$('boardInner');
  let html='';
  for(let c=0;c<NCOLS;c++){html+='<div class="cat">'+board[c].cat+'</div>';}
  for(let r=0;r<NROWS;r++){
    for(let c=0;c<NCOLS;c++){
      const cl=board[c].clues[r];
      html+='<button class="tile" data-c="'+c+'" data-r="'+r+'"'+(cl.done?' disabled':'')+'>'+
            (cl.done?'':'$'+cl.val)+'</button>';
    }
  }
  inner.innerHTML=html;
  inner.querySelectorAll('.tile').forEach(t=>{
    t.addEventListener('click',()=>openClue(+t.dataset.c,+t.dataset.r));
  });
}
function openClue(c,r){
  if(phase!=='idle') return;
  const cl=board[c].clues[r];
  if(cl.done) return;
  const isDD=(c===ddCol&&r===ddRow);
  current={c:c,r:r,val:cl.val,clue:cl,isDD:isDD};
  phase='clue';
  $('clueVal').textContent=board[c].cat+'  for  $'+cl.val;
  $('clueText').innerHTML=cl.q;
  $('clueAns').textContent='A: '+cl.a;
  $('clueAns').classList.remove('show');
  $('feedMsg').textContent=''; $('feedMsg').className='feedmsg';
  $('btnRow').innerHTML='';
  $('clueCard').className='clue';
  $('overlay').classList.add('show');
  renderPlayers();
  if(isDD){startDailyDouble();}else{startBuzz();}
}
function startBuzz(){
  phase='buzzing';
  $('ddBanner').style.display='none';
  $('wagerBox').classList.remove('show');
  $('buzzWrap').style.display='block';
  $('buzzLabel').textContent='Buzz in! (press Space or the button)';
  $('btnRow').innerHTML='<button class="btn buzz" id="buzzBtn">&#128276; BUZZ</button>';
  $('buzzBtn').addEventListener('click',playerBuzz);
  const fill=$('buzzFill');
  fill.style.transition='none'; fill.style.transform='scaleX(1)';
  void fill.offsetWidth;
  fill.style.transition='transform '+BUZZ_MS+'ms linear';
  fill.style.transform='scaleX(0)';
  aiBuzzTimers=[];
  PLAYERS.filter(p=>!p.human).forEach(p=>{
    if(Math.random()<0.78){
      const t=p.react + Math.random()*1100;
      if(t<BUZZ_MS){aiBuzzTimers.push(setTimeout(()=>aiBuzz(p),t));}
    }
  });
  buzzTimer=setTimeout(buzzTimeout,BUZZ_MS+30);
}
function clearBuzz(){
  if(buzzTimer){clearTimeout(buzzTimer);buzzTimer=null;}
  aiBuzzTimers.forEach(t=>clearTimeout(t)); aiBuzzTimers=[];
  const fill=$('buzzFill');
  const cur=getComputedStyle(fill).transform;
  fill.style.transition='none'; fill.style.transform=cur;
}
function playerBuzz(){
  if(phase!=='buzzing') return;
  clearBuzz();
  phase='answered';
  $('buzzWrap').style.display='none';
  $('pl_you').classList.add('buzzed');
  setHost("You're in! What's the answer?");
  $('buzzLabel').textContent='';
  $('clueAns').classList.add('show');
  $('feedMsg').textContent='You buzzed first &mdash; did you have it?';
  $('btnRow').innerHTML=
    '<button class="btn right" id="selfRight">&#9989; I was right</button>'+
    '<button class="btn wrong" id="selfWrong">&#10060; I was wrong</button>';
  $('selfRight').addEventListener('click',()=>resolvePlayer(true));
  $('selfWrong').addEventListener('click',()=>resolvePlayer(false));
}
function aiBuzz(ai){
  if(phase!=='buzzing') return;
  clearBuzz();
  phase='answered';
  $('buzzWrap').style.display='none';
  $('pl_'+ai.id).classList.add('buzzed');
  const correct=Math.random()<ai.acc;
  if(correct){
    $('clueAns').classList.add('show');
    addScore(ai,current.val);
    setHost(rand(HOST_AIWIN).replace('%s',ai.name));
    $('feedMsg').textContent=ai.name+' buzzed in and got it right!';
    $('feedMsg').className='feedmsg good';
    finishClue();
  } else {
    addScore(ai,-current.val);
    setHost(ai.name+' buzzed&hellip; and missed! The board reopens &mdash; you can buzz!');
    $('feedMsg').textContent=ai.name+' was wrong (&minus;$'+current.val+'). Buzz in if you know it!';
    $('feedMsg').className='feedmsg bad';
    reopenForPlayer(ai);
  }
}
function reopenForPlayer(missedAi){

    '<button class="btn ghost" id="passBtn">Pass</button>';

  $('passBtn').addEventListener('click',function(){phase='answered';revealAndClose("No buzz &mdash; here's the answer.");});
  const fill=$('buzzFill');
  fill.style.transition='none'; fill.style.transform='scaleX(1)'; void fill.offsetWidth;
  fill.style.transition='transform 2000ms linear'; fill.style.transform='scaleX(0)';

  });

}
function playerBuzzReopen(){
  if(phase!=='buzzing') return;

  $('pl_you').classList.add('buzzed');
  $('clueAns').classList.add('show');

  $('selfRight').addEventListener('click',()=>resolvePlayer(true));
  $('selfWrong').addEventListener('click',()=>resolvePlayer(false));
}
function buzzTimeout(){
  if(phase!=='buzzing') return;

}
function revealAndClose(hostMsg){
  $('buzzWrap').style.display='none';
  $('clueAns').classList.add('show');

  $('feedMsg').textContent='';

function resolvePlayer(right){
  const you=PLAYERS[0];
  if(right){
    addScore(you,current.val);
    flashGood(); confettiBurst();
    setHost(rand(HOST_RIGHT));
    $('feedMsg').textContent='+$'+current.val+'!';
    $('feedMsg').className='feedmsg good';
  } else {
    addScore(you,-current.val);
    flashBad();
    setHost(rand(HOST_WRONG));
    $('feedMsg').textContent='&minus;$'+current.val;
    $('feedMsg').className='feedmsg bad';
  }
  finishClue();
}
function startDailyDouble(){
  phase='dd';
  $('ddBanner').style.display='block';
  $('buzzWrap').style.display='none';
  setHost("Daily Double! No buzzer race &mdash; how confident are you?");
  const you=PLAYERS[0];
  const maxW=Math.max(1000, you.score, current.val);
  $('wagerMax').textContent='$'+maxW.toLocaleString();
  const wi=$('wagerInput'); wi.value=current.val; wi.max=maxW; wi.min=0;
  $('wagerBox').classList.add('show');
  $('clueText').innerHTML='<em style="opacity:.85;font-size:.9rem">(Category: '+board[current.c].cat+')</em><br><br>Set your wager, then reveal the clue.';
  $('btnRow').innerHTML='';
  $('wagerGo').onclick=function(){
    let w=parseInt(wi.value,10); if(isNaN(w)||w<0)w=0; if(w>maxW)w=maxW;
    current.wager=w;
    $('wagerBox').classList.remove('show');
    $('clueText').innerHTML=current.clue.q;
    $('clueVal').innerHTML=board[current.c].cat+'  Daily Double  &bull;  $'+w.toLocaleString();
    $('clueAns').classList.add('show');
    phase='answered';
    setHost("There's the clue &mdash; did you nail it?");
    $('feedMsg').textContent='Wager: $'+w.toLocaleString();
    $('btnRow').innerHTML=
      '<button class="btn right" id="ddRight">&#9989; I was right</button>'+
      '<button class="btn wrong" id="ddWrong">&#10060; I was wrong</button>';
    $('ddRight').onclick=function(){resolveDD(true);};
    $('ddWrong').onclick=function(){resolveDD(false);};
  };
}
function resolveDD(right){
  const you=PLAYERS[0];
  const w=current.wager||0;
  if(right){addScore(you,w);flashGood();confettiBurst();setHost(rand(HOST_RIGHT));$('feedMsg').textContent='+$'+w.toLocaleString()+'!';$('feedMsg').className='feedmsg good';}
  else{addScore(you,-w);flashBad();setHost(rand(HOST_WRONG));$('feedMsg').textContent='&minus;$'+w.toLocaleString();$('feedMsg').className='feedmsg bad';}
  finishClue();
}
function addScore(p,delta){
  p.score+=delta;
  const el=$('sc_'+p.id);
  if(el){
    el.textContent='$'+p.score.toLocaleString();
    el.classList.toggle('neg',p.score<0);
    el.classList.remove('scorebump'); void el.offsetWidth; el.classList.add('scorebump');
  }
}
function finishClue(){
  current.clue.done=true;
  tilesLeft--;
  $('btnRow').insertAdjacentHTML('beforeend','<button class="btn cont" id="contBtn">Continue &#9654; (Enter)</button>');
  $('contBtn').addEventListener('click',closeClue);
}
function closeClue(){
  $('overlay').classList.remove('show');
  document.querySelectorAll('.player').forEach(p=>p.classList.remove('buzzed'));
  phase='idle';
  current=null;
  renderBoard();
  renderPlayers();
  if(tilesLeft<=0){ setTimeout(endGame,400); }
  else setHost(rand(HOST_PICK));
}
function flashGood(){const c=$('clueCard');c.classList.remove('flash-good');void c.offsetWidth;c.classList.add('flash-good');}
function flashBad(){const c=$('clueCard');c.classList.remove('flash-bad');void c.offsetWidth;c.classList.add('flash-bad');}
function confettiBurst(){
  const box=$('confetti');box.innerHTML='';box.classList.add('show');
  const colors=['#b1d887','#0074C8','#f3c44b','#01426A','#ff5ca0','#fff'];
  for(let i=0;i<70;i++){
    const s=document.createElement('i');
    s.style.left=Math.random()*100+'vw';
    s.style.background=colors[i%colors.length];
    s.style.animationDuration=(1.4+Math.random()*1.4)+'s';
    s.style.animationDelay=(Math.random()*0.3)+'s';
    s.style.transform='rotate('+(Math.random()*360)+'deg)';
    box.appendChild(s);
  }
  setTimeout(()=>box.classList.remove('show'),2600);
}
function endGame(){
  const ranked=PLAYERS.slice().sort((a,b)=>b.score-a.score);
  const top=ranked[0].score;
  const winners=ranked.filter(p=>p.score===top);
  const you=PLAYERS[0];
  const youWin=winners.some(w=>w.human)&&winners.length===1;
  const tie=winners.length>1&&winners.some(w=>w.human);
  const s=getStats();
  s.games++;
  if(youWin)s.wins++; else if(tie)s.ties++; else s.losses++;
  if(you.score>s.high)s.high=you.score;
  setStats(s);
  $('endCrown').innerHTML=youWin?'&#127942;':(tie?'&#129309;':'&#128640;');
  $('endWinner').innerHTML=youWin?'You win! &#127881;':(tie?"It's a tie!":winners[0].name+' takes it');
  $('endRows').innerHTML=ranked.map(p=>(
    '<div class="finalrow'+(p.score===top?' win':'')+'"><span>'+p.name+(p.human?'':' (AI)')+'</span>'+
    '<span class="v">$'+p.score.toLocaleString()+'</span></div>'
  )).join('');
  $('endAlltime').innerHTML='All-time: '+s.wins+'W &ndash; '+s.losses+'L'+(s.ties?' &ndash; '+s.ties+'T':'')+
    ' &bull; high score $'+s.high.toLocaleString();
  $('endScreen').classList.add('show');
  if(youWin)confettiBurst();
}
document.addEventListener('keydown',function(e){
  if(e.code==='Space'){
    if(phase==='buzzing'){
      e.preventDefault();
      const btn=$('buzzBtn'); if(btn) btn.click();
    }
  } else if(e.code==='Enter'){
    const cont=$('contBtn');
    if(cont && $('overlay').classList.contains('show')){e.preventDefault();cont.click();}
    if($('endScreen').classList.contains('show')){e.preventDefault();$('playAgain').click();}
  }
});
$('playAgain').addEventListener('click',function(){$('endScreen').classList.remove('show');newGame();});
newGame();
</script>
</body>
</html>

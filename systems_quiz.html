  "anti-ice-035": [{ ref:"FCOM 3.10.3", quote:"BACKUP WINDOW HEAT Switches ON – backup window heat anti-fogging is commanded on for the selected windows if primary window heat system fails." },{ ref:"FCOM 3.20.3", quote:"With the BACKUP L FWD and R FWD switches in the ON position, a backup antifogging system for the forward windows operates automatically if the primary window heat system fails." }],
  "anti-ice-036": [{ ref:"FCOM 3.20.3", quote:"The forward windows are equipped with independently controlled, three-speed wipers." },{ ref:"FCOM 3.10.4", quote:"WIPER Selectors OFF – the wiper is stowed vertically. INT (intermittent) – the wiper operates intermittently. LOW – the wiper operates at low speed. HIGH – the wiper operates at high speed.", note:"Three speeds listed: INT, LOW, HIGH (plus OFF/stowed)" }],
  "anti-ice-037": [{ ref:"FCOM 3.10.4", quote:"WIPER Selectors OFF – the wiper is stowed vertically." },{ ref:"FCOM 3.20.3", quote:"When the WIPER selector in OFF, the respective wiper is off and stowed." }],
  "anti-ice-038": [{ ref:"FCOM 3.20.3", quote:"The Captains and First Officers windshields are equipped with a windshield washer system." }],
  "anti-ice-039": [{ ref:"FCOM 3.20.3", quote:"Windshield washer switches command a continuous application of washer fluid while held ON." }],
  "anti-ice-040": [{ ref:"FCOM 3.20.3", quote:"Windshield scratching may occur if wipers are used on a dry windshield surface." },{ ref:"FCOM SP.3.1", quote:"CAUTION: Windshield scratching will occur if the windshield wipers are operated on a dry windshield." }],
  "anti-ice-041": [{ ref:"FCOM 3.20.4", quote:"Three pitot probes and two angle of attack probes are electrically heated for anti-ice protection when either engine is operating." },{ ref:"FCOM 10.20.17", quote:"The major components of the ADRS are: … three pitot probes … two angle-of-attack sensors … one total air temperature probe." }],
  "anti-ice-042": [{ ref:"FCOM 3.20.4", quote:"Three pitot probes and two angle of attack probes are electrically heated for anti-ice protection when either engine is operating." },{ ref:"FCOM 10.20.17", quote:"The ADRS receives data from two angle of attack sensors, an airframe mounted dual element total air temperature probe, and engine TAT sensors." }],
  "anti-ice-043": [{ ref:"FCOM 3.20.4", quote:"The total air temperature probe is electrically heated for anti-ice protection in flight." },{ ref:"FCOM 10.20.17", quote:"The major components of the ADRS are: … one total air temperature probe." }],
  "anti-ice-044": [{ ref:"FCOM 3.20.4", quote:"Three pitot probes and two angle of attack probes are electrically heated for anti-ice protection when either engine is operating." }],
  "anti-ice-045": [{ ref:"FCOM 3.20.4", quote:"The total air temperature probe is electrically heated for anti-ice protection in flight." }],
  "anti-ice-046": [{ ref:"FCOM 10.20.17", quote:"Two pitot probes (right and center) are mounted on the right forward section of the airplane. One pitot probe (left) is mounted on the left forward section of the airplane." }],
  "anti-ice-047": [{ ref:"FCOM 3.10.3", quote:"BACKUP WINDOW HEAT Switches ON – backup window heat anti-fogging is commanded on for the selected windows if primary window heat system fails." },{ ref:"FCOM 3.20.3", quote:"With the BACKUP L FWD and R FWD switches in the ON position, a backup antifogging system for the forward windows operates automatically if the primary window heat system fails." }],
  "anti-ice-048": [{ ref:"FCOM 3.20.1", quote:"The engine anti-ice indication EAI is displayed above the EICAS N1 indication when an engine anti-ice valve is open. Engine anti-ice can be operated in flight or on the ground. Automatic operation of the engine anti-ice system is inhibited on the ground.", note:"Composite source for all-of-the-above question; each sub-fact (A)(B)(C) sourced to FCOM 3.20.1" }],
  "fire-protection-001": [{ ref:"FCOM 8.20.1", quote:"There are fire detection and extinguishing systems for the: • APU • cargo compartments • engines • lavatories" }],
  "fire-protection-002": [{ ref:"FCOM 8.20.1", quote:"The main gear wheel wells have a fire detection system, but no fire extinguishing system. The overhead flight crew rest compartment has a fire detection system, but no fire extinguishing system. The overhead flight attendant rest compartment has a fire detection system, but no fire extinguishing system." }],
  "fire-protection-003": [{ ref:"FCOM 8.20.4", quote:"The nose wheel well does not have a fire or overheat detection system." }],
  "fire-protection-004": [{ ref:"FCOM 8.20.1", quote:"The engines also have overheat detection systems." }],
  "fire-protection-005": [{ ref:"FCOM 8.10.4", quote:"Push and hold – • sends fire/overheat test signals to the engine, APU, wheel well, and cargo compartment fire detector systems • tests flight deck fire and overheat indications" }],
  "fire-protection-006": [{ ref:"FCOM 8.20.1", quote:"The EICAS advisory message DET FIRE ENG (L or R) is displayed if the engine fire detection system fails." }],
  "fire-protection-007": [{ ref:"FCOM 8.20.4", quote:"The EICAS advisory message DET FIRE APU is displayed if the APU fire detection system fails." }],
  "fire-protection-008": [{ ref:"FCOM 8.20.5", quote:"Whenever cargo compartment smoke detection is inoperative, the EICAS advisory message DET FIRE CARGO (FWD or AFT) is displayed." }],
  "fire-protection-009": [{ ref:"FCOM 8.20.1", quote:"If a fault is detected in one channel, the remaining channel element automatically switches to single channel operation. If the operating channel senses a fire or overheat, the system provides the appropriate fire warning or overheat caution." }],
  "fire-protection-010": [{ ref:"FCOM 8.20.1", quote:"There are multiple dual-channel detector assemblies in each engine nacelle. Each detector channel provides both fire and overheat detection." }],
  "fire-protection-011": [{ ref:"FCOM 8.20.1", quote:"Normally, at least one element on each channel must detect a fire or overheat condition to cause an engine fire warning or overheat caution." }],
  "fire-protection-012": [{ ref:"FCOM 8.20.1", quote:"The indications of an engine overheat are: • the caution beeper sounds • the master CAUTION lights illuminate • the EICAS caution message OVERHEAT ENG (L or R) is displayed" }],
  "fire-protection-013": [{ ref:"FCOM 8.20.1", quote:"The indications of an engine fire are: • the fire bell sounds • the master WARNING lights illuminate • the EICAS warning message FIRE ENG (L or R) is displayed • the engine fire switch LEFT or RIGHT fire warning light illuminates • the engine fire switch unlocks • the engine FUEL CONTROL (L or R) switch fire warning light illuminates" }],
  "fire-protection-014": [{ ref:"FCOM 8.10.1", quote:"In – normal position, mechanically locked; unlocks automatically for a fire warning, or when the FUEL CONTROL switch is in CUTOFF." }],
  "fire-protection-015": [{ ref:"FCOM 8.10.1", quote:"Out – • arms both engine fire extinguishers • closes the associated engine and spar fuel valves • closes the associated engine anti-ice valves • trips the associated engine generators off • shuts off hydraulic fluid to the associated engine-driven hydraulic pump • depressurizes the associated engine-driven hydraulic pump • removes power to the thrust reverser isolation valve" }],
  "fire-protection-016": [{ ref:"FCOM 8.10.1", quote:"Out – • arms both engine fire extinguishers • closes the associated engine and spar fuel valves" }],
  "fire-protection-017": [{ ref:"FCOM 8.10.1", quote:"• trips the associated engine generators off" }],
  "fire-protection-018": [{ ref:"FCOM 8.10.1", quote:"• shuts off hydraulic fluid to the associated engine-driven hydraulic pump • depressurizes the associated engine-driven hydraulic pump" }],
  "fire-protection-019": [{ ref:"FCOM 8.10.1", quote:"• removes power to the thrust reverser isolation valve" }],
  "fire-protection-020": [{ ref:"FCOM 8.10.1", quote:"Out – • arms both engine fire extinguishers" }],
  "fire-protection-021": [{ ref:"FCOM 8.20.3", quote:"There are two fire extinguisher bottles. Either or both bottles can be discharged into either engine. When the engine fire switch is pulled out, rotating the fire switch in either direction discharges a single extinguisher bottle into the associated engine." }],
  "fire-protection-022": [{ ref:"FCOM 8.10.1", quote:"Engine Bottle Discharged (ENG BTL DISCH) Lights — Illuminated (amber) – the extinguisher bottle is discharged or has low pressure." }],
  "fire-protection-023": [{ ref:"FCOM 8.20.4", quote:"The APU compartment has dual fire detector loops." }],
  "fire-protection-024": [{ ref:"FCOM 8.20.4", quote:"There is no APU overheat detection." }],
  "fire-protection-025": [{ ref:"FCOM 8.20.4", quote:"Normally, both loops must detect a fire to produce a fire warning." }],
  "fire-protection-026": [{ ref:"FCOM 8.20.4", quote:"On the ground with both engines off an APU fire signal from either APU fire detector loop causes APU shutdown and extinguisher bottle discharge." }],
  "fire-protection-027": [{ ref:"FCOM 8.20.4", quote:"The indications of an APU fire warning are: • the fire bell sounds • the master WARNING lights illuminate • the EICAS warning message FIRE APU is displayed • the APU fire switch fire warning light illuminates • the APU fire switch unlocks" }],
  "fire-protection-028": [{ ref:"FCOM 8.20.4", quote:"An APU fire warning automatically shuts down the APU. An APU fire signal causes the APU to shutdown immediately. The APU extinguisher bottle is automatically discharged after a 15 second delay to allow time for the fuel valve to close." }],
  "fire-protection-029": [{ ref:"FCOM 8.20.4", quote:"The APU extinguisher bottle is automatically discharged after a 15 second delay to allow time for the fuel valve to close." }],
  "fire-protection-030": [{ ref:"FCOM 8.20.4", quote:"There is one APU fire extinguisher bottle." }],
  "fire-protection-031": [{ ref:"FCOM 8.10.3", quote:"Rotate – either direction discharges the APU fire extinguisher into the APU compartment." }],
  "fire-protection-032": [{ ref:"FCOM 8.20.4", quote:"If the bottle is discharged or has low pressure: • the APU BTL DISCH light illuminates • the EICAS advisory message BOTTLE DISCH APU is displayed" }],
  "fire-protection-033": [{ ref:"FCOM 8.10.3", quote:"Out – • arms the APU fire extinguisher bottle • closes the APU fuel valve • closes the APU air inlet door" }],
  "fire-protection-034": [{ ref:"FCOM 8.10.3", quote:"Out – • trips the APU generator field and generator breaker" }],
  "fire-protection-035": [{ ref:"FCOM 8.20.4", quote:"The main wheel well has fire and overheat detection. There is no fire extinguishing system." }],
  "fire-protection-036": [{ ref:"FCOM 8.20.5", quote:"The indications for a main wheel well fire are: • the fire bell sounds • the master WARNING lights illuminate • the EICAS warning message FIRE WHEEL WELL is displayed" }],
  "fire-protection-037": [{ ref:"FCOM 8.20.4", quote:"The indications for a main wheel well overheat are: • the caution beeper sounds • the master CAUTION lights illuminate • the EICAS caution message OVERHEAT WHEEL WELL is displayed" }],
  "fire-protection-038": [],
  "fire-protection-039": [],
  "fire-protection-040": [],
  "fire-protection-041": [{ ref:"FCOM 8.20.5", quote:"Eighteen detectors are installed in the forward cargo compartment." }],
  "fire-protection-042": [{ ref:"FCOM 8.20.5", quote:"Eleven detectors are installed in the aft (nine detectors) / bulk (two detectors) cargo compartments." }],
  "fire-protection-043": [{ ref:"FCOM 8.20.5", quote:"Note: The bulk cargo compartment is included in the AFT cargo fire detection and extinguishing systems." }],
  "fire-protection-044": [{ ref:"FCOM 8.20.5", quote:"Normally, two smoke detectors in the same cargo compartment must detect a fire or overheat condition at the same time to cause a cargo fire warning." }],
  "fire-protection-045": [{ ref:"FCOM 8.20.5", quote:"If one detector fails in a compartment, a single smoke detector detecting a fire or overheat condition causes a fire warning." }],
  "fire-protection-046": [{ ref:"FCOM 8.20.5", quote:"The indications of a cargo compartment fire are: • the fire bell sounds • the master WARNING lights illuminate • the EICAS warning message FIRE CARGO (FWD or AFT) is displayed • the CARGO FIRE (FWD or AFT) fire warning light illuminates" }],
  "fire-protection-047": [{ ref:"FCOM 8.20.6", quote:"Six fire extinguisher bottles are installed for cargo compartment fire extinguishing." }],
  "fire-protection-048": [{ ref:"FCOM 8.20.6", quote:"Cargo fire suppression is provided for 240-minute ETOPS operation. The most limiting cargo fire suppression system time is 240 minutes." }],
  "fire-protection-049": [{ ref:"FCOM 8.20.6", quote:"In flight, a fire warning from the cargo fire detection system causes the immediate total discharge of two extinguisher bottles into the affected compartment." }],
  "fire-protection-050": [{ ref:"FCOM 8.20.6", quote:"After a 15 minute time delay, the remaining four extinguisher bottles discharge at a reduced flow rate into the affected compartment." }],
  "fire-protection-051": [{ ref:"FCOM 8.20.6", quote:"If the airplane lands within the 15 minute time delay, one of the remaining bottles discharges at the reduced rate on touchdown." }],
  "fire-protection-052": [{ ref:"FCOM 8.20.6", quote:"On the ground, if a CARGO FIRE DISCHARGE switch is pushed, three extinguisher bottles discharge simultaneously into the selected compartment, with the third bottle discharging at a reduced flow rate." }],
  "fire-protection-053": [{ ref:"FCOM 8.20.6", quote:"When cargo fire extinguisher bottle discharge is initiated and the first two extinguisher bottles begin to discharge: • the CARGO FIRE DISCHARGE switch light illuminates • the EICAS advisory message BOTTLE DISCH CARGO is displayed" }],
  "fire-protection-054": [{ ref:"FCOM 8.10.3", quote:"ARMED – • commands the packs to provide the minimum air flow required to provide pressurization" }],
  "fire-protection-055": [{ ref:"FCOM 8.10.3", quote:"ARMED – • shuts down the bulk cargo compartment ventilation system operation (aft cargo fire only)" }],
  "fire-protection-056": [{ ref:"FCOM 8.10.3", quote:"ARMED – • turns off Nitrogen Generation System (NGS)" }],
  "fire-protection-057": [{ ref:"FCOM 8.10.3", quote:"ARMED – • outflow valves move to 50/50 flow split for air flow stability" }],
  "fire-protection-058": [{ ref:"FCOM 8.20.6", quote:"The EICAS caution message SMOKE REST UPR DR 1 indicates smoke in the compartment." }],
  "fire-protection-059": [{ ref:"FCOM 8.20.6", quote:"The EICAS caution message SMOKE REST UPR DR 4 indicates smoke in the compartment." }],
  "fire-protection-060": [{ ref:"FCOM 8.20.7", quote:"Each lavatory has a single smoke detector." }],
  "fire-protection-061": [{ ref:"FCOM 8.20.7", quote:"If smoke is detected, an aural alert sounds in the lavatory and in the cabin. In addition, the lavatory call light flashes and the master call light at the associated attendant station illuminates. The EICAS advisory message SMOKE LAVATORY is displayed." }],
  "fire-protection-062": [{ ref:"FCOM 8.20.7", quote:"Each lavatory has one fire extinguisher bottle. The bottle discharges through two nozzles into the waste container. Extinguisher operation is automatic." }],
  "fire-protection-063": [{ ref:"FCOM 8.20.7", quote:"There is no flight deck indication." }],
  "communications-001": [{ ref:"FCOM 5.20.1", quote:"The communication systems are controlled using the: • audio control panels • tuning and control panels (TCP) • control display unit (CDU) communications pages • multifunction display (MFD) communications pages" }],
  "communications-002": [{ ref:"FCOM 11.10.11", quote:"Transponder (XPDR) Code — Displays the current ATC transponder squawk code as set on the TCP XPDR page." }],
  "communications-003": [{ ref:"FCOM 11.10.11", quote:"Flight Number (FLT #) — Displays the current flight number as set on the RTE 1/X page." }],
  "communications-004": [{ ref:"FCOM 5.40.48", quote:"Arriving ATC and Flight Information uplink messages are annunciated by an EICAS •ATC communications message and an aural chime. The message text is displayed in the ATC Data Block. The message text can also be displayed using the NEW MESSAGE menu selection." }],
  "communications-005": [{ ref:"FCOM 5.40.48", quote:"Arriving company uplink messages are annunciated by an optional EICAS •COMM communications message, optional EICAS •PRINTER communications message, and/or optional aural chime." }],
  "communications-006": [{ ref:"FCOM 5.10.1", quote:"pushing the CAB transmitter select switch twice within one second places a priority call to a selected cabin station" }],
  "communications-007": [{ ref:"FCOM 5.10.1", quote:"Note: Second push of the CAB select switch deselects the transmitter and receiver audio only after one second has elapsed from the first push." }],
  "communications-008": [{ ref:"FCOM 5.10.3", quote:"In case of an uncommanded ACP restart, the ACP will blank intermittently taking approximately 5 seconds to complete and would set the ACP to the last configuration set prior to last aircraft power down." }],
  "communications-009": [{ ref:"FCOM 5.20.1", quote:"Microphones are keyed by pushing the desired audio control panel transmitter select switch and using the MIC (microphone) position of a control wheel or audio control panel microphone/interphone switch, a glareshield MIC switch, or a hand microphone push-to-talk switch." }],
  "communications-010": [{ ref:"FCOM 5.20.2", quote:"VHF L is configured for voice communication only and VHF C is normally used for data communication." }],
  "communications-011": [{ ref:"FCOM 5.20.2", quote:"VHF L is configured for voice communication only and VHF C is normally used for data communication. VHF C and VHF R can be used for both voice or data communication." }],
  "communications-012": [{ ref:"FCOM 5.20.2", quote:"However, only one VHF radio can operate in the data mode at a time." }],
  "communications-013": [{ ref:"FCOM 5.20.2", quote:"When a VHF radio is tuned to frequency 121.5, all flight crew automatically monitor the radio. The receiver lights on all audio control panels illuminate." }],
  "communications-014": [{ ref:"FCOM 5.20.2", quote:"When ------- - X - ------- is displayed on the TCP, the affected radio (X) is inoperative." }],
  "communications-015": [{ ref:"FCOM 5.20.2", quote:"In event of electrical power loss, the left VHF radio and left TCP continue to operate on standby power." }],
  "communications-016": [{ ref:"FCOM 5.20.4", quote:"The data mode can be selected and deselected by pushing the frequency transfer switch when the word DATA is displayed on the active radio line (VHF or HF)." }],
  "communications-017": [{ ref:"FCOM 5.20.4", quote:"A radio can be returned to the voice communication mode by transferring a voice frequency into the ACTIVE frequency window." }],
  "communications-018": [{ ref:"FCOM 5.20.4", quote:"Note: HF datalink transmissions are inhibited on the ground.", note:"Also see TCP HFDL GND XMIT key at FCOM 5.10.13 which toggles HF datalink ground transmit on/off" }],
  "communications-019": [{ ref:"FCOM 5.20.5", quote:"In the event a VHF or HF radio transmits for more than 30 seconds, the EICAS advisory message RADIO TRANSMIT CAPT, F/O, or OBS is displayed. The message is removed when the transmission stops." }],
  "communications-020": [{ ref:"FCOM 5.20.5", quote:"In the event a VHF or HF radio transmits for more than 30 seconds, the EICAS advisory message RADIO TRANSMIT CAPT, F/O, or OBS is displayed." }],
  "communications-021": [{ ref:"FCOM 5.20.5", quote:"On the ground, any VHF radio that transmits for more than approximately 35 seconds is automatically disabled. Several seconds before disablement, an intermittent tone can be heard through the audio system for that radio." }],
  "communications-022": [{ ref:"FCOM 5.20.5", quote:"That radio is enabled when the microphone switch for that radio is released." }],
  "communications-023": [{ ref:"FCOM 5.20.3", quote:"There are two independent HF communication radios, designated HF L (left) and HF R (right). Each HF radio can be tuned by any TCP from the main HF page." }],
  "communications-024": [{ ref:"FCOM 5.20.3", quote:"Up to three pages of stored HF frequencies (24 total) can be stored in the TCP." }],
  "communications-025": [{ ref:"FCOM 5.20.3", quote:"Data is stored in memory for the last 100 tuned frequencies. Stored frequencies may tune quickly and a tone may not be noticeable." }],
  "communications-026": [{ ref:"FCOM 5.20.3", quote:"A tone lasting longer than 7 seconds indicates failure of the system to tune." }],
  "communications-027": [{ ref:"FCOM 5.20.3", quote:"The HF radios operate in one of two modes, upper side band (USB) or amplitude modulation (AM). The USB/AM key on the main HF page is used to toggle between these two modes." }],
  "communications-028": [{ ref:"FCOM 5.20.3", quote:"Both HF radios use a common antenna. When either HF radio is transmitting, the antenna is disconnected from the other HF radio, and it cannot be used to transmit or receive. However, both HF radios can receive simultaneously if neither is being used for transmitting." }],
  "communications-029": [{ ref:"FCOM 5.20.3", quote:"If an ATC uplink containing a VHF frequency is accepted, the uplink frequency is displayed in the scratchpad preceded by a UL indicator." }],
  "communications-030": [{ ref:"FCOM 5.20.3", quote:"Line selecting this frequency into the active, standby or a stored position clears the scratchpad. It also turns the uplink frequency green in the uplink data block." }],
  "communications-031": [{ ref:"FCOM 5.20.3", quote:"It is possible for one clearance to contain both a radio frequency and a transponder code. The radio frequency appears in the scratchpad only when the appropriate page is displayed on the TCP; transponder codes appear when the transponder page is displayed." }],
  "communications-032": [{ ref:"FCOM 5.40.81", quote:"The ADS page controls the following airplane ADS functions: • ADS ARM – allows airplane ADS functions • ADS OFF – inhibits airplane ADS functions • ADS EMERGENCY – sends an alert to ATC indicating an emergency situation (resets to ADS EMERGENCY OFF at power-up) • ADS EMERGENCY OFF – cancels emergency indication to ATC" }],
  "communications-033": [{ ref:"FCOM 5.40.81", quote:"ADS EMERGENCY – sends an alert to ATC indicating an emergency situation (resets to ADS EMERGENCY OFF at power-up)" }],
  "communications-034": [{ ref:"FCOM 5.40.81", quote:"ADS EMERGENCY – sends an alert to ATC indicating an emergency situation (resets to ADS EMERGENCY OFF at power-up)" }],
  "communications-035": [{ ref:"FCOM 5.40.81", quote:"the airplane can be in contact with up to 5 different facilities at one time" }],
  "communications-036": [{ ref:"FCOM 5.40.81", quote:"Only one ATSP can be inhibited at a time." }],
  "communications-037": [{ ref:"FCOM 5.20.5", quote:"Incoming SATCOM calls are annunciated by a SELCAL chime and illumination of a CALL light on the audio control panel." }],
  "communications-038": [{ ref:"FCOM 5.20.5", quote:"Pressing the respective transmitter select switch connects the call to the pilot headset/hand mic." }],
  "communications-039": [{ ref:"FCOM 5.20.5", quote:"SATCOM calls are terminated when the CALL light extinguishes (ground party hang-up or pilot ends call)." }],
  "communications-040": [{ ref:"FCOM 5.20.5", quote:"The EICAS communication message SATCOM CALL displays when a SATCOM message requires flight crew attention. Servicing the message clears the EICAS message." }],
  "communications-041": [{ ref:"FCOM 5.20.5", quote:"The Rockwell SDU-2200B SATCOM system (as installed) provides four priority levels: • Emergency (EMG) - emergency and distress calls (activates ground station alarm) • High (HGH) - regulatory and flight safety calls • Low (LOW) - non-safety related service calls. • Public (PUB) - non-safety related public correspondence." }],
  "communications-042": [{ ref:"FCOM 5.20.5", quote:"Emergency (EMG) - emergency and distress calls (activates ground station alarm)" }],
  "communications-043": [{ ref:"FCOM 5.10.12", quote:"Note: SBB communications are limited to PUB priority only." }],
  "communications-044": [{ ref:"FCOM SP.5.1", quote:"Note: The first two procedure steps may be performed in any order. Establish communication with desired SATCOM ground station. Establish cabin interphone communication with the cabin crew. Select both CAB and SAT transmitter select switches on the observer ACP." }],
  "communications-045": [{ ref:"FCOM SP.5.1", quote:"Select both CAB and SAT transmitter select switches on the observer ACP. Note: With both CAB and SAT transmitter select switches active on the same ACP, a SATCOM conference is established between the cabin crew and ground station." }],
  "communications-046": [{ ref:"FCOM SP.5.1", quote:"Note: The conferencing ACP is unusable by the flight crew for other communications while cabin / SATCOM conference is in progress." }],
  "communications-047": [{ ref:"FCOM 5.30.1", quote:"The interphone communication system includes the: • flight interphone system • service interphone system • cabin interphone system • passenger address (PA) system" }],
  "communications-048": [{ ref:"FCOM 5.30.1", quote:"The flight interphone, service interphone, and passenger address systems are normally operated through the audio select panel. The cabin interphone is operated through the TCP or the flight deck handset." }],
  "communications-049": [{ ref:"FCOM 5.30.1", quote:"Crew alerting of a ground crew initiated call is provided by an aural alert chime, the GROUND CALL EICAS communications alert message, and a CALL light illuminated on the audio control panel transmitter select switch." }],
  "communications-050": [{ ref:"FCOM 5.30.2", quote:"The system can be connected to the flight interphone system through the service interphone switch on the overhead panel." }],
  "communications-051": [{ ref:"FCOM 5.30.1", quote:"Pushing a PA mic switch on an audio control panel provides direct access to all PA areas." }],
  "communications-052": [{ ref:"FCOM 5.30.1", quote:"A PA sales mode function, selected by using the appropriate dial code, provides the capability for flight crews and flight attendants to make cabin announcements without interrupting passenger in-flight entertainment (IFE) audio and video broadcasts." }],
  "communications-053": [{ ref:"FCOM 5.30.1", quote:"Cabin PA announcement priorities are: • flight deck announcements from an audio control panel • priority (all area) announcements • normal announcements from flight attendant or flight deck handsets" }],
  "communications-054": [{ ref:"FCOM 5.40.85", quote:"the center VHF radio is selected as the default" }],
  "communications-055": [{ ref:"FCOM 5.40.85", quote:"the VHF default radio is set to data mode on the ground or voice mode in the air" }],
  "communications-056": [{ ref:"FCOM 5.40.85", quote:"the right HF radio is selected as the default and set to voice mode" }],
  "communications-057": [{ ref:"FCOM 5.40.85", quote:"This reset does not occur at power–up." }],
  "communications-058": [{ ref:"FCOM 5.40.85", quote:"The data communication system may automatically reset (AMI option) after each flight. If selected, reset occurs approximately 10 minutes after the last engine is shut down, and with any entry door open." }],
  "communications-059": [{ ref:"FCOM 5.40.85", quote:"Datalink capability for the flight management system, OMS, and EICAS related maintenance functions, and cabin functions are not reset with this feature." }],
  "communications-060": [{ ref:"FCOM 5.20.1", quote:"An oxygen mask microphone is enabled and the boom microphone is disabled when the oxygen mask stowage doors are open." }],
  "communications-061": [{ ref:"FCOM 5.20.1", quote:"The oxygen mask microphone is disabled and the boom microphone is enabled when the left oxygen mask stowage box door is closed and the RESET/TEST lever is pushed." }],
  "communications-062": [{ ref:"FCOM 5.20.1", quote:"It also records flight deck area conversations using an area microphone and crewmember boom, oxygen mask, and hand microphones, independent of microphone/interphone switch positions. All inputs are recorded continuously." }],
  "communications-063": [{ ref:"FCOM 5.30.1", quote:"The system is used by selecting the INT position of a control wheel or audio control panel mic/interphone switch. The interphone can also be used by selecting the FLT transmitter selector on an ACP and then selecting a MIC switch (control wheel, ACP, hand mic PTT, or glareshield).", note:"Also accepts hand mic PTT or glareshield MIC switch; the two ways WITHOUT FLT selector are the INT position on control wheel or ACP mic/interphone switch" }],
  "communications-064": [{ ref:"FCOM 5.40.49", quote:"the communications management system then monitors clearance parameters and notifies the flight crew with a COMM SYSTEM MESSAGE when either the condition has been met, or the crew has taken an action to execute the clearance before the condition has been met." }],
  "communications-065": [{ ref:"FCOM 5.40.49", quote:"When a conditional clearance monitor function must be cancelled (e.g. a new clearance is received by voice that supersedes the conditional clearance) the crew can select CONDITIONAL CLEARANCES from the ATC menu and then choose DELETE on the CONDITIONAL MONITOR page." }],
  "communications-066": [{ ref:"FCOM 5.40.81", quote:"a 4 character ICAO identifier if a previous connection was established • a 7 character ACARS address if a previous connection was not established" }],
  "communications-067": [{ ref:"FCOM 5.10.3", quote:"Note: Marker beacon audio is available in all positions." }],
  "communications-068": [{ ref:"FCOM 5.30.1", quote:"Note: Voice level from the flight deck speakers decreases when selecting the MIC/INT switch on the ACP or control wheel, the PTT switch on the hand microphone, or the MIC switch on the glareshield." }],
  "sftd-1-001": [],
  "sftd-1-002": [{ ref:"FCOM 1.45.7", quote:"Emergency Descent Devices . . . . . . . . . . . . . . . . . . . . . . . 1.45.3", note:"TOC entry; descent device stowage and use described at FCOM 1.45.3. Quantity of 4 is per Alaska 787 configuration." }],
  "sftd-1-003": [{ ref:"FCOM 1.45.7", quote:"Emergency Equipment Locations - Flight Deck . . . . . . . . . . . . . . 1.45.7", note:"PBE count of 1 per flight deck is per aircraft configuration diagram; FCOM 1.45.7 is the equipment locations section." }],
  "sftd-1-004": [{ ref:"FCOM 1.40.1", quote:"the BATTERY switch is pushed and the left CCR start-up cycle begins (approximately 2-3 minutes in duration)" }],
  "sftd-1-005": [{ ref:"FCOM 1.40.1", quote:"the right CCR will not begin the start-up cycle until the left CCR completes start-up and a power source other than the battery (APU or external power) is available." }],
  "sftd-1-006": [{ ref:"FCOM L.10.1", quote:"Runway slope +/- 2%" }],
  "sftd-1-007": [{ ref:"FCOM L.10.1", quote:"# Maximum Takeoff and Landing Tailwind Component 15 knots" }],
  "sftd-1-008": [{ ref:"FCOM L.10.1", quote:"Maximum Takeoff and Landing Altitude 14,000 ft pressure altitude" }],
  "sftd-1-009": [{ ref:"FCOM L.10.1", quote:"# Do not operate HF radios when refueling." }],
  "sftd-1-010": [{ ref:"FCOM 14.20.4", quote:"The RTO autobrake setting commands maximum braking pressure if: • the airplane is on the ground, and • groundspeed is above 85 knots, and • both thrust levers are retarded to idle" }],
  "sftd-1-011": [{ ref:"FCOM 6.20.4", quote:"In flight, the RAT deploys automatically if any of the following occur: • both engines have failed • all three hydraulic system pressures are low • loss of all electrical power to captain's and first officer's flight instruments • loss of all four EMPs and faults in the flight control system occur on approach • loss of all four EMPs and an engine fails on takeoff or landing" }],
  "sftd-1-012": [{ ref:"FCOM 8.20.4", quote:"An APU fire signal causes the APU to shutdown immediately. The APU extinguisher bottle is automatically discharged after a 15 second delay to allow time for the fuel valve to close." }],
  "sftd-1-013": [{ ref:"FCOM 7.10.1", quote:"The airplane is powered by two General Electric GEnx-1B74/75 engines. The engines are rated at 74,100 pounds of takeoff thrust each.", note:"Boeing Equivalent Thrust (BET) — see FCOM note at same location." }],
  "sftd-1-014": [{ ref:"FCOM 8.10.5", quote:"Note: If the common core system is not running, the APU controller delays start until the required common core applications are available." }],
  "sftd-1-015": [{ ref:"FCOM 9.10.1", quote:"only one VHF radio can operate in the data mode at a time." }],
  "sftd-1-016": [{ ref:"FCOM 9.10.1", quote:"VHF L is configured for voice communication only and VHF C is normally used for data communication." }],
  "sftd-1-017": [{ ref:"FCOM 9.20.4", quote:"A tone lasting longer than 7 seconds indicates failure of the system to tune." }],
  "sftd-1-018": [{ ref:"FCOM 1.40.5", quote:"The fasten seat belt signs are controlled by an overhead panel selector. The signs automatically illuminate when the SEAT BELTS switch is in the AUTO position and: • landing gear not up and locked, or • flap lever at 5 or greater, or • cabin altitude above 10,000 feet", note:"FCOM also lists 'airplane altitude below 10,000 feet MSL' and 'passenger oxygen on'; question selects the three most commonly tested." }],
  "sftd-1-019": [{ ref:"FCOM 1.40.14", quote:"The masks automatically drop from the PSU prior to the cabin altitude reaching the greater of: • 14,500 feet, or • origin airfield altitude +1500 feet, or • destination airfield altitude +1500 feet" }],
  "sftd-1-020": [{ ref:"FCOM 1.40.14", quote:"Oxygen is available for approximately 22 minutes." }],
  "sftd-1-021": [{ ref:"FCOM L.10.8", quote:"# Headwind 25 knots # Tailwind 15 knots # Crosswind 25 knots (15 KTS for CAT II/III)" }],
  "sftd-1-022": [{ ref:"FCOM L.10.8", quote:"# Without LAND 2 or LAND 3 annunciated, the autopilot must be disengaged below 135 feet AGL." }],
  "sftd-1-023": [{ ref:"FCOM L.10.8", quote:"# Do not use FLCH on final approach below 1,000 feet AFE." }],
  "sftd-1-024": [{ ref:"FCOM L.10.6", quote:"Takeoff is permitted only in the normal flight control mode." }],
  "sftd-1-025": [{ ref:"FCOM L.10.6", quote:"The maximum altitude with flaps extended is 20,000 feet." }],
  "sftd-1-026": [{ ref:"FCOM 2.10.3", quote:"When upper and/or lower RECIRCULATION FAN switches are OFF, an EICAS advisory message RECIRC FAN UPR and/or LWR OFF is displayed." }],
  "sftd-1-027": [{ ref:"FCOM 2.20.1", quote:"Two CACs are dedicated to each pack. A single CAC provides sufficient air to operate its associated pack in all operating modes." }],
  "sftd-1-028": [{ ref:"FCOM 2.30.1", quote:"Two outflow valves are installed: one forward and one aft. Normally, the outflow of cabin air is split equally between these two outflow valves." }],
  "sftd-1-029": [{ ref:"FCOM 2.30.1", quote:"The pressurization system uses ambient pressure and flight plan data from the FMC to calculate a cabin pressurization schedule." }],
  "sftd-1-030": [{ ref:"FCOM 4.10.10", quote:"AUTO – varies between 15º – 25º, depending on TAS" }],
  "sftd-1-031": [{ ref:"FCOM 4.10.21", quote:"If not pushed below 50 knots, autothrottle operation is inhibited until reaching 400 feet altitude" }],
  "sftd-1-032": [{ ref:"FCOM 4.10.21", quote:"pushing either switch above 80 knots disarms LNAV and VNAV" }],
  "sftd-1-033": [{ ref:"FCOM 4.20.4", quote:"If glideslope signal interference and fluctuations occur, the AFDS limits the descent angle of the airplane to 3.25 degrees while the system is in the glideslope attitude stabilizing mode. This mode uses inertial data for up to 15 seconds to allow the glideslope signal error to resolve." }],
  "sftd-1-034": [{ ref:"FCOM 4.20.21", quote:"between 25 and 50 feet radio altitude, the autothrottle begins retarding thrust levers to idle" }],
  "sftd-1-035": [{ ref:"FCOM 6.20.4", quote:"The APU battery provides power on the ground for: • APU start • navigation lights (when Towing Power mode is active)" }],
  "sftd-1-036": [{ ref:"FCOM 7.10.8", quote:"The RUNNING indication blanks 30 seconds after engine reaches idle." }],
  "sftd-1-037": [{ ref:"FCOM 15.10.1", quote:"red alert messages remain displayed and cannot be canceled by pushing the CANC/RCL switch … cannot be canceled by pushing the CANC/RCL switch [Communication messages] … cannot be canceled by pushing the CANC/RCL switch [Memo messages]" }],
  "sftd-1-038": [{ ref:"FCOM 15.10.1", quote:"amber alert messages can be canceled or recalled by pushing the CANC/RCL switch [Caution] … amber alert messages can be canceled or recalled by pushing the CANC/RCL switch [Advisory]" }],
  "sftd-1-039": [{ ref:"FCOM 15.20.2", quote:"A rectangular symbol [] prefaces an alert message that has procedural steps." },{ ref:"QRH CI.2.1", quote:"A rectangle icon [ ] precedes all EICAS alert messages that have procedural steps, notes, or other information of which the flight crew should be aware." }],
  "sftd-1-040": [{ ref:"FCOM 10.60.2", quote:"Closed loop action items continuously monitor the position of a flight deck switch, lever, or selector. When the control is in the required position, the action item color changes to green … Open loop action items require the flight crew to manually confirm completion with the CCD." }],
  "sftd-1-041": [{ ref:"FCOM 11.20.3", quote:"The major components of the IRS are: • two inertial reference units (IRU) • two attitude heading reference units (AHRU)" }],
  "sftd-1-042": [{ ref:"FCOM 11.20.8", quote:"Primary Flight Controls enter Secondary Mode AFDS INOP Autopilot INOP Autothrottles INOP", note:"From IRS Schematic diagram labels for NAV AIR DATA SYS message condition." }],
  "sftd-1-043": [{ ref:"FCOM 11.20.8", quote:"Center Pitot Static Only", note:"ISFD driven by center pitot/static only when NAV AIR DATA SYS message active; altitude and airspeed may be unreliable." }],
  "sftd-1-044": [{ ref:"FCOM 11.30.1", quote:"There are three independent FMCs. At power up, one FMC is designated to accomplish the flight management tasks while the other FMCs monitor." },{ ref:"FCOM 11.32.5", quote:"At powerup, the three FMCs are designated as master, spare and backup." }],
  "sftd-1-045": [{ ref:"FCOM 11.32.5", quote:"This transition occurs automatically and is not apparent to the crew. No crew action is necessary. LNAV and VNAV, if active, remain active and all flight plan and performance data is retained." }],
  "sftd-1-046": [{ ref:"FCOM 11.32.5", quote:"If two FMCs fail in flight, the third FMC automatically takes over in a single FMC configuration. The EICAS advisory message SINGLE FMC is displayed." }],
  "sftd-1-047": [{ ref:"FCOM 11.32.5", quote:"All data is retained, NDs continue to operate, but LNAV and VNAV deselect. The flight crew needs to reactivate and execute the flight plan, and reselect LNAV and VNAV." }],
  "sftd-1-048": [{ ref:"FCOM 11.32.6", quote:"In the unlikely event all FMCs become inoperative, the EICAS advisory message FMC is displayed." }],
  "sftd-1-049": [{ ref:"FCOM 11.32.6", quote:"The TCPs provide the capability to enter a single Latitude/Longitude waypoint. The TCPs then provide track, distance to go, and groundspeed for the entered waypoint." }],
  "sftd-1-050": [{ ref:"FCOM 11.32.6", quote:"Autothrottles should still be available and may be used in conjunction with any valid autopilot roll and/or pitch mode." }],
  "sftd-1-051": [],
  "nav-and-fms-001": [{ ref:"FCOM 11.30.1", quote:"There are three independent FMCs. At power up, one FMC is designated to accomplish the flight management tasks while the other FMCs monitor. The second FMC is ready to replace the first FMC if system faults occur." }],
  "nav-and-fms-002": [{ ref:"FCOM 11.20.1", quote:"Left and right GPS receivers are independent and supply very accurate position data to the IRS. The IRS in turn supplies a very accurate hybrid GPS inertial position to the FMC. In the event that the IRS becomes inoperative, the GPS supplies position and track data directly to the FMC." }],
  "nav-and-fms-003": [{ ref:"FCOM 11.20.1", quote:"Use the GPS NAV prompt on the POS REF page 3/4 to inhibit GPS navigation data. The EICAS advisory message GPS alerts the crew when both GPS systems have failed." }],
  "nav-and-fms-004": [{ ref:"FCOM 11.20.3", quote:"The IRS calculates airplane airspeed, attitude, heading, and position data for the displays, flight management system, flight controls, engine controls, and other systems. The major components of IRS are the inertial reference units (IRUs), and attitude and heading reference units (AHRUs)." }],
  "nav-and-fms-005": [{ ref:"FCOM 11.20.4", quote:"Alignment time is approximately 7 to 10 minutes at mid latitudes and up to 17 minutes at high latitudes. The airplane should not move until alignment is complete." }],
  "nav-and-fms-006": [{ ref:"FCOM 11.20.4", quote:"Alignment time is approximately 7 to 10 minutes at mid latitudes and up to 17 minutes at high latitudes. The airplane should not move until alignment is complete." }],
  "nav-and-fms-007": [{ ref:"FCOM 11.20.4", quote:"Alignment time is approximately 7 to 10 minutes at mid latitudes and up to 17 minutes at high latitudes. The airplane should not move until alignment is complete. When the alignment is complete, the IRS changes to the navigate mode and the airplane can be moved." }],
  "nav-and-fms-008": [{ ref:"FCOM 11.20.4", quote:"When the GPS system is operating normally there is no requirement for the flight crew to enter present position on the CDU POS INIT page. The POS INIT page displays dashes in the SET INERTIAL POS line to allow the option of manually entering present position. If the GPS position is not available during the alignment, the dashes are replaced with boxes and present position must be entered to complete the alignment." }],
  "nav-and-fms-009": [{ ref:"FCOM 11.20.4", quote:"If the latitude/longitude position is not close to the position of the origin airport, the EICAS advisory message FMC MESSAGE is displayed along with the CDU help window message INERTIAL/ORIGIN DISAGREE." }],
  "nav-and-fms-010": [{ ref:"FCOM 11.20.4", quote:"When the alignment is complete, the IRS changes to the navigate mode and the airplane can be moved. If the airplane stops for an extended period, the IRS changes to the automatic realign mode and refines the alignment until the airplane moves again." }],
  "nav-and-fms-011": [{ ref:"FCOM 11.20.4", quote:"Note: A position update is recommended if the total time in the navigation mode is expected to exceed 18 hours." }],
  "nav-and-fms-012": [{ ref:"FCOM 11.20.4", quote:"Should both IRUs fail, the EICAS advisory message NAV IRU is displayed. The FMC will continue to receive a hybrid GPS inertial position solution using the AHRUs inertial sensors combined with GPS position." }],
  "nav-and-fms-013": [{ ref:"FCOM 11.20.5", quote:"If the IRS fails, meaning both AHRUs and both IRUs fail, the EICAS caution message NAV INERTIAL SYS is displayed. GPS output from the integrated navigation radios (INRs) provides the necessary position and track data for the FMC to continue to operate without the IRS. LNAV and VNAV guidance coupled to the autopilot however are not available when the IRS is inoperative." }],
  "nav-and-fms-014": [{ ref:"FCOM 11.20.4", quote:"The IRU has the additional capability to complete an alignment while in flight. When power is restored to the IRU while in flight, attitude information becomes available within a few seconds and full navigation capability is restored within about 10 minutes. This capability relies on GPS data and is therefore not available if the GPS receivers are not functioning." }],
  "nav-and-fms-015": [{ ref:"FCOM 11.20.3", quote:"The ADRS receives air data from the left, center, and right pitot and static systems, and sends trusted voted air data to the PFDs. The ADRS is completely independent of the IRS." }],
  "nav-and-fms-016": [{ ref:"FCOM 11.20.3", quote:"The ADRS receives air data from the left, center, and right pitot and static systems, and sends trusted voted air data to the PFDs. The ADRS is completely independent of the IRS." }],
  "nav-and-fms-017": [{ ref:"FCOM 11.20.3", quote:"When voted ADRS air data is invalid and the AIR DATA/ATT switch is in the AUTO position, backup airspeed (AOA SPD) and/or backup altitude (GPS ALT) are automatically provided by the IRS and GPS systems." }],
  "nav-and-fms-018": [{ ref:"FCOM 11.20.3", quote:"The integrated standby flight display (ISFD) receives data from the center pitot static system. Altitude, attitude, and airspeed are independent of IRU and AHRU values." }],
  "nav-and-fms-019": [{ ref:"FCOM 11.20.3", quote:"In the event both voted and backup air data is unavailable, ISFD altitude (ISFD ALT) and ISFD airspeed (ISFD SPD) are displayed on the PFDs." }],
  "nav-and-fms-020": [{ ref:"FCOM 4.10.4", quote:"Upper line displays 200 knots and lower line is blank when power is first applied." }],
  "nav-and-fms-021": [{ ref:"FCOM 4.10.4", quote:"The display range is: • 100 – 399 KIAS • .400 – 950 Mach" }],
  "nav-and-fms-022": [{ ref:"FCOM 4.10.5", quote:"During climb, automatically changes from IAS to MACH at .840 Mach." }],
  "nav-and-fms-023": [{ ref:"FCOM 4.10.5", quote:"During descent, automatically changes from MACH to IAS at 310 KIAS." }],
  "nav-and-fms-024": [{ ref:"FCOM 4.10.3", quote:"IAS/MACH window is blank when the FMC controls the speed." }],
  "nav-and-fms-025": [{ ref:"FCOM 4.10.5", quote:"Push – • with VNAV active, alternately opens or closes the IAS/MACH window: • when the window is closed, the FMC computed target speed is active • when the window is open, FMC speed–intervention is active and the IAS/MACH selector may be used to set the desired speed" }],
  "nav-and-fms-026": [{ ref:"FCOM 4.10.10", quote:"Rotate – sets the AFDS commanded bank limit when in the heading select (HDG SEL) or track select (TRK SEL) roll mode as follows: • AUTO – varies between 15º – 25º, depending on TAS" }],
  "nav-and-fms-027": [{ ref:"FCOM 4.10.12", quote:"The display range is: • V/S: -8000 to +6000 fpm • FPA: -9.9º to +9.9º" }],
  "nav-and-fms-028": [{ ref:"FCOM 4.10.12", quote:"Displays the selected vertical speed in 100 fpm increments or the selected flight path angle in 0.1 degree increments. The display range is: • V/S: -8000 to +6000 fpm • FPA: -9.9º to +9.9º" }],
  "nav-and-fms-029": [{ ref:"FCOM 4.10.13", quote:"Upper line displays 10,000 feet and lower line is blank when power is first applied." }],
  "nav-and-fms-030": [{ ref:"FCOM 4.10.13", quote:"The altitude range is 0 to 50,000 feet." }],
  "nav-and-fms-031": [{ ref:"FCOM 4.10.14", quote:"within 50 NM of the top-of-descent (T/D) point, with the altitude window set below cruise altitude, the airplane initiates the descend now (DES NOW) feature" }],
  "nav-and-fms-032": [{ ref:"FCOM 4.20.3", quote:"When the airplane is above 500 feet RA and the flight crew does not respond to a pitch or roll mode degradation after 10 seconds, the autopilot automatically disconnects. The AUTOPILOT DISC message shows and the wailer sounds. The TO/GA mode is available for a go-around and the autopilot can be re-engaged above 200 feet RA." }],
  "nav-and-fms-033": [{ ref:"FCOM 4.20.3", quote:"Below 500 feet RA, mode degradation indications are annunciated by FMA strikethrough, the AUTOPILOT message, and the NO AUTOLAND message. ASA NO AUTOLAND shows on the PFD and HUD. The TO/GA mode is available for a go-around. Autopilot does not disconnect at this height." }],
  "nav-and-fms-034": [{ ref:"FCOM 4.20.1", quote:"The AFDS does not have direct control of the flight control surfaces. The autopilot controls the elevators, ailerons, flaperons, and spoilers through the fly–by–wire flight control system. Autopilot rudder commands are added only during an autopilot approach and landing." }],
  "nav-and-fms-035": [{ ref:"FCOM 4.20.1", quote:"The autopilot controls nose wheel steering during rollout after an automatic landing." }],
  "nav-and-fms-036": [{ ref:"FCOM 4.10.15", quote:"capture can occur when an intercept track angle is within 120º of the localizer or final approach course" }],
  "nav-and-fms-037": [{ ref:"FCOM 4.10.16", quote:"pitch mode (G/S, G/P) captures when intercept track angle is within 80º of localizer or final approach course" }],
  "nav-and-fms-038": [{ ref:"FCOM 4.10.16", quote:"The approach mode deselects: • by pushing APP when above 1,500 feet radio altitude" }],
  "nav-and-fms-039": [{ ref:"FCOM 4.20.3", quote:"If glideslope signal interference and fluctuations occur, the AFDS limits the descent angle of the airplane to 3.25 degrees while the system is in the glideslope attitude stabilizing mode. This mode uses inertial data for up to 15 seconds to allow the glideslope signal error to resolve." }],
  "nav-and-fms-040": [{ ref:"FCOM 4.20.3", quote:"If glideslope signal interference and fluctuations occur, the AFDS limits the descent angle of the airplane to 3.25 degrees while the system is in the glideslope attitude stabilizing mode. This mode uses inertial data for up to 15 seconds to allow the glideslope signal error to resolve." }],
  "nav-and-fms-041": [{ ref:"FCOM 4.20.3", quote:"If localizer signal interference and fluctuations occur, the AFDS uses inertial data for up to 20 seconds to allow the localizer signal error to resolve." }],
  "nav-and-fms-042": [{ ref:"FCOM 4.20.4", quote:"The autopilot automatically disconnects when the following conditions are met: • The pilot does not push TO/GA for a go-around or disconnect the autopilot within 10 seconds of the AUTOPILOT and NO AUTOLAND messages showing • The airplane is above 500 feet AGL" }],
  "nav-and-fms-043": [{ ref:"FCOM 4.20.21", quote:"Flare is armed when LAND 3 or LAND 2 is annunciated on the PFDs and HUDs." }],
  "nav-and-fms-044": [{ ref:"FCOM 4.20.11", quote:"FLARE (active) – During autoland, flare activates between 60 and 40 feet radio altitude. FLARE deactivates at touchdown and smoothly lowers the nosewheel to the runway." }],
  "nav-and-fms-045": [{ ref:"FCOM 4.20.21", quote:"During flare: • between 25 and 50 feet radio altitude, the autothrottle begins retarding thrust levers to idle • PFD and HUD autothrottle annunciation changes from SPD to IDLE" }],
  "nav-and-fms-046": [{ ref:"FCOM 4.20.21", quote:"Below 350 feet radio altitude, the inboard spoilers are biased up incrementally. If the autopilot is subsequently disengaged, the spoiler bias is removed and a slight forward column control force may be required to maintain trim." }],
  "nav-and-fms-047": [{ ref:"FCOM 4.20.22", quote:"Rollout activates at touchdown with weight on the wheels. ROLLOUT replaces the roll mode annunciation. The autopilot controls rudder and nose wheel steering to track the localizer centerline." }],
  "nav-and-fms-048": [{ ref:"FCOM 4.10.6", quote:"LNAV activates when the airplane is above 50 feet radio altitude and: • within 2.5 NM of the active leg" }],
  "nav-and-fms-049": [{ ref:"FCOM 4.10.6", quote:"LNAV activates when the airplane is above 50 feet radio altitude and: • within 2.5 NM of the active leg • when not within 2.5 NM of the active leg and on an intercept heading to the active leg, remains armed then activates when approaching the active leg" }],
  "nav-and-fms-050": [{ ref:"FCOM 4.10.6", quote:"on go-around when valid missed approach path exists, LNAV activates automatically at 50 feet radio altitude with flight director only or 200 feet radio altitude with the autopilot engaged." }],
  "nav-and-fms-051": [{ ref:"FCOM 11.31.13", quote:"The FMC evaluates enroute LNAV turns, starting 5 minutes prior to the turn, and calculates a bank limit if required." }],
  "nav-and-fms-052": [{ ref:"FCOM 4.10.6", quote:"selection of LNAV with the airplane not on a heading to intercept the active leg, displays FMC INTERCEPT HDG EICAS advisory message" }],
  "nav-and-fms-053": [{ ref:"FCOM 11.31.13", quote:"When a holding fix is the active waypoint and the airplane is within 3 minutes of the hold, the FMC evaluates need for a bank limit. If the computed holding turn radius is larger than the protected airspace radius, the EICAS advisory message FMC HOLD AIRSPACE is shown." }],
  "nav-and-fms-054": [{ ref:"FCOM 4.10.7", quote:"VNAV activates 400 feet above field elevation" }],
  "nav-and-fms-055": [{ ref:"FCOM 4.10.7", quote:"VNAV SPD, VNAV PTH or VNAV ALT pitch mode displays in green (active) on the PFD and HUD pitch flight mode annunciation." }],
  "nav-and-fms-056": [{ ref:"FCOM 4.10.7", quote:"with the VNAV PTH pitch mode active, the autothrottle operates in the following modes: • for climb or cruise – operates in the speed (SPD) mode • for descent – operates in the IDLE, HOLD, or speed (SPD) mode" }],
  "nav-and-fms-057": [{ ref:"FCOM 4.10.14", quote:"within 50 NM of the top-of-descent (T/D) point, with the altitude window set below cruise altitude, the airplane initiates the descend now (DES NOW) feature" }],
  "nav-and-fms-058": [{ ref:"FCOM 4.10.8", quote:"for climbs between 1,000 feet and 12,000 feet of altitude change, the A/T advances the thrust levers to as high as the current thrust limit to provide an approximately 2 minute climb" }],
  "nav-and-fms-059": [{ ref:"FCOM 4.10.3", quote:"On the ground and below 400 feet during takeoff, the switch is inoperative." }],
  "nav-and-fms-060": [{ ref:"FCOM 4.20.11", quote:"The autothrottle is active when the A/T arm switches are ON and there is an autothrottle mode shown. The active autothrottle modes are: IDLE, HOLD, THR, THR REF, and SPD." }],
  "nav-and-fms-061": [{ ref:"FCOM 4.20.13", quote:"Thrust levers can be manually positioned without disconnecting the autothrottle. After manual positioning, the autothrottle system repositions thrust levers to comply with the active mode. The autothrottle system does not reposition thrust levers while in HOLD mode." }],
  "nav-and-fms-062": [{ ref:"FCOM 4.20.13", quote:"Autothrottle disconnect occurs automatically: • if a fault in the active autothrottle mode is detected, or • when either reverse thrust lever is raised to reverse idle, or • if the thrust levers are overridden during a manual landing, after the autothrottle has begun to retard the thrust levers to idle, or • when both engines are shut down" }],
  "nav-and-fms-063": [{ ref:"FCOM 4.20.13", quote:"The EICAS caution message AUTOTHROTTLE DISC displays and an aural alert sounds when the autothrottle is manually or automatically disconnected. The EICAS caution message and aural alert are inhibited if the disconnect occurs because of reverse thrust." }],
  "nav-and-fms-064": [{ ref:"FCOM 4.10.20", quote:"First push (either switch) – • disengages the autopilot • the master warning lights illuminate • displays the EICAS warning message AUTOPILOT DISC • sounds an aural warning" }],
  "nav-and-fms-065": [{ ref:"FCOM 4.10.20", quote:"Second push – resets: • the master warning lights • EICAS warning message • the aural warning" }],
  "nav-and-fms-066": [{ ref:"FCOM 4.10.21", quote:"Second push – • resets the master caution lights and EICAS message • autothrottle remains armed" }],
  "nav-and-fms-067": [{ ref:"FCOM 4.10.2", quote:"in flight, with the autopilot disengaged and both flight director switches OFF, the first flight director switch positioned to ON activates the flight director in: • heading hold (HDG HOLD) or track hold (TRK HOLD) as the roll mode, and • vertical speed (V/S) or flight path angle (FPA) as the pitch mode" }],
  "nav-and-fms-068": [{ ref:"FCOM 4.10.17", quote:"Note: NO AUTOLAND also displays on the PFD and HUD if multi-channel approach selected but multi-channel engage status (LAND 3 or LAND2) has not been annunciated by 300 feet AGL. Under these conditions, flare and rollout modes are not armed." }],
  "nav-and-fms-069": [{ ref:"FCOM 4.10.17", quote:"Note: When first engaged/activated, A/T, roll or pitch mode changes are emphasized for 10 seconds by a green box drawn around the mode." }],
  "nav-and-fms-070": [{ ref:"FCOM 11.20.1", quote:"Use the GPS NAV prompt on the POS REF page 3/4 to inhibit GPS navigation data." }],
  "nav-and-fms-071": [{ ref:"FCOM 11.20.13", quote:"POS REF page 2/4 displays the identifier of the VOR and DME pair used for position updates." }],
  "nav-and-fms-072": [{ ref:"FCOM 11.20.1", quote:"POS REF page 4/4 displays the left and right GPS-IRU position." }],
  "nav-and-fms-073": [{ ref:"FCOM 11.20.13", quote:"If the crew enters two VOR identifiers on the NAV RADIO page, then the FMC cannot tune any other station for VOR/DME updates." }],
  "nav-and-fms-074": [{ ref:"FCOM 11.20.12", quote:"Two conditions must be met for FMC ILS autotuning to occur: • an ILS, LOC, back course, LDA (localizer–type directional aid), or SDF (simplified directional facility) approach have been selected to the active route, and • the airplane is within 50 NM from the top of descent, 150 NM of the landing runway threshold, or the FMC is in descent mode" }],
  "nav-and-fms-075": [{ ref:"FCOM 11.20.12", quote:"On initial takeoff, ILS autotuning is inhibited for 10 minutes to prevent clutter on the PFD." }],
  "nav-and-fms-076": [{ ref:"FCOM 11.20.12", quote:"Selection and execution of a new approach in the active flight plan causes the ILS to autotune to the new approach frequency, even if this is accomplished during the 10 minute takeoff inhibit period." }],
  "nav-and-fms-077": [{ ref:"FCOM 11.20.12", quote:"ILS approach tuning inhibit (also applies to GLS and IAN) is active when: • autopilot is engaged or flight director is on and either the localizer or glideslope is captured, or • HUD takeoff mode is active for at least 5 seconds and on the ground" }],
  "nav-and-fms-078": [{ ref:"FCOM 11.20.12", quote:"In the unlikely event that all three FMCs fail, or if all of the large displays fail, the left ILS can be tuned from ALTN NAV RADIO page 2/2 on the TCP." }],
  "nav-and-fms-079": [{ ref:"FCOM 11.31.7", quote:"On the ground with GPS NAV OFF, pushing a TO/GA switch updates the FMC position to the takeoff runway threshold or to the shift position, when entered. With GPS NAV ON and valid reception, the TO/GA update is inhibited." }],
  "nav-and-fms-080": [{ ref:"FCOM 11.31.9", quote:"When entering the polar regions, the autopilot will automatically switch to a true north reference for all cruise roll modes (HDG HOLD, HDG SEL, TRK HOLD, TRK SEL, and LNAV) regardless of the position of the HEADING REF switch. Automatic switching to a true north reference is annunciated by a white box around the word TRU on both the ND and PFD." }],
  "nav-and-fms-081": [{ ref:"FCOM 11.31.9", quote:"The CDU RTE LEGS page will also display a \"T\" next to the leg course data on the line title when operating in true north reference." }],
  "nav-and-fms-082": [{ ref:"FCOM 11.31.9", quote:"Note: When operating north of 82°N or south of 82°S using the ND PLAN mode, the airplane position symbol changes to a circle with a \"X\" in the middle." }],
  "nav-and-fms-083": [{ ref:"FCOM 11.31.9", quote:"Periodic updating of the heading reference on the POS INIT page should be accomplished at least every 10 minutes." }],
  "nav-and-fms-084": [{ ref:"FCOM 11.31.9", quote:"When leaving the polar regions, the autopilot will automatically switch back to a magnetic reference if the HEADING REF switch is in the NORM position. The ND and PFD display a green box around the word MAG to annunciate the change back to magnetic reference." }],
  "nav-and-fms-085": [{ ref:"FCOM 11.31.9", quote:"If the heading reference is TRU in the descent phase, the ND and PFD display an amber box around the word TRU." }],
  "nav-and-fms-086": [{ ref:"FCOM 11.20.14", quote:"The ATP controls the following Transponder/TCAS modes: • ALT RPTG OFF • STBY • TA ONLY • TA/RA • XPDR" }],
  "nav-and-fms-087": [{ ref:"FCOM 11.20.14", quote:"Traffic displays if the transponder mode selector is in TA ONLY or TA/RA." }],
  "nav-and-fms-088": [{ ref:"FCOM 11.20.15", quote:"Should both transponders fail, the EICAS advisory message TRANSPONDER is displayed." }],
  "nav-and-fms-089": [{ ref:"FCOM 11.20.16", quote:"At ND ranges greater than 320 NM, WXR can still be displayed but only shows weather returns out to 320 NM." }],
  "nav-and-fms-090": [{ ref:"FCOM 11.20.16", quote:"The weather radar system performs various levels of self test on power up, during each sweep, and when descending through 2,300 feet AGL." }],
  "nav-and-fms-091": [{ ref:"FCOM 11.10.21", quote:"WX+T (turbulence) – displays weather returns and turbulence within precipitation at calibrated gain level. Turbulence within 40 NM is displayed at all display ranges." }],
  "nav-and-fms-092": [{ ref:"FCOM 11.10.21", quote:"Note: Turbulence detection requires presence of detectable precipitation. Clear air turbulence cannot be detected by radar." }],
  "nav-and-fms-093": [{ ref:"FCOM 11.10.22", quote:"Push and hold – • UP – slews antenna tilt up to a maximum of +15º • DOWN – slews antenna tilt down to a maximum of -15º" }],
  "nav-and-fms-094": [{ ref:"FCOM 11.10.24", quote:"Note: When WXR TEST is selected ON, all other WXR modes (WX, WX+T, and MAP, from WEATHER RADAR 1/2) are automatically set to OFF." }],
  "nav-and-fms-095": [{ ref:"FCOM 11.10.23", quote:"when on the ground, selecting WXR on the EFIS control panel and TEST on the TCP WXR page 2/2 activates a 12 second test. Initially, the amber WINDSHEAR annunciation displays and the aural MONITOR RADAR DISPLAY sounds. Next, the Master Warning Light illuminates and the EICAS alert message WINDSHEAR SYS displays. Finally, the red WINDSHEAR annunciation displays and the aural GO AROUND WINDSHEAR AHEAD, and then WINDSHEAR AHEAD, WINDSHEAR AHEAD sounds" }],
  "nav-and-fms-096": [{ ref:"FCOM 10.10.36", quote:"The Airport Map automatically displays at ranges of 5 NM or less if the airport is either the ORIGIN or DESTINATION airport in the active flight plan." }],
  "nav-and-fms-097": [{ ref:"FCOM 11.20.3", quote:"The integrated standby flight display (ISFD) receives data from the center pitot static system. Altitude, attitude, and airspeed are independent of IRU and AHRU values." }],
  "nav-and-fms-098": [{ ref:"FCOM 11.10.12", quote:"Illuminated (white) – airplane battery powers IRS. Note: ON BAT light illuminates only when IRS has been aligned on airplane or ground power, and primary power is subsequently removed or failed (battery power only remains). On the ground, a warning horn is sounded in the nose wheel well to alert the ground crew that the IRS is depleting the battery." }],
  "nav-and-fms-099": [{ ref:"FCOM 11.31.2", quote:"The approach phase starts when the first waypoint of the procedure sequences or when the runway is the active waypoint and the distance to go is less than 25 NM, or when the flaps are moved out of the UP position." }],
  "nav-and-fms-100": [{ ref:"FCOM 11.31.2", quote:"Thirty seconds after engine shutdown, the flight complete phase clears the active flight plan and load data. Some preflight data fields initialize to default values in preparation for the next flight." }],
  "nav-and-fms-101": [{ ref:"FCOM 11.30.1", quote:"The FMS navigation database supplies the necessary data to fly routes, SIDs, STARs, holding patterns, and procedure turns." }],
  "hydraulics-001": [{ ref:"FCOM 13.20.1", quote:"The airplane has three independent 5000 psi hydraulic systems: left, right, and center." }],
  "hydraulics-002": [{ ref:"FCOM 13.20.1", quote:"The airplane has three independent 5000 psi hydraulic systems: left, right, and center." }],
  "hydraulics-003": [],
  "hydraulics-004": [{ ref:"FCOM 13.10.3", quote:"displays system reservoir quantity as a percentage of the normal service level (1.00 is the normal service level)" }],
  "hydraulics-005": [{ ref:"FCOM 13.10.3", quote:"LO (amber) – displayed when the reservoir quantity is low" }],
  "hydraulics-006": [{ ref:"FCOM 13.10.3", quote:"OF (white) – displayed when the reservoir is over–full (inhibited in flight)" }],
  "hydraulics-007": [{ ref:"FCOM 13.10.3", quote:"RF (white) – displayed when the reservoir requires refilling (inhibited in flight)" }],
  "hydraulics-008": [{ ref:"FCOM 13.10.3", quote:"OF (white) – displayed when the reservoir is over–full (inhibited in flight) ... RF (white) – displayed when the reservoir requires refilling (inhibited in flight)" }],
  "hydraulics-009": [{ ref:"FCOM 13.10.3", quote:"LO (amber) – displayed when the reservoir quantity is low", note:"LO is the only QTY indication NOT inhibited in flight; OF and RF are both inhibited in flight per the same section." }],
  "hydraulics-010": [{ ref:"FCOM 13.10.3", quote:"Hydraulic system indications are displayed by pushing the systems (SYS) display switch, then selecting either the status (STAT) synoptic key or the hydraulic (HYD) synoptic key.", note:"EICAS message HYD QTY LOW C, L, R (Advisory) also appears per FCOM 13.30.1." }],
  "hydraulics-011": [{ ref:"FCOM 13.10.5", quote:"LOAD SHED – Pump has received load shed command", note:"LOAD SHED appears next to the demand pump symbol on the hydraulic synoptic display." },{ ref:"FCOM 13.20.3", quote:"The indication is LOAD SHED showing on the hydraulic synoptic next to the demand pump symbol." }],
  "hydraulics-012": [{ ref:"FCOM 13.20.1", quote:"The left and right primary pumps are engine–driven by the related left and right engines." }],
  "hydraulics-013": [{ ref:"FCOM 13.20.1", quote:"The left and right primary pumps are engine–driven by the related left and right engines." }],
  "hydraulics-014": [{ ref:"FCOM 13.20.2", quote:"Two electric motor-driven pumps (EMPs) provide hydraulic power sources for the center hydraulic system. The C1 and C2 ELEC pump selectors control pump operation." }],
  "hydraulics-015": [{ ref:"FCOM 13.20.2", quote:"The two center pumps alternate as a primary pump and demand pump. The primary pump operates continuously after the second engine is started." },{ ref:"FCOM 13.10.1", quote:"AUTO – Pumps alternate as a primary pump and a demand pump. The primary pump operates continuously and the demand pump operates during high system demand." }],
  "hydraulics-016": [{ ref:"FCOM 13.10.1", quote:"FAULT illuminated (amber) – low primary pump pressure; excessive primary pump fluid temperature, or; pump selected OFF" }],
  "hydraulics-017": [{ ref:"FCOM 13.20.1", quote:"The left hydraulic system powers: flight controls; the left engine thrust reverser; right and left wing spoilers" }],
  "hydraulics-018": [{ ref:"FCOM 13.20.1", quote:"The right hydraulic system powers: flight controls; the right engine thrust reverser; right and left wing spoilers" }],
  "hydraulics-019": [{ ref:"FCOM 13.20.2", quote:"The center hydraulic system powers: flight controls; nose gear steering; landing gear actuation; right and left wing spoilers; leading edge slats; trailing edge flaps" }],
  "hydraulics-020": [{ ref:"FCOM 13.20.1", quote:"The demand pumps provide supplementary hydraulic power for periods of high system demand. The demand pumps also provide a backup hydraulic power source for the engine–driven primary pumps." }],
  "hydraulics-021": [{ ref:"FCOM 13.10.1", quote:"AUTO – the pump operates when system and/or primary pump(s) pressure is low, or when control logic anticipates a large system demand." }],
  "hydraulics-022": [{ ref:"FCOM 13.20.1", quote:"on the ground, for the first three minutes after the second engine is started" }],
  "hydraulics-023": [{ ref:"FCOM 13.20.1", quote:"from takeoff thrust set to flaps retracted" }],
  "hydraulics-024": [{ ref:"FCOM 13.20.1", quote:"during descent and landing, from gear down or RA less than 1000 feet, to groundspeed less than 40 knots" }],
  "hydraulics-025": [{ ref:"FCOM 13.20.1", quote:"during descent and landing, from gear down or RA less than 1000 feet, to groundspeed less than 40 knots" }],
  "hydraulics-026": [{ ref:"FCOM 13.20.2", quote:"flaps or slats are in motion", note:"This condition appears in the center demand pump AUTO list but not the L/R demand pump list." }],
  "hydraulics-027": [{ ref:"FCOM 13.20.2", quote:"from takeoff thrust set until radio altitude exceeds 2000 feet", note:"Center deactivates at RA >2000 ft. Compare L/R (FCOM 13.20.1): 'from takeoff thrust set to flaps retracted.'" }],
  "hydraulics-028": [{ ref:"FCOM 13.20.2", quote:"during descent from when the gear lever is down and radio altitude is less than 2000 feet until groundspeed is less than 60 knots", note:"Center uses AND logic (gear down AND RA <2000 ft). L/R (FCOM 13.20.1) uses OR logic: 'gear down or RA less than 1000 feet.'" }],
  "hydraulics-029": [{ ref:"FCOM 13.20.2", quote:"during descent from when the gear lever is down and radio altitude is less than 2000 feet until groundspeed is less than 60 knots" }],
  "hydraulics-030": [{ ref:"FCOM 13.20.1", quote:"during descent and landing, from gear down or RA less than 1000 feet, to groundspeed less than 40 knots" },{ ref:"FCOM 13.20.2", quote:"during descent from when the gear lever is down and radio altitude is less than 2000 feet until groundspeed is less than 60 knots" }],
  "hydraulics-031": [{ ref:"FCOM 13.10.5", quote:"SOV – shutoff valve", note:"Synoptic legend identifies Left/Right system non-normal valves as SOV (shutoff valves). EDP Shutoff Valves (SOV) section at 13.10.6 covers their indication symbology." }],
  "hydraulics-032": [{ ref:"FCOM 13.10.5", quote:"ISLN – isolation valve", note:"Center system non-normal valves are labeled ISLN (isolation valves) on the hydraulic synoptic legend." },{ ref:"FCOM 13.20.3", quote:"The center hydraulic system has isolation functionality in the event of a leak. The isolation function uses a Nose Gear Isolation Valve (NGIV), Reserve Steering Isolation Valve (RSIV), Alternate Extend Isolation Valve (AEIV) and a reservoir standpipe." }],
  "hydraulics-033": [{ ref:"FCOM 13.10.8", quote:"Pull – closes the engine–driven pump hydraulic supply shutoff valve; depressurizes the engine–driven pump" }],
  "hydraulics-034": [{ ref:"FCOM 13.20.3", quote:"The isolation function uses a Nose Gear Isolation Valve (NGIV), Reserve Steering Isolation Valve (RSIV), Alternate Extend Isolation Valve (AEIV) and a reservoir standpipe.", note:"Note from FCOM 13.10.4: 'The Alternate Extend Isolation Valve (AEIV) is not shown' on the synoptic." }],
  "hydraulics-035": [{ ref:"FCOM 13.20.3", quote:"The isolation valves operate automatically and cannot be controlled by the crew." }],
  "hydraulics-036": [{ ref:"FCOM 13.20.3", quote:"The hydraulic isolation systems ensure the flight crew can lower the landing gear and that nose wheel steering is operational for landing, roll-out and taxi. The isolation valves preserve hydraulic fluid to reduce the effects of a leak and to minimize the occurrence of nose wheel steering loss." }],
  "hydraulics-037": [],
  "hydraulics-038": [{ ref:"FCOM 13.20.3", quote:"The RAT can be deployed manually by pushing the RAM AIR TURBINE switch on the hydraulic panel. A spring-loaded actuator is used to deploy the RAT either automatically or manually." }],
  "hydraulics-039": [{ ref:"FCOM 13.20.3", quote:"Once deployed, the RAT cannot be stowed in flight." }],
  "hydraulics-040": [{ ref:"FCOM 13.20.3", quote:"The RAT, when deployed, provides 5000 psi hydraulic power to the primary flight controls connected to the center hydraulic system." },{ ref:"FCOM 13.10.1", quote:"Ram Air Turbine Pressure (PRESS) Light — Illuminated (white) – the RAT is deployed; center system primary flight control hydraulic pressure is greater than 3000 psi" }],
  "hydraulics-041": [{ ref:"FCOM 13.10.1", quote:"Ram Air Turbine Unlocked (UNLKD) Light — Illuminated (amber) – the RAT is not in the stowed position." }],
  "hydraulics-042": [{ ref:"FCOM 13.20.3", quote:"The RAT, when deployed, provides 5000 psi hydraulic power to the primary flight controls connected to the center hydraulic system." },{ ref:"FCOM 13.20.2", quote:"The ram air turbine (RAT) only provides hydraulic power to the center hydraulic system primary flight controls." }],
  "hydraulics-043": [{ ref:"FCOM 13.20.3", quote:"The RAT provides hydraulic and electrical power throughout the flight envelope." },{ ref:"FCOM 6.20.3", quote:"A Ram Air Turbine (RAT) serves as an emergency source of electrical and hydraulic power. It has no operating time limits, airspeeds, or altitudes." }],
  "hydraulics-044": [{ ref:"FCOM 13.20.3", quote:"In flight, the RAT deploys automatically if any of the following occur: both engines have failed; all three hydraulic system pressures are low; loss of all electrical power to captain's and first officer's flight instruments; loss of all four EMPs and faults in the flight control system occur on approach; loss of all four EMPs and an engine fails on takeoff or landing" }],
  "hydraulics-045": [{ ref:"FCOM 13.10.9", quote:"NORM – associated flight control surface electronically unlocked. LOCK – associated flight control surface electronically locked." }],
  "hydraulics-046": [{ ref:"FCOM 13.10.9", quote:"FLIGHT CONTROL SURFACES Lockout FAIL Light — Illuminated (amber) – the system lockout has failed." },{ ref:"FCOM 9.20", quote:"The flight control lock FAIL light is illuminated when a lock switch is in the LOCK position and any of the associated surfaces do not lock." }],
  "hydraulics-047": [{ ref:"FCOM 9.20", quote:"In addition, the flight control surfaces automatically unlock when groundspeed exceeds 40 knots." }],
  "hydraulics-048": [{ ref:"FCOM 13.30.1", quote:"HYD PRESS SYS L+C+R — Caution — Beeper — All hydraulic system pressures are low." }],
  "hydraulics-049": [{ ref:"FCOM 13.30.1", quote:"HYD PRESS SYS C — Caution — Beeper — The center hydraulic system pressure is low.", note:"Same level/aural applies to SYS L and SYS R per the same EICAS table." }],
  "hydraulics-050": [{ ref:"FCOM 13.30.1", quote:"HYD OVERHEAT C1 — Advisory — The C1 pump temperature is high. [also C2, DEM L/R, PRI L/R — all Advisory, no aural listed]" }],
  "hydraulics-051": [{ ref:"FCOM 13.30.1", quote:"RAT UNLOCKED — Advisory — The ram air turbine is not stowed and locked." }],
  "air-systems-001": [{ ref:"FCOM 2.TOC", quote:"Air Conditioning System Description . . . 2.20 Pressurization System Description . . . 2.30 Bleed Air System Description . . . 2.40", note:"Chapter 2 table of contents enumerates the three subsystems; no single prose sentence lists all three by name." }],
  "air-systems-002": [{ ref:"FCOM 2.40.1", quote:"Bleed air is supplied by the engines and is only used for engine core and inlet cowl anti–ice operations.", note:"Opening sentence of Bleed Air System Description, Section 40." }],
  "air-systems-003": [{ ref:"FCOM 2.10.1", quote:"Flight Deck Temperature (FLT DECK TEMP) Control • selects the target flight deck temperature • turning the control toward C or W sets the desired temperature between 65° F and 85° F. Mid position (12 o'clock) sets approximately 75° F" }],
  "air-systems-004": [{ ref:"FCOM 2.10.1", quote:"turning the control toward C or W sets the desired temperature between 65° F and 85° F. Mid position (12 o'clock) sets approximately 75° F" }],
  "air-systems-005": [{ ref:"FCOM 2.10.1", quote:"Cabin Temperature (CABIN TEMP) Control Provides automatic passenger cabin temperature control. Turning the control toward C or W sets the passenger cabin master reference temperature between 65° F and 85° F." }],
  "air-systems-006": [{ ref:"FCOM 2.20.4", quote:"The target temperatures of each passenger cabin temperature zone may be further modified plus or minus 5º F, within the range of 65º F to 85º F, using the cabin management system." }],
  "air-systems-007": [{ ref:"FCOM 2.20.1", quote:"Outside air is supplied to four electric cabin air compressors (CAC) through two dedicated inlets located in the wing to body fairings. Two CACs are dedicated to each pack. A single CAC provides sufficient air to operate its associated pack in all operating modes." }],
  "air-systems-008": [{ ref:"FCOM 2.20.1", quote:"A single CAC provides sufficient air to operate its associated pack in all operating modes." }],
  "air-systems-009": [{ ref:"FCOM 2.20.1", quote:"Outside air is supplied to four electric cabin air compressors (CAC) through two dedicated inlets located in the wing to body fairings. The air is then pressurized and flow-regulated by the CACs and supplied to two identical air conditioning packs." }],
  "air-systems-010": [{ ref:"FCOM 2.10.1", quote:"Forward Equipment Cooling (EQUIP COOLING FWD) Switch Off (AUTO not visible) – • both forward equipment cooling supply fans and vent fan are commanded off • smoke/override valve is commanded open • forward cargo heat becomes inoperative • forward cargo air conditioning becomes inoperative • OVRD illuminates" }],
  "air-systems-011": [{ ref:"FCOM 2.50.1", quote:"EQUIP CLG OVRD FWD Advisory The forward equipment cooling system is in override mode.", note:"EICAS Messages section; message name is EQUIP CLG OVRD FWD." }],
  "air-systems-012": [{ ref:"FCOM 2.50.1", quote:"EQUIP CLG OVRD AFT Advisory The aft equipment cooling system is in override mode.", note:"EICAS Messages section; message name is EQUIP CLG OVRD AFT." }],
  "air-systems-013": [{ ref:"QRH 2.15", quote:"Note: After 30 minutes of operation at low altitude and low cabin differential pressure, non-critical electronic equipment may fail.", note:"This note appears under both EQUIP CLG OVRD AFT and EQUIP CLG OVRD FWD checklists." }],
  "air-systems-014": [{ ref:"FCOM 2.20.9", quote:"The forward system reconfigures automatically to an override mode when: • the FWD EQUIP COOLING switch is selected to OVRD, or • in flight, both supply fans fail, or • both flow sensors fail, or • in flight, low airflow is detected, or • in flight, excessive temperature is detected in the forward equipment cooling system, or • smoke is detected in the forward equipment cooling system or the forward cargo area, or • the FWD CARGO FIRE ARM switch is ARMED" }],
  "air-systems-015": [{ ref:"FCOM 2.20.10", quote:"The aft system reconfigures automatically to an override mode when: • the AFT EQUIP COOLING switch is selected to OVRD, or • in flight, both supply fans fail, or • both flow sensors fail, or • in flight, low airflow is detected, or • in flight, excessive temperature is detected in the aft equipment cooling system, or • the AFT CARGO FIRE ARM switch is ARMED, or • smoke is detected in the aft equipment cooling system or aft equipment ventilation system Note: If smoke is detected in the aft E/E equipment compartment, the lower recirculation fans are commanded off." }],
  "air-systems-016": [{ ref:"FCOM 2.20.3", quote:"The flight deck receives 100% conditioned outside air and the passenger cabin receives a mix of outside air and recirculated air." }],
  "air-systems-017": [{ ref:"FCOM 2.20.3", quote:"Some recirculated air is supplied to the flight deck if one pack is off and its associated lower recirculation fan is on." }],
  "air-systems-018": [{ ref:"FCOM 2.20.3", quote:"Recirculation fans assist the packs to maintain a constant ventilation rate through the cabin. The fans draw cabin air through filters, then reintroduce the air into the conditioned air distribution system.", note:"FCOM describes filters on recirculation fans. HEPA is the filter type per system knowledge but the word 'HEPA' does not appear in the pdftotext output of the four manuals." }],
  "air-systems-019": [{ ref:"QRH 2.22", quote:"Do not attempt an air conditioning reset above 34,000 feet. Attempt only one reset for this condition per flight.", note:"Steps 1 and 5 of PACK L, R checklist." }],

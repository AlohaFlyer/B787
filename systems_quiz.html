// ============================================================
// STATE + PERSISTENCE (localStorage, per-filter mastered state)
// ============================================================
const LS_KEY = 'b787_sysquiz_v2';
function loadStore() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e) { return {}; }
}
function saveStore() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      retired: Array.from(state.retired), filter: state.filter
    }));
  } catch(e) {}
}
const _saved = loadStore();
const state = {
  filter: _saved.filter || 'All',
  queue: [],
  retired: new Set(_saved.retired || []),
  missed: new Set(),
  currentIdx: 0,
  revealed: false,
  fcomOpen: false,
  streak: 0,
  sessionCorrect: 0,
  sessionMissed: 0,
};

function getSystems() {
  const seen = [];
  QUESTIONS.forEach(q => { if (!seen.includes(q.system)) seen.push(q.system); });
  return ['All', ...seen];
}
function getActivePool() {
  return state.filter === 'All' ? QUESTIONS : QUESTIONS.filter(q => q.system === state.filter);
}
function buildQueue(keepRetired) {
  const pool = getActivePool();
  if (!keepRetired) { pool.forEach(q => state.retired.delete(q.id)); }
  state.queue = shuffleArray(pool.filter(q => !state.retired.has(q.id))).slice(0, 100);
  state.missed.clear();
  state.currentIdx = 0;
  state.revealed = false;
  state.fcomOpen = false;
  state.streak = 0;
  state.sessionCorrect = 0;
  state.sessionMissed = 0;
  saveStore();
}
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function currentCard() { return state.queue[state.currentIdx] || null; }

// ============================================================
// RENDER
// ============================================================
function renderProgress() {
  const total = getActivePool().length;
  const mastered = getActivePool().filter(q => state.retired.has(q.id)).length;
  const pct = total > 0 ? (mastered / total) * 100 : 0;
  return `<div class="progress-row">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="progress-label">${mastered}/${total} mastered</div>
    ${state.streak >= 3 ? `<div class="streak-badge">&#128293; ${state.streak} streak</div>` : ''}
  </div>`;
}
function renderFilterBar() {
  return `<div class="filter-bar">${getSystems().map(s => {
    const pool = s === 'All' ? QUESTIONS : QUESTIONS.filter(q => q.system === s);
    const m = pool.filter(q => state.retired.has(q.id)).length;
    const done = m === pool.length && pool.length > 0;
    return `<button class="filter-btn ${state.filter===s?'active':''} ${done?'fdone':''}" onclick="setFilter('${s.replace(/'/g, "\\'")}')">${s === 'All' ? 'ALL SYS' : s} <span class="n">${m}/${pool.length}</span></button>`;
  }).join('')}</div>`;
}
function renderStats() {
  const remaining = state.queue.length - state.currentIdx;
  return `<div class="stats-row">
    <div class="stat-chip green"><div class="stat-val">${getActivePool().filter(q => state.retired.has(q.id)).length}</div><div class="stat-lbl">Mastered</div></div>
    <div class="stat-chip amber"><div class="stat-val">${remaining}</div><div class="stat-lbl">Remaining</div></div>
    <div class="stat-chip red"><div class="stat-val">${state.missed.size}</div><div class="stat-lbl">Recycle</div></div>
  </div>`;
}
function renderFcomDetail(q) {
  const blocks = FCOM_DETAIL[q.id];
  if (!blocks || blocks.length === 0) {
    return `<div class="fcom-area ${state.fcomOpen?'visible':''}" id="fcom-area">
      <div class="fcom-label">Source</div>
      <div class="fcom-block"><div class="fcom-ref">${q.src || 'Deck extract'}</div>
      <div class="fcom-note">No direct FCOM quote mapped for this question yet. Verify in FCOM before relying on exact wording.</div></div>
    </div>`;
  }
  const blocksHtml = blocks.map(b => `
    <div class="fcom-block">
      <div class="fcom-ref">${b.ref}</div>
      <div class="fcom-quote">"${b.quote}"</div>
      ${b.note ? `<div class="fcom-note">${b.note}</div>` : ''}
    </div>
  `).join('');
  return `<div class="fcom-area ${state.fcomOpen?'visible':''}" id="fcom-area">
    <div class="fcom-label">FCOM / FCTM Reference</div>
    ${blocksHtml}
  </div>`;
}
function renderCard(q) {
  const hasFcom = !!(FCOM_DETAIL[q.id] && FCOM_DETAIL[q.id].length > 0);
  const fcomLabel = hasFcom ? 'FCOM Detail' : 'Source';
  const revealButtons = !state.revealed
    ? `<div class="btn-row">
        <button class="btn btn-reveal" onclick="reveal()">Reveal Answer</button>
        <button class="btn btn-fcom ${state.fcomOpen?'active':''}" onclick="toggleFcom()">${state.fcomOpen ? 'Hide' : fcomLabel}</button>
      </div>`
    : `<div class="btn-row">
        <button class="btn btn-got-it" onclick="mark(true)">Got it &#10003;</button>
        <button class="btn btn-missed" onclick="mark(false)">Missed it &#10007;</button>
        <button class="btn btn-fcom ${state.fcomOpen?'active':''}" onclick="toggleFcom()" style="flex:0.6">${state.fcomOpen ? 'Hide' : fcomLabel}</button>
      </div>`;
  return `
    <div class="card">
      <div class="system-tag">${q.system}</div>
      <div class="source-tag">${q.src || ''}</div>
      <div class="question">${q.q}</div>
    </div>
    <div class="answer-area ${state.revealed?'visible':''}" id="answer-area">
      <div class="answer-label">Answer</div>
      <div class="answer-text">${q.a}</div>
    </div>
    ${renderFcomDetail(q)}
    ${revealButtons}
    <div class="queue-info" style="margin-top:8px">
      <div>Card <span>${state.currentIdx+1}</span> of <span>${state.queue.length}</span></div>
      <div>Recycle: <span>${state.missed.size}</span></div>
      <div class="reset-link" onclick="resetProgress()">reset ${state.filter === 'All' ? 'all' : state.filter} progress</div>
    </div>`;
}
function renderComplete() {
  return `<div class="complete-screen">
    <div class="trophy">&#127942;</div>
    <h2>${state.filter === 'All' ? 'ALL SYS' : state.filter} Session Complete</h2>
    <p>Session complete.<br>
    Correct: ${state.sessionCorrect} &nbsp;|&nbsp; Missed: ${state.sessionMissed}</p>
    <div class="btn-row" style="justify-content:center;max-width:400px;margin:0 auto">
      <button class="btn btn-reveal" onclick="restart()">Go Again</button>
      <button class="btn btn-restart" onclick="resetProgress()">Reset Progress</button>
    </div>
  </div>`;
}
function examTip() {
  return `<div class="exam-tip"><b>SV exam tip:</b> For the real systems exam, when "All of the Above" is shown that is the answer, and most of the time when it's True or False the answer is True.</div>`;
}
function render() {
  const main = document.getElementById('main');
  if (!main) return;
  const sub = document.getElementById('hdr-sub');
  if (sub) sub.textContent = 'Active recall - ' + (state.filter === 'All' ? 'ALL SYS' : state.filter) + ' - 100-question session from ' + QUESTIONS.length + ' question bank';
  const q = currentCard();
  if (!q) {
    if (state.missed.size > 0) {
      const pool = getActivePool();
      const recycled = shuffleArray(pool.filter(qq => state.missed.has(qq.id)));
      state.missed.clear();
      state.queue = state.queue.concat(recycled);
      if (state.queue[state.currentIdx]) { state.revealed = false; render(); return; }
    }
    main.innerHTML = renderProgress() + renderFilterBar() + renderStats() + renderComplete() + examTip();
    return;
  }
  main.innerHTML = renderProgress() + renderFilterBar() + renderStats() + renderCard(q) + examTip();
}

// ============================================================
// ACTIONS
// ============================================================
function reveal() { state.revealed = true; render(); }
function toggleFcom() { state.fcomOpen = !state.fcomOpen; render(); }
function mark(correct) {
  const q = currentCard();
  if (correct) {
    state.retired.add(q.id); state.missed.delete(q.id);
    state.streak++; state.sessionCorrect++;
  } else {
    state.missed.add(q.id); state.streak = 0; state.sessionMissed++;
  }
  state.currentIdx++;
  state.revealed = false;
  state.fcomOpen = false;
  if (state.currentIdx >= state.queue.length && state.missed.size > 0) {
    const pool = getActivePool();
    const recycled = shuffleArray(pool.filter(qq => state.missed.has(qq.id)));
    state.missed.clear();
    state.queue = state.queue.concat(recycled);
  }
  saveStore();
  render();
}
function setFilter(f) { state.filter = f; buildQueue(true); render(); }
function restart() { buildQueue(true); render(); }
function resetProgress() {
  getActivePool().forEach(q => state.retired.delete(q.id));
  buildQueue(true); render();
}
buildQueue(true);
render();

</script>

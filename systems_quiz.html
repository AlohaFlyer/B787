  { id:"fuel-x-008", system:"Fuel", q:"What two indications confirm a fuel pump has been load shed?", a:"The pump switch PRESS light is illuminated AND the pump is labeled LOAD SHED on the fuel synoptic.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-009", system:"Fuel", q:"What flight risk exists when an engine is on suction feed at altitude?", a:"Thrust deterioration or engine flameout may occur due to fuel flow reduction.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-010", system:"Fuel", q:"What causes suction feed line restriction as the airplane climbs?", a:"Dissolved air released from fuel due to decreasing air pressure collects in the suction feed line and restricts fuel flow.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-011", system:"Fuel", q:"What is the long-term consequence of continued use of the crossfeed valve?", a:"Progressive fuel imbalance.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-012", system:"Fuel", q:"What is the key operational difference between fuel crossfeed and fuel balance?", a:"Fuel crossfeed is tank-to-engine; fuel balance is tank-to-tank.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-013", system:"Fuel", q:"List four conditions that cause the fuel balance system to automatically command off.", a:"Fuel is balanced; jettison system is active; FUEL DISAGREE message displayed; FUEL QTY LOW message displayed; airplane is on ground and either engine running. (Any four accepted.)", src:"Fuel deck (full extract)" },
  { id:"fuel-x-014", system:"Fuel", q:"Under what conditions does a flashing white imbalance pointer appear?", a:"Main tank fuel differs by more than 200 lbs AND either the crossfeed valve is open OR the balance system is ON.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-015", system:"Fuel", q:"When the flashing white imbalance pointer is shown, is the FUEL IMBALANCE message displayed?", a:"No. The FUEL IMBALANCE message is NOT displayed for a flashing white pointer.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-016", system:"Fuel", q:"What replaces the FUEL QTY header when mains are back in balance, and for how long does it flash?", a:"FUEL BALANCED replaces FUEL QTY and flashes for 5 seconds.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-017", system:"Fuel", q:"What fuel quantity does the Jettison ARM switch initialize the \"fuel to remain\" value to?", a:"The MLW (maximum landing weight) fuel quantity.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-018", system:"Fuel", q:"When the Jettison ARM switch is pushed, what display is replaced by the \"fuel to remain\" readout?", a:"The fuel temperature and static air temperature displays are replaced.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-019", system:"Fuel", q:"What is the target fuel state when jettison is complete?", a:"The fuel quantity remaining leaves the airplane at maximum landing weight (MLW).", src:"Fuel deck (full extract)" },
  { id:"fuel-x-020", system:"Fuel", q:"Where is jettison time displayed, and in what units?", a:"On the fuel synoptic display, in minutes.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-021", system:"Fuel", q:"At what point does fuel jettison automatically stop?", a:"Just above the FUEL TO REMAIN quantity.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-022", system:"Fuel", q:"True or false: With less than all engines/generators operating there may be insufficient power to operate all fuel pumps, and a load shed is shown on the fuel synoptic.", a:"TRUE.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-023", system:"Fuel", q:"True or false: The two center tank fuel pumps are override/jettison pumps with higher output pressure than main tank pumps, and center tank fuel is used before wing tank fuel.", a:"TRUE.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-024", system:"Fuel", q:"What is the total fuel tank capacity of all three tanks on the B787?", a:"223,646 lbs.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-025", system:"Fuel", q:"Which of the following is TRUE about APU fuel feed: (A) APU fuel from right manifold; (B) any pump supplying right manifold or right main DC pump; (C) on ground, no AC, APU ON -- DC pump runs automatically; (D) with AC, right aft AC pump auto regardless of switch.", a:"C. On the ground, with the APU switch ON and no AC power available, the DC pump runs automatically. (The APU feeds from the LEFT manifold, not the right -- all other options describe right-side components, which is incorrect.)", src:"Fuel deck (full extract)" },
  { id:"fuel-x-026", system:"Fuel", q:"Under what conditions does the expanded FUEL QTY display (showing all three tank quantities) appear? (List at least five.)", a:"Crossfeed valve open; fuel tank qty indication(s) inoperative; FUEL IN CENTER message displayed; FUEL QTY LOW message displayed; FUEL LOW CENTER message displayed; FUEL FLOW ENG message displayed; INSUFFICIENT FUEL message displayed; FUEL IMBALANCE message displayed; airplane on ground with both engines off; balance system active; balance system selected on and fuel already balanced.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-027", system:"Fuel", q:"What happens to dissolved air in the fuel tank eventually at cruise altitude, and what does depletion time depend on?", a:"The dissolved air eventually depletes. Depletion time depends on airplane altitude, fuel temperature, and type of fuel. Once depleted, the engine should effectively operate on suction feed.", src:"Fuel deck (full extract)" },
  { id:"aircraft-general-001", system:"Aircraft General", q:"What is the wing span of the Boeing 787-9?", a:"197 ft 3 in (60.12 m)", src:"Aircraft General deck" },
  { id:"aircraft-general-002", system:"Aircraft General", q:"What is the total length of the Boeing 787-9?", a:"206 ft 1 in (62.8 m)", src:"Aircraft General deck" },
  { id:"aircraft-general-003", system:"Aircraft General", q:"What is the tail height of the Boeing 787-9?", a:"55 ft 10 in (17.0 m)", src:"Aircraft General deck" },
  { id:"aircraft-general-004", system:"Aircraft General", q:"What is the nose gear to main gear wheelbase of the 787-9?", a:"84 ft 9 in (25.83 m)", src:"Aircraft General deck" },
  { id:"aircraft-general-005", system:"Aircraft General", q:"How far forward of the nose gear is the pilot seat?", a:"8.75 ft", src:"Aircraft General deck" },
  { id:"aircraft-general-006", system:"Aircraft General", q:"By what percentage does the 787 reduce fuel use and emissions compared to previous generation aircraft?", a:"25% Turning Radius (FCOM VOL II 1.10.2)", src:"Aircraft General deck" },
  { id:"aircraft-general-007", system:"Aircraft General", q:"Which part of the 787 swings the largest arc while turning and determines minimum obstruction clearance?", a:"The wing tip", src:"Aircraft General deck" },
  { id:"aircraft-general-008", system:"Aircraft General", q:"What is the 787 wing tip turning radius?", a:"144 ft 0 in", src:"Aircraft General deck" },
  { id:"aircraft-general-009", system:"Aircraft General", q:"What is the 787 nose turning radius?", a:"110 ft 0 in", src:"Aircraft General deck" },
  { id:"aircraft-general-010", system:"Aircraft General", q:"What is the 787 tail turning radius?", a:"126 ft 0 in", src:"Aircraft General deck" },
  { id:"aircraft-general-011", system:"Aircraft General", q:"What is the maximum nose wheel steering angle?", a:"70 degrees", src:"Aircraft General deck" },
  { id:"aircraft-general-012", system:"Aircraft General", q:"What is the minimum pavement width required for a 787 180-degree turn?", a:"154 ft 0 in", src:"Aircraft General deck" },
  { id:"aircraft-general-013", system:"Aircraft General", q:"What caution applies when making a 180-degree turn on a 150 ft wide runway?", a:"Requires differential braking/thrust", src:"Aircraft General deck" },
  { id:"aircraft-general-014", system:"Aircraft General", q:"How close to the wing tip must you avoid turning away from an obstacle?", a:"Within 15 ft of the wing tip", src:"Aircraft General deck" },
  { id:"aircraft-general-015", system:"Aircraft General", q:"How close to the nose must you avoid turning away from an obstacle?", a:"Within 55 ft of the nose Cargo Doors (FCOM 1.40.24 / 1.40.25)", src:"Aircraft General deck" },
  { id:"aircraft-general-016", system:"Aircraft General", q:"How many cargo doors does the 787 have? Name them.", a:"3 -- FWD Cargo, AFT Cargo, Bulk Cargo", src:"Aircraft General deck" },
  { id:"aircraft-general-017", system:"Aircraft General", q:"On which side of the fuselage are the FWD and AFT cargo doors located?", a:"Right side", src:"Aircraft General deck" },
  { id:"aircraft-general-018", system:"Aircraft General", q:"How do the FWD and AFT cargo doors open?", a:"Outside the airplane", src:"Aircraft General deck" },
  { id:"aircraft-general-019", system:"Aircraft General", q:"On which side of the fuselage is the bulk cargo door located?", a:"Left side", src:"Aircraft General deck" },
  { id:"aircraft-general-020", system:"Aircraft General", q:"How does the bulk cargo door open?", a:"Into the cargo area", src:"Aircraft General deck" },
  { id:"aircraft-general-021", system:"Aircraft General", q:"How are the FWD and AFT cargo doors normally operated?", a:"Electrically from an exterior fuselage-mounted control panel near each door", src:"Aircraft General deck" },
  { id:"aircraft-general-022", system:"Aircraft General", q:"How is the bulk cargo door operated?", a:"Manually using an external handle; counterbalanced for ease of operation", src:"Aircraft General deck" },
  { id:"aircraft-general-023", system:"Aircraft General", q:"What happens to cargo area heating, ventilation, and fire detection when a cargo door is opened?", a:"Nothing -- they are NOT turned off Door Synoptic (FCOM 1.30.14)", src:"Aircraft General deck" },
  { id:"aircraft-general-024", system:"Aircraft General", q:"What does an AMBER door synoptic indication mean for a passenger entry or large cargo door?", a:"The door is NOT closed, latched, and locked", src:"Aircraft General deck" },
  { id:"aircraft-general-025", system:"Aircraft General", q:"What does an AMBER door synoptic indication mean for the flight deck overhead door, bulk cargo door, or access door?", a:"The door is NOT closed and latched", src:"Aircraft General deck" },
  { id:"aircraft-general-026", system:"Aircraft General", q:"What does a WHITE door synoptic indication mean?", a:"Door signal is invalid or unknown; door position is unknown", src:"Aircraft General deck" },
  { id:"aircraft-general-027", system:"Aircraft General", q:"What does a green letter \"A\" on the door synoptic mean?", a:"Passenger door is closed, latched, and locked; slide is in AUTOMATIC mode", src:"Aircraft General deck" },
  { id:"aircraft-general-028", system:"Aircraft General", q:"What does a white letter \"M\" on the door synoptic mean?", a:"Passenger door is closed, latched, and locked; slide is in MANUAL mode", src:"Aircraft General deck" },
  { id:"aircraft-general-029", system:"Aircraft General", q:"What does a blank slide mode indication on the door synoptic mean?", a:"Passenger door is closed, latched, and locked; slide mode is UNKNOWN SEAT BELTS Selector (FCOM 1.30.3 / 1.40.6)", src:"Aircraft General deck" },
  { id:"aircraft-general-030", system:"Aircraft General", q:"What does the SEAT BELTS selector OFF position do to the signs?", a:"The fasten seat belt and return to seat signs are NOT illuminated", src:"Aircraft General deck" },
  { id:"aircraft-general-031", system:"Aircraft General", q:"What does the SEAT BELTS selector ON position do?", a:"The fasten seat belt and return to seat signs ARE illuminated", src:"Aircraft General deck" },
  { id:"aircraft-general-032", system:"Aircraft General", q:"What does the SEAT BELTS selector AUTO position do?", a:"Signs illuminate or extinguish automatically based on airplane altitude and system configuration", src:"Aircraft General deck" },
  { id:"aircraft-general-033", system:"Aircraft General", q:"List the five conditions that cause the seat belt signs to automatically illuminate in AUTO.", a:"(1) Landing gear not up and locked, (2) flap lever at 5 or greater, (3) airplane altitude below 10,000 ft MSL, (4) cabin altitude above 10,000 ft, (5) passenger oxygen on", src:"Aircraft General deck" },
  { id:"aircraft-general-034", system:"Aircraft General", q:"When passenger oxygen deploys, what happens to each sign, regardless of selector position?", a:"FASTEN SEAT BELT illuminates; RETURN TO SEAT extinguishes", src:"Aircraft General deck" },
  { id:"aircraft-general-035", system:"Aircraft General", q:"Are no smoking signs electrically illuminated on the 787?", a:"No -- no smoking signs are NOT electrically illuminated; placards are installed throughout the airplane OFCR (FCOM 1.46)", src:"Aircraft General deck" },
  { id:"aircraft-general-036", system:"Aircraft General", q:"Where is the Overhead Flight Crew Rest (OFCR) located?", a:"Overhead area between door 1L and 1R", src:"Aircraft General deck" },
  { id:"aircraft-general-037", system:"Aircraft General", q:"Does the OFCR have a fire extinguishing system?", a:"No -- it has smoke detection only", src:"Aircraft General deck" },
  { id:"aircraft-general-038", system:"Aircraft General", q:"Who may occupy the OFCR?", a:"Flight crew members trained in crew rest evacuation routes, fire fighting, and depressurization procedures", src:"Aircraft General deck" },
  { id:"aircraft-general-039", system:"Aircraft General", q:"What are the OFCR occupancy restrictions during taxi, takeoff, and landing?", a:"Seat, bunk, and common area may NOT be occupied; OFCR door must be LATCHED CLOSED", src:"Aircraft General deck" },
  { id:"aircraft-general-040", system:"Aircraft General", q:"How many smoke detectors are in the OFCR and where are they located?", a:"4 total -- 1 in common area, 1 in seat area, 1 in each bunk area", src:"Aircraft General deck" },
  { id:"aircraft-general-041", system:"Aircraft General", q:"What does the amber call light above the OFCR entrance do when FLASHING?", a:"Smoke has been detected in the crew rest area", src:"Aircraft General deck" },
  { id:"aircraft-general-042", system:"Aircraft General", q:"What does the amber call light above the OFCR entrance do when STEADY?", a:"An attendant call button on a crew rest PCU has been pushed", src:"Aircraft General deck" },
  { id:"aircraft-general-043", system:"Aircraft General", q:"How long does the OFCR smoke self-test button sound for?", a:"3 seconds (external alarms also sound)", src:"Aircraft General deck" },
  { id:"aircraft-general-044", system:"Aircraft General", q:"What does the OFCR green status indicator light STEADY mean?", a:"Smoke detector has power and is operating properly", src:"Aircraft General deck" },
  { id:"aircraft-general-045", system:"Aircraft General", q:"What does the OFCR green status indicator light BLINKING mean?", a:"Maintenance is necessary", src:"Aircraft General deck" },
  { id:"aircraft-general-046", system:"Aircraft General", q:"What does the OFCR red status indicator light STEADY mean?", a:"Smoke has been detected", src:"Aircraft General deck" },
  { id:"aircraft-general-047", system:"Aircraft General", q:"What does the OFCR red status indicator light BLINKING mean?", a:"The detector has failed", src:"Aircraft General deck" },
  { id:"aircraft-general-048", system:"Aircraft General", q:"What EICAS message appears when smoke is detected in the OFCR?", a:"SMOKE REST UPR DR 1 (caution)", src:"Aircraft General deck" },
  { id:"aircraft-general-049", system:"Aircraft General", q:"After the Horn Cancel switch is released in the OFCR, how long must smoke be absent before the detector resets?", a:"30 seconds", src:"Aircraft General deck" },
  { id:"aircraft-general-050", system:"Aircraft General", q:"What is the primary evacuation route from the OFCR?", a:"Down the entrance stairway through the entrance enclosure", src:"Aircraft General deck" },
  { id:"aircraft-general-051", system:"Aircraft General", q:"What is the alternate evacuation route from the OFCR if the main entrance is unusable?", a:"Emergency hatch at the bunk on the RIGHT side", src:"Aircraft General deck" },
  { id:"aircraft-general-052", system:"Aircraft General", q:"What must be done to the lower evacuation hatch after OFCR evacuation, and why?", a:"Must be CLOSED to help prevent the spread of smoke or fire", src:"Aircraft General deck" },
  { id:"aircraft-general-053", system:"Aircraft General", q:"During OFCR decompression, what type of horn sounds and where?", a:"A continuous decompression horn in the main area and entrance enclosure", src:"Aircraft General deck" },
  { id:"aircraft-general-054", system:"Aircraft General", q:"What should OFCR occupants do before evacuating during decompression?", a:"Push the HORN SHUT OFF switch in the entrance area to silence decompression alarm horns", src:"Aircraft General deck" },
  { id:"aircraft-general-055", system:"Aircraft General", q:"What effect does pushing HORN SHUT OFF have on the cabin attendant panel SMOKE DETECTED alert?", a:"Removes the pop-up window; SMOKE DETECTED appears in small text at the bottom of all cabin attendant panels", src:"Aircraft General deck" },
  { id:"aircraft-general-056", system:"Aircraft General", q:"Does the EICAS SMOKE REST UPR DR 1 message clear when HORN SHUT OFF is pushed?", a:"No -- it remains until the smoke detection system is RESET", src:"Aircraft General deck" },
  { id:"aircraft-general-057", system:"Aircraft General", q:"What type of switch is the OFCR LIGHTS MASTER switch?", a:"Guarded switch", src:"Aircraft General deck" },
  { id:"aircraft-general-058", system:"Aircraft General", q:"What does the first push of the OFCR LIGHTS MASTER switch do?", a:"Overrides individual lighting controls; turns all crew rest lights ON BRIGHT", src:"Aircraft General deck" },
  { id:"aircraft-general-059", system:"Aircraft General", q:"What does the second push of the OFCR LIGHTS MASTER switch do?", a:"Turns all lights OFF and returns control to individual switches Oxygen Systems (FCOM 1.30 / 1.40.14)", src:"Aircraft General deck" },
  { id:"aircraft-general-060", system:"Aircraft General", q:"What does the crew oxygen flow indicator show when oxygen is flowing?", a:"A yellow cross", src:"Aircraft General deck" },
  { id:"aircraft-general-061", system:"Aircraft General", q:"What does the RESET/TEST switch do when the oxygen panel door is closed and OXY ON is NOT displayed?", a:"Turns oxygen on momentarily to test the regulator", src:"Aircraft General deck" },
  { id:"aircraft-general-062", system:"Aircraft General", q:"What does the RESET/TEST switch do when OXY ON IS displayed?", a:"Turns oxygen off, deactivates mask microphone, reactivates boom microphone", src:"Aircraft General deck" },
  { id:"aircraft-general-063", system:"Aircraft General", q:"What does squeezing and pulling both oxygen mask release levers do?", a:"Opens oxygen panel doors, starts oxygen flow, inflates mask harness, selects mask microphone (boom mic deselected)", src:"Aircraft General deck" },
  { id:"aircraft-general-064", system:"Aircraft General", q:"What does the EMGCY regulator mode provide?", a:"100% oxygen under POSITIVE PRESSURE at all cabin altitudes; protects against smoke and harmful vapors", src:"Aircraft General deck" },
  { id:"aircraft-general-065", system:"Aircraft General", q:"What does the 100% regulator mode provide?", a:"100% oxygen on demand (not an air/oxygen mixture)", src:"Aircraft General deck" },
  { id:"aircraft-general-066", system:"Aircraft General", q:"What does the N (normal) regulator mode provide?", a:"Air/oxygen mixture on demand; ratio depends on cabin altitude; automatically supplies 100% oxygen under positive pressure above a preset cabin altitude", src:"Aircraft General deck" },
  { id:"aircraft-general-067", system:"Aircraft General", q:"Why should EMGCY mode be used only as conditions require?", a:"It depletes oxygen supply at a higher rate than 100% or N mode", src:"Aircraft General deck" },
  { id:"aircraft-general-068", system:"Aircraft General", q:"Where is passenger and flight attendant oxygen stored?", a:"In small high-pressure gaseous oxygen cylinders in the Passenger Service Units (PSU) in the ceiling panels", src:"Aircraft General deck" },
  { id:"aircraft-general-069", system:"Aircraft General", q:"How does the passenger oxygen delivery system work?", a:"Normal breathing initiates flow; system delivers small pulses during inhalation; pulse duration is longer at higher cabin altitudes", src:"Aircraft General deck" },
  { id:"aircraft-general-070", system:"Aircraft General", q:"Are passenger oxygen cylinders reusable?", a:"No -- single use only; once activated they provide oxygen until depleted", src:"Aircraft General deck" },
  { id:"aircraft-general-071", system:"Aircraft General", q:"How long does passenger oxygen last?", a:"Approximately 22 minutes", src:"Aircraft General deck" },
  { id:"aircraft-general-072", system:"Aircraft General", q:"At what cabin altitude do passenger oxygen masks automatically drop?", a:"Prior to reaching the GREATER of: 14,500 ft, origin airfield altitude +1,500 ft, or destination airfield altitude +1,500 ft", src:"Aircraft General deck" },
  { id:"aircraft-general-073", system:"Aircraft General", q:"How can the pilot manually deploy passenger oxygen masks?", a:"Push the PASS OXYGEN switch on the overhead panel to ON", src:"Aircraft General deck" },
  { id:"aircraft-general-074", system:"Aircraft General", q:"Where is crew oxygen quantity checked during Pre-flight?", a:"On the STATUS page (shown in PSI)", src:"Aircraft General deck" },
  { id:"aircraft-general-075", system:"Aircraft General", q:"What reference is used to determine required crew oxygen quantity, and what is the unit caution?", a:"FCOM Performance Dispatch Section 11; first table is in liters, status page is in PSI -- use Table 4 to convert Common Core System (FCOM 1.40)", src:"Aircraft General deck" },
  { id:"aircraft-general-076", system:"Aircraft General", q:"What does the CCS provide?", a:"A common computing network and data exchange system for many airplane systems", src:"Aircraft General deck" },
  { id:"aircraft-general-077", system:"Aircraft General", q:"Is CCS operation automatic or manual?", a:"Automatic", src:"Aircraft General deck" },
  { id:"aircraft-general-078", system:"Aircraft General", q:"What is the main component of the CCS?", a:"The Common Computing Resource (CCR)", src:"Aircraft General deck" },
  { id:"aircraft-general-079", system:"Aircraft General", q:"How many CCR cabinets are there and where are they located?", a:"2 (left and right), located in the Forward EE Bay", src:"Aircraft General deck" },
  { id:"aircraft-general-080", system:"Aircraft General", q:"Are there any CCS controls or indications during normal operations?", a:"No", src:"Aircraft General deck" },
  { id:"aircraft-general-081", system:"Aircraft General", q:"Where are the CCR RESET switches located?", a:"On the overhead panel (L and R)", src:"Aircraft General deck" },
  { id:"aircraft-general-082", system:"Aircraft General", q:"What checklist covers loss of all displays due to a CCR fault?", a:"Un-annunciated non-normal checklist: LOSS OF ALL DISPLAYS", src:"Aircraft General deck" },
  { id:"aircraft-general-083", system:"Aircraft General", q:"Which CCR always starts up first?", a:"The left CCR", src:"Aircraft General deck" },
  { id:"aircraft-general-084", system:"Aircraft General", q:"How long does the left CCR start-up cycle take?", a:"Approximately 2-3 minutes", src:"Aircraft General deck" },
  { id:"aircraft-general-085", system:"Aircraft General", q:"What indicates the left CCR is on-line during battery power start-up?", a:"The captain's inboard and lower display units show the default format (CDU pages)", src:"Aircraft General deck" },
  { id:"aircraft-general-086", system:"Aircraft General", q:"What two conditions must be met before the right CCR can begin its start-up cycle?", a:"Left CCR must complete start-up AND a power source other than the battery (APU or external power) must be available", src:"Aircraft General deck" },
  { id:"aircraft-general-087", system:"Aircraft General", q:"What indicates both CCRs are on-line after external power start-up?", a:"All displays AND the HUD combiners show their default formats", src:"Aircraft General deck" },
  { id:"aircraft-general-088", system:"Aircraft General", q:"How many data networks does the CCS use and what are they called?", a:"2 redundant networks -- Channel A and Channel B", src:"Aircraft General deck" },
  { id:"aircraft-general-089", system:"Aircraft General", q:"Name five of the systems whose computing resources are hosted in the CCR cabinets.", a:"Any five from: environmental control, communication, electrical, fire protection, fuel, hydraulic, ice and rain protection, indicating and recording, landing gear, lighting, navigation, water and waste, central maintenance and condition monitoring, nitrogen generation, door indication and control Panel Identification", src:"Aircraft General deck" },
  { id:"aircraft-general-090", system:"Aircraft General", q:"What is the name of the panel with selectable pages for VHF, HF, SAT, CAB, GPWS, WXR, and XPDR?", a:"Tuning and Control Panel (TCP)", src:"Aircraft General deck" },
  { id:"aircraft-general-091", system:"Aircraft General", q:"What is the name of the panel containing G/S INHIBIT, TRANSPONDER MODE selector, and AURAL CANCEL?", a:"Alerting and Transponder Control Panel (ATP)", src:"Aircraft General deck" },
  { id:"aircraft-general-092", system:"Aircraft General", q:"What is the name of the panel with MINS RADIO/BARO, FPV, MTRS, BAROSET, ND mode, MAP, PLAN, MENU, RANGE, WXR, TFC, and TERR?", a:"EFIS Control Panel", src:"Aircraft General deck" },
  { id:"aircraft-general-093", system:"Aircraft General", q:"What is the name of the panel with MFD L/R, SYS, CDU, INFO, CHLK, COMM, ND, EICAS arrows, ENG, and CANC/RCL?", a:"Display Select Panel (DSP)", src:"Aircraft General deck" },
  { id:"aircraft-general-094", system:"Aircraft General", q:"What are DUs and how are they labeled on the 787?", a:"Display Units; labeled outboard, inboard, and lower DUs", src:"Aircraft General deck" },
  { id:"air-systems-001", system:"Air Systems", q:"What are the three subsystems that make up Air Systems on the B787?", a:"Air Conditioning System, Pressurization System, and Bleed Air System.", src:"Air Systems deck" },
  { id:"air-systems-002", system:"Air Systems", q:"On the B787, engine bleed air is used for which purpose(s)?", a:"Engine core anti-ice and inlet cowl anti-ice operations ONLY. The B787 uses a no-bleed architecture -- bleed air is NOT used for air conditioning or pressurization.", src:"Air Systems deck" },
  { id:"air-systems-003", system:"Air Systems", q:"What flight deck temperature does the FLT DECK TEMP knob set at the mid (12 o'clock) position?", a:"Approximately 75 deg F.", src:"Air Systems deck" },
  { id:"air-systems-004", system:"Air Systems", q:"What is the temperature range of the FLT DECK TEMP control?", a:"65 deg F to 85 deg F.", src:"Air Systems deck" },
  { id:"air-systems-005", system:"Air Systems", q:"What is the temperature range of the CABIN TEMP control (master reference)?", a:"65 deg F to 85 deg F.", src:"Air Systems deck" },
  { id:"air-systems-006", system:"Air Systems", q:"By how much can cabin attendants adjust individual cabin zones from the master temperature?", a:"Plus or minus 5 deg F.", src:"Air Systems deck" },
  { id:"air-systems-007", system:"Air Systems", q:"How many total Cabin Air Compressors (CACs) are on the B787, and how are they allocated?", a:"Four total -- two dedicated to each pack (two to the left pack, two to the right pack).", src:"Air Systems deck" },
  { id:"air-systems-008", system:"Air Systems", q:"Can a single CAC operate its associated pack in all operating modes?", a:"Yes -- a single CAC provides sufficient air to operate its associated pack in all operating modes.", src:"Air Systems deck" },
  { id:"air-systems-009", system:"Air Systems", q:"What controls the B787 cabin temperature and pressurization instead of engine bleed air?", a:"Electrically driven Cabin Air Compressors (CACs) pressurize outside air and supply it to the two air conditioning packs.", src:"Air Systems deck" },
  { id:"air-systems-010", system:"Air Systems", q:"When the EQUIP COOLING FWD switch is selected OFF (AUTO not visible), what happens?", a:"Both forward equipment cooling supply fans and vent fan are commanded off; the smoke/override valve is commanded open; forward cargo heat becomes inoperative; forward cargo air conditioning becomes inoperative; OVRD illuminates amber.", src:"Air Systems deck" },
  { id:"air-systems-011", system:"Air Systems", q:"What EICAS message indicates the forward equipment cooling system is in override mode?", a:"EQUIP CLG OVRD FWD.", src:"Air Systems deck" },
  { id:"air-systems-012", system:"Air Systems", q:"What EICAS message indicates the aft equipment cooling system is in override mode?", a:"EQUIP CLG OVRD AFT.", src:"Air Systems deck" },
  { id:"air-systems-013", system:"Air Systems", q:"After 30 minutes in equipment cooling override mode at low altitude and low cabin differential pressure, what may happen?", a:"Non-critical electronic equipment may fail.", src:"Air Systems deck" },
  { id:"air-systems-014", system:"Air Systems", q:"List the seven conditions that cause the FWD equipment cooling system to automatically enter override mode.", a:"(1) FWD EQUIP COOLING switch to OVRD. (2) In flight, both supply fans fail. (3) Both flow sensors fail. (4) In flight, low airflow detected. (5) In flight, excessive temperature detected in forward equipment cooling system. (6) Smoke detected in forward equipment cooling system or forward cargo area. (7) FWD CARGO FIRE ARM switch is ARMED.", src:"Air Systems deck" },
  { id:"air-systems-015", system:"Air Systems", q:"What additional condition applies to the AFT equipment cooling override that is NOT present for FWD?", a:"AFT CARGO FIRE ARM switch is ARMED is unique to AFT (FWD has FWD CARGO FIRE ARM instead). Also: smoke in the aft equipment ventilation system. Additionally, if smoke is detected in the aft E/E compartment, the lower recirculation fans are commanded off.", src:"Air Systems deck" },
  { id:"air-systems-016", system:"Air Systems", q:"What type of air does the flight deck receive during normal operation?", a:"100% conditioned outside air. (The passenger cabin receives a mix of outside and recirculated air.)", src:"Air Systems deck" },
  { id:"air-systems-017", system:"Air Systems", q:"What type of air does the flight deck receive if one pack is off and the associated lower recirculation fan is on?", a:"Some recirculated air is supplied to the flight deck.", src:"Air Systems deck" },
  { id:"air-systems-018", system:"Air Systems", q:"What filter type do recirculation fans use?", a:"HEPA filters -- cabin air is drawn through HEPA filters before being reintroduced into the conditioned air distribution system.", src:"Air Systems deck" },
  { id:"air-systems-019", system:"Air Systems", q:"What is the per-flight limit on PACK resets?", a:"A reset of a single PACK is limited to once per flight. Some PACK reset attempts are restricted above 34,000 ft.", src:"Air Systems deck" },
  { id:"air-systems-020", system:"Air Systems", q:"What are the four functions of the AIR COND RESET switch?", a:"(1) Resets any air conditioning faults and attempts to restart normal operation. (2) Resets any trim air valves held closed due to overheat, control failure, or valve failure. (3) Attempts to reset a failed recirculation fan. (4) Resets fault protection.", src:"Air Systems deck" },
  { id:"air-systems-021", system:"Air Systems", q:"Why is resetting an inoperative pack above 34,000 ft potentially dangerous?", a:"Above 34,000 ft the CACs are close to the surge margin. This may prevent reset of the inoperative pack AND the temporarily reduced CAC flow schedule on the operating pack can cause it to shut down too.", src:"Air Systems deck" },
  { id:"air-systems-022", system:"Air Systems", q:"During engine start, when do packs restart?", a:"Not until at least 2 minutes after the engine start sequence is initiated AND the engine is running. If both engines start together and the 2-minute limit is met, packs restart immediately after the second engine is running.", src:"Air Systems deck" },
  { id:"air-systems-023", system:"Air Systems", q:"When is three-CAC operation automatically enabled?", a:"2 minutes after both engines are running.", src:"Air Systems deck" },
  { id:"air-systems-024", system:"Air Systems", q:"What EICAS message is displayed when a pack is in standby cooling mode?", a:"PACK MODE (L, R).", src:"Air Systems deck" },
  { id:"air-systems-025", system:"Air Systems", q:"How is standby cooling mode indicated on the Air Synoptic?", a:"\"STBY COOLING\" is displayed in amber.", src:"Air Systems deck" },
  { id:"air-systems-026", system:"Air Systems", q:"What can happen to a pack in standby cooling mode at lower altitudes or higher OAT?", a:"The pack may shut down at lower altitudes and higher outside air temperatures. It restarts automatically when altitude and OAT are suitable.", src:"Air Systems deck" },
  { id:"air-systems-027", system:"Air Systems", q:"What CAUTION applies before using external ground conditioned air?", a:"Packs AND lower recirculation fans must be selected off before and during use of external conditioned air. Packs can be damaged if operated while ground air is connected.", src:"Air Systems deck" },
  { id:"air-systems-028", system:"Air Systems", q:"What controls the pack outlet temperature in the trim air system?", a:"The zone requiring the COOLEST temperature controls the pack outlet temperature.", src:"Air Systems deck" },
  { id:"air-systems-029", system:"Air Systems", q:"If the temperature selector is unavailable to the pack temperature controller, what temperature does the pack regulate to?", a:"Either the last temperature set, or an average cabin temperature of 75 deg F.", src:"Air Systems deck" },
  { id:"air-systems-030", system:"Air Systems", q:"How many zone ducts does each trim air system supply?", a:"Two cabin zone ducts and one flight deck zone duct (each trim air system). Seven total temperature zones.", src:"Air Systems deck" },
  { id:"air-systems-031", system:"Air Systems", q:"When the VENTILATION switch is selected to ALTN, where do the outflow valves reposition, and under what conditions?", a:"Forward OFV repositions to the 10 o'clock position; aft OFV repositions to the 1 o'clock position. This occurs when airplane is below 13,000 ft and not on the ground. Results in depressurization. Only used with a non-normal checklist.", src:"Air Systems deck" },
  { id:"air-systems-032", system:"Air Systems", q:"How many liquid cooling loops does PECS have, and how many pumps per loop?", a:"Two independent loops; each loop has one pump package containing two fully redundant pumps.", src:"Air Systems deck" },
  { id:"air-systems-033", system:"Air Systems", q:"What temperature does PECS control the liquid coolant supply to during normal operation?", a:"80 deg F.", src:"Air Systems deck" },
  { id:"air-systems-034", system:"Air Systems", q:"What is the PECS and ICS coolant mixture and color?", a:"60/40 percent propylene glycol and deionized water; orange in color.", src:"Air Systems deck" },
  { id:"air-systems-035", system:"Air Systems", q:"What CAUTION applies to PECS after shutting down packs and hydraulic EMP?", a:"PECS requires a cool-down period to dissipate residual heat from liquid cooled units, preventing damage to the units and degradation of the coolant.", src:"Air Systems deck" },
  { id:"air-systems-036", system:"Air Systems", q:"When does the ICS operate, and what flight deck control does it have?", a:"The ICS operates anytime the airplane has electrical power. There is no flight deck control.", src:"Air Systems deck" },
  { id:"air-systems-037", system:"Air Systems", q:"How many zonal dryers make up the crown dehumidification system, and where are they?", a:"Two -- one in the forward crown area, one in the aft area.", src:"Air Systems deck" },
  { id:"air-systems-038", system:"Air Systems", q:"When does the flight deck humidification system automatically activate in cruise?", a:"20 minutes into cruise above 25,000 ft, when the HUMID switch is ON.", src:"Air Systems deck" },
  { id:"air-systems-039", system:"Air Systems", q:"When does the humidification system automatically shut off?", a:"Approximately 1 to 1.5 hours prior to touchdown.", src:"Air Systems deck" },
  { id:"air-systems-040", system:"Air Systems", q:"What temperature does the forward cargo A/C control target at the 12 o'clock (mid) position?", a:"Approximately 60 deg F.", src:"Air Systems deck" },
  { id:"air-systems-041", system:"Air Systems", q:"What is the temperature range and increment of the forward cargo A/C control?", a:"40 deg F to 80 deg F, in 2 deg F increments.", src:"Air Systems deck" },
  { id:"air-systems-042", system:"Air Systems", q:"When is FWD CARGO FLOW HIGH selected, and what does it do?", a:"Used for live animal carriage or odorous cargo. Selects high ventilation flow to prevent cargo odors from entering the passenger cabin, or to remove cabin odors.", src:"Air Systems deck" },
  { id:"air-systems-043", system:"Air Systems", q:"What is the bulk cargo heat target temperature when AUTO is selected?", a:"70 deg F.", src:"Air Systems deck" },
  { id:"air-systems-044", system:"Air Systems", q:"If a bulk cargo heater automatic overheat shutdown occurs, can cargo heat be restored in flight?", a:"No -- cargo heat to the related compartment cannot be restored in flight.", src:"Air Systems deck" },
  { id:"air-systems-045", system:"Air Systems", q:"List the five conditions that prevent bulk cargo heating system operation.", a:"(1) Alternate Ventilation System is on. (2) Aft or bulk cargo smoke detection. (3) Bulk cargo zone temperature above 141 deg F. (4) Fault with bulk cargo heating system components. (5) Aft cargo door or bulk cargo door is open.", src:"Air Systems deck" },
  { id:"air-systems-046", system:"Air Systems", q:"Under what OAT condition does the aft cargo heating system operate on the ground?", a:"When outside air temperature is below 45 deg F.", src:"Air Systems deck" },
  { id:"air-systems-047", system:"Air Systems", q:"What is the temperature range of the overhead flight crew rest compartment control?", a:"59 deg F (15 deg C) to 80 deg F (27 deg C).", src:"Air Systems deck" },
  { id:"air-systems-048", system:"Air Systems", q:"What is a key limitation of the crew rest compartment temperature control?", a:"The temperature can only be INCREASED above the temperature in the aft cabin area. The system may not achieve the selected temperature under all operating conditions.", src:"Air Systems deck" },
  { id:"air-systems-049", system:"Air Systems", q:"How many outflow valves does the B787 have, and how is flow normally split?", a:"Two outflow valves (one forward, one aft). Normally, outflow is split equally between them.", src:"Air Systems deck" },
  { id:"air-systems-050", system:"Air Systems", q:"Can either outflow valve alone maintain pressurization?", a:"Yes -- either valve alone can maintain cabin altitude and full ventilation rates.", src:"Air Systems deck" },
  { id:"air-systems-051", system:"Air Systems", q:"What is the maximum differential pressure at takeoff and landing?", a:"0.11 PSI (MAX delta-P .11 PSI -- takeoff and landing, as shown on the pressurization panel).", src:"Air Systems deck" },
  { id:"air-systems-052", system:"Air Systems", q:"What data does the pressurization system use to calculate the cabin pressurization schedule?", a:"Ambient pressure and flight plan data from the FMC.", src:"Air Systems deck" },
  { id:"air-systems-053", system:"Air Systems", q:"What does the pressurization system do just prior to rotation on takeoff?", a:"Supplies a small positive pressurization prior to rotation to cause a smooth cabin altitude transition to the cabin altitude climb schedule.", src:"Air Systems deck" },
  { id:"air-systems-054", system:"Air Systems", q:"What is the normal cabin altitude in cruise?", a:"At or below 6,000 ft.", src:"Air Systems deck" },
  { id:"air-systems-055", system:"Air Systems", q:"How high can cabin altitude be commanded during degraded cruise operations?", a:"Up to 8,000 ft (more likely with an inoperative pack or CAC).", src:"Air Systems deck" },
  { id:"air-systems-056", system:"Air Systems", q:"If cruise altitude is unavailable from the FMC in AUTO, what default cruise altitude does the CPCS use?", a:"43,000 ft.", src:"Air Systems deck" },
  { id:"air-systems-057", system:"Air Systems", q:"What source provides the landing altitude barometric pressure correction for descent pressurization?", a:"The captain's altimeter setting.", src:"Air Systems deck" },
  { id:"air-systems-058", system:"Air Systems", q:"What happens to both outflow valves at touchdown?", a:"Both outflow valves open to depressurize the cabin.", src:"Air Systems deck" },
  { id:"air-systems-059", system:"Air Systems", q:"If landing altitude is unavailable from the FMC and not set manually, what does the CPCS assume and what EICAS message appears?", a:"Assumes a landing altitude of 2,000 ft. EICAS advisory message LANDING ALTITUDE is displayed.", src:"Air Systems deck" },
  { id:"air-systems-060", system:"Air Systems", q:"During a depressurization event with a takeoff/landing airport below 9,500 ft, at what cabin altitude will the outflow valves begin to open?", a:"11,500 ft.", src:"Air Systems deck" },
  { id:"air-systems-061", system:"Air Systems", q:"During a depressurization event with a takeoff/landing airport above 9,500 ft (and at or below 14,000 ft), at what cabin altitude will the outflow valves begin to open?", a:"14,500 ft.", src:"Air Systems deck" },
  { id:"air-systems-062", system:"Air Systems", q:"What does CPCS do if cabin altitude reaches 15,000 ft due to any probable failure?", a:"Outflow valves drive FULL OPEN for the remainder of the flight. Flight crew must NOT attempt to manually close the outflow valves during descent.", src:"Air Systems deck" },
  { id:"air-systems-063", system:"Air Systems", q:"In manual pressurization, if outflow valve position is not available on EICAS, how long must the OUTFLOW VALVE MANUAL switch be held to achieve full valve travel?", a:"30 seconds.", src:"Air Systems deck" },
  { id:"air-systems-064", system:"Air Systems", q:"What is the LDG ALT selector range?", a:"-2,000 ft (below sea level) to 14,000 ft above sea level.", src:"Air Systems deck" },
  { id:"air-systems-065", system:"Air Systems", q:"What increment does the LDG ALT selector use when turned slowly vs. quickly?", a:"Slowly: 100-ft increments. Quickly: 500-ft increments.", src:"Air Systems deck" },
  { id:"air-systems-066", system:"Air Systems", q:"List the conditions under which pressurization indications are automatically displayed on EICAS.", a:"Landing altitude in MAN; either OFV switch in MAN; cabin altitude above normal range (amber/red); cabin differential pressure above normal range (amber); cabin differential pressure excessive (red); AIR synoptic selected on any MFD; EICAS messages displayed: CABIN ALTITUDE, CABIN ALTITUDE AUTO, LANDING ALTITUDE, PACK L+R, OUTFLOW VALVE AFT, OUTFLOW VALVE FWD, VENTILATION ALTN.", src:"Air Systems deck" },
  { id:"air-systems-067", system:"Air Systems", q:"For what purpose ONLY does the B787 use engine bleed air?", a:"Engine core and inlet cowl anti-ice operations only. (787 no-bleed architecture -- air conditioning and pressurization use electrically driven CACs, not bleed air.)", src:"Air Systems deck" },
  { id:"air-systems-068", system:"Air Systems", q:"How are the engine anti-ice valves armed, and what opens them?", a:"Armed when ENGINE ANTI-ICE selectors are placed to AUTO. Valves open when the ice detection system detects icing conditions, or the selector is set to ON.", src:"Air Systems deck" },
  { id:"air-systems-069", system:"Air Systems", q:"List the five conditions that cause engine anti-ice valves to close automatically.", a:"(1) During start. (2) Bleed air over temperature. (3) Bleed air overpressure. (4) Engine fire switch is pulled. (5) Bleed air leak is detected.", src:"Air Systems deck" },
  { id:"air-systems-070", system:"Air Systems", q:"During a go-around with one engine inoperative, if the PACK L+R EICAS message appears momentarily, what crew action is required?", a:"No crew action is required. This can occur if slat autogap is needed and both packs temporarily load shed; the message is expected and momentary.", src:"Air Systems deck" },
  { id:"air-systems-071", system:"Air Systems", q:"In the Air Synoptic, what color indicates selected temperature vs. actual temperature?", a:"MAGENTA = selected temperature; WHITE = actual temperature.", src:"Air Systems deck" },
  { id:"air-systems-072", system:"Air Systems", q:"What is the air source for the Forward Cargo Air Conditioning (FCAC) system?", a:"Air from the forward EE compartment.", src:"Air Systems deck" },
  { id:"air-systems-073", system:"Air Systems", q:"What is the air source for forward cargo HEAT (as opposed to A/C)?", a:"The forward equipment cooling exhaust fan.", src:"Air Systems deck" },
  { id:"air-systems-074", system:"Air Systems", q:"When does CAC operation use only ONE CAC per pack on the ground?", a:"At normal ground temperature with both APU Starter Generators (ASG) connected.", src:"Air Systems deck" },
  { id:"air-systems-075", system:"Air Systems", q:"Why does the AFT equipment cooling system, when in override mode with smoke in the aft E/E compartment, also command the lower recirculation fans off?", a:"The lower recirculation fans are commanded off when smoke is detected in the aft E/E equipment compartment to prevent smoke from being circulated into the cabin through the recirculation system. (deck-stated; FCOM ref 2.10.2 not independently confirmed - low risk)", src:"Air Systems deck" },
  { id:"anti-ice-001", system:"Anti-Ice", q:"How many ice detectors does the Primary Ice Detection System (PIDS) have?", a:"Two ice detectors.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-002", system:"Anti-Ice", q:"What does the PIDS measure to determine if icing conditions exist?", a:"Liquid water content, using TAT and other air data information and temperature sources.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-003", system:"Anti-Ice", q:"Where does ice detector data go after it is collected?", a:"To the Common Data Network (CDN).", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-004", system:"Anti-Ice", q:"What data do the ice detectors use to calculate possible ice conditions?", a:"Air Data Reference Function (ADRF) data.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-005", system:"Anti-Ice", q:"Below what airspeed is automatic ice detection inhibited on the ground?", a:"Below 75 kts.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-006", system:"Anti-Ice", q:"How are the PIDS ice detectors kept from icing over themselves on the ground?", a:"They are heated electrically after engine start.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-007", system:"Anti-Ice", q:"What EICAS message appears if the automatic ice detection system fails?", a:"[checklist box] ICE DETECTORS (amber caution with checklist box).", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-008", system:"Anti-Ice", q:"What energy source does engine anti-ice use?", a:"Bleed air.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-009", system:"Anti-Ice", q:"What two areas does engine anti-ice protect?", a:"The engine core and the cowl inlet.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-010", system:"Anti-Ice", q:"Can engine anti-ice be used on the ground?", a:"Yes -- it can be operated in flight or on the ground (manual). Automatic operation is inhibited on the ground.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-011", system:"Anti-Ice", q:"Where on EICAS is the EAI (engine anti-ice) indication displayed?", a:"Above the EICAS N1 indication.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-012", system:"Anti-Ice", q:"What condition triggers the EAI indication on EICAS?", a:"When an engine anti-ice valve is open.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-013", system:"Anti-Ice", q:"List the five conditions that cause engine anti-ice valves to close automatically.", a:"(1) During start; (2) bleed air overtemperature; (3) bleed air overpressure; (4) engine fire switch pulled; (5) bleed air leak detected.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-014", system:"Anti-Ice", q:"What happens if an engine anti-ice duct leak is detected?", a:"The respective (that engine's) anti-ice valves close.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-015", system:"Anti-Ice", q:"What type of heating does wing anti-ice use?", a:"Electrical -- thermal anti-icing mats.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-016", system:"Anti-Ice", q:"Where specifically are the wing anti-ice thermal mats located?", a:"On the leading edge slats -- specifically the 4 slats outboard of each engine pylon.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-017", system:"Anti-Ice", q:"Below what airspeed is wing anti-ice inhibited on the ground?", a:"Below 75 kts.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-018", system:"Anti-Ice", q:"What is the maximum duration that wing anti-ice power can be momentarily shed?", a:"30 seconds.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-019", system:"Anti-Ice", q:"What event commonly triggers the temporary shedding of wing anti-ice power?", a:"High electrical loads, such as during flap retraction.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-020", system:"Anti-Ice", q:"What does the wing anti-ice system do if one thermal mat fails?", a:"It automatically de-powers the opposite thermal mat to prevent asymmetrical wing icing.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-021", system:"Anti-Ice", q:"With the WING ANTI-ICE selector in AUTO, when does the system activate in flight?", a:"When icing conditions are detected (automatically via PIDS).", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-022", system:"Anti-Ice", q:"What EICAS indication is displayed when wing anti-ice is active?", a:"WAI.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-023", system:"Anti-Ice", q:"With the WING ANTI-ICE selector in ON (manual), what TAT condition must exist for the system to be powered in flight?", a:"TAT must be below 25 degrees C.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-024", system:"Anti-Ice", q:"With flaps out of up, what effect does use of engine or wing anti-ice have on stick shaker speed and minimum maneuvering speed?", a:"It increases both, reducing maneuver margin to stick shaker.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-025", system:"Anti-Ice", q:"With flaps up, what effect does use of engine or wing anti-ice have on stick shaker speed?", a:"No effect on stick shaker speed or minimum maneuvering speed.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-026", system:"Anti-Ice", q:"What does the pack inlet anti-ice system protect?", a:"Both ram air inlets for the cabin air compressors.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-027", system:"Anti-Ice", q:"What type of heater is used for pack inlet anti-ice?", a:"An electric heater on the leading edge of each inlet.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-028", system:"Anti-Ice", q:"How is pack inlet anti-ice controlled?", a:"Automatically, with signals from the automatic ice detection system (PIDS).", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-029", system:"Anti-Ice", q:"Under what two conditions is pack inlet anti-ice inhibited?", a:"On the ground, and when TAT is above 10 degrees C.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-030", system:"Anti-Ice", q:"What type of heating is used for all flight deck windows?", a:"Electrical heating.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-031", system:"Anti-Ice", q:"What protection do the forward flight deck windows have that the side windows do not?", a:"Exterior surface anti-icing (side windows have interior antifogging only).", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-032", system:"Anti-Ice", q:"What protection do the side windows have?", a:"Interior surface antifogging protection only -- no exterior anti-icing.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-033", system:"Anti-Ice", q:"Which window heat switches activate the primary window heat system?", a:"PRIMARY L SIDE, L FWD, R FWD, and R SIDE (four switches).", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-034", system:"Anti-Ice", q:"Which windows have BACKUP window heat switches?", a:"Forward windows only -- BACKUP L FWD and R FWD.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-035", system:"Anti-Ice", q:"When does the backup antifogging system for forward windows operate?", a:"Automatically, when BACKUP L FWD and R FWD switches are ON and the primary window heat system has failed.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-036", system:"Anti-Ice", q:"How many wiper speeds do the forward window wipers have, and what are they?", a:"Three speeds: INT, LOW, and HIGH (plus OFF/stowed).", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-037", system:"Anti-Ice", q:"What does the WIPER selector in OFF do to the wiper?", a:"The wiper is off and stowed.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-038", system:"Anti-Ice", q:"Which windshields are equipped with a windshield washer system?", a:"The Captain's and First Officer's windshields.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-039", system:"Anti-Ice", q:"How does the windshield washer system apply fluid?", a:"Continuously, while the washer switch is held ON.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-040", system:"Anti-Ice", q:"What hazard exists if wipers are used on a dry windshield?", a:"Windshield scratching may occur.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-041", system:"Anti-Ice", q:"How many pitot probes does the B787 have?", a:"Three (3).", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-042", system:"Anti-Ice", q:"How many AOA probes does the B787 have?", a:"Two (2).", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-043", system:"Anti-Ice", q:"How many TAT probes does the B787 have?", a:"One (1).", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-044", system:"Anti-Ice", q:"What triggers probe heat for the pitot and AOA probes?", a:"Either engine operating.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-045", system:"Anti-Ice", q:"What triggers probe heat for the TAT probe?", a:"In flight only.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-046", system:"Anti-Ice", q:"Where are the Right and Center pitot probes located on the fuselage?", a:"On the right side of the fuselage nose section (the Left pitot is on the left side of the nose).", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-047", system:"Anti-Ice", q:"[Knowledge check] TRUE or FALSE: When the BACKUP WINDOW HEAT switches are selected ON, backup window heat anti-fogging is commanded on for the selected windows if the primary window heat system fails.", a:"TRUE.", src:"Anti-Ice and Rain deck" },
  { id:"anti-ice-048", system:"Anti-Ice", q:"[Knowledge check] Which statement about the engine anti-ice system is true: (A) EAI displayed above N1 when valve open, (B) can be operated in flight or on the ground, (C) automatic operation inhibited on the ground, (D) ALL the Above?", a:"D -- ALL the Above.", src:"Anti-Ice and Rain deck" },
  { id:"apu-001", system:"APU", q:"Where is the B787 APU located?", a:"In the airplane tailcone.", src:"APU deck" },
  { id:"apu-002", system:"APU", q:"What is the maximum certified altitude for APU start and operation?", a:"43,100 ft (no envelope limits).", src:"APU deck" },
  { id:"apu-003", system:"APU", q:"What is the APU fuel burn rate during typical ground operations?", a:"480 lb/hr.", src:"APU deck" },
  { id:"apu-004", system:"APU", q:"How many starters and generators does the B787 APU have, and how many are required to start?", a:"2 starters and 2 generators; only one starter and one generator are required to start.", src:"APU deck" },
  { id:"apu-005", system:"APU", q:"What power sources can energize an APU starter?", a:"Forward external power or an engine generator. APU Selector / Controls", src:"APU deck" },
  { id:"apu-006", system:"APU", q:"What three actions does the APU selector ON position accomplish?", a:"(1) Opens the APU fuel spar valve and inlet door, (2) activates the AC or DC fuel pump, (3) powers the APU controller.", src:"APU deck" },
  { id:"apu-007", system:"APU", q:"What two things does APU selector OFF accomplish?", a:"Initiates normal shutdown and resets the auto shutdown fault logic.", src:"APU deck" },
  { id:"apu-008", system:"APU", q:"What type of detent is the APU selector START position?", a:"Momentary, spring-loaded to ON.", src:"APU deck" },
  { id:"apu-009", system:"APU", q:"What does the APU FAULT light (amber) indicate?", a:"APU fault and/or fire detected; APU shutdown due to fault/fire; or momentarily during APU controller self-test.", src:"APU deck" },
  { id:"apu-010", system:"APU", q:"If the CCS is not running when START is selected, what happens?", a:"The APU controller delays the start until the required common core applications are available. APU Start Sequence", src:"APU deck" },
  { id:"apu-011", system:"APU", q:"Which battery powers the APU controller (APUC), air inlet door, and right starter?", a:"The APU battery.", src:"APU deck" },
  { id:"apu-012", system:"APU", q:"Which battery powers the APU fuel shutoff valve, DC fuel pump, and fire detection system?", a:"The main airplane battery.", src:"APU deck" },
  { id:"apu-013", system:"APU", q:"What two batteries must be ON to properly start the APU?", a:"Both the APU battery and the main airplane battery.", src:"APU deck" },
  { id:"apu-014", system:"APU", q:"What system must be operational (visible indication: CDU page on lower DU) before APU start proceeds?", a:"The Common Core System (CCS).", src:"APU deck" },
  { id:"apu-015", system:"APU", q:"What two conditions must both be true before the APU starter engages?", a:"(1) APU air inlet door at full open position, AND (2) required CCS programs running.", src:"APU deck" },
  { id:"apu-016", system:"APU", q:"On battery power only, which APU starter is used?", a:"Right starter only.", src:"APU deck" },
  { id:"apu-017", system:"APU", q:"At approximately what RPM does the starter disengage and ignition turn off?", a:"Approximately 50% RPM.", src:"APU deck" },
  { id:"apu-018", system:"APU", q:"When does the EICAS memo APU RUNNING display?", a:"When the APU reaches 95% of target speed plus 2 seconds.", src:"APU deck" },
  { id:"apu-019", system:"APU", q:"After an APU start failure, how do you reset the system to enable a restart?", a:"Move the APU selector from ON to OFF (clears APU SHUTDOWN advisory, resets the shutdown system).", src:"APU deck" },
  { id:"apu-020", system:"APU", q:"How many consecutive start attempts will the APU battery support?", a:"2 consecutive start attempts.", src:"APU deck" },
  { id:"apu-021", system:"APU", q:"How long must you wait before a third start attempt if the APU has failed twice?", a:"5 minutes. APU Shutdown", src:"APU deck" },
  { id:"apu-022", system:"APU", q:"How long is the normal APU shutdown cooldown cycle?", a:"2 minutes.", src:"APU deck" },
  { id:"apu-023", system:"APU", q:"What EICAS message is displayed during the APU cooldown cycle?", a:"APU COOLDOWN (memo).", src:"APU deck" },
  { id:"apu-024", system:"APU", q:"Can the APU be restarted during the cooldown cycle, and if so how?", a:"Yes. Place the APU selector back to ON at any time during the 2-minute cooldown.", src:"APU deck" },
  { id:"apu-025", system:"APU", q:"What is simulated at the end of the cooldown period to complete shutdown?", a:"An overspeed condition is simulated to test the overspeed and fuel shutoff protection, which shuts off fuel.", src:"APU deck" },
  { id:"apu-026", system:"APU", q:"At what RPM does the APUC command the air inlet door to close during shutdown?", a:"15% RPM. APU Operating Modes", src:"APU deck" },
  { id:"apu-027", system:"APU", q:"Under what conditions is attended mode active?", a:"When either engine is starting or running, OR when the airplane is in flight.", src:"APU deck" },
  { id:"apu-028", system:"APU", q:"Under what conditions is unattended mode active?", a:"All other ground configurations (neither engine running, on the ground).", src:"APU deck" },
  { id:"apu-029", system:"APU", q:"List the six fault conditions that cause immediate APU shutdown in attended mode.", a:"APU fire/inlet overtemperature; overspeed/loss of overspeed protection; APU controller failure; speed droop; APU start failure (no rotation, no acceleration, or no light-off); air inlet door failed closed.", src:"APU deck" },
  { id:"apu-030", system:"APU", q:"In attended mode, which three fault conditions trigger APU LIMIT (APU continues running)?", a:"High EGT, high oil temperature, low oil pressure.", src:"APU deck" },
  { id:"apu-031", system:"APU", q:"What EICAS message type is APU SHUTDOWN?", a:"Advisory.", src:"APU deck" },
  { id:"apu-032", system:"APU", q:"What EICAS message type is APU LIMIT?", a:"Caution.", src:"APU deck" },
  { id:"apu-033", system:"APU", q:"Is there a cooldown period when the APU shuts down in attended mode due to a fault?", a:"No.", src:"APU deck" },
  { id:"apu-034", system:"APU", q:"Is there a cooldown period when the APU is manually shut down after an APU LIMIT message?", a:"No.", src:"APU deck" },
  { id:"apu-035", system:"APU", q:"Name the additional fault triggers in unattended mode that are NOT immediate shutdown triggers in attended mode.", a:"High EGT/loss of EGT signal; low oil pressure; high oil temperature; APU starter/generator oil filter approaching bypass. (In attended mode these either trigger APU LIMIT or are not listed as immediate shutdown faults.) APU Fuel Feed", src:"APU deck" },
  { id:"apu-036", system:"APU", q:"What is the APU primary fuel pump?", a:"The aft left AC (boost) pump.", src:"APU deck" },
  { id:"apu-037", system:"APU", q:"From which manifold is APU fuel supplied?", a:"The left fuel manifold.", src:"APU deck" },
  { id:"apu-038", system:"APU", q:"What happens automatically when the APU switch is moved to ON with no AC power?", a:"The left main tank DC fuel pump turns on automatically.", src:"APU deck" },
  { id:"apu-039", system:"APU", q:"When AC power becomes available during APU operation, what happens to the fuel pumps?", a:"The left aft AC fuel pump operates automatically (regardless of fuel pump switch position) and the DC fuel pump turns off.", src:"APU deck" },
  { id:"apu-040", system:"APU", q:"Up to what altitude in flight can the APU be started with no pumps operating?", a:"14,000 ft pressure altitude. APU Automatic Start", src:"APU deck" },
  { id:"apu-041", system:"APU", q:"What in-flight event triggers an automatic APU start regardless of selector position?", a:"Three or more engine generators going offline.", src:"APU deck" },
  { id:"apu-042", system:"APU", q:"How do you shut down the APU if the automatic start condition is no longer valid?", a:"Position the selector to ON, then OFF.", src:"APU deck" },
  { id:"apu-043", system:"APU", q:"How do you shut down the APU while the automatic start condition is still valid?", a:"Only by pulling the APU fire switch. APU Fire Detection", src:"APU deck" },
  { id:"apu-044", system:"APU", q:"How many fire detector loops does the APU compartment have?", a:"2 (dual fire detector loops).", src:"APU deck" },
  { id:"apu-045", system:"APU", q:"Does the B787 APU have overheat detection?", a:"No. There is no APU overheat detection.", src:"APU deck" },
  { id:"apu-046", system:"APU", q:"Normally, how many loops must detect fire to generate an APU fire warning?", a:"Both loops.", src:"APU deck" },
  { id:"apu-047", system:"APU", q:"What happens if a fault is detected in one APU fire detector loop?", a:"The system automatically switches to single-loop operation. Detection by the remaining operating loop then triggers fire warning and APU shutdown.", src:"APU deck" },
  { id:"apu-048", system:"APU", q:"What EICAS message indicates the APU fire detection system has failed?", a:"DET FIRE APU (advisory). APU Fire Warning", src:"APU deck" },
  { id:"apu-049", system:"APU", q:"List the five indications of an APU fire warning.", a:"(1) Fire bell sounds, (2) master WARNING lights illuminate, (3) EICAS warning message FIRE APU displays, (4) APU fire switch fire warning light illuminates red, (5) APU fire switch unlocks. APU Fire Extinguishing", src:"APU deck" },
  { id:"apu-050", system:"APU", q:"How many APU fire extinguisher bottles are there?", a:"One.", src:"APU deck" },
  { id:"apu-051", system:"APU", q:"List the five actions that occur when the APU fire switch is pulled OUT.", a:"(1) Arms the APU fire extinguisher bottle, (2) closes the APU fuel valve, (3) closes the APU air inlet door, (4) trips the APU generator field and generator breaker, (5) shuts down the APU (if automatic shutdown has not occurred).", src:"APU deck" },
  { id:"apu-052", system:"APU", q:"How is the APU fire extinguisher bottle discharged?", a:"Rotate the APU fire switch in either direction after pulling it out.", src:"APU deck" },
  { id:"apu-053", system:"APU", q:"What is the automatic extinguisher bottle discharge delay after an APU fire signal?", a:"15 seconds (allows time for the fuel valve to close).", src:"APU deck" },
  { id:"apu-054", system:"APU", q:"On the ground with both engines off, how many fire detector loops are required to trigger APU shutdown and automatic bottle discharge?", a:"Either loop (single loop is sufficient when both engines are off).", src:"APU deck" },
  { id:"apu-055", system:"APU", q:"What does the APU BTL DISCH light (amber) indicate?", a:"The extinguisher bottle is discharged or has low pressure.", src:"APU deck" },
  { id:"apu-056", system:"APU", q:"What EICAS message displays when the APU extinguisher bottle is discharged or low pressure?", a:"BOTTLE DISCH APU (advisory). APU Inflight Fuel Flow Penalty (PI.17.11)", src:"APU deck" },
  { id:"apu-057", system:"APU", q:"What does the APU inflight fuel flow penalty table account for?", a:"Both APU fuel flow AND the effect of increased drag from the open APU door.", src:"APU deck" },
  { id:"apu-058", system:"APU", q:"What is the APU fuel flow penalty at 43,000 ft pressure altitude?", a:"190 lb/hr.", src:"APU deck" },
  { id:"apu-059", system:"APU", q:"What is the APU fuel flow penalty at 20,000 ft pressure altitude?", a:"370 lb/hr.", src:"APU deck" },
  { id:"apu-060", system:"APU", q:"What is the APU fuel flow penalty at 5,000 ft pressure altitude?", a:"530 lb/hr.", src:"APU deck" },
  { id:"apu-061", system:"APU", q:"In general, how does the APU fuel flow penalty change with altitude?", a:"The penalty increases as altitude decreases (530 lb/hr at 5,000 ft vs. 190 lb/hr at 43,000 ft).", src:"APU deck" },
  { id:"communications-001", system:"Communications", q:"What are the three main communications control panels on the B787 flight deck?", a:"TCP (Tuning and Control Panel), ACP (Audio Control Panel), and the MFD Communications page.", src:"Communications deck" },
  { id:"communications-002", system:"Communications", q:"Where is the ATC transponder squawk code displayed on the outboard PFD?", a:"In the XPDR data block, showing the current code as set on the TCP XPDR page.", src:"Communications deck" },
  { id:"communications-003", system:"Communications", q:"Where is the flight number displayed on the outboard PFD, and where is it set?", a:"The FLT # data block; it is set on the RTE 1/X page.", src:"Communications deck" },
  { id:"communications-004", system:"Communications", q:"What EICAS message annunciates an incoming COMM system message, and where does the text appear?", a:"EICAS advisory message ATC (communications message) with an aural chime; text appears in the ATC Data Block.", src:"Communications deck" },
  { id:"communications-005", system:"Communications", q:"How are arriving company uplink messages annunciated?", a:"Optionally by EICAS COMM message, optional EICAS PRINTER message, and/or optional aural chime; text displayed via NEW MESSAGE menu selection.", src:"Communications deck" },
  { id:"communications-006", system:"Communications", q:"When you push a CAB transmitter select switch twice within one second on the ACP, what happens?", a:"It places a priority call to a selected cabin station.", src:"Communications deck" },
  { id:"communications-007", system:"Communications", q:"What is the important note regarding the second push of the CAB select switch?", a:"It deselects the transmitter and receiver audio only after 1 second has elapsed from the first push.", src:"Communications deck" },
  { id:"communications-008", system:"Communications", q:"When the ACP suffers an uncommanded reset/restart, how long does it blank, and what state does it revert to?", a:"It blanks intermittently for approximately 5 seconds and reverts to the last configuration set prior to the last aircraft power-down.", src:"Communications deck" },
  { id:"communications-009", system:"Communications", q:"What are the three ways to transmit on the B787?", a:"(1) MIC/INT switch on the control wheel or ACP, (2) control wheel push-to-talk (PTT) switch, (3) glareshield MIC switch.", src:"Communications deck" },
  { id:"communications-010", system:"Communications", q:"Which VHF radio is configured for voice communication only?", a:"VHF L (left).", src:"Communications deck" },
  { id:"communications-011", system:"Communications", q:"Which VHF radio is normally used for data communication?", a:"VHF C (center).", src:"Communications deck" },
  { id:"communications-012", system:"Communications", q:"How many VHF radios can operate in data mode simultaneously?", a:"Only one VHF radio can operate in data mode at a time.", src:"Communications deck" },
  { id:"communications-013", system:"Communications", q:"What happens when any VHF radio is tuned to 121.5 MHz?", a:"All flight crew automatically monitor the radio; receiver lights on all audio control panels illuminate.", src:"Communications deck" },
  { id:"communications-014", system:"Communications", q:"How is an inoperative VHF or HF radio indicated on the TCP?", a:"The display shows ------- - X - ------- where X is the affected radio designation.", src:"Communications deck" },
  { id:"communications-015", system:"Communications", q:"Which VHF radio and TCP continue to operate on standby power in the event of electrical power loss?", a:"The left VHF radio and left TCP.", src:"Communications deck" },
  { id:"communications-016", system:"Communications", q:"How is data mode selected or deselected on a VHF or HF radio?", a:"By pushing the frequency transfer (XFR) switch when the word DATA is displayed on the active radio line.", src:"Communications deck" },
  { id:"communications-017", system:"Communications", q:"How is a VHF or HF radio returned to voice mode from data mode?", a:"By transferring a voice frequency into the ACTIVE frequency window.", src:"Communications deck" },
  { id:"communications-018", system:"Communications", q:"Are HF datalink transmissions allowed on the ground?", a:"No -- HF datalink transmissions are inhibited on the ground.", src:"Communications deck" },
  { id:"communications-019", system:"Communications", q:"How long must a VHF or HF radio transmit in flight before the RADIO TRANSMIT EICAS advisory appears?", a:"More than 30 seconds.", src:"Communications deck" },
  { id:"communications-020", system:"Communications", q:"What EICAS message is displayed for a stuck mic in flight?", a:"RADIO TRANSMIT CAPT, F/O, or OBS (advisory message).", src:"Communications deck" },
  { id:"communications-021", system:"Communications", q:"How long before a VHF radio is automatically disabled on the ground due to a stuck mic?", a:"Approximately 35 seconds.", src:"Communications deck" },
  { id:"communications-022", system:"Communications", q:"How is a ground-disabled stuck-mic radio re-enabled?", a:"By releasing the microphone switch for that radio.", src:"Communications deck" },
  { id:"communications-023", system:"Communications", q:"How many HF radios are installed on the B787?", a:"Two -- HF L (left) and HF R (right).", src:"Communications deck" },
  { id:"communications-024", system:"Communications", q:"How many pages of HF frequencies can be stored in the TCP, and what is the total number of frequencies?", a:"Up to 3 pages, 24 total stored frequencies.", src:"Communications deck" },
  { id:"communications-025", system:"Communications", q:"How many previously tuned HF frequencies are stored in memory?", a:"The last 100 tuned frequencies.", src:"Communications deck" },
  { id:"communications-026", system:"Communications", q:"What does an HF antenna tuning tone lasting longer than 7 seconds indicate?", a:"Failure of the system to tune.", src:"Communications deck" },
  { id:"communications-027", system:"Communications", q:"What two modes do the HF radios operate in, and how do you toggle between them?", a:"USB (upper side band) and AM (amplitude modulation); toggled with the USB/AM key on the main HF page.", src:"Communications deck" },
  { id:"communications-028", system:"Communications", q:"Can both HF radios receive simultaneously?", a:"Yes -- both can receive simultaneously as long as neither is transmitting. When one HF radio is transmitting, the antenna is disconnected from the other.", src:"Communications deck" },
  { id:"communications-029", system:"Communications", q:"What indicator appears in the TCP scratchpad when a frequency is received via ATC uplink?", a:"The frequency is preceded by a UL indicator (e.g., UL 121.875).", src:"Communications deck" },
  { id:"communications-030", system:"Communications", q:"What two things happen when you line select an ATC uplink frequency into the active, standby, or stored position?", a:"The scratchpad is cleared AND the uplink frequency turns green in the uplink data block.", src:"Communications deck" },
  { id:"communications-031", system:"Communications", q:"If a clearance contains both a radio frequency and a transponder code, when does each appear in the scratchpad?", a:"Each appears only when the appropriate TCP page is displayed (VHF page 1 for VHF frequencies, HF page 1 for HF frequencies, transponder page for transponder codes).", src:"Communications deck" },
  { id:"communications-032", system:"Communications", q:"What are the four ADS functions controllable on the ADS page?", a:"ADS ARM, ADS OFF, ADS EMERGENCY, and ADS EMERGENCY OFF.", src:"Communications deck" },
  { id:"communications-033", system:"Communications", q:"What does ADS EMERGENCY do?", a:"Sends an alert to ATC indicating an emergency situation.", src:"Communications deck" },
  { id:"communications-034", system:"Communications", q:"When does ADS EMERGENCY automatically reset to ADS EMERGENCY OFF?", a:"At power-up (also via Datalink System Reset).", src:"Communications deck" },
  { id:"communications-035", system:"Communications", q:"How many ADS facilities can the airplane be in contact with at one time?", a:"Up to 5 different facilities.", src:"Communications deck" },
  { id:"communications-036", system:"Communications", q:"How many ATSPs can be inhibited at one time on the ADS page?", a:"Only one.", src:"Communications deck" },
  { id:"communications-037", system:"Communications", q:"How is an incoming SATCOM call annunciated?", a:"By a SELCAL chime and illumination of a CALL light on the audio control panel.", src:"Communications deck" },
  { id:"communications-038", system:"Communications", q:"How do you answer an incoming SATCOM call?", a:"Press the respective transmitter select switch on the ACP to connect the call to the pilot headset/hand mic.", src:"Communications deck" },
  { id:"communications-039", system:"Communications", q:"How is a SATCOM call terminated?", a:"When the CALL light extinguishes (ground party hang-up or pilot ends call).", src:"Communications deck" },
  { id:"communications-040", system:"Communications", q:"What EICAS message indicates an incoming SATCOM message requiring flight crew attention?", a:"SATCOM CALL (communications message).", src:"Communications deck" },
  { id:"communications-041", system:"Communications", q:"What are the four SATCOM call priority levels?", a:"EMG (Emergency), HGH (High), LOW (Low), PUB (Public).", src:"Communications deck" },
  { id:"communications-042", system:"Communications", q:"What type of calls does SATCOM EMG priority activate?", a:"Emergency and distress calls; activates the ground station alarm.", src:"Communications deck" },
  { id:"communications-043", system:"Communications", q:"What SATCOM priority level is SBB limited to?", a:"PUB (Public) priority only.", src:"Communications deck" },
  { id:"communications-044", system:"Communications", q:"What is the procedure to establish a cabin/SATCOM conference call?", a:"(1) Establish communication with desired SATCOM ground station, (2) Establish cabin interphone communication with the cabin crew (steps 1 and 2 may be in any order), (3) Select both CAB and SAT transmitter select switches on the observer ACP.", src:"Communications deck" },
  { id:"communications-045", system:"Communications", q:"Which ACP must be used to initiate a cabin/SATCOM conference?", a:"The observer ACP (both CAB and SAT selected on the same ACP).", src:"Communications deck" },
  { id:"communications-046", system:"Communications", q:"What is the limitation on the conferencing ACP during a cabin/SATCOM conference?", a:"The conferencing ACP is unusable by the flight crew for other communications while the conference is in progress.", src:"Communications deck" },
  { id:"communications-047", system:"Communications", q:"What are the four components of the interphone communication system?", a:"Flight interphone, cabin interphone, service interphone, and passenger address (PA).", src:"Communications deck" },
  { id:"communications-048", system:"Communications", q:"How is the cabin interphone operated, compared to the other interphone systems?", a:"The cabin interphone is operated through the TCP or the flight deck handset; the other systems (flight interphone, service interphone, PA) are normally operated through the audio select panel (ACP).", src:"Communications deck" },
  { id:"communications-049", system:"Communications", q:"What EICAS message indicates a ground crew initiated call?", a:"GROUND CALL (communications alert message); also accompanied by an aural alert chime and CALL light on the ACP.", src:"Communications deck" },
  { id:"communications-050", system:"Communications", q:"How is the service interphone connected to the flight interphone system?", a:"Through the service interphone switch on the overhead panel.", src:"Communications deck" },
  { id:"communications-051", system:"Communications", q:"How do you get direct access to all PA areas from the flight deck?", a:"Push a PA mic switch on an audio control panel.", src:"Communications deck" },
  { id:"communications-052", system:"Communications", q:"What is the PA sales mode function, and how is it selected?", a:"It allows flight crew and flight attendants to make cabin announcements without interrupting passenger IFE audio and video; selected by using the appropriate dial code.", src:"Communications deck" },

  { id:"flight-instruments-040", system:"Flight Instruments", q:"What does the UL annunciation next to the barometric preselect field indicate?", a:"A barometric setting uplink has been accepted.", src:"Flight Instruments deck" },
  { id:"flight-instruments-041", system:"Flight Instruments", q:"When is the barometric setting boxed in amber?", a:"If a barometric setting is set and altitude climbs above transition altitude, or if STD is set and altitude descends below the transition flight level. NPS / Navigation", src:"Flight Instruments deck" },
  { id:"flight-instruments-042", system:"Flight Instruments", q:"What shape is the NPS Deviation Pointer?", a:"A magenta triangle.", src:"Flight Instruments deck" },
  { id:"flight-instruments-043", system:"Flight Instruments", q:"When does the NPS Deviation Pointer become unfilled?", a:"When parked at deflection limit and lateral deviation continues to increase.", src:"Flight Instruments deck" },
  { id:"flight-instruments-044", system:"Flight Instruments", q:"On what scale is the NPS vertical deviation pointer only displayed?", a:"Only in the descent phase of flight.", src:"Flight Instruments deck" },
  { id:"flight-instruments-045", system:"Flight Instruments", q:"After how long in the bar area does the NPS pointer begin to flash, and for how long does it flash?", a:"After 5 seconds in the bar area; it flashes for 10 seconds. Navigation Display", src:"Flight Instruments deck" },
  { id:"flight-instruments-046", system:"Flight Instruments", q:"What ND range triggers automatic Airport Map display?", a:"5 NM or less.", src:"Flight Instruments deck" },
  { id:"flight-instruments-047", system:"Flight Instruments", q:"What ANP value is required for Airport Map to display automatically?", a:"0.02 NM or less.", src:"Flight Instruments deck" },
  { id:"flight-instruments-048", system:"Flight Instruments", q:"In ND Plan mode, what is the orientation of the display?", a:"True North up.", src:"Flight Instruments deck" },
  { id:"flight-instruments-049", system:"Flight Instruments", q:"What does the Position Trend Vector show on the ND at a 40 NM range?", a:"Predicted positions at 30, 60, and 90 seconds ahead.", src:"Flight Instruments deck" },
  { id:"flight-instruments-050", system:"Flight Instruments", q:"What does the Position Trend Vector show on the ND at a 10 NM range?", a:"Only the 30 second predicted position.", src:"Flight Instruments deck" },
  { id:"flight-instruments-051", system:"Flight Instruments", q:"What ND annunciation appears when predictive windshear is detected but weather radar is not displayed?", a:"MONITOR RADAR DISP.", src:"Flight Instruments deck" },
  { id:"flight-instruments-052", system:"Flight Instruments", q:"What is the symbol for GPS position on the ND?", a:"A filled circle with a cross.", src:"Flight Instruments deck" },
  { id:"flight-instruments-053", system:"Flight Instruments", q:"What is the symbol for IRU position on the ND?", a:"An asterisk/star. Terrain Display", src:"Flight Instruments deck" },
  { id:"flight-instruments-054", system:"Flight Instruments", q:"What color represents terrain at Reference Altitude + 2,000 ft on the TERR display?", a:"High Density Red.", src:"Flight Instruments deck" },
  { id:"flight-instruments-055", system:"Flight Instruments", q:"What color represents terrain at Reference Altitude + 1,000 ft on the TERR display?", a:"High Density Amber.", src:"Flight Instruments deck" },
  { id:"flight-instruments-056", system:"Flight Instruments", q:"At what time from projected terrain impact does the voice \"CAUTION OBSTACLE\" sound?", a:"40 to 60 seconds from projected impact.", src:"Flight Instruments deck" },
  { id:"flight-instruments-057", system:"Flight Instruments", q:"Where is the TERR indication displayed when the TERR switch is selected ON?", a:"On the left side of the NDs and mini-maps. GND PROX", src:"Flight Instruments deck" },
  { id:"flight-instruments-058", system:"Flight Instruments", q:"What switch inhibits the below-glideslope alert, and at what altitude is it triggered?", a:"The GND PROX G/S INHIBIT switch on the ATP; triggered below 1,000 ft RA.", src:"Flight Instruments deck" },
  { id:"flight-instruments-059", system:"Flight Instruments", q:"What callout occurs 500 ft above minimums?", a:"APPROACHING MINIMUMS. TCAS", src:"Flight Instruments deck" },
  { id:"flight-instruments-060", system:"Flight Instruments", q:"Are pilots authorized to deviate from an ATC clearance to comply with a TCAS RA?", a:"Yes, pilots are authorized to deviate from a current ATC clearance as necessary to comply with a TCAS resolution advisory.", src:"Flight Instruments deck" },
  { id:"flight-instruments-061", system:"Flight Instruments", q:"May evasive maneuvers be based solely on a TCAS TA?", a:"No, evasive maneuvers must not be based solely on TA information without visually sighting the traffic. EFIS / DSP", src:"Flight Instruments deck" },
  { id:"flight-instruments-062", system:"Flight Instruments", q:"Where can EFIS control panel functions be accessed if the EFIS control panel fails?", a:"Through the backup EFIS/DSP display on the SYS page.", src:"Flight Instruments deck" },
  { id:"flight-instruments-063", system:"Flight Instruments", q:"Does enabling EFIS backup control disable the EFIS control panel hardware?", a:"Yes, it inhibits inputs from the respective EFIS control panel.", src:"Flight Instruments deck" },
  { id:"flight-instruments-064", system:"Flight Instruments", q:"What does the ENG switch on the DSP do?", a:"Toggles the display of secondary engine information on the EICAS display.", src:"Flight Instruments deck" },
  { id:"flight-instruments-065", system:"Flight Instruments", q:"What does the EICAS transfer switch on the DSP do?", a:"Toggles the EICAS display between the inboard half of the Captain and First Officer inboard DUs.", src:"Flight Instruments deck" },
  { id:"flight-instruments-066", system:"Flight Instruments", q:"What display switches are available on the DSP for MFD window selection?", a:"SYS, CDU, INFO, CHKL, COMM, or ND. ISFD", src:"Flight Instruments deck" },
  { id:"flight-instruments-067", system:"Flight Instruments", q:"What information does the ISFD display?", a:"Attitude, airspeed, altitude, ILS, GLS, and heading.", src:"Flight Instruments deck" },
  { id:"flight-instruments-068", system:"Flight Instruments", q:"What is the airspeed and altitude source for the ISFD?", a:"The center pitot and static air data modules.", src:"Flight Instruments deck" },
  { id:"flight-instruments-069", system:"Flight Instruments", q:"What is the attitude source for the ISFD?", a:"Internal inertial sensors.", src:"Flight Instruments deck" },
  { id:"flight-instruments-070", system:"Flight Instruments", q:"What is the ILS/GLS source for the ISFD?", a:"The left INR receiver.", src:"Flight Instruments deck" },
  { id:"flight-instruments-071", system:"Flight Instruments", q:"What ISFD message requires the crew to push the Attitude Reset switch?", a:"ATT:RST.", src:"Flight Instruments deck" },
  { id:"flight-instruments-072", system:"Flight Instruments", q:"What message displays during the attitude reset process?", a:"ATT 10s.", src:"Flight Instruments deck" },
  { id:"flight-instruments-073", system:"Flight Instruments", q:"What are the requirements for performing an ISFD attitude reset in flight?", a:"Wings level, non-accelerated flight maintained for 10 seconds.", src:"Flight Instruments deck" },
  { id:"flight-instruments-074", system:"Flight Instruments", q:"What are the requirements for performing an ISFD attitude reset on the ground?", a:"The airplane must be stationary.", src:"Flight Instruments deck" },
  { id:"flight-instruments-075", system:"Flight Instruments", q:"If the ISFD attitude reset is unsuccessful, what happens?", a:"The ATT:RST message remains displayed and attitude is not shown. Radio Altimeter", src:"Flight Instruments deck" },
  { id:"flight-instruments-076", system:"Flight Instruments", q:"How many RA systems does the B787 have?", a:"Two - left and right.", src:"Flight Instruments deck" },
  { id:"flight-instruments-077", system:"Flight Instruments", q:"What EICAS message displays if both RA systems are inoperative or degraded?", a:"RADIO ALTIMETER L+R (advisory).", src:"Flight Instruments deck" },
  { id:"flight-instruments-078", system:"Flight Instruments", q:"What additional indication appears on the PFD and HUD if both RA systems fail?", a:"\"RA\" is displayed on both PFD and HUD.", src:"Flight Instruments deck" },
  { id:"flight-instruments-079", system:"Flight Instruments", q:"What systems receive data from the RA systems?", a:"Autopilot, Autothrottle, GPWS, TCAS, Weather Radar, and Primary Flight Control System. AUX Display", src:"Flight Instruments deck" },
  { id:"flight-instruments-080", system:"Flight Instruments", q:"What information is displayed in the upper portion of the AUX display?", a:"Flight number, UTC time, MIC readout, date, transponder code, elapsed flight time, SELCAL, chrono dial and readout, and airplane tail number. AOA Speed", src:"Flight Instruments deck" },
  { id:"flight-instruments-081", system:"Flight Instruments", q:"When is AOA SPD automatically displayed?", a:"When pitot and/or static pressure from the ADRS is erroneous or unavailable (NAV AIRSPEED DATA or NAV AIR DATA SYS condition), or when both pilots manually select the AIR DATA/ATT source selector to ALTN.", src:"Flight Instruments deck" },
  { id:"flight-instruments-082", system:"Flight Instruments", q:"What flight control law change occurs when AOA SPD is displayed?", a:"Simplified flight control laws are used, which may result in increased pitch control sensitivity to abrupt pitch inputs.", src:"Flight Instruments deck" },
  { id:"flight-instruments-083", system:"Flight Instruments", q:"To what values are maximum speed indications reduced when AOA SPD is active?", a:"From 360 kt / 0.90 M reduced to 300 kt / 0.85 M.", src:"Flight Instruments deck" },
  { id:"flight-instruments-084", system:"Flight Instruments", q:"How many TAT sensor inputs does the ADRS use?", a:"6 inputs.", src:"Flight Instruments deck" },
  { id:"flight-instruments-085", system:"Flight Instruments", q:"What is the ADRS TAT source when on the ground below 50 kts CAS?", a:"Sensors in the CAC inlets; ADRS selects the lower of the two CAC inlet temperatures (two sensors per inlet).", src:"Flight Instruments deck" },
  { id:"flight-instruments-086", system:"Flight Instruments", q:"To what factors is AOA SPD subject to indication variations?", a:"Configuration changes, maneuvering, and speedbrake use. VSD", src:"Flight Instruments deck" },
  { id:"flight-instruments-087", system:"Flight Instruments", q:"How is the VSD selected for display?", a:"From the map information selections on the MAP mode drop-down menu.", src:"Flight Instruments deck" },
  { id:"flight-instruments-088", system:"Flight Instruments", q:"What is the range of the full-display VSD?", a:"Twice the ND range - from 10 NM to 2,560 NM.", src:"Flight Instruments deck" },
  { id:"flight-instruments-089", system:"Flight Instruments", q:"Up to what ND range does the VSD depict a consistent 3-degree glidepath?", a:"80 NM range. Checklists", src:"Flight Instruments deck" },
  { id:"flight-instruments-090", system:"Flight Instruments", q:"What are the 10 normal checklists in sequence?", a:"PREFLIGHT, BEFORE START, BEFORE TAXI, BEFORE TAKEOFF, AFTER TAKEOFF, DESCENT, APPROACH, LANDING, SHUTDOWN, SECURE.", src:"Flight Instruments deck" },
  { id:"flight-instruments-091", system:"Flight Instruments", q:"What EICAS message alerts crew that a critical normal checklist line item is incomplete before the corresponding phase of flight?", a:"CHKL INCOMPLETE NORM (caution).", src:"Flight Instruments deck" },
  { id:"flight-instruments-092", system:"Flight Instruments", q:"What does the normal checklist key color change to when a normal checklist is incomplete?", a:"Amber.", src:"Flight Instruments deck" },
  { id:"flight-instruments-093", system:"Flight Instruments", q:"What is the checklist icon on an EICAS alert message?", a:"A white box to the left of the message.", src:"Flight Instruments deck" },
  { id:"flight-instruments-094", system:"Flight Instruments", q:"What does no checklist icon on an EICAS message indicate?", a:"The checklist is complete, there is no checklist for the message, or another checklist inhibits the icon.", src:"Flight Instruments deck" },
  { id:"flight-instruments-095", system:"Flight Instruments", q:"What EICAS message displays when a non-normal checklist is in the queue, the EICAS message is blank, and ECL is not open?", a:"CHKL NON-NORMAL (advisory).", src:"Flight Instruments deck" },
  { id:"flight-instruments-096", system:"Flight Instruments", q:"What color does an action item show when it is overridden or inactive?", a:"Cyan.", src:"Flight Instruments deck" },
  { id:"flight-instruments-097", system:"Flight Instruments", q:"What color does an action item show when complete?", a:"Green.", src:"Flight Instruments deck" },
  { id:"flight-instruments-098", system:"Flight Instruments", q:"When is the use of RESET NON-NORMAL or RESET ALL not recommended?", a:"In flight.", src:"Flight Instruments deck" },
  { id:"flight-instruments-099", system:"Flight Instruments", q:"What is the checklist priority on the ground with both fuel control switches CUTOFF?", a:"(1) Checklists for EICAS warning messages; (2) NORMAL checklists.", src:"Flight Instruments deck" },
  { id:"flight-instruments-100", system:"Flight Instruments", q:"In what order do checklists appear in the non-normal checklist queue?", a:"Same order as the messages appear on EICAS; unannunciated checklists appear after all annunciated checklists.", src:"Flight Instruments deck" },
  { id:"flight-instruments-101", system:"Flight Instruments", q:"What happens to a completed non-normal checklist when its EICAS alert message remains active?", a:"The EICAS message can still show but the checklist is removed from the queue.", src:"Flight Instruments deck" },
  { id:"flight-instruments-102", system:"Flight Instruments", q:"How can an unannunciated non-normal checklist be removed from the queue without completing it?", a:"The checklist must be overridden.", src:"Flight Instruments deck" },
  { id:"flight-instruments-103", system:"Flight Instruments", q:"What is a consequential EICAS alert message?", a:"An alert message caused by a primary failure condition rather than a separate system failure; crews should do the checklist for the primary message, not the consequential message. Video Surveillance", src:"Flight Instruments deck" },
  { id:"flight-instruments-104", system:"Flight Instruments", q:"What action will disable the video surveillance cameras outside the flight deck entrance?", a:"Selecting the flight deck IFE/PASS SEATS power switch OFF.", src:"Flight Instruments deck" },
  { id:"hud-001", system:"HUD", q:"What activates the HUD projector and displays symbology?", a:"Deploying the combiner. There is no ON/OFF switch.", src:"HUD deck" },
  { id:"hud-002", system:"HUD", q:"How do you manually adjust HUD brightness?", a:"Pull the brightness control out, then rotate it.", src:"HUD deck" },
  { id:"hud-003", system:"HUD", q:"How do you set automatic brightness adjustment on the HUD?", a:"Push the brightness control in, set the initial level by rotating, and brightness then adjusts automatically with changing background lighting.", src:"HUD deck" },
  { id:"hud-004", system:"HUD", q:"What message appears if the HUD combiner is not properly aligned with the projector?", a:"ALIGN HUD -- displayed left or right of the airplane symbol on the combiner screen.", src:"HUD deck" },
  { id:"hud-005", system:"HUD", q:"Is the locking lever required when stowing the HUD combiner?", a:"No. Lift the combiner up and back until the latch engages; the locking lever is not required for stowing.", src:"HUD deck" },
  { id:"hud-006", system:"HUD", q:"What is the purpose of the combiner breakaway position?", a:"To prevent the pilot's head from impacting the combiner during a sudden and sustained deceleration.", src:"HUD deck" },
  { id:"hud-007", system:"HUD", q:"How do you release the combiner from the breakaway position?", a:"Push forward to relieve pressure on the latch, slide the locking lever to the right, then reposition to desired position.", src:"HUD deck" },
  { id:"hud-008", system:"HUD", q:"Because the HUD is monochromatic, how are amber color alerts from the PFD conveyed on the HUD?", a:"Through flashing, shape filling/blanking, and highlight box symbology. Some alerts have no distinct HUD equivalent.", src:"HUD deck" },
  { id:"hud-009", system:"HUD", q:"Is the partial compass rose displayed in full symbology mode during ground operations?", a:"No. The partial compass rose is not displayed in full symbology mode during ground operations.", src:"HUD deck" },
  { id:"hud-010", system:"HUD", q:"What does decluttered mode do to airspeed and altitude information?", a:"Eliminates the tapes and shows digital values only. The partial compass rose is also removed.", src:"HUD deck" },
  { id:"hud-011", system:"HUD", q:"How do you toggle between full symbology and decluttered modes on the HUD?", a:"Using the symbology switch on the pilot's yoke control wheel.", src:"HUD deck" },
  { id:"hud-012", system:"HUD", q:"At what radio altitude does the guidance cue appear on a normal (non-HUD) takeoff?", a:"50 feet RA.", src:"HUD deck" },
  { id:"hud-013", system:"HUD", q:"When does the guidance cue appear if a HUD takeoff has been selected?", a:"At the same time as the flight path vector (not delayed to 50 ft RA).", src:"HUD deck" },
  { id:"hud-014", system:"HUD", q:"How does the guidance cue change during a windshear alert?", a:"It changes from hollow to solid (filled).", src:"HUD deck" },
  { id:"hud-015", system:"HUD", q:"To follow flight director guidance on the HUD, how should you position the flight path vector symbol?", a:"Position the circular body of the flight path vector symbol around the guidance cue (small circle).", src:"HUD deck" },
  { id:"hud-016", system:"HUD", q:"During a takeoff roll, at what ground speed does the TO/GA reference line (pitch target) become visible?", a:"When ground speed is greater than 65 knots.", src:"HUD deck" },
  { id:"hud-017", system:"HUD", q:"In TO/GA mode, what must you do to comply with vertical flight director guidance on the HUD?", a:"Place the airplane reference symbol on the TO/GA reference line (horizontal dashed line).", src:"HUD deck" },
  { id:"hud-018", system:"HUD", q:"For HUD takeoff ground deviation indications to become active, what two conditions must be met?", a:"(1) Airplane heading within 45 degrees of runway heading, AND (2) airplane within 2 degrees of the ILS localizer centerline.", src:"HUD deck" },
  { id:"hud-019", system:"HUD", q:"What happens when the airplane deviates more than 7 meters (23 feet) from the runway centerline during a HUD takeoff?", a:"A flashing triangle appears, pointing in the direction of the runway centerline to assist in correction.", src:"HUD deck" },
  { id:"hud-020", system:"HUD", q:"Where is HUD takeoff guidance selected?", a:"On the FMC.", src:"HUD deck" },
  { id:"hud-021", system:"HUD", q:"What are the projected runway dimensions used for the HUD runway edge lines symbol?", a:"8,000 feet long by 200 feet wide.", src:"HUD deck" },
  { id:"hud-022", system:"HUD", q:"What is the runway edge lines centerline based on?", a:"The localizer course, not the geographic orientation of the runway.", src:"HUD deck" },
  { id:"hud-023", system:"HUD", q:"At what radio altitude are runway edge lines enabled, and when are they removed?", a:"Enabled at 300 feet RA; removed at 60 feet.", src:"HUD deck" },
  { id:"hud-024", system:"HUD", q:"In which HUD display mode do runway edge lines appear?", a:"Decluttered mode only.", src:"HUD deck" },
  { id:"hud-025", system:"HUD", q:"If radio altitude is unavailable, what does the runway edge lines system use instead?", a:"Barometric altitude above touchdown.", src:"HUD deck" },
  { id:"hud-026", system:"HUD", q:"What do the two tick marks on the runway edge lines symbol represent?", a:"The touchdown aiming point (glideslope intercept point).", src:"HUD deck" },
  { id:"hud-027", system:"HUD", q:"During approach, how is the glideslope angle shown on the HUD?", a:"As a horizontal dashed line across the HUD pitch scale, with the numerical glideslope angle value digitally displayed adjacent to the line.", src:"HUD deck" },
  { id:"hud-028", system:"HUD", q:"How do you use the glideslope reference line during a visual approach?", a:"Overlay the glideslope reference line on the runway touchdown zone and maintain the flight path vector symbol on the glideslope reference line.", src:"HUD deck" },
  { id:"hud-029", system:"HUD", q:"When does the ground deceleration scale appear during a takeoff?", a:"It is not initially displayed, but appears if deceleration is sensed when ground speed is above 50 knots and the airplane is still on the ground.", src:"HUD deck" },
  { id:"hud-030", system:"HUD", q:"What three conditions cause the ground deceleration scale to be removed?", a:"Ground speed decreases below 25 knots, the airplane begins accelerating, or the airplane lifts off.", src:"HUD deck" },
  { id:"hud-031", system:"HUD", q:"What autobrake settings does the ground deceleration scale reference?", a:"1, 2, 3, 4, and MAX AUTO.", src:"HUD deck" },
  { id:"hud-032", system:"HUD", q:"When is the flight path slip/skid indicator displayed?", a:"Only during a takeoff or a low-altitude go-around.", src:"HUD deck" },
  { id:"hud-033", system:"HUD", q:"What is the purpose of the flight path slip/skid indicator?", a:"To provide additional yaw reference in the case of an engine failure.", src:"HUD deck" },
  { id:"hud-034", system:"HUD", q:"How is a TCAS corrective advisory depicted on the HUD?", a:"As a double lined box called the \"fly-to box,\" showing where to position the flight path vector to obtain vertical separation from traffic.", src:"HUD deck" },
  { id:"hud-035", system:"HUD", q:"On the HUD NAV Performance Scales, what do the outer tic marks represent?", a:"RNP (Required Navigation Performance).", src:"HUD deck" },
  { id:"hud-036", system:"HUD", q:"On the HUD NAV Performance Scales, what do the bars represent?", a:"ANP (Actual Navigation Performance).", src:"HUD deck" },
  { id:"hud-037", system:"HUD", q:"What does the area between the ANP bars on the NPS indicate?", a:"The margin available to remain within RNP criteria.", src:"HUD deck" },
  { id:"hud-038", system:"HUD", q:"When do the bars on the NPS vertical scale display?", a:"Only during the FMC descent phase of flight.", src:"HUD deck" },
  { id:"hud-039", system:"HUD", q:"During an ILS approach with LNAV or VNAV active (or LNAV armed), when are NPS indications removed?", a:"At localizer or glideslope capture.", src:"HUD deck" },
  { id:"hud-040", system:"HUD", q:"What is the appearance of the HUD localizer pointer when it first appears?", a:"Unfilled diamond.", src:"HUD deck" },
  { id:"hud-041", system:"HUD", q:"When does the HUD localizer pointer become a filled diamond?", a:"When within 2.5 dots from the center.", src:"HUD deck" },
  { id:"hud-042", system:"HUD", q:"When does the expanded localizer scale display?", a:"When the autopilot or flight director is in LOC mode and the airplane is close to runway centerline. Also displays during HUD takeoff operations.", src:"HUD deck" },
  { id:"hud-043", system:"HUD", q:"What deviation does one rectangle equal on the expanded localizer scale?", a:"0.5 dot deviation.", src:"HUD deck" },
  { id:"hud-044", system:"HUD", q:"What is the appearance of the HUD glideslope pointer when it first appears?", a:"Unfilled diamond.", src:"HUD deck" },
  { id:"hud-045", system:"HUD", q:"When does the HUD glideslope pointer become a filled diamond?", a:"When within 2.5 dots from the scale center.", src:"HUD deck" },
  { id:"hud-046", system:"HUD", q:"What does a hollow landing altitude reference bar indicate?", a:"The airplane is 500 to 1,000 feet above landing altitude.", src:"HUD deck" },
  { id:"hud-047", system:"HUD", q:"What does a filled landing altitude reference bar indicate?", a:"The airplane is 0 to 500 feet above landing altitude.", src:"HUD deck" },
  { id:"hud-048", system:"HUD", q:"How does the BARO minimums line behave when the airplane descends below minimums?", a:"It flashes for 3 seconds, then goes steady.", src:"HUD deck" },
  { id:"hud-049", system:"HUD", q:"What units are used for BARO minimums on the HUD?", a:"Feet MSL.", src:"HUD deck" },
  { id:"hud-050", system:"HUD", q:"What units are used for RADIO minimums on the HUD?", a:"Radio altitude feet AGL.", src:"HUD deck" },
  { id:"hud-051", system:"HUD", q:"How does the minimums reference display behave when descending below selected minimum altitude?", a:"Flashes for 3 seconds, then goes steady.", src:"HUD deck" },
  { id:"hud-052", system:"HUD", q:"What does the flight path acceleration symbol above the wing of the flight path vector indicate?", a:"The airplane is accelerating.", src:"HUD deck" },
  { id:"hud-053", system:"HUD", q:"What does the flight path acceleration symbol below the wing of the flight path vector indicate?", a:"The airplane is decelerating.", src:"HUD deck" },
  { id:"hud-054", system:"HUD", q:"When is the flight path acceleration symbol removed from the HUD display?", a:"When a low-level, decreasing performance windshear is detected below 400 ft AGL.", src:"HUD deck" },
  { id:"hud-055", system:"HUD", q:"What is the reference airspeed used by the speed error tape on takeoff?", a:"V2.", src:"HUD deck" },
  { id:"hud-056", system:"HUD", q:"What is the flight director guidance airspeed on takeoff (relevant to the speed error tape)?", a:"V2 + 15 knots.", src:"HUD deck" },
  { id:"hud-057", system:"HUD", q:"Why is the speed error tape not displayed immediately on takeoff?", a:"To prevent incorrect interpretation -- it is not displayed until the first flap retraction.", src:"HUD deck" },
  { id:"hud-058", system:"HUD", q:"What is the maximum error the speed error tape can display?", a:"15 knots.", src:"HUD deck" },
  { id:"hud-059", system:"HUD", q:"If indicated airspeed is faster than selected speed, which direction does the speed error tape symbol move?", a:"Rises above the wing.", src:"HUD deck" },
  { id:"hud-060", system:"HUD", q:"If indicated airspeed is slower than selected speed, which direction does the speed error tape symbol move?", a:"Falls below the wing.", src:"HUD deck" },
  { id:"hud-061", system:"HUD", q:"At what pitch angle does the downward pointing pitch scale chevron appear?", a:"+30 degrees (excessively high pitch).", src:"HUD deck" },
  { id:"hud-062", system:"HUD", q:"At what pitch angle does the upward pointing pitch scale chevron appear?", a:"-20 degrees (excessively low pitch).", src:"HUD deck" },
  { id:"hud-063", system:"HUD", q:"What is the purpose of pitch scale chevrons?", a:"To direct the pilot to pitch the airplane back toward the horizon when at excessively high or low pitch angles.", src:"HUD deck" },
  { id:"hydraulics-001", system:"Hydraulics", q:"How many hydraulic systems does the B787 have, and are they interconnected?", a:"3 systems (Left, Center, Right); they are NOT connected to each other.", src:"Hydraulics deck" },
  { id:"hydraulics-002", system:"Hydraulics", q:"What is the rated pressure of each B787 hydraulic system?", a:"5000 psi.", src:"Hydraulics deck" },
  { id:"hydraulics-003", system:"Hydraulics", q:"What are the reservoir capacities for the Left, Center, and Right hydraulic systems?", a:"Left = 5 gal; Center = 11 gal; Right = 5 gal.", src:"Hydraulics deck" },
  { id:"hydraulics-004", system:"Hydraulics", q:"What does a reservoir QTY indication of 1.00 represent?", a:"Normal service level (100% of normal fill level).", src:"Hydraulics deck" },
  { id:"hydraulics-005", system:"Hydraulics", q:"What color and abbreviation is displayed when hydraulic reservoir quantity is low?", a:"Amber - LO.", src:"Hydraulics deck" },
  { id:"hydraulics-006", system:"Hydraulics", q:"What does OF (white) mean on the hydraulic synoptic?", a:"Reservoir is over-full.", src:"Hydraulics deck" },
  { id:"hydraulics-007", system:"Hydraulics", q:"What does RF (white) mean on the hydraulic synoptic?", a:"Reservoir requires refilling.", src:"Hydraulics deck" },
  { id:"hydraulics-008", system:"Hydraulics", q:"Are OF and RF reservoir indications inhibited in flight?", a:"Yes, both OF and RF are inhibited in-flight.", src:"Hydraulics deck" },
  { id:"hydraulics-009", system:"Hydraulics", q:"Is the LO reservoir quantity indication inhibited in flight?", a:"No - LO is NOT inhibited in flight, and an ECL must be accomplished.", src:"Hydraulics deck" },
  { id:"hydraulics-010", system:"Hydraulics", q:"Where are LO hydraulic quantity indications displayed?", a:"EICAS, STATUS page, and Hydraulic synoptic.", src:"Hydraulics deck" },
  { id:"hydraulics-011", system:"Hydraulics", q:"Where are LOAD SHED indications displayed?", a:"On the Hydraulic synoptic page.", src:"Hydraulics deck" },
  { id:"hydraulics-012", system:"Hydraulics", q:"What type of primary pump does the Left hydraulic system use?", a:"Engine Driven Pump (EDP).", src:"Hydraulics deck" },
  { id:"hydraulics-013", system:"Hydraulics", q:"What type of primary pump does the Right hydraulic system use?", a:"Engine Driven Pump (EDP).", src:"Hydraulics deck" },
  { id:"hydraulics-014", system:"Hydraulics", q:"What type of pumps does the Center hydraulic system use?", a:"Two Electric Motor Pumps (EMPs) operating at 235V AC - designated C-1 and C-2.", src:"Hydraulics deck" },
  { id:"hydraulics-015", system:"Hydraulics", q:"How do C-1 and C-2 center pumps relate to each other?", a:"They alternate between acting as primary (operates continuously) and demand (operates during high demand) pump.", src:"Hydraulics deck" },
  { id:"hydraulics-016", system:"Hydraulics", q:"What are the three conditions that illuminate a hydraulic pump FAULT light?", a:"Low pump pressure; excessive fluid temperature; pump selected OFF.", src:"Hydraulics deck" },
  { id:"hydraulics-017", system:"Hydraulics", q:"What components does the Left hydraulic system power?", a:"Flight controls, left engine thrust reverser, and left and right wing spoilers.", src:"Hydraulics deck" },
  { id:"hydraulics-018", system:"Hydraulics", q:"What components does the Right hydraulic system power?", a:"Flight controls, right engine thrust reverser, and right and left wing spoilers.", src:"Hydraulics deck" },
  { id:"hydraulics-019", system:"Hydraulics", q:"What components does the Center hydraulic system power?", a:"Flight controls, nose gear actuation and steering, main landing gear actuation, spoilers, leading edge slats, and trailing edge flaps.", src:"Hydraulics deck" },
  { id:"hydraulics-020", system:"Hydraulics", q:"What is the purpose of L/R Electric Motor Demand Pumps (EMPs)?", a:"Augment hydraulic power during high load demands and provide redundancy if the primary EDP fails.", src:"Hydraulics deck" },
  { id:"hydraulics-021", system:"Hydraulics", q:"In AUTO, when do the L/R demand pumps operate?", a:"When primary (EDP) pressure is low, or when the system anticipates a large demand.", src:"Hydraulics deck" },
  { id:"hydraulics-022", system:"Hydraulics", q:"How long do L/R demand pumps run after the second engine is started?", a:"First 3 minutes.", src:"Hydraulics deck" },
  { id:"hydraulics-023", system:"Hydraulics", q:"During takeoff, when do L/R demand pumps activate and deactivate?", a:"Activate at takeoff thrust set; deactivate when flaps are retracted.", src:"Hydraulics deck" },
  { id:"hydraulics-024", system:"Hydraulics", q:"During landing, what triggers L/R demand pump activation?", a:"Gear lever placed DOWN OR radio altitude less than 1000 feet.", src:"Hydraulics deck" },
  { id:"hydraulics-025", system:"Hydraulics", q:"During landing rollout, at what groundspeed do L/R demand pumps stop?", a:"Less than 40 knots (or when thrust reversers are no longer operating).", src:"Hydraulics deck" },
  { id:"hydraulics-026", system:"Hydraulics", q:"What additional trigger activates center demand pumps that does NOT apply to L/R demand pumps?", a:"Anytime flaps or slats are in motion.", src:"Hydraulics deck" },
  { id:"hydraulics-027", system:"Hydraulics", q:"During takeoff, when do center demand pumps deactivate? How does this differ from L/R?", a:"Center: radio altitude exceeds 2000 ft. L/R: flaps retracted. (Center uses RA, L/R uses flap position.)", src:"Hydraulics deck" },
  { id:"hydraulics-028", system:"Hydraulics", q:"During landing, what triggers center demand pump activation? How does this differ from L/R?", a:"Center: gear lever DOWN AND RA less than 2000 ft (both conditions required). L/R: gear lever DOWN OR RA less than 1000 ft (either condition sufficient).", src:"Hydraulics deck" },
  { id:"hydraulics-029", system:"Hydraulics", q:"During landing rollout, at what groundspeed do center demand pumps stop?", a:"Less than 60 knots.", src:"Hydraulics deck" },
  { id:"hydraulics-030", system:"Hydraulics", q:"What is the difference in landing approach logic between L/R and center demand pumps?", a:"L/R uses OR logic (gear down OR RA <1000 ft); center uses AND logic (gear down AND RA <2000 ft).", src:"Hydraulics deck" },
  { id:"hydraulics-031", system:"Hydraulics", q:"What type of valves does the Left/Right system use for non-normal conditions?", a:"Shutoff valves (SOV).", src:"Hydraulics deck" },
  { id:"hydraulics-032", system:"Hydraulics", q:"What type of valves does the Center system use for non-normal conditions?", a:"Isolation valves (ISLN).", src:"Hydraulics deck" },
  { id:"hydraulics-033", system:"Hydraulics", q:"What happens to the hydraulic system when an engine fire switch is pulled?", a:"The engine-driven pump hydraulic supply shutoff valve closes, and the EDP is depressurized.", src:"Hydraulics deck" },
  { id:"hydraulics-034", system:"Hydraulics", q:"What three isolation valves make up the center system isolation function, plus what fourth element?", a:"Nose Gear Isolation Valve (NGIV), Reserve Steering Isolation Valve (RSIV), Alternate Extend Isolation Valve (AEIV), and the reservoir standpipe.", src:"Hydraulics deck" },
  { id:"hydraulics-035", system:"Hydraulics", q:"Who controls the center hydraulic isolation valves during a non-normal event?", a:"No one - they operate automatically and cannot be controlled by the crew.", src:"Hydraulics deck" },
  { id:"hydraulics-036", system:"Hydraulics", q:"What is the purpose of the center hydraulic isolation system?", a:"To ensure the flight crew can lower the landing gear and that nose wheel steering is operational for landing, rollout, and taxi even in the event of a leak.", src:"Hydraulics deck" },
  { id:"hydraulics-037", system:"Hydraulics", q:"Where is the RAM Air Turbine located?", a:"In a compartment aft of the right main landing gear.", src:"Hydraulics deck" },
  { id:"hydraulics-038", system:"Hydraulics", q:"How can the RAT be deployed?", a:"Automatically or manually (by pushing the RAM AIR TURBINE switch on the hydraulic panel).", src:"Hydraulics deck" },
  { id:"hydraulics-039", system:"Hydraulics", q:"Can the RAT be stowed in flight after deployment?", a:"No - once deployed, the RAT cannot be stowed in flight.", src:"Hydraulics deck" },
  { id:"hydraulics-040", system:"Hydraulics", q:"What pressure does the RAT provide, and what does the PRESS white light indicate?", a:"RAT seeks 5000 psi; PRESS white light illuminates when RAT is deployed and pressure is greater than 3000 psi.", src:"Hydraulics deck" },
  { id:"hydraulics-041", system:"Hydraulics", q:"What does the amber UNLKD light on the RAT switch indicate?", a:"The RAT is not stowed and locked.", src:"Hydraulics deck" },
  { id:"hydraulics-042", system:"Hydraulics", q:"What does the RAT power hydraulically?", a:"Only the Center system flight controls.", src:"Hydraulics deck" },
  { id:"hydraulics-043", system:"Hydraulics", q:"What does the RAT power electrically?", a:"Electrical power throughout the flight envelope (primarily instrument displays).", src:"Hydraulics deck" },
  { id:"hydraulics-044", system:"Hydraulics", q:"List the five conditions that cause automatic RAT deployment in flight.", a:"1) Both engines have failed; 2) All three hydraulic system pressures are low; 3) Loss of all electrical power to captain's and first officer's flight instruments; 4) Loss of all four EMPs AND flight control system faults on approach; 5) Loss of all four EMPs AND an engine fails on takeoff or landing.", src:"Hydraulics deck" },
  { id:"hydraulics-045", system:"Hydraulics", q:"What positions do the TAIL and WINGS flight control lockout switches have?", a:"NORM (surface electronically unlocked) and LOCK (surface electronically locked).", src:"Hydraulics deck" },
  { id:"hydraulics-046", system:"Hydraulics", q:"What does the FAIL light on a flight control lockout switch indicate?", a:"The switch is in LOCK position but one or more of the associated surfaces did not lock.", src:"Hydraulics deck" },
  { id:"hydraulics-047", system:"Hydraulics", q:"At what groundspeed do flight control surfaces automatically unlock?", a:"When groundspeed exceeds 40 knots.", src:"Hydraulics deck" },
  { id:"hydraulics-048", system:"Hydraulics", q:"The HYD PRESS SYS L+C+R caution message indicates what condition?", a:"All hydraulic system pressures are low.", src:"Hydraulics deck" },
  { id:"hydraulics-049", system:"Hydraulics", q:"What is the aural alert level for HYD PRESS SYS C, L, or R caution messages?", a:"Beeper (caution level with beeper aural).", src:"Hydraulics deck" },
  { id:"hydraulics-050", system:"Hydraulics", q:"What is the message and level for a hydraulic pump overheat?", a:"HYD OVERHEAT C1/C2/DEM L,R/PRI L,R - Advisory level (no aural).", src:"Hydraulics deck" },
  { id:"hydraulics-051", system:"Hydraulics", q:"The RAT UNLOCKED EICAS message is what level?", a:"Advisory.", src:"Hydraulics deck" },
  { id:"landing-gear-001", system:"Landing Gear", q:"What type of hydraulic system provides power for landing gear retraction, extension, and steering?", a:"The center hydraulic system.", src:"Landing Gear deck" },
  { id:"landing-gear-002", system:"Landing Gear", q:"How many Electric Brake Actuator Controllers (EBACs) does the B787 have, and what does each one control?", a:"4 EBACs; each one controls the brake force of a fore-aft wheel pairing.", src:"Landing Gear deck" },
  { id:"landing-gear-003", system:"Landing Gear", q:"How many Electric Brake Actuators (EBAs) are on the B787, and how many are on each wheel?", a:"32 total (4 per wheel x 8 main gear wheels).", src:"Landing Gear deck" },
  { id:"landing-gear-004", system:"Landing Gear", q:"When do EBAs consume electrical power?", a:"Only when they change position.", src:"Landing Gear deck" },
  { id:"landing-gear-005", system:"Landing Gear", q:"Where are the weight-on-wheels sensors located?", a:"On each main landing gear beam.", src:"Landing Gear deck" },
  { id:"landing-gear-006", system:"Landing Gear", q:"On the ground, what holds the gear lever in the DN position?", a:"An automatic lever lock.", src:"Landing Gear deck" },
  { id:"landing-gear-007", system:"Landing Gear", q:"How is the landing gear lever lock released in flight?", a:"Automatically through air/ground sensing.", src:"Landing Gear deck" },
  { id:"landing-gear-008", system:"Landing Gear", q:"If the lever lock fails to release in flight, how does the crew override it?", a:"By pushing and holding the landing gear lever LOCK OVRD switch.", src:"Landing Gear deck" },
  { id:"landing-gear-009", system:"Landing Gear", q:"How soon after lift-off does the early doors function pre-open the main gear doors?", a:"1 second after lift-off.", src:"Landing Gear deck" },
  { id:"landing-gear-010", system:"Landing Gear", q:"What happens if the crew does not move the gear lever to UP within 30 seconds of the early doors opening?", a:"The main gear doors return to the closed position.", src:"Landing Gear deck" },
  { id:"landing-gear-011", system:"Landing Gear", q:"During a touch-and-go, when does the early doors function activate?", a:"Only after the airplane has been on the ground for more than 30 seconds.", src:"Landing Gear deck" },
  { id:"landing-gear-012", system:"Landing Gear", q:"What color and style does the EICAS gear indication show when gear is in transit?", a:"White crosshatch (in-transit indication).", src:"Landing Gear deck" },
  { id:"landing-gear-013", system:"Landing Gear", q:"How long does the UP indication remain displayed before blanking after gear retraction?", a:"10 seconds.", src:"Landing Gear deck" },
  { id:"landing-gear-014", system:"Landing Gear", q:"When is the landing gear hydraulic system automatically depressurized?", a:"When the gear is retracted and all doors are closed.", src:"Landing Gear deck" },
  { id:"landing-gear-015", system:"Landing Gear", q:"What happens to gear doors during alternate extension?", a:"All hydraulically powered gear doors remain open; EICAS message GEAR DOOR is displayed.", src:"Landing Gear deck" },
  { id:"landing-gear-016", system:"Landing Gear", q:"What powers the alternate extension system?", a:"A dedicated DC-powered electric hydraulic pump using center hydraulic system fluid.", src:"Landing Gear deck" },
  { id:"landing-gear-017", system:"Landing Gear", q:"In the normal compact EICAS gear display, what does an empty white box mean?", a:"All landing gear position indicators are inoperative.", src:"Landing Gear deck" },
  { id:"landing-gear-018", system:"Landing Gear", q:"In the expanded gear position display, what does DN in green indicate?", a:"The associated landing gear is down and locked.", src:"Landing Gear deck" },
  { id:"landing-gear-019", system:"Landing Gear", q:"What is the maximum nosewheel deflection achievable with the tiller?", a:"70 degrees in either direction.", src:"Landing Gear deck" },
  { id:"landing-gear-020", system:"Landing Gear", q:"What is the maximum nosewheel deflection achievable with rudder pedals?", a:"8 degrees in either direction.", src:"Landing Gear deck" },
  { id:"landing-gear-021", system:"Landing Gear", q:"What is the combined maximum nosewheel deflection when tiller and rudder pedal inputs are summed?", a:"70 degrees (capped at tiller maximum).", src:"Landing Gear deck" },
  { id:"landing-gear-022", system:"Landing Gear", q:"Are the left and right nosewheel steering tillers interconnected?", a:"No - transfer of control during a turn must not be accomplished.", src:"Landing Gear deck" },
  { id:"landing-gear-023", system:"Landing Gear", q:"What is the purpose of the rudder pedal disconnect switch and how does it operate?", a:"Temporarily disables rudder pedal inputs during the flight controls check before taxi; must be held down and is spring-loaded to out.", src:"Landing Gear deck" },
  { id:"landing-gear-024", system:"Landing Gear", q:"Do the nosewheels have brakes?", a:"No - only main gear wheels have brakes.", src:"Landing Gear deck" },
  { id:"landing-gear-025", system:"Landing Gear", q:"What type of brakes do the B787 main gear wheels use?", a:"Multiple disc carbon brakes.", src:"Landing Gear deck" },
  { id:"landing-gear-026", system:"Landing Gear", q:"What type of brake system does the B787 use instead of hydraulic brakes?", a:"Electro-mechanical brakes.", src:"Landing Gear deck" },
  { id:"landing-gear-027", system:"Landing Gear", q:"What does the antiskid system use for touchdown and hydroplaning protection?", a:"Airplane inertial groundspeed.", src:"Landing Gear deck" },
  { id:"landing-gear-028", system:"Landing Gear", q:"How does the antiskid system provide locked wheel protection?", a:"By comparison with other wheel speeds.", src:"Landing Gear deck" },
  { id:"landing-gear-029", system:"Landing Gear", q:"What is the data source for antiskid system control?", a:"Each axle Remote Data Concentrator (RDC).", src:"Landing Gear deck" },
  { id:"landing-gear-030", system:"Landing Gear", q:"Does the antiskid system require flight crew interface?", a:"No - it requires no flight crew interface.", src:"Landing Gear deck" },
  { id:"landing-gear-031", system:"Landing Gear", q:"What EICAS message appears for an antiskid fault, and what type is it?", a:"ANTISKID - an advisory message.", src:"Landing Gear deck" },
  { id:"landing-gear-032", system:"Landing Gear", q:"What three conditions must ALL be met for RTO autobrake to command maximum braking?", a:"(1) Airplane on the ground; (2) Groundspeed above 85 knots; (3) Both thrust levers retarded to idle.", src:"Landing Gear deck" },
  { id:"landing-gear-033", system:"Landing Gear", q:"If an RTO is initiated at or below 85 knots, does the RTO autobrake function operate?", a:"No - it does not operate.", src:"Landing Gear deck" },
  { id:"landing-gear-034", system:"Landing Gear", q:"Can RTO be selected in flight?", a:"No - RTO can be selected on the ground only.", src:"Landing Gear deck" },
  { id:"landing-gear-035", system:"Landing Gear", q:"How many autobrake deceleration levels are available for landing?", a:"Five (1, 2, 3, 4, and MAX AUTO).", src:"Landing Gear deck" },
  { id:"landing-gear-036", system:"Landing Gear", q:"What two conditions must be met before autobrake application begins after landing?", a:"Both thrust levers retarded to idle AND wheels have spun up.", src:"Landing Gear deck" },
  { id:"landing-gear-037", system:"Landing Gear", q:"What does MAX AUTO do initially upon landing, and when does it increase to full MAX AUTO deceleration?", a:"Initially limits deceleration to the AUTOBRAKE 4 level until pitch angle is less than 1 degree, then increases to MAX AUTO level.", src:"Landing Gear deck" },
  { id:"landing-gear-038", system:"Landing Gear", q:"Can the autobrake deceleration level be changed without disarming the system?", a:"Yes - by rotating the selector.", src:"Landing Gear deck" },
  { id:"landing-gear-039", system:"Landing Gear", q:"Name conditions that disarm the autobrake system (any five).", a:"(1) Pedal braking applied; (2) Either thrust lever advanced after landing; (3) Speedbrake lever moved to DOWN detent after spoiler deployment; (4) DISARM or OFF selected; (5) Autobrake fault; (6) Antiskid system fault; (7) Loss of IRU inertial data.", src:"Landing Gear deck" },
  { id:"landing-gear-040", system:"Landing Gear", q:"After autobrake disarms following landing, where does the AUTOBRAKE selector move?", a:"Automatically to the DISARM position.", src:"Landing Gear deck" },
  { id:"landing-gear-041", system:"Landing Gear", q:"After takeoff, where does the AUTOBRAKE selector automatically move?", a:"Automatically to OFF.", src:"Landing Gear deck" },
  { id:"landing-gear-042", system:"Landing Gear", q:"During taxi below 30 knots, how many brakes does the taxi brake release system apply per main gear during a manual brake application?", a:"One-half (alternating fore-aft pairs), sequencing through pairs at each application.", src:"Landing Gear deck" },
  { id:"landing-gear-043", system:"Landing Gear", q:"What must the pilot do to transition to the other brake pair during taxi?", a:"Fully release the brake pedal.", src:"Landing Gear deck" },
  { id:"landing-gear-044", system:"Landing Gear", q:"Where is the PARKING BRAKE lever located?", a:"On the control stand to the right of the Captain.", src:"Landing Gear deck" },
  { id:"landing-gear-045", system:"Landing Gear", q:"Describe the procedure to set the parking brake.", a:"Fully depress brake pedals, pull parking brake lever fully aft, then release the pedals.", src:"Landing Gear deck" },
  { id:"landing-gear-046", system:"Landing Gear", q:"How do you release the parking brake?", a:"Simultaneously depress both brake pedals.", src:"Landing Gear deck" },
  { id:"landing-gear-047", system:"Landing Gear", q:"Does the parking brake require continuous electrical power to maintain the clamping force?", a:"No - the electric actuators are clamped in position and require no active power.", src:"Landing Gear deck" },
  { id:"landing-gear-048", system:"Landing Gear", q:"What does the \"park and adjust\" feature do?", a:"Monitors brake condition after parking brake application and adjusts clamping force as needed during brake cooling.", src:"Landing Gear deck" },
  { id:"landing-gear-049", system:"Landing Gear", q:"How long do the BSCUs keep braking power ON after parking brake is set, and why?", a:"60 minutes - to allow EBACs to adjust EBAs for thermal changes in the brakes.", src:"Landing Gear deck" },
  { id:"landing-gear-050", system:"Landing Gear", q:"If airplane power goes off after setting the parking brake, what powers the BSCUs?", a:"The main battery for the remaining portion of the 60-minute period.", src:"Landing Gear deck" },
  { id:"landing-gear-051", system:"Landing Gear", q:"What EICAS message appears when the parking brake is set, and what type?", a:"PARKING BRAKE SET - a memo message.", src:"Landing Gear deck" },
  { id:"landing-gear-052", system:"Landing Gear", q:"What is the recommended action regarding the parking brake if there is a BRAKE TEMP EICAS message?", a:"It is recommended not to set the parking brake, unless needed.", src:"Landing Gear deck" },
  { id:"landing-gear-053", system:"Landing Gear", q:"What is the range of brake temperature values displayed on the GEAR synoptic?", a:"0.0 to 9.9 in increments of 0.1.", src:"Landing Gear deck" },
  { id:"landing-gear-054", system:"Landing Gear", q:"What color are brake temperature values in the normal range?", a:"White (values 0.0 to 4.9).", src:"Landing Gear deck" },
  { id:"landing-gear-055", system:"Landing Gear", q:"What does a solid white brake symbol on the GEAR synoptic indicate?", a:"The hottest brake on that truck, temperature 3.0 to 4.9. Only one hottest brake symbol is displayed per truck at any time.", src:"Landing Gear deck" },
  { id:"landing-gear-056", system:"Landing Gear", q:"What does a solid amber brake symbol on the GEAR synoptic indicate?", a:"Brake overheat - temperature value 5.0 to 9.9. Multiple may appear simultaneously.", src:"Landing Gear deck" },
  { id:"landing-gear-057", system:"Landing Gear", q:"At what brake temperature value does the EICAS BRAKE TEMP advisory trigger?", a:"5.0 or higher on any brake.", src:"Landing Gear deck" },
  { id:"landing-gear-058", system:"Landing Gear", q:"When does the EICAS BRAKE TEMP advisory clear?", a:"When all brake temperatures are below 3.0.", src:"Landing Gear deck" },
  { id:"landing-gear-059", system:"Landing Gear", q:"Can the aircraft be dispatched with a BRAKE TEMP EICAS indication?", a:"No - dispatch is not possible with a BRAKE TEMP indication.", src:"Landing Gear deck" },
  { id:"landing-gear-060", system:"Landing Gear", q:"Why do pilots use brakes on speed (KIAS) rather than the synoptic display to determine the initial brake cooling schedule?", a:"Because the brake temperature display takes 10-15 minutes after stopping to indicate the resultant value.", src:"Landing Gear deck" },
  { id:"landing-gear-061", system:"Landing Gear", q:"Which spoilers provide wheel well cooling, and how are they activated?", a:"Spoilers 6 and 9 - activated automatically when temperatures reach a certain value.", src:"Landing Gear deck" },
  { id:"landing-gear-062", system:"Landing Gear", q:"What color are normal tire pressures displayed on the GEAR synoptic?", a:"White.", src:"Landing Gear deck" },
  { id:"landing-gear-063", system:"Landing Gear", q:"What color indicates a tire pressure above or below normal range?", a:"Amber.", src:"Landing Gear deck" },
  { id:"landing-gear-064", system:"Landing Gear", q:"What triggers the EICAS TIRE PRESS advisory?", a:"Any tire pressure above or below normal range, OR an excessive pressure difference between two tires on the same axle.", src:"Landing Gear deck" },
  { id:"landing-gear-065", system:"Landing Gear", q:"What is the normal operations tire speed limit?", a:"204 knots (235 MPH).", src:"Landing Gear deck" },
  { id:"landing-gear-066", system:"Landing Gear", q:"What is the maximum tire speed limit for non-normal landings?", a:"226 knots (260 MPH).", src:"Landing Gear deck" },
  { id:"landing-gear-067", system:"Landing Gear", q:"What is required if a landing exceeds 204 knots tire speed?", a:"A logbook entry shall be made.", src:"Landing Gear deck" },
  { id:"landing-gear-068", system:"Landing Gear", q:"What is the maximum crank speed for adjusting rudder pedal position?", a:"No faster than one turn per second.", src:"Landing Gear deck" },
  { id:"landing-gear-069", system:"Landing Gear", q:"What happens if the rudder pedal adjust crank is not stowed after use?", a:"The rudder pedals may move out of the desired position.", src:"Landing Gear deck" },
  { id:"landing-gear-070", system:"Landing Gear", q:"Where are tire pressures displayed on the GEAR synoptic relative to the gear symbols?", a:"Inside each individual gear symbol.", src:"Landing Gear deck" },
  { id:"nav-and-fms-001", system:"Nav and FMS", q:"How many independent FMCs does the B787 have?", a:"Three independent FMCs.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-002", system:"Nav and FMS", q:"How many GPS receivers does the B787 have, and where is their position output sent?", a:"Two (Left and Right). They supply accurate position data to the IRS, which in turn supplies hybrid GPS inertial position to the FMC. All GPS tuning is automatic.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-003", system:"Nav and FMS", q:"What EICAS message is generated when both GPS systems have failed?", a:"EICAS advisory message GPS.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-004", system:"Nav and FMS", q:"What are the two major hardware components of the IRS?", a:"Two inertial reference units (IRUs) and two attitude heading reference units (AHRUs).", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-005", system:"Nav and FMS", q:"What is the approximate IRS alignment time at mid latitudes?", a:"Approximately 7 to 10 minutes.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-006", system:"Nav and FMS", q:"What is the maximum IRS alignment time at high latitudes?", a:"Up to 17 minutes.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-007", system:"Nav and FMS", q:"When can the airplane be moved during IRS alignment?", a:"The airplane should not move until alignment is complete (IRS changes to navigate mode).", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-008", system:"Nav and FMS", q:"If GPS is not available during IRS alignment, what must the crew do?", a:"Manually enter present position on the CDU POS INIT page (boxes replace dashes).", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-009", system:"Nav and FMS", q:"What EICAS message and CDU message appear if the entered position is not close to the origin airport?", a:"EICAS advisory FMC MESSAGE + CDU help window message INERTIAL/ORIGIN DISAGREE.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-010", system:"Nav and FMS", q:"What is the automatic realign mode, and what triggers it?", a:"When the airplane stops for an extended period, the IRS changes to automatic realign mode and refines alignment until the airplane moves. In this mode, IRS velocity and acceleration errors are reset to zero.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-011", system:"Nav and FMS", q:"When is a manual position update recommended in the navigate mode?", a:"If total time in navigate mode is expected to exceed 18 hours.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-012", system:"Nav and FMS", q:"If both IRUs fail (but AHRUs are intact), what EICAS message is shown and what capability remains?", a:"EICAS advisory NAV IRU. The FMC continues to receive a hybrid GPS inertial position solution using the AHRUs inertial sensors combined with GPS position.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-013", system:"Nav and FMS", q:"If the full IRS fails (both AHRUs and IRUs), what EICAS message is shown and what capability is lost?", a:"EICAS caution NAV INERTIAL SYS. LNAV and VNAV coupled to autopilot are not available. GPS provides position/track data for FMC to continue navigation.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-014", system:"Nav and FMS", q:"Regarding in-flight IRU realignment after a power interruption: how quickly does attitude return, and how quickly is full navigation restored?", a:"Attitude information available within a few seconds; full navigation capability restored within about 10 minutes. Requires GPS data.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-015", system:"Nav and FMS", q:"What are the three pitot-static sources used by the ADRS?", a:"Left, center, and right pitot and static systems.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-016", system:"Nav and FMS", q:"What is the relationship between the ADRS and the IRS?", a:"The ADRS is completely independent of the IRS.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-017", system:"Nav and FMS", q:"If voted ADRS air data becomes invalid with the AIR DATA/ATT switch in AUTO, what backup sources are used?", a:"Backup airspeed (AOA SPD) and/or backup altitude (GPS ALT) automatically provided by the IRS and GPS systems.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-018", system:"Nav and FMS", q:"What data source does the ISFD use, and is it dependent on the IRU/AHRU?", a:"The ISFD receives data from the center pitot static system. ISFD altitude, attitude, and airspeed are independent of IRU and AHRU values.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-019", system:"Nav and FMS", q:"What data is displayed on the PFD if both voted and backup air data are unavailable?", a:"ISFD ALT and ISFD SPD.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-020", system:"Nav and FMS", q:"What is the IAS/MACH window value when power is first applied?", a:"Upper line displays 200 knots; lower line is blank.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-021", system:"Nav and FMS", q:"What is the display range of the IAS/MACH window?", a:"100-399 KIAS or .400-.950 Mach.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-022", system:"Nav and FMS", q:"At what speed does the MCP IAS/MACH window automatically change from IAS to Mach during climb?", a:"0.840 Mach.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-023", system:"Nav and FMS", q:"At what speed does the MCP IAS/MACH window automatically change from Mach to IAS during descent?", a:"310 KIAS.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-024", system:"Nav and FMS", q:"When is the IAS/MACH window blank?", a:"When the FMC controls the speed (VNAV active, window closed).", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-025", system:"Nav and FMS", q:"What happens when you push the IAS/MACH selector with VNAV active?", a:"Alternately opens or closes the IAS/MACH window. Closed = FMC computed target speed active. Open = FMC speed-intervention active; IAS/MACH selector may set desired speed.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-026", system:"Nav and FMS", q:"What is the BANK LIMIT AUTO range and what does it depend on?", a:"Varies between 15 and 25 degrees depending on TAS.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-027", system:"Nav and FMS", q:"What is the V/S window display range?", a:"-8,000 to +6,000 fpm, in 100 fpm increments.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-028", system:"Nav and FMS", q:"What is the FPA window display range?", a:"-9.9 to +9.9 degrees, in 0.1 degree increments.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-029", system:"Nav and FMS", q:"What is the altitude window value when power is first applied?", a:"Upper line displays 10,000 feet; lower line is blank.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-030", system:"Nav and FMS", q:"What is the altitude window range?", a:"0 to 50,000 feet.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-031", system:"Nav and FMS", q:"What does pushing the MCP altitude selector do within 50 NM of the T/D point with the altitude window set below cruise altitude?", a:"Initiates the DES NOW (descend now) feature.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-032", system:"Nav and FMS", q:"How does the autopilot respond to a pitch or roll mode degradation above 500 feet RA?", a:"If the flight crew does not respond within 10 seconds, the autopilot automatically disconnects; AUTOPILOT DISC message and wailer sound. Autopilot can be re-engaged above 200 feet RA.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-033", system:"Nav and FMS", q:"How does the autopilot respond to a pitch or roll mode degradation below 500 feet RA?", a:"Mode degradation annunciated by FMA strikethrough, AUTOPILOT message, and NO AUTOLAND message on PFD and HUD. Autopilot does NOT automatically disconnect. TO/GA is available for a go-around.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-034", system:"Nav and FMS", q:"What control surfaces does the autopilot directly control through the fly-by-wire system?", a:"Elevators, ailerons, flaperons, and spoilers. Rudder commands are added only during autopilot approach and landing.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-035", system:"Nav and FMS", q:"What does the autopilot control during rollout after an automatic landing?", a:"Nose wheel steering.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-036", system:"Nav and FMS", q:"What is the maximum intercept angle for LOC/FAC roll mode capture?", a:"Within 120 degrees of the localizer or final approach course.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-037", system:"Nav and FMS", q:"What is the maximum intercept angle for G/S or G/P pitch mode capture?", a:"Within 80 degrees of the localizer or final approach course.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-038", system:"Nav and FMS", q:"Below what altitude can you NOT deselect the APP mode by pushing APP again?", a:"Below 1,500 feet RA.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-039", system:"Nav and FMS", q:"What descent angle does the AFDS limit to during glideslope attitude stabilizing mode?", a:"3.25 degrees.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-040", system:"Nav and FMS", q:"How long does the AFDS use inertial data to allow the glideslope signal to resolve?", a:"Up to 15 seconds.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-041", system:"Nav and FMS", q:"How long does the AFDS use inertial data to allow the localizer signal to resolve?", a:"Up to 20 seconds.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-042", system:"Nav and FMS", q:"What are the conditions for autopilot auto-disconnect after ILS signal interference?", a:"Pilot does not push TO/GA or disconnect autopilot within 10 seconds of AUTOPILOT and NO AUTOLAND messages, AND airplane is above 500 feet AGL.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-043", system:"Nav and FMS", q:"At what altitude does FLARE arm during an autoland?", a:"When LAND 3 or LAND 2 is annunciated.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-044", system:"Nav and FMS", q:"At what altitude does FLARE activate?", a:"Between 60 and 40 feet RA. (Flare maneuver starts at approximately 50 feet RA.)", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-045", system:"Nav and FMS", q:"During autoland flare, when does the autothrottle begin retarding thrust levers?", a:"Between 25 and 50 feet RA; A/T annunciation changes from SPD to IDLE.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-046", system:"Nav and FMS", q:"Below what altitude are inboard spoilers biased up incrementally during autoland?", a:"Below 350 feet RA.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-047", system:"Nav and FMS", q:"When does Rollout activate and what does the autopilot use to track centerline?", a:"Rollout activates at touchdown with weight on wheels. Autopilot uses rudder and nose wheel steering to track the localizer centerline.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-048", system:"Nav and FMS", q:"What is the LNAV activation altitude above the runway?", a:"Above 50 feet RA.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-049", system:"Nav and FMS", q:"How close to the active route leg must the airplane be for LNAV to activate on takeoff?", a:"Within 2.5 NM of the active leg.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-050", system:"Nav and FMS", q:"On go-around, when does LNAV automatically activate with flight director only vs. autopilot engaged?", a:"Flight director only: 50 feet RA. Autopilot engaged: 200 feet RA.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-051", system:"Nav and FMS", q:"How far before an enroute turn does the FMC begin evaluating the need for a bank limit?", a:"5 minutes prior to the turn.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-052", system:"Nav and FMS", q:"What EICAS message appears if LNAV is selected when the airplane is not on a heading to intercept the active leg?", a:"EICAS advisory FMC INTERCEPT HDG.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-053", system:"Nav and FMS", q:"What EICAS message appears if the FMC hold turn radius is larger than the protected airspace radius?", a:"EICAS advisory FMC HOLD AIRSPACE.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-054", system:"Nav and FMS", q:"At what altitude above the runway does VNAV activate?", a:"400 feet above runway elevation.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-055", system:"Nav and FMS", q:"What are the three VNAV pitch sub-modes?", a:"VNAV SPD, VNAV PTH, VNAV ALT.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-056", system:"Nav and FMS", q:"In VNAV PTH, what A/T mode is used for descent?", a:"IDLE, HOLD, or SPD.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-057", system:"Nav and FMS", q:"What triggers the DES NOW or early descent feature when using the MCP altitude selector?", a:"Within 50 NM of the T/D point (with altitude window set below cruise altitude).", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-058", system:"Nav and FMS", q:"For a FLCH climb of 1,000-12,000 feet, approximately how long does the A/T target for the climb?", a:"Approximately 2 minutes.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-059", system:"Nav and FMS", q:"When is the CLB/CON thrust switch inoperative?", a:"On the ground and below 400 feet during takeoff.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-060", system:"Nav and FMS", q:"What are the five active autothrottle modes?", a:"IDLE, HOLD, THR, THR REF, and SPD.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-061", system:"Nav and FMS", q:"In what mode does the A/T NOT reposition thrust levers after manual input?", a:"HOLD mode.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-062", system:"Nav and FMS", q:"When does the autothrottle automatically disconnect?", a:"When a fault in the active A/T mode is detected; when either reverse thrust lever is raised to reverse idle; if thrust levers are overridden during a manual landing after A/T begins retarding; when both engines are shut down; or possibly when one engine is shut down.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-063", system:"Nav and FMS", q:"The EICAS caution AUTOTHROTTLE DISC and aural alert are inhibited in what specific condition?", a:"When the disconnect occurs because of reverse thrust.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-064", system:"Nav and FMS", q:"What does the first push of either autopilot disconnect switch do?", a:"Disengages autopilot, illuminates master WARNING lights, displays EICAS warning AUTOPILOT DISC, sounds an aural warning.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-065", system:"Nav and FMS", q:"What does the second push of the autopilot disconnect switch do?", a:"Resets the master warning lights, EICAS warning message, and aural warning.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-066", system:"Nav and FMS", q:"What does the second push of the autothrottle disconnect switch do?", a:"Resets master caution lights and EICAS message; autothrottle remains armed.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-067", system:"Nav and FMS", q:"When the first F/D switch is turned ON in flight with the autopilot disengaged and both F/D switches previously OFF, what modes activate?", a:"HDG HOLD or TRK HOLD (roll) and V/S or FPA (pitch).", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-068", system:"Nav and FMS", q:"What does NO AUTOLAND on the FMA indicate if it appears prior to 300 feet AGL during a multi-channel autoland approach?", a:"Multi-channel engage status (LAND 3 or LAND 2) has not been annunciated by 300 feet AGL; flare and rollout modes are NOT armed.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-069", system:"Nav and FMS", q:"How is a new FMA mode change emphasized when it first becomes active?", a:"A green box is drawn around the mode for 10 seconds.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-070", system:"Nav and FMS", q:"What is the CDU page used to inhibit GPS navigation data?", a:"POS REF page 3/4 (GPS NAV prompt).", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-071", system:"Nav and FMS", q:"What CDU page displays the VOR and DME pair used for FMC position updates?", a:"POS REF page 2/4.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-072", system:"Nav and FMS", q:"What CDU page displays the left and right GPS-IRU position?", a:"POS REF page 4/4.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-073", system:"Nav and FMS", q:"When the crew manually enters two VOR identifiers on the NAV RADIO page, what does the FMC lose the ability to do?", a:"Autotune any other station for VOR/DME updates. (FMC continues to tune DME/DME pairs.)", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-074", system:"Nav and FMS", q:"What are the two conditions that must both be met for FMC ILS autotuning?", a:"(1) An ILS, LOC, back course, or LDA approach is in the active route; AND (2) the airplane is within 50 NM of the T/D, OR within 150 NM of the landing runway threshold, OR the FMC is in descent mode.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-075", system:"Nav and FMS", q:"How long is ILS autotuning inhibited after initial takeoff?", a:"10 minutes (to prevent clutter on PFD).", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-076", system:"Nav and FMS", q:"Can the ILS autotune during the 10-minute inhibit period if a new approach is executed?", a:"Yes -- selecting AND executing a new ILS approach into the active flight plan causes the ILS to autotune to the new approach frequency even during the inhibit period.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-077", system:"Nav and FMS", q:"What are the conditions under which ILS approach tuning is inhibited?", a:"Autopilot engaged or flight director on AND localizer or glideslope captured; OR HUD takeoff mode active for at least 5 seconds on the ground.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-078", system:"Nav and FMS", q:"If all three FMCs and all large displays fail, how can the left ILS be tuned?", a:"From ALTN NAV RADIO page 2/2 on the TCP.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-079", system:"Nav and FMS", q:"What is the FMC TO/GA position update behavior with GPS NAV ON and valid GPS reception?", a:"The TO/GA position update is inhibited.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-080", system:"Nav and FMS", q:"In polar operations, what heading reference does the autopilot automatically use, and how is it annunciated?", a:"True north reference; annunciated by a white box around \"TRU\" on both ND and PFD.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-081", system:"Nav and FMS", q:"In polar operations, what does a \"T\" next to leg course data on the CDU RTE LEGS page indicate?", a:"The airplane is operating in true north reference.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-082", system:"Nav and FMS", q:"What is the position symbol in ND PLAN mode when operating north of 82 degrees N or south of 82 degrees S?", a:"A circle with an \"X\" in the middle.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-083", system:"Nav and FMS", q:"In polar operations with the IRS failed, how frequently should the heading reference on the POS INIT page be updated?", a:"At least every 10 minutes.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-084", system:"Nav and FMS", q:"What annunciation indicates the return to magnetic reference when leaving polar regions?", a:"A green box around \"MAG\" on the ND and PFD.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-085", system:"Nav and FMS", q:"In what phase of flight does an amber box appear around \"TRU\" on the ND and PFD in polar operations?", a:"During the descent phase.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-086", system:"Nav and FMS", q:"What transponder/TCAS modes are available on the ATP?", a:"ALT RPTG OFF, STBY, TA ONLY, TA/RA, XPDR.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-087", system:"Nav and FMS", q:"In what transponder modes does traffic display?", a:"TA ONLY or TA/RA.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-088", system:"Nav and FMS", q:"What EICAS message appears if both transponders fail?", a:"EICAS advisory TRANSPONDER.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-089", system:"Nav and FMS", q:"What is the maximum range at which WXR returns are displayed, even if ND is set beyond that?", a:"320 NM.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-090", system:"Nav and FMS", q:"At what altitude does the weather radar perform an in-flight self test?", a:"When descending through 2,300 feet AGL.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-091", system:"Nav and FMS", q:"At what range is turbulence displayed in WX+T mode, regardless of ND range setting?", a:"Within 40 NM.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-092", system:"Nav and FMS", q:"Can weather radar detect clear air turbulence?", a:"No. Turbulence can only be sensed when there is sufficient precipitation.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-093", system:"Nav and FMS", q:"What is the maximum manual radar antenna tilt up and down?", a:"+15 degrees up, -15 degrees down.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-094", system:"Nav and FMS", q:"What happens to other WXR modes when WXR TEST is selected ON?", a:"All other WXR modes (WX, WX+T, MAP) are automatically set to OFF.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-095", system:"Nav and FMS", q:"What is displayed during the WXR ground test sequence?", a:"Amber WINDSHEAR annunciation and aural MONITOR RADAR DISPLAY, then Master Warning and EICAS WINDSHEAR SYS, then red WINDSHEAR annunciation and aural GO AROUND WINDSHEAR AHEAD, WINDSHEAR AHEAD, WINDSHEAR AHEAD. Total test takes 12 seconds.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-096", system:"Nav and FMS", q:"The Airport Map on the ND automatically displays at what range, and what is the condition? (Ref 10.10.36)", a:"At 5 NM or less, if either the ORIGIN or DESTINATION airport is in the active flight plan.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-097", system:"Nav and FMS", q:"Which ISFD statements are correct: (a) receives airspeed/altitude from center pitot-static, (b) attitude from internal inertial sensors, (c) heading from same source as Captain's PFD? (Ref 10.20.15)", a:"All of the above are correct.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-098", system:"Nav and FMS", q:"When does the IRS ON BAT light illuminate and what other alert occurs? (Ref 11.10.12)", a:"ON BAT light illuminates when the IRS is on battery power (primary power removed or failed). A warning horn in the landing gear wheel well also sounds.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-099", system:"Nav and FMS", q:"What is the FMS approach phase entry criteria?", a:"When the first waypoint of the procedure sequences; OR when the runway is the active waypoint and distance to go is less than 25 NM; OR when flaps are moved out of UP.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-100", system:"Nav and FMS", q:"How long after engine shutdown does the flight complete phase activate, and what does it do?", a:"30 seconds after engine shutdown; clears the active flight plan and load data; some preflight data fields initialize to default values.", src:"Navigation and FMS deck" },
  { id:"nav-and-fms-101", system:"Nav and FMS", q:"The FMS navigation database supports which types of procedures?", a:"Routes, SIDs, STARs, holding patterns, and procedure turns.", src:"Navigation and FMS deck" },
  { id:"warnings-001", system:"Warnings", q:"What color are Warning messages on the EICAS display?", a:"Red", src:"Warnings deck" },
  { id:"warnings-002", system:"Warnings", q:"What color are Caution messages on the EICAS display?", a:"Amber", src:"Warnings deck" },
  { id:"warnings-003", system:"Warnings", q:"What color are Advisory messages on the EICAS display?", a:"Amber", src:"Warnings deck" },
  { id:"warnings-004", system:"Warnings", q:"Can Warning messages be canceled by pressing the CANC/RCL switch?", a:"No -- Warning messages cannot be canceled by the CANC/RCL switch", src:"Warnings deck" },
  { id:"warnings-005", system:"Warnings", q:"Can Caution messages be canceled by pressing the CANC/RCL switch?", a:"Yes", src:"Warnings deck" },
  { id:"warnings-006", system:"Warnings", q:"Can Advisory messages be canceled by pressing the CANC/RCL switch?", a:"Yes", src:"Warnings deck" },
  { id:"warnings-007", system:"Warnings", q:"What is the key difference between a Caution message and an Advisory message on the EICAS?", a:"A Caution message is accompanied by an aural sound; an Advisory message is not. Advisory messages are also indented one space on the display.", src:"Warnings deck" },
  { id:"warnings-008", system:"Warnings", q:"How are Advisory messages visually distinguished from Caution messages on the EICAS display?", a:"Advisory messages are indented one space; Caution messages are not indented", src:"Warnings deck" },
  { id:"warnings-009", system:"Warnings", q:"Between what speed and altitude are all EICAS Advisory messages inhibited?", a:"Between 80 kts and 400 ft AGL (radio altitude), or 20 seconds after liftoff, whichever occurs first -- also inhibited if takeoff thrust not selected on both engines", src:"Warnings deck" },
  { id:"warnings-010", system:"Warnings", q:"If a rejected takeoff is initiated above 80 knots, until what speed does the Advisory inhibit continue?", a:"Until airspeed is less than 75 knots", src:"Warnings deck" },
  { id:"warnings-011", system:"Warnings", q:"What visual indicator precedes a Communication message on the EICAS?", a:"A white dot", src:"Warnings deck" },
  { id:"warnings-012", system:"Warnings", q:"Can Communication messages be canceled by the CANC/RCL switch?", a:"No", src:"Warnings deck" },
  { id:"warnings-013", system:"Warnings", q:"Can Memo messages be canceled by the CANC/RCL switch?", a:"No", src:"Warnings deck" },
  { id:"warnings-014", system:"Warnings", q:"What does the RECALL indication on the EICAS display indicate, and how long does it remain after releasing the switch?", a:"It appears when the CANC/RCL switch is pushed and remains for 1 second after the switch is released", src:"Warnings deck" },
  { id:"warnings-015", system:"Warnings", q:"What does a STATUS cue on the EICAS indicate?", a:"A new status message exists", src:"Warnings deck" },
  { id:"warnings-016", system:"Warnings", q:"What color does the STAT display key illuminate when selected?", a:"Green", src:"Warnings deck" },

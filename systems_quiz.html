  { id:"warnings-017", system:"Warnings", q:"What is the significance of Status messages on the Status Display?", a:"They indicate equipment faults requiring MEL reference for dispatch", src:"Warnings deck" },
  { id:"warnings-018", system:"Warnings", q:"What does the NO AUTOLAND alert on the PFD indicate?", a:"The autoland system is not available -- it displays when flying an ILS approach with the autopilot on an FMC glidepath (not ILS glidepath) below 100 ft", src:"Warnings deck" },
  { id:"warnings-019", system:"Warnings", q:"What are the four Time Critical Warnings displayed on the PFD and HUD?", a:"ENG FAIL, PULL UP, SPEEDBRAKE, WINDSHEAR", src:"Warnings deck" },
  { id:"warnings-020", system:"Warnings", q:"Under what two conditions does the TCAS TRAFFIC display show automatically on the ND?", a:"An RA or TA is occurring AND the respective ND is in MAP or MAP CTR mode", src:"Warnings deck" },
  { id:"warnings-021", system:"Warnings", q:"What symbol represents a Resolution Advisory (RA) on the TCAS display?", a:"A filled red square", src:"Warnings deck" },
  { id:"warnings-022", system:"Warnings", q:"What symbol represents a Traffic Advisory (TA) on the TCAS display?", a:"A filled amber (yellow/orange) circle", src:"Warnings deck" },
  { id:"warnings-023", system:"Warnings", q:"What symbol represents Proximate Traffic on the TCAS display?", a:"A filled white diamond", src:"Warnings deck" },
  { id:"warnings-024", system:"Warnings", q:"What symbol represents Other Traffic on the TCAS display?", a:"An open white diamond", src:"Warnings deck" },
  { id:"warnings-025", system:"Warnings", q:"What color are the RA pitch regions to avoid displayed on the attitude indicator?", a:"Red outline", src:"Warnings deck" },
  { id:"warnings-026", system:"Warnings", q:"During a single RA, how many red outlined pitch regions to avoid are displayed?", a:"One (either above or below, not both)", src:"Warnings deck" },
  { id:"warnings-027", system:"Warnings", q:"What must be true of the aircraft's pitch to ensure vertical separation during an RA?", a:"The center of the airplane symbol must be outside the red outlined RA pitch regions to avoid", src:"Warnings deck" },
  { id:"warnings-028", system:"Warnings", q:"What altitude restriction applies to the G/S INHIBIT function?", a:"G/S INHIBIT only inhibits the glideslope alert when pushed below 1,000 feet radio altitude", src:"Warnings deck" },
  { id:"warnings-029", system:"Warnings", q:"What color is the BELOW G/S light on the Alerting and Transponder Panel?", a:"Amber", src:"Warnings deck" },
  { id:"warnings-030", system:"Warnings", q:"Name four conditions that reset the G/S INHIBIT function.", a:"On the ground; after a touch and go landing; after a go-around; when deselected by the flight crew", src:"Warnings deck" },
  { id:"warnings-031", system:"Warnings", q:"What aural warning sounds when predictive windshear is detected on approach within 1.5 miles ahead?", a:"\"GO AROUND, WINDSHEAR AHEAD\"", src:"Warnings deck" },
  { id:"warnings-032", system:"Warnings", q:"What aural and visual indication occurs when airspeed decreases to TAMS during takeoff or go-around?", a:"Aural \"AIRSPEED, AIRSPEED\" sounds and the Master WARNING light illuminates", src:"Warnings deck" },
  { id:"warnings-033", system:"Warnings", q:"What is the stall warning device on the B787?", a:"Left and right stick shakers", src:"Warnings deck" },
  { id:"warnings-034", system:"Warnings", q:"What voice annunciation sounds at V1 during takeoff?", a:"\"VEE ONE\"", src:"Warnings deck" },
  { id:"warnings-035", system:"Warnings", q:"What hardware components make up the Tail Strike Detection System?", a:"A 2-inch blade target and two frangible wires installed on the aft body of the airplane", src:"Warnings deck" },
  { id:"warnings-036", system:"Warnings", q:"What EICAS message and what alert level is generated by a tail strike, and what accompanies it?", a:"TAIL STRIKE -- Caution level (amber); accompanied by a beeper and Master CAUTION light", src:"Warnings deck" },
  { id:"warnings-037", system:"Warnings", q:"List the takeoff configuration Warning messages (red) generated by the Takeoff Configuration Warning System.", a:"CONFIG DOORS, CONFIG FLAPS, CONFIG PARKING BRAKE, CONFIG RUDDER, CONFIG SPOILERS, CONFIG STABILIZER", src:"Warnings deck" },
  { id:"warnings-038", system:"Warnings", q:"What EICAS message (level and color) is triggered when the landing gear is not down for landing?", a:"CONFIG GEAR -- Warning level (red)", src:"Warnings deck" },
  { id:"warnings-039", system:"Warnings", q:"What are the three conditions that can trigger the CONFIG GEAR warning message?", a:"(1) Thrust lever below nominal glideslope thrust level AND radio altitude less than 800 ft, OR (2) FLAP lever in landing position -- combined with airplane in flight and any gear not down and locked", src:"Warnings deck" },
  { id:"warnings-040", system:"Warnings", q:"How is the CONFIG GEAR message cleared?", a:"Thrust levers are advanced, OR landing gear is down and locked", src:"Warnings deck" },
  { id:"warnings-041", system:"Warnings", q:"What is the EICAS message for speedbrakes extended during landing, and what is its alert level?", a:"SPEEDBRAKE EXTENDED -- Caution level (amber)", src:"Warnings deck" },
  { id:"warnings-042", system:"Warnings", q:"What three conditions trigger the SPEEDBRAKE EXTENDED caution message?", a:"Radio altitude below 800 ft; OR FLAP lever in landing position; OR thrust lever above idle stop for 15 seconds", src:"Warnings deck" },
  { id:"warnings-043", system:"Warnings", q:"How far before the MCP selected altitude does the altitude alert C-chord sound?", a:"900 feet prior to reaching the selected altitude", src:"Warnings deck" },
  { id:"warnings-044", system:"Warnings", q:"What visual indication accompanies the altitude alert when approaching the MCP selected altitude?", a:"A highlighted white box around both the selected altitude and the current altitude on the PFD", src:"Warnings deck" },
  { id:"warnings-045", system:"Warnings", q:"At what point do the approaching-altitude alert highlights disappear?", a:"When within 200 feet of the selected altitude", src:"Warnings deck" },
  { id:"warnings-046", system:"Warnings", q:"What triggers the ALTITUDE ALERT caution message when departing the MCP selected altitude?", a:"Departing the selected altitude by 200 feet", src:"Warnings deck" },
  { id:"warnings-047", system:"Warnings", q:"What color highlight box appears around the current altitude when ALTITUDE ALERT is active?", a:"Amber", src:"Warnings deck" },
  { id:"warnings-048", system:"Warnings", q:"Name three conditions that remove the ALTITUDE ALERT message and amber highlight.", a:"Reapproaching to within 200 ft of selected altitude; a new MCP altitude is selected; departing more than 900 ft from selected altitude", src:"Warnings deck" },
  { id:"warnings-049", system:"Warnings", q:"What two conditions inhibit MCP altitude alerting?", a:"Glideslope or glidepath captured; OR landing flaps selected with landing gear down and locked", src:"Warnings deck" },
  { id:"limitations-001", system:"Limitations", q:"How are limitations that must be memorized identified in the FCOM?", a:"They are marked with a # symbol.", src:"Limitations Deck deck" },
  { id:"limitations-002", system:"Limitations", q:"What is the criterion for a limitation to require memorization?", a:"Flight crew access by reference CANNOT assure timely compliance.", src:"Limitations Deck deck" },
  { id:"limitations-003", system:"Limitations", q:"Is knowing the exact wording of a memorized limitation required?", a:"No, exact wording is not required.", src:"Limitations Deck deck" },
  { id:"limitations-004", system:"Limitations", q:"What is the maximum runway slope for the B787?", a:"+/- 2%", src:"Limitations Deck deck" },
  { id:"limitations-005", system:"Limitations", q:"What is the maximum takeoff and landing tailwind component? (memorize)", a:"15 knots", src:"Limitations Deck deck" },
  { id:"limitations-006", system:"Limitations", q:"What is the maximum operating altitude for the B787?", a:"43,100 feet PA", src:"Limitations Deck deck" },
  { id:"limitations-007", system:"Limitations", q:"What is the maximum takeoff and landing altitude for the B787?", a:"14,000 feet PA", src:"Limitations Deck deck" },
  { id:"limitations-008", system:"Limitations", q:"At what airport elevation must High Altitude Airport Operations procedures be used?", a:"Above 8,000 feet", src:"Limitations Deck deck" },
  { id:"limitations-009", system:"Limitations", q:"When are HF radios prohibited? (memorize)", a:"During refueling", src:"Limitations Deck deck" },
  { id:"limitations-010", system:"Limitations", q:"Can the B787 fly in RVSM airspace using only the ISFD?", a:"No. The ISFD alone is not approved for RVSM. The Standby Altimeter does not meet RVSM requirements.", src:"Limitations Deck deck" },
  { id:"limitations-011", system:"Limitations", q:"What is the maximum allowable difference between the CA or FO altitude display and field elevation prior to takeoff?", a:"75 feet", src:"Limitations Deck deck" },
  { id:"limitations-012", system:"Limitations", q:"What is the severe turbulent air penetration speed at and above 25,000 feet? (memorize)", a:"310 KIAS / .84 M, whichever is lower", src:"Limitations Deck deck" },
  { id:"limitations-013", system:"Limitations", q:"What is the severe turbulent air penetration speed below 25,000 feet? (memorize)", a:"290 KIAS", src:"Limitations Deck deck" },
  { id:"limitations-014", system:"Limitations", q:"Where must weather radar operation be avoided? (memorize)", a:"In a hangar. Also avoid when personnel are within the area normally enclosed by the nose radome.", src:"Limitations Deck deck" },
  { id:"limitations-015", system:"Limitations", q:"Does the weather radar hangar restriction apply to weather radar test mode?", a:"No, it does not apply to test mode.", src:"Limitations Deck deck" },
  { id:"limitations-016", system:"Limitations", q:"What is the maximum demonstrated crosswind for takeoff?", a:"33 KTS (gust included) -- this is NOT a limitation", src:"Limitations Deck deck" },
  { id:"limitations-017", system:"Limitations", q:"What is the maximum demonstrated crosswind for landing?", a:"40 KTS (gust included) -- this is NOT a limitation", src:"Limitations Deck deck" },
  { id:"limitations-018", system:"Limitations", q:"By how much should takeoff crosswind guidelines be reduced if thrust is above 40% N1 at brake release?", a:"Reduce by 5 knots", src:"Limitations Deck deck" },
  { id:"limitations-019", system:"Limitations", q:"Under TALPA, what is the takeoff crosswind limit for RCC 1 (Poor braking)?", a:"10 KTS (all CG positions)", src:"Limitations Deck deck" },
  { id:"limitations-020", system:"Limitations", q:"Under TALPA, what is the landing crosswind limit for RCC 4 (Good to Medium)?", a:"35 KTS", src:"Limitations Deck deck" },
  { id:"limitations-021", system:"Limitations", q:"Under TALPA, what is the landing crosswind limit for RCC 2 (Medium to Poor)?", a:"17 KTS", src:"Limitations Deck deck" },
  { id:"limitations-022", system:"Limitations", q:"At what crosswind component are sideslip-only (zero crab) landings not recommended?", a:"Above 25 KTS", src:"Limitations Deck deck" },
  { id:"limitations-023", system:"Limitations", q:"When must crosswind limits be reduced by 5 knots on wet or contaminated runways?", a:"Whenever asymmetric reverse thrust is used", src:"Limitations Deck deck" },
  { id:"limitations-024", system:"Limitations", q:"Under Non-TALPA, what is the landing crosswind limit for Standing Water/Slush conditions?", a:"20 KTS", src:"Limitations Deck deck" },
  { id:"limitations-025", system:"Limitations", q:"Under Non-TALPA, what is the landing crosswind limit for Ice (no melting)?", a:"17 KTS", src:"Limitations Deck deck" },
  { id:"limitations-026", system:"Limitations", q:"What is the maximum taxi weight?", a:"563,000 lbs", src:"Limitations Deck deck" },
  { id:"limitations-027", system:"Limitations", q:"What is the maximum takeoff weight?", a:"561,500 lbs", src:"Limitations Deck deck" },
  { id:"limitations-028", system:"Limitations", q:"What is the CG range at the maximum takeoff weight of 561,500 lbs?", a:"17.6% to 20.6% MAC", src:"Limitations Deck deck" },
  { id:"limitations-029", system:"Limitations", q:"What is the maximum landing weight?", a:"425,000 lbs", src:"Limitations Deck deck" },
  { id:"limitations-030", system:"Limitations", q:"What is the maximum zero fuel weight?", a:"400,000 lbs", src:"Limitations Deck deck" },
  { id:"limitations-031", system:"Limitations", q:"What is the minimum flight weight?", a:"244,000 lbs", src:"Limitations Deck deck" },
  { id:"limitations-032", system:"Limitations", q:"What is the flap limit speed for Flaps 1?", a:"260 KIAS", src:"Limitations Deck deck" },
  { id:"limitations-033", system:"Limitations", q:"What is the flap limit speed for Flaps 5?", a:"240 KIAS", src:"Limitations Deck deck" },
  { id:"limitations-034", system:"Limitations", q:"What is the flap limit speed for Flaps 10?", a:"230 KIAS", src:"Limitations Deck deck" },
  { id:"limitations-035", system:"Limitations", q:"What is the flap limit speed for Flaps 15?", a:"220 KIAS", src:"Limitations Deck deck" },
  { id:"limitations-036", system:"Limitations", q:"What is the flap limit speed for Flaps 20?", a:"210 KIAS", src:"Limitations Deck deck" },
  { id:"limitations-037", system:"Limitations", q:"What is the flap limit speed for Flaps 25?", a:"190 KIAS", src:"Limitations Deck deck" },
  { id:"limitations-038", system:"Limitations", q:"What is the flap limit speed for Flaps 30?", a:"180 KIAS", src:"Limitations Deck deck" },
  { id:"limitations-039", system:"Limitations", q:"What is VLO (maximum landing gear operating speed)?", a:"270 KIAS / 0.82 MACH", src:"Limitations Deck deck" },
  { id:"limitations-040", system:"Limitations", q:"What is VLE (maximum landing gear extended speed)?", a:"270 KIAS / 0.82 MACH", src:"Limitations Deck deck" },
  { id:"limitations-041", system:"Limitations", q:"What is VMO at sea level (pressure altitude zero)?", a:"350 KIAS", src:"Limitations Deck deck" },
  { id:"limitations-042", system:"Limitations", q:"At what pressure altitude does VMO reach its maximum value, and what is that value?", a:"16,500 feet PA / 360 KIAS", src:"Limitations Deck deck" },
  { id:"limitations-043", system:"Limitations", q:"What is MMO?", a:"0.90 MACH", src:"Limitations Deck deck" },
  { id:"limitations-044", system:"Limitations", q:"Are flap placard speeds and gear speeds required to be memorized?", a:"No -- they are depicted on placards and the landing gear panel.", src:"Limitations Deck deck" },
  { id:"limitations-045", system:"Limitations", q:"Below what altitude must the autopilot not be engaged after takeoff? (memorize)", a:"200 feet AGL", src:"Limitations Deck deck" },
  { id:"limitations-046", system:"Limitations", q:"What is the maximum airport elevation for autoland operations? (memorize)", a:"8,400 feet", src:"Limitations Deck deck" },
  { id:"limitations-047", system:"Limitations", q:"Without LAND 2 or LAND 3 annunciated, when must the autopilot be disengaged? (memorize)", a:"Below 135 feet AGL", src:"Limitations Deck deck" },
  { id:"limitations-048", system:"Limitations", q:"With LAND 2 or LAND 3 and a glideslope greater than 3.25 degrees, when must the autopilot be disengaged? (memorize)", a:"Below 100 feet AGL", src:"Limitations Deck deck" },
  { id:"limitations-049", system:"Limitations", q:"If the glidepath angle is greater than 3.77 degrees, when must the autopilot be disengaged?", a:"No later than 50 feet below DH/MDA", src:"Limitations Deck deck" },
  { id:"limitations-050", system:"Limitations", q:"On final approach, below what altitude is FLCH prohibited? (memorize)", a:"1,000 feet AFE", src:"Limitations Deck deck" },
  { id:"limitations-051", system:"Limitations", q:"What ILS facility type is required for a low visibility HUD takeoff?", a:"ILS Type II or Type III with landing minima of 300 RVR", src:"Limitations Deck deck" },
  { id:"limitations-052", system:"Limitations", q:"What are the HUD takeoff maximum wind limits? (memorize)", a:"Headwind 25 KTS / Crosswind 20 KTS / Tailwind 15 KTS", src:"Limitations Deck deck" },
  { id:"limitations-053", system:"Limitations", q:"What are the autoland maximum wind component speeds? (memorize)", a:"Headwind 25 KTS / Crosswind 25 KTS / Tailwind 15 KTS", src:"Limitations Deck deck" },
  { id:"limitations-054", system:"Limitations", q:"What are the autoland glideslope angle limits? (memorize)", a:"Maximum 3.25 degrees / Minimum 2.5 degrees", src:"Limitations Deck deck" },
  { id:"limitations-055", system:"Limitations", q:"What flap positions are approved for autoland?", a:"Flaps 20, 25, or 30", src:"Limitations Deck deck" },
  { id:"limitations-056", system:"Limitations", q:"Can autoland be used with one engine inoperative?", a:"Yes", src:"Limitations Deck deck" },
  { id:"limitations-057", system:"Limitations", q:"What AFDS annunciation is required for autoland?", a:"LAND 2 or LAND 3 must be displayed", src:"Limitations Deck deck" },
  { id:"limitations-058", system:"Limitations", q:"What is the maximum positive relief valve differential pressure?", a:"9.9 psi differential", src:"Limitations Deck deck" },
  { id:"limitations-059", system:"Limitations", q:"What is the maximum allowable cabin pressure differential for takeoff and landing?", a:"0.11 psi", src:"Limitations Deck deck" },
  { id:"limitations-060", system:"Limitations", q:"Who may conduct a SATCOM/cabin conference call via the ACP?", a:"The observer only. Use of the CA's or F/O's ACP for a SATCOM/cabin conference call is prohibited.", src:"Limitations Deck deck" },
  { id:"limitations-061", system:"Limitations", q:"How long is the Takeoff and Go-Around thrust rating limited to?", a:"5 minutes, or 10 minutes in the event of loss of thrust on one engine", src:"Limitations Deck deck" },
  { id:"limitations-062", system:"Limitations", q:"What is the minimum oil temperature for engine start? (memorize)", a:"Greater than -40 degrees C", src:"Limitations Deck deck" },
  { id:"limitations-063", system:"Limitations", q:"Is intentional selection of reverse thrust in flight permitted? (memorize)", a:"No, it is prohibited.", src:"Limitations Deck deck" },
  { id:"limitations-064", system:"Limitations", q:"Is backing the airplane using reverse thrust permitted? (memorize)", a:"No, it is prohibited.", src:"Limitations Deck deck" },
  { id:"limitations-065", system:"Limitations", q:"When surface winds exceed 55 KTS, what is the engine thrust restriction?", a:"Limit engine thrust to IDLE", src:"Limitations Deck deck" },
  { id:"limitations-066", system:"Limitations", q:"When crosswind exceeds 40 KTS on the ground, what is the thrust restriction?", a:"Limit thrust to a setting normally used for taxi (45% N1)", src:"Limitations Deck deck" },
  { id:"limitations-067", system:"Limitations", q:"When tailwind exceeds 5 KTS and surface winds exceed 35 KTS, what is the thrust restriction?", a:"Limit thrust to a setting normally used for taxi (45% N1)", src:"Limitations Deck deck" },
  { id:"limitations-068", system:"Limitations", q:"In what flight control mode is takeoff permitted?", a:"Normal Flight Control Mode only", src:"Limitations Deck deck" },
  { id:"limitations-069", system:"Limitations", q:"What EICAS message(s) must NOT be displayed for takeoff?", a:"\"FLIGHT CONTROL MODE\" or \"PRI FLIGHT COMPUTERS\"", src:"Limitations Deck deck" },
  { id:"limitations-070", system:"Limitations", q:"What is the structural concern with rapid and large alternating control inputs? (memorize)", a:"They may result in structural failure at any speed, including below VA.", src:"Limitations Deck deck" },
  { id:"limitations-071", system:"Limitations", q:"What is the maximum altitude for flight with flaps extended?", a:"20,000 feet", src:"Limitations Deck deck" },
  { id:"limitations-072", system:"Limitations", q:"What is the maximum tank fuel temperature at takeoff?", a:"49 degrees C", src:"Limitations Deck deck" },
  { id:"limitations-073", system:"Limitations", q:"What is the inflight fuel temperature limit?", a:"65 degrees C", src:"Limitations Deck deck" },
  { id:"limitations-074", system:"Limitations", q:"What is the minimum tank fuel temperature prior to takeoff?", a:"-29 degrees C (must not be below this)", src:"Limitations Deck deck" },
  { id:"limitations-075", system:"Limitations", q:"What are the inflight minimum fuel temperature limits?", a:"Must be maintained at least -42 degrees C AND at least 3 degrees C above the freezing point of the fuel being used", src:"Limitations Deck deck" },
  { id:"limitations-076", system:"Limitations", q:"With no center tank fuel, what is the required pump and crossfeed configuration?", a:"All operable main tank boost pumps ON, crossfeed valve CLOSED, center pumps OFF", src:"Limitations Deck deck" },
  { id:"limitations-077", system:"Limitations", q:"At what center tank fuel quantity does the FUEL IN CENTER advisory display?", a:"Greater than 16,000 lbs", src:"Limitations Deck deck" },
  { id:"limitations-078", system:"Limitations", q:"When the FUEL IN CENTER advisory is displayed, what is the required configuration?", a:"Use center tank fuel with all boost pumps ON, crossfeed CLOSED, center pumps ON", src:"Limitations Deck deck" },
  { id:"limitations-079", system:"Limitations", q:"When the FUEL LOW CENTER advisory is displayed, what action is required?", a:"Turn off the center tank pumps", src:"Limitations Deck deck" },
  { id:"limitations-080", system:"Limitations", q:"If FUEL IN CENTER displays once in stabilized cruise, what should be done?", a:"Turn on center tank pumps and use center tank fuel until FUEL LOW CENTER is displayed, then revert to main tank feed", src:"Limitations Deck deck" },
  { id:"limitations-081", system:"Limitations", q:"What is the requirement for main tanks when center tank fuel is loaded?", a:"Main tanks must be scheduled to be full", src:"Limitations Deck deck" },
  { id:"limitations-082", system:"Limitations", q:"Under what conditions may up to 22,000 lbs of center tank fuel be loaded with less than full main tanks?", a:"Center tank fuel weight plus actual ZFW must not exceed MZFW, and CG limits must be observed", src:"Limitations Deck deck" },
  { id:"limitations-083", system:"Limitations", q:"At what flap setting is fuel jettison prohibited?", a:"Flaps 30", src:"Limitations Deck deck" },
  { id:"limitations-084", system:"Limitations", q:"What is the fuel imbalance limit between main tanks when total main tank fuel exceeds 68,300 lbs?", a:"1,500 lbs", src:"Limitations Deck deck" },
  { id:"limitations-085", system:"Limitations", q:"What is the fuel imbalance limit between main tanks when total main tank fuel is 41,900 lbs or less?", a:"2,500 lbs", src:"Limitations Deck deck" },
  { id:"limitations-086", system:"Limitations", q:"Is memorization of the fuel imbalance numbers required?", a:"No. However, a Fuel Imbalance EICAS Advisory requires action to balance fuel or determine if a fuel leak exists.", src:"Limitations Deck deck" },
  { id:"limitations-087", system:"Limitations", q:"What training must a crew member have before occupying the Overhead Flight Crew Rest?", a:"Must be trained in OFCR emergency procedures (evacuation routes, firefighting, and depressurization procedures) as determined by the PIC", src:"Limitations Deck deck" },
  { id:"limitations-088", system:"Limitations", q:"How is the OFCR training requirement met at Alaska/Hawaiian Airlines?", a:"By use of the 787 Jumpseat and Crew Rest Briefing Card in the Content App or in the aircraft", src:"Limitations Deck deck" },
  { id:"limitations-089", system:"Limitations", q:"What is the terrain display prohibited from being used for?", a:"Navigation", src:"Limitations Deck deck" },
  { id:"limitations-090", system:"Limitations", q:"Within what distance of an airport/runway not in the GPWS terrain database are look-ahead terrain alerting and terrain display functions prohibited?", a:"Within 15 NM", src:"Limitations Deck deck" },
  { id:"genops-001", system:"GenOps", q:"What is the mnemonic for flight deck emergency equipment, and what items does it represent?", a:"FFLAAP MD: (2) Flashlights, (1) Fire Extinguisher, (4) Life Vests, (1) AVSAX and Gloves, (1) Crash Axe, (1) PBE, (4) O2 Masks, (4) Descent Devices.", src:"GenOps deck" },
  { id:"genops-002", system:"GenOps", q:"In which direction does the flight deck overhead door open?", a:"Inward - it is hinged to fall inward and hangs from the ceiling on hinges.", src:"GenOps deck" },
  { id:"genops-003", system:"GenOps", q:"What EICAS message is generated when the flight deck overhead door is not closed and secure?", a:"DOOR FD OVHD (advisory message).", src:"GenOps deck" },
  { id:"genops-004", system:"GenOps", q:"What does the oxygen flow indicator show when O2 is flowing to the crew mask?", a:"A yellow cross.", src:"GenOps deck" },
  { id:"genops-005", system:"GenOps", q:"What does pushing the RESET/TEST switch do when the left oxygen panel door is closed and OXY ON IS displayed?", a:"Turns oxygen off, deactivates the mask microphone, and reactivates the boom microphone.", src:"GenOps deck" },
  { id:"genops-006", system:"GenOps", q:"After a Halon or equivalent extinguisher is discharged on the flight deck, how long can it take for the agent to dissipate?", a:"Up to 7 minutes.", src:"GenOps deck" },
  { id:"genops-007", system:"GenOps", q:"When a Halon extinguisher is discharged on the flight deck, what must all flight deck crewmembers do?", a:"Wear oxygen masks and use 100% oxygen with EMERGENCY selected.", src:"GenOps deck" },
  { id:"genops-008", system:"GenOps", q:"Where is the OFCR located on the 787?", a:"In the overhead area between door 1L and 1R; accessed through an enclosure near door 1L.", src:"GenOps deck" },
  { id:"genops-009", system:"GenOps", q:"Where is the OFAR located on the 787?", a:"In the overhead area between door 4L and 4R; accessed through an enclosure near door 4L.", src:"GenOps deck" },
  { id:"genops-010", system:"GenOps", q:"How many smoke detectors are installed in the OFCR, and how are they distributed?", a:"4 total: 2 in the entrance area and 1 in each of the 2 bunk areas.", src:"GenOps deck" },
  { id:"genops-011", system:"GenOps", q:"How many smoke detectors are installed in the OFAR, and how are they distributed?", a:"8 total: 2 in the entrance area and 1 in each of the 6 bunk areas.", src:"GenOps deck" },
  { id:"genops-012", system:"GenOps", q:"What EICAS message appears when smoke is detected in the OFCR?", a:"SMOKE REST UPR DR 1 (caution message).", src:"GenOps deck" },
  { id:"genops-013", system:"GenOps", q:"Does the OFCR have a fire extinguishing system?", a:"No. It has smoke detection only; there is no fire extinguishing system in the OFCR.", src:"GenOps deck" },
  { id:"genops-014", system:"GenOps", q:"What happens to OFCR ventilation in the event of an OFCR smoke detection activation?", a:"OFCR air supply valves are closed and area exhaust valves are opened.", src:"GenOps deck" },
  { id:"genops-015", system:"GenOps", q:"After pressing the Horn Cancel switch on a crew rest smoke detector, how long must no smoke be sensed before the detector resets?", a:"30 seconds.", src:"GenOps deck" },
  { id:"genops-016", system:"GenOps", q:"What are the OFCR occupancy restrictions regarding taxi, takeoff, and landing?", a:"The OFCR seat may not be occupied; bunks and common area may not be occupied; the OFCR door must be latched closed during taxi, takeoff, and landing.", src:"GenOps deck" },
  { id:"genops-017", system:"GenOps", q:"What altitude restriction applies to OFAR ventilation?", a:"The OFAR has no ventilation below 15,000 ft altitude.", src:"GenOps deck" },
  { id:"genops-018", system:"GenOps", q:"What type of slide/raft deploys at 1L/R, 2L/R, and 4L/R exits?", a:"Dual-lane slide/raft.", src:"GenOps deck" },
  { id:"genops-019", system:"GenOps", q:"What type of slide/raft deploys at 3L/R exits?", a:"Single-lane slide/raft.", src:"GenOps deck" },
  { id:"genops-020", system:"GenOps", q:"Where is the red manual inflation handle located on the 787 door?", a:"On the right side of the girt extension.", src:"GenOps deck" },
  { id:"genops-021", system:"GenOps", q:"When opening a 787 door in emergency mode, in what direction does the 3L/R single-lane slide/raft inflate?", a:"At a diagonal towards the aft of the aircraft.", src:"GenOps deck" },
  { id:"genops-022", system:"GenOps", q:"Where is the Quick Release Handle on the 787 slide/raft, and what color is it?", a:"Located at the top of the slide/raft under a grey flap at the girt end; the handle is white.", src:"GenOps deck" },
  { id:"genops-023", system:"GenOps", q:"After pulling the white Quick Release Handle, what keeps the slide/raft attached to the aircraft?", a:"A mooring line.", src:"GenOps deck" },
  { id:"genops-024", system:"GenOps", q:"What is the normal and overload capacity of the 1L/R slide/raft?", a:"Normal: 57; Overload: 71.", src:"GenOps deck" },
  { id:"genops-025", system:"GenOps", q:"What is the normal and overload capacity of the 2L/R slide/raft?", a:"Normal: 43; Overload: 54.", src:"GenOps deck" },
  { id:"genops-026", system:"GenOps", q:"What is the normal and overload capacity of the 3L/R slide/raft?", a:"Normal: 27; Overload: 34.", src:"GenOps deck" },
  { id:"genops-027", system:"GenOps", q:"What is the normal and overload capacity of the 4L/R slide/raft?", a:"Normal: 53; Overload: 66.", src:"GenOps deck" },
  { id:"genops-028", system:"GenOps", q:"How many canopy mast attach points does a single-lane slide/raft have? A dual-lane?", a:"Single-lane: 5; Dual-lane: 8.", src:"GenOps deck" },
  { id:"genops-029", system:"GenOps", q:"How much pressure on the mooring line triggers automatic complete release of the slide/raft?", a:"1,000 lbs.", src:"GenOps deck" },
  { id:"genops-030", system:"GenOps", q:"How is the raft knife used for complete release, and where is it stored?", a:"Use the knife to cut the mooring line; it is stored in a pocket at the girt end of the raft.", src:"GenOps deck" },
  { id:"genops-031", system:"GenOps", q:"What happens to inflation valves on the raft when the handpump is removed?", a:"They are self-closing.", src:"GenOps deck" },
  { id:"genops-032", system:"GenOps", q:"Are aerial flares approved for day use, night use, or both?", a:"Both day and night.", src:"GenOps deck" },
  { id:"genops-033", system:"GenOps", q:"During a slide/raft transfer, what is the maximum amount the door may be rotated outward and why?", a:"No more than 3 inches - to prevent slide/raft deployment.", src:"GenOps deck" },
  { id:"genops-034", system:"GenOps", q:"In a slide/raft transfer, what is the first step after deciding to transfer?", a:"Disable the power assist by opening the hinged door and moving the switch downward to the SAFE position.", src:"GenOps deck" },
  { id:"genops-035", system:"GenOps", q:"What does the pulse oxygen bottle preflight pressure gauge need to read?", a:"Between 1,500 and 1,850 psi. If below 1,500 psi, notify FFA.", src:"GenOps deck" },
  { id:"genops-036", system:"GenOps", q:"What type of extinguishing agent is in the 787 chemical fire extinguisher?", a:"Non-halon agent.", src:"GenOps deck" },
  { id:"genops-037", system:"GenOps", q:"How far should you stand from the base of flames when using the 787 chemical fire extinguisher?", a:"6 to 8 feet.", src:"GenOps deck" },
  { id:"genops-038", system:"GenOps", q:"How long does the ELT transmit a distress signal?", a:"24 to 50 hours with unlimited range.", src:"GenOps deck" },
  { id:"genops-039", system:"GenOps", q:"What does the ELT LED amber blink indicate, and what does green blink indicate?", a:"Amber blink: signal not yet detected by GPS. Green blink: detected by GPS.", src:"GenOps deck" },
  { id:"genops-040", system:"GenOps", q:"How many PED fire containment bags are on the 787, and where are they located?", a:"3 bags total: 1 in the flight deck and 2 in the cabin.", src:"GenOps deck" },
  { id:"genops-041", system:"GenOps", q:"What are the MEL installed and required quantities for the Enhanced Emergency Medical Kit (EEMK)?", a:"1 installed; 1 required.", src:"GenOps deck" },
  { id:"genops-042", system:"GenOps", q:"What are the MEL installed and required quantities for First Aid Kits?", a:"4 installed; 3 required.", src:"GenOps deck" },
  { id:"genops-043", system:"GenOps", q:"During a water evacuation, where does the First Officer retrieve the ELT?", a:"From the Door 1L storage space.", src:"GenOps deck" },
  { id:"genops-044", system:"GenOps", q:"During a water evacuation, through which doors does the Captain exit the aircraft?", a:"L/R AFT entry doors.", src:"GenOps deck" },
  { id:"genops-045", system:"GenOps", q:"What color are crew life vests? What color are passenger life vests?", a:"Crew vests are orange/red; passenger vests are yellow.", src:"GenOps deck" },
  { id:"genops-046", system:"GenOps", q:"What is the wing tip turning radius of the 787?", a:"144 ft 0 in.", src:"GenOps deck" },
  { id:"genops-047", system:"GenOps", q:"What is the nose turning radius of the 787?", a:"110 ft 0 in.", src:"GenOps deck" },
  { id:"genops-048", system:"GenOps", q:"What is the minimum pavement width required for a 787 180-degree turn?", a:"154 ft 0 in.", src:"GenOps deck" },
  { id:"genops-049", system:"GenOps", q:"What obstacle clearance distances must not be violated when turning the 787?", a:"Do not turn within 15 ft of the wing tip or within 55 ft of the nose.", src:"GenOps deck" },
  { id:"genops-050", system:"GenOps", q:"When the SEAT BELTS switch is in AUTO, at what flap lever position do the seat belt signs illuminate?", a:"Flap lever at 5 or greater.", src:"GenOps deck" },
  { id:"genops-051", system:"GenOps", q:"When the SEAT BELTS switch is in AUTO, below what aircraft altitude do the seat belt signs illuminate?", a:"Below 10,000 ft MSL.", src:"GenOps deck" },
  { id:"genops-052", system:"GenOps", q:"What cabin altitude triggers automatic seat belt sign illumination in AUTO mode?", a:"Above 10,000 ft cabin altitude.", src:"GenOps deck" },
  { id:"genops-053", system:"GenOps", q:"What does a Green \"A\" on the door synoptic indicate?", a:"Passenger door is closed, latched, and locked; and the slide is in automatic mode.", src:"GenOps deck" },
  { id:"genops-054", system:"GenOps", q:"What does a White \"M\" on the door synoptic indicate?", a:"Passenger door is closed, latched, and locked; and the slide is in manual mode.", src:"GenOps deck" },
  { id:"genops-055", system:"GenOps", q:"What does an amber indication on the door synoptic mean?", a:"Passenger entry or large cargo door is NOT closed, latched, and locked. (Also covers flight deck overhead door, bulk cargo door, or access door not closed and latched.)", src:"GenOps deck" },
  { id:"genops-056", system:"GenOps", q:"Which cargo doors are on the right side of the 787?", a:"Forward and aft cargo doors.", src:"GenOps deck" },
  { id:"genops-057", system:"GenOps", q:"How is the bulk cargo door operated, and on which side is it located?", a:"Mechanically operated; on the left side; opens inward.", src:"GenOps deck" },
  { id:"genops-058", system:"GenOps", q:"Does opening a cargo door turn off cargo heating, ventilation, or fire detection?", a:"No. Opening any cargo door does NOT turn off cargo area heating, ventilation, or fire detection.", src:"GenOps deck" },
  { id:"genops-059", system:"GenOps", q:"What are the three O2 regulator settings and what does each provide?", a:"EMGCY: 100% O2 under positive pressure at all altitudes. 100%: 100% O2 on demand. N (Normal): air/oxygen mixture on demand; auto switches to 100% positive pressure above a preset cabin altitude.", src:"GenOps deck" },
  { id:"genops-060", system:"GenOps", q:"How long is oxygen available from the passenger oxygen system?", a:"Approximately 22 minutes.", src:"GenOps deck" },
  { id:"genops-061", system:"GenOps", q:"At what cabin altitude do passenger oxygen masks automatically drop?", a:"The greater of 14,500 ft OR origin airfield altitude plus 1,500 ft OR destination airfield altitude plus 1,500 ft.", src:"GenOps deck" },
  { id:"genops-062", system:"GenOps", q:"How do you manually deploy passenger oxygen masks from the flight deck?", a:"Push the PASS OXYGEN switch on the overhead panel to ON.", src:"GenOps deck" },
  { id:"genops-063", system:"GenOps", q:"Where are the two CCR cabinets located on the 787?", a:"In the Forward EE Bay (left cabinet and right cabinet).", src:"GenOps deck" },
  { id:"genops-064", system:"GenOps", q:"Are there any CCS controls or indications for normal operations?", a:"No. There are no CCS controls or indications during normal operations.", src:"GenOps deck" },
  { id:"genops-065", system:"GenOps", q:"Where are the two CCR RESET switches located?", a:"On the overhead panel (labeled L and R).", src:"GenOps deck" },
  { id:"genops-066", system:"GenOps", q:"During battery-only start-up, when does the R CCR begin its start-up cycle?", a:"After the L CCR completes start-up AND a power source other than the battery (APU or external power) is available.", src:"GenOps deck" },
  { id:"genops-067", system:"GenOps", q:"How do you know both CCRs are on-line following external power start-up?", a:"All displays and HUD combiners show their default formats.", src:"GenOps deck" },
  { id:"genops-068", system:"GenOps", q:"Can EICAS warning messages be canceled using the CANC/RCL switch?", a:"No. Warning messages cannot be canceled by the CANC/RCL switch.", src:"GenOps deck" },
  { id:"genops-069", system:"GenOps", q:"Can EICAS communication messages be canceled by the CANC/RCL switch?", a:"No. Communication messages cannot be canceled by CANC/RCL.", src:"GenOps deck" },
  { id:"genops-070", system:"GenOps", q:"During what speed/altitude range are EICAS advisory messages inhibited?", a:"Between 80 knots and 400 ft AGL.", src:"GenOps deck" },
  { id:"genops-071", system:"GenOps", q:"When does the EICAS checklist icon disappear?", a:"When the checklist associated with that message is complete.", src:"GenOps deck" },
  { id:"genops-072", system:"GenOps", q:"What triggers the NO AUTOLAND alert on the PFD?", a:"Flying an ILS approach with the autopilot on an FMC glidepath below 100 ft (rather than the ILS glidepath).", src:"GenOps deck" },
  { id:"genops-073", system:"GenOps", q:"What are the four Time Critical Warnings displayed on both the PFD and HUD?", a:"ENG FAIL, PULL UP, SPEEDBRAKE, WINDSHEAR.", src:"GenOps deck" },
  { id:"genops-074", system:"GenOps", q:"When TAMS is reached, what aural and master light are triggered?", a:"\"AIRSPEED, AIRSPEED\" aural sounds with Master WARNING light.", src:"GenOps deck" },
  { id:"genops-075", system:"GenOps", q:"At what altitude can the G/S INHIBIT switch be activated?", a:"Below 1,000 ft radio altitude.", src:"GenOps deck" },
  { id:"genops-076", system:"GenOps", q:"On takeoff, between what airspeeds does the ENG FAIL alert display if thrust is less than commanded?", a:"Between 65 knots and 6 knots prior to V1.", src:"GenOps deck" },
  { id:"genops-077", system:"GenOps", q:"What condition triggers the EICAS caution ENG FAIL (not on the takeoff roll)?", a:"An engine unexpectedly decelerates to less than idle speed.", src:"GenOps deck" },
  { id:"genops-078", system:"GenOps", q:"What clears the EICAS caution ENG FAIL message?", a:"Engine recovers to above idle, OR the fuel control switch is moved to CUTOFF.", src:"GenOps deck" },
  { id:"genops-079", system:"GenOps", q:"What physical components make up the 787 tail strike detection system?", a:"A two-inch blade target and two frangible wires installed on the aft body of the airplane.", src:"GenOps deck" },
  { id:"genops-080", system:"GenOps", q:"What is the EICAS level (warning/caution/advisory) for the TAIL STRIKE message?", a:"Caution.", src:"GenOps deck" },
  { id:"genops-081", system:"GenOps", q:"At what radio altitude does the CONFIG GEAR warning trigger?", a:"Radio altitude less than 800 ft (with gear not down and locked, and thrust lever below nominal glideslope thrust level).", src:"GenOps deck" },
  { id:"genops-082", system:"GenOps", q:"What triggers the SPEEDBRAKE EXTENDED caution in flight?", a:"Radio altitude below 800 ft AND flap lever in landing position; OR thrust lever above idle stop for 15 seconds.", src:"GenOps deck" },
  { id:"genops-083", system:"GenOps", q:"How far before the MCP selected altitude does the altitude alerting C-chord sound?", a:"900 ft prior to reaching the selected altitude.", src:"GenOps deck" },
  { id:"genops-084", system:"GenOps", q:"How far from the MCP selected altitude does the ALTITUDE ALERT caution trigger when departing?", a:"200 ft deviation from the selected altitude.", src:"GenOps deck" },
  { id:"genops-085", system:"GenOps", q:"When are MCP selected altitude alerts inhibited?", a:"When glideslope or glidepath is captured, OR when landing flaps are selected and landing gear is down and locked.", src:"GenOps deck" },
  { id:"genops-086", system:"GenOps", q:"TRUE or FALSE: Passenger oxygen masks automatically drop at the greater of 14,500 ft, origin airfield altitude plus 1,500 ft, or destination airfield altitude plus 1,500 ft?", a:"TRUE.", src:"GenOps deck" },
  { id:"genops-087", system:"GenOps", q:"TRUE or FALSE: Warning (red) EICAS messages can be cancelled by pushing the Cancel/Recall button?", a:"FALSE. Warning messages cannot be cancelled by the CANC/RCL switch.", src:"GenOps deck" },
  { id:"genops-088", system:"GenOps", q:"When does the EICAS checklist icon disappear?", a:"When the checklist associated with that message is complete.", src:"GenOps deck" },
  { id:"sv-ground-001", system:"SV Ground", q:"How many questions are on the B787 Systems Validation (SV) exam?", a:"100 questions.", src:"SV Ground deck" },
  { id:"sv-ground-002", system:"SV Ground", q:"How long do pilots have to complete the SV?", a:"3 hours.", src:"SV Ground deck" },
  { id:"sv-ground-003", system:"SV Ground", q:"What is the passing standard for the B787 SV?", a:"80% or greater. Pilots who score below 80% are remediated to 100%.", src:"SV Ground deck" },
  { id:"sv-ground-004", system:"SV Ground", q:"Is the SV open or closed book? What resources are and are not permitted?", a:"Open book. Company iPad to access resource documents is permitted. Personal notes and study guides are NOT permitted. -- MEMORY ITEMS AND NNC FUNDAMENTALS --", src:"SV Ground deck" },
  { id:"sv-ground-005", system:"SV Ground", q:"When should memory items be accomplished following an engine fire or engine severe damage/separation?", a:"When the flight path is under control, gear has been retracted, and a safe altitude has been attained - minimum 400 feet AGL.", src:"SV Ground deck" },
  { id:"sv-ground-006", system:"SV Ground", q:"During an engine fire memory item, when does the PF retard the affected thrust lever?", a:"After the PM confirms that the PF has identified the correct engine.", src:"SV Ground deck" },
  { id:"sv-ground-007", system:"SV Ground", q:"Where is the QRC stored?", a:"Under the MCP glareshield.", src:"SV Ground deck" },
  { id:"sv-ground-008", system:"SV Ground", q:"When a non-normal situation occurs, who initiates the memory items and how do both crew respond?", a:"At the direction of the pilot flying, both crewmembers do all memory items in their areas of responsibility without delay.", src:"SV Ground deck" },
  { id:"sv-ground-009", system:"SV Ground", q:"Is verbal \"Confirm\" required for non-normal checklist items when on the ground?", a:"No. Confirmation is NOT needed for non-normal checklist items when on the ground.", src:"SV Ground deck" },
  { id:"sv-ground-010", system:"SV Ground", q:"Name five controls that require verbal confirmation before action during an inflight non-normal situation.", a:"Autothrottle arm switch; engine thrust lever; fuel control switch; engine or APU fire switch (or cargo fire arm switch); generator drive disconnect switch.", src:"SV Ground deck" },
  { id:"sv-ground-011", system:"SV Ground", q:"The \"Confirm\" step requirement does not apply to which checklist?", a:"The Dual Eng Fail/Stall checklist. -- NORMAL CHECKLISTS --", src:"SV Ground deck" },
  { id:"sv-ground-012", system:"SV Ground", q:"What EICAS message alerts crew when critical normal checklist items are incomplete?", a:"CHKL INCOMPLETE NORM (caution level). The normal checklist key also changes to amber.", src:"SV Ground deck" },
  { id:"sv-ground-013", system:"SV Ground", q:"At what altitude does the CHKL INCOMPLETE NORM \"landing phase\" trigger occur?", a:"When the airplane descends below 500 feet above the FMC landing altitude.", src:"SV Ground deck" },
  { id:"sv-ground-014", system:"SV Ground", q:"If a normal checklist is interrupted and the crew is unsure where it was stopped, what must be done?", a:"Do the checklist from the start.", src:"SV Ground deck" },
  { id:"sv-ground-015", system:"SV Ground", q:"After completing each normal checklist, what does the pilot reading the checklist call out?", a:"\"________ CHECKLIST COMPLETE.\" -- NON-NORMAL CHECKLISTS --", src:"SV Ground deck" },
  { id:"sv-ground-016", system:"SV Ground", q:"What is the difference between an annunciated and an unannunciated checklist?", a:"Annunciated checklists correspond to an EICAS alert message. Unannunciated checklists have no EICAS alert message.", src:"SV Ground deck" },
  { id:"sv-ground-017", system:"SV Ground", q:"Where are unannunciated checklists found in the QRH?", a:"In the associated system section. Those with no associated system are in section 0, Miscellaneous.", src:"SV Ground deck" },
  { id:"sv-ground-018", system:"SV Ground", q:"What does the rectangle icon [ ] before an EICAS alert message indicate?", a:"The checklist has procedural steps, notes, or other crew information. The icon is removed when the checklist is completed.", src:"SV Ground deck" },
  { id:"sv-ground-019", system:"SV Ground", q:"Give three examples of annunciated and three examples of unannunciated checklists.", a:"Annunciated: FIRE ENG L, CABIN ALTITUDE, HYD PRESS SYS R. Unannunciated: Ditching, ENG Severe Damage/Separation, Overweight Landing.", src:"SV Ground deck" },
  { id:"sv-ground-020", system:"SV Ground", q:"When should CANC/RCL be used after completing a NNC?", a:"Before completing any normal checklists, to check if there are other NNCs to be completed.", src:"SV Ground deck" },
  { id:"sv-ground-021", system:"SV Ground", q:"What EICAS advisory message alerts the crew to an active checklist in the queue when ECL is not open?", a:"CHKL NON-NORMAL. It blanks when ECL is opened.", src:"SV Ground deck" },
  { id:"sv-ground-022", system:"SV Ground", q:"A NNC occurs a second time on the same flight. The EICAS message shows but without the rectangle icon. Why, and what should the crew do?", a:"The checklist is latched in the completed state from the first occurrence (it is a latched checklist). The crew must open the checklist from the ECL non-normal menu and select CHKL RESET to restart it.", src:"SV Ground deck" },
  { id:"sv-ground-023", system:"SV Ground", q:"What situations require landing at the nearest suitable airport?", a:"When the NNC includes \"Plan to land at the nearest suitable airport\"; fire or smoke continues; only two AC power sources remain; or any other situation with significant adverse effect on safety if flight is continued.", src:"SV Ground deck" },
  { id:"sv-ground-024", system:"SV Ground", q:"When a checklist directs an engine shutdown, what must the captain evaluate?", a:"Whether an actual shutdown or operation at reduced thrust is the safest course of action.", src:"SV Ground deck" },
  { id:"sv-ground-025", system:"SV Ground", q:"When the PF calls for the checklist, what three conditions must be met?", a:"Flight path is under control; airplane is not in a critical phase of flight; all memory items are complete.", src:"SV Ground deck" },
  { id:"sv-ground-026", system:"SV Ground", q:"After moving a control during a NNC, who states the checklist response?", a:"The flight crewmember who took the action. -- ECL OPERATIONS --", src:"SV Ground deck" },
  { id:"sv-ground-027", system:"SV Ground", q:"What does CHKL OVRD do, and what does it also remove?", a:"Forces the checklist back to the inactive state. Also removes: notes collected on the Notes page, inhibited checklists, and deferred items added to normal checklists.", src:"SV Ground deck" },
  { id:"sv-ground-028", system:"SV Ground", q:"When should CHKL OVRD NOT be used?", a:"When the crew wants to pause the checklist and complete it later.", src:"SV Ground deck" },
  { id:"sv-ground-029", system:"SV Ground", q:"What does ITEM OVRD do to a line item?", a:"Changes the item to cyan, advances the current line item box to the next incomplete item, and treats the overridden item as complete.", src:"SV Ground deck" },
  { id:"sv-ground-030", system:"SV Ground", q:"In an open-loop conditional checklist, what color do inactive items become?", a:"Cyan.", src:"SV Ground deck" },
  { id:"sv-ground-031", system:"SV Ground", q:"When can the active ECL database be changed?", a:"On the ground when both engines are off. The key is inhibited in flight.", src:"SV Ground deck" },
  { id:"sv-ground-032", system:"SV Ground", q:"What happens to all checklists when the active ECL database is changed?", a:"All checklists are reset.", src:"SV Ground deck" },
  { id:"sv-ground-033", system:"SV Ground", q:"What revision should the selected AIRLINE DATABASE match?", a:"The ECL Revision listed on the front page of the current approved QRH.", src:"SV Ground deck" },
  { id:"sv-ground-034", system:"SV Ground", q:"When does a checklist timer change from white to amber?", a:"When the countdown reaches :00 (timer is done).", src:"SV Ground deck" },
  { id:"sv-ground-035", system:"SV Ground", q:"Can a crew leave the checklist page while a timer is running?", a:"Yes. Timers run in the background. -- WEIGHT AND BALANCE / LOAD CLOSEOUT --", src:"SV Ground deck" },
  { id:"sv-ground-036", system:"SV Ground", q:"What must happen before the Load Closeout (final numbers) will be sent to the aircraft?", a:"\"Fit-For-Duty\" must be submitted and acknowledged.", src:"SV Ground deck" },
  { id:"sv-ground-037", system:"SV Ground", q:"What two figures are compared during the LCO crosscheck?", a:"Planned Takeoff Weight on the Dispatch Release vs. Actual Takeoff Weight on the Load Closeout.", src:"SV Ground deck" },
  { id:"sv-ground-038", system:"SV Ground", q:"The Dispatch Release is valid for TOW up to how many pounds greater than PTOW without requiring a new release?", a:"Up to 3,000 lbs greater.", src:"SV Ground deck" },
  { id:"sv-ground-039", system:"SV Ground", q:"If TOW on the LCO exceeds PTOW by 2,000 lbs, what two actions are required?", a:"Increase MIN RLS FUEL and MIN TAKEOFF FUEL by the FUEL BURN ADJUSTMENT per 1,000 lbs increase in TOW, and send an ACARS message to Dispatch with acknowledgment required.", src:"SV Ground deck" },
  { id:"sv-ground-040", system:"SV Ground", q:"What exact ACARS message text is used when adjusting MIN RLS and MIN TAKEOFF fuel?", a:"\"ADD XXXLB TO MIN RLS AND MIN TO\" (inserting the appropriate amount).", src:"SV Ground deck" },
  { id:"sv-ground-041", system:"SV Ground", q:"If TOW exceeds PTOW by more than 3,000 lbs, what is required?", a:"A revised Dispatch Release.", src:"SV Ground deck" },
  { id:"sv-ground-042", system:"SV Ground", q:"How is a Load Closeout obtained if ACARS is inoperative?", a:"Company email (preferred) or VHF radio.", src:"SV Ground deck" },
  { id:"sv-ground-043", system:"SV Ground", q:"For a Radio Load Closeout (HAL F-809), what must be read back and what must the Captain do with the form?", a:"The asterisked items must be read back for accuracy. The Captain must carry a signed copy to the destination. -- PERFORMANCE --", src:"SV Ground deck" },
  { id:"sv-ground-044", system:"SV Ground", q:"On a contaminated runway, what is the thrust requirement and what is not permitted?", a:"Maximum takeoff thrust is mandatory. The assumed temperature method of reduced thrust is NOT authorized.", src:"SV Ground deck" },
  { id:"sv-ground-045", system:"SV Ground", q:"On a wet or slippery (not contaminated) runway, is maximum thrust required?", a:"No. It is encouraged but not required.", src:"SV Ground deck" },
  { id:"sv-ground-046", system:"SV Ground", q:"What is the maximum normal tire speed on landing?", a:"204 knots.", src:"SV Ground deck" },
  { id:"sv-ground-047", system:"SV Ground", q:"What is the maximum allowable tire speed for a non-normal landing?", a:"226 knots.", src:"SV Ground deck" },
  { id:"sv-ground-048", system:"SV Ground", q:"What factor is applied to normal configuration landing distances?", a:"115% of the actual landing distance.", src:"SV Ground deck" },
  { id:"sv-ground-049", system:"SV Ground", q:"Are non-normal configuration landing distances factored?", a:"No. They are representative of actual landing distance and are NOT factored.", src:"SV Ground deck" },
  { id:"sv-ground-050", system:"SV Ground", q:"What is the assumed flare time used for the normal landing reference distance?", a:"7 seconds.", src:"SV Ground deck" },
  { id:"sv-ground-051", system:"SV Ground", q:"If brake overheat occurs after takeoff, what action should be taken?", a:"Extend the gear for at least 12 minutes.", src:"SV Ground deck" },
  { id:"sv-ground-052", system:"SV Ground", q:"When should brake temperature indication on the MFD be used to determine cooling schedule?", a:"10 to 15 minutes after the airplane has come to a complete stop, or in flight with gear retracted.", src:"SV Ground deck" },
  { id:"sv-ground-053", system:"SV Ground", q:"What is the Flap Retraction Altitude for all takeoffs?", a:"1,000 ft AFE, unless a Special Procedure states otherwise.", src:"SV Ground deck" },
  { id:"sv-ground-054", system:"SV Ground", q:"Below what altitude are no turns permitted when takeoff weather is below 1,000 ft ceiling and 3 sm visibility?", a:"1,000 ft AFE (unless a Special Departure Procedure or assigned instrument departure procedure specifically requires otherwise).", src:"SV Ground deck" },
  { id:"sv-ground-055", system:"SV Ground", q:"When is the OPT used?", a:"For landing calculations only - when the Landing Data Request is not working for normal conditions, or when calculating non-normal/inoperative item landing distances.", src:"SV Ground deck" },
  { id:"sv-ground-056", system:"SV Ground", q:"What is the standard missed approach climb gradient used in the OPT?", a:"2.5%.", src:"SV Ground deck" },
  { id:"sv-ground-057", system:"SV Ground", q:"What does a non-normal entry affecting flap selection do to the OPT output?", a:"The landing flap field is blanked, the missed approach climb gradient is disregarded, and recommended brake cooling time is not displayed.", src:"SV Ground deck" },
  { id:"sv-ground-058", system:"SV Ground", q:"How do you convert a climb gradient from ft/NM to a percentage?", a:"Divide by 60 (representing 6,000 ft per NM, rounded).", src:"SV Ground deck" },
  { id:"sv-ground-059", system:"SV Ground", q:"VREF for flaps 30 at 420,000 lbs is what?", a:"153 knots (per deck example).", src:"SV Ground deck" },
  { id:"sv-ground-060", system:"SV Ground", q:"For the brake cooling example in the deck (440,000 lbs / 140 kt / OAT 30C / sea level / RTO MAX MANUAL), what is the cooling situation?", a:"Event Adjusted Brake Energy = 55.0. Ground cooling is in the Caution Zone: delay takeoff and inspect after one hour. -- COLD WEATHER OPERATIONS --", src:"SV Ground deck" },
  { id:"sv-ground-061", system:"SV Ground", q:"What federal regulation is the Clean Aircraft Concept based on?", a:"14 CFR 121.629.", src:"SV Ground deck" },
  { id:"sv-ground-062", system:"SV Ground", q:"How much frost on lower wing surfaces is allowable for takeoff, and under what condition?", a:"Light coatings of frost up to 1/8 inch (3mm) on lower wing surfaces due to cold fuel are allowable.", src:"SV Ground deck" },
  { id:"sv-ground-063", system:"SV Ground", q:"Are upper wing surfaces, leading-edge devices, and control surfaces subject to any frost tolerance?", a:"No. They must be completely free of snow, ice, and frost.", src:"SV Ground deck" },
  { id:"sv-ground-064", system:"SV Ground", q:"Where is thin hoarfrost acceptable, and what defines it?", a:"On the upper surface of the fuselage, provided all vents and ports are clear. It is a uniform white deposit of fine crystalline texture, thin enough to distinguish surface features (paint lines, markings, lettering) underneath.", src:"SV Ground deck" },
  { id:"sv-ground-065", system:"SV Ground", q:"When does HOT begin?", a:"When the final application of deicing or anti-icing fluid commences.", src:"SV Ground deck" },
  { id:"sv-ground-066", system:"SV Ground", q:"If the deice report does not identify the specific Type IV fluid brand used, what table must be used?", a:"The generic holdover time table for Type IV fluid from the FAA Holdover Time Guidelines.", src:"SV Ground deck" },
  { id:"sv-ground-067", system:"SV Ground", q:"The holdover time table shows a time range. What does the shorter time correspond to?", a:"A heavier precipitation intensity within that cell.", src:"SV Ground deck" },
  { id:"sv-ground-068", system:"SV Ground", q:"If METAR indicates light snow but the prevailing visibility chart shows moderate snow, which is used for HOT?", a:"Moderate snow is used.", src:"SV Ground deck" },
  { id:"sv-ground-069", system:"SV Ground", q:"If visibility drops to 1/2 SM during snowfall, what is the holdover time?", a:"There is no holdover time - no HOT exists for heavy snow.", src:"SV Ground deck" },
  { id:"sv-ground-070", system:"SV Ground", q:"When must the flight crew pre-takeoff contamination check (after HOT expiry) be conducted?", a:"Within five (5) minutes prior to beginning of takeoff.", src:"SV Ground deck" },
  { id:"sv-ground-071", system:"SV Ground", q:"During the pre-takeoff contamination check, which wing is inspected last?", a:"The wing that was de-iced first.", src:"SV Ground deck" },
  { id:"sv-ground-072", system:"SV Ground", q:"What must be done with the HAL HOT app when using the holdover timer?", a:"The app must be displayed as the active window on at least one EFB. Use the iPad split window function to display the timer and airport diagram simultaneously.", src:"SV Ground deck" },
  { id:"sv-ground-073", system:"SV Ground", q:"When temperature is lower than ISA, how does true altitude compare to indicated altitude?", a:"True altitude is lower than indicated altitude.", src:"SV Ground deck" },
  { id:"sv-ground-074", system:"SV Ground", q:"When must pilots request ATC approval for cold temperature altitude corrections?", a:"Whenever applying a cold temperature altitude correction. They do NOT need to notify ATC of the final approach segment correction (new MDA or DA).", src:"SV Ground deck" },
  { id:"sv-ground-075", system:"SV Ground", q:"On a Baro-VNAV RNAV (GPS) approach without a temperature compensating system, which line of minima cannot be used if the temperature is outside the charted range?", a:"The LNAV/VNAV line of minima. The LNAV line of minima may still be used after applying cold temperature corrections.", src:"SV Ground deck" },
  { id:"sv-ground-076", system:"SV Ground", q:"Are cold temperature correction \"snowflake\" icons shown on Jeppesen charts?", a:"No. Snowflake icons appear on US Terminal Procedure Publications only, not on Jeppesen charts as used by Hawaiian Airlines crews.", src:"SV Ground deck" },
  { id:"sv-ground-077", system:"SV Ground", q:"What temperature inhibits pack inlet anti-ice operation?", a:"Inhibited on the ground and when TAT is above 10 degrees C. -- EXTERIOR WALKAROUND --", src:"SV Ground deck" },
  { id:"sv-ground-078", system:"SV Ground", q:"Who performs the exterior preflight inspection?", a:"The pilot monitoring or IRO.", src:"SV Ground deck" },
  { id:"sv-ground-079", system:"SV Ground", q:"Are static ports heated?", a:"No. Static ports are NOT heated - ensure clear of ice/frost during preflight.", src:"SV Ground deck" },
  { id:"sv-ground-080", system:"SV Ground", q:"What is the function of the negative pressure relief vents?", a:"Protect the fuselage during abnormal negative pressure conditions.", src:"SV Ground deck" },
  { id:"sv-ground-081", system:"SV Ground", q:"What do both outflow valves do at touchdown?", a:"Both open to depressurize the cabin.", src:"SV Ground deck" },
  { id:"sv-ground-082", system:"SV Ground", q:"If one outflow valve fails, can cabin altitude still be maintained?", a:"Yes. Cabin altitude and full ventilation rates can be maintained by either valve alone.", src:"SV Ground deck" },
  { id:"sv-ground-083", system:"SV Ground", q:"When is the TAT probe heated?", a:"In flight only - when airspeed is more than 50 knots.", src:"SV Ground deck" },
  { id:"sv-ground-084", system:"SV Ground", q:"Pitot probes have two heat power levels. What determines which level is used?", a:"Below 50 knots = low power; above 50 knots = high power.", src:"SV Ground deck" },
  { id:"sv-ground-085", system:"SV Ground", q:"Below what ground speed is the automatic ice detection system inhibited?", a:"Below 75 knots.", src:"SV Ground deck" },
  { id:"sv-ground-086", system:"SV Ground", q:"What are the cargo door wind speed limits?", a:"Do not operate with winds at the door of more than 40 knots; do not keep door open if gusts exceed 65 knots.", src:"SV Ground deck" },
  { id:"sv-ground-087", system:"SV Ground", q:"What are the B787 fan blades made of, how many are there, and what protects their edges?", a:"18 fan blades made from Carbon Fiber Reinforced Plastic (CFRP). Leading and trailing edges are titanium.", src:"SV Ground deck" },
  { id:"sv-ground-088", system:"SV Ground", q:"How many T/R drag links and blocker doors are installed per engine, and what is the MEL limit?", a:"24 installed per engine. More than 1 missing = thrust reverser inoperative. Up to 12 may be missing on one engine per MEL (with weight penalties).", src:"SV Ground deck" },
  { id:"sv-ground-089", system:"SV Ground", q:"How much does the B787 wing flex during takeoff and landing?", a:"About 12 feet.", src:"SV Ground deck" },
  { id:"sv-ground-090", system:"SV Ground", q:"How many static discharge wicks are on each wing?", a:"12.", src:"SV Ground deck" },
  { id:"sv-ground-091", system:"SV Ground", q:"When should a brake wear indicator pin be written up?", a:"When the indicator is flush with the guide. (Indicator extending OUT of the guide = brakes are good.)", src:"SV Ground deck" },
  { id:"sv-ground-092", system:"SV Ground", q:"How many Electronic Brake Actuators are installed per wheel?", a:"Four (4).", src:"SV Ground deck" },
  { id:"sv-ground-093", system:"SV Ground", q:"On the ground with both engines off, what happens if either APU fire detector loop detects a fire?", a:"The APU automatically shuts down AND the extinguisher bottle discharges automatically.", src:"SV Ground deck" },
  { id:"sv-ground-094", system:"SV Ground", q:"What do the parking brake lights at the nose wheel well indicate?", a:"Blue light = parking brakes OFF; amber and red lights = parking brake set and on.", src:"SV Ground deck" },
  { id:"sv-ground-095", system:"SV Ground", q:"What is the Hybrid Laminar Flow Control (HLFC) system, and what are the crew requirements?", a:"A system on the vertical stabilizer to reduce aerodynamic drag. There are NO crew procedures, NO monitoring requirements, and NO alert messages for any failure mode.", src:"SV Ground deck" },
  { id:"sv-ground-096", system:"SV Ground", q:"How many static ports are on the vertical stabilizer, and what is their function?", a:"Four (two on each side). They provide inputs to the lateral gust suppression function.", src:"SV Ground deck" },
  { id:"sv-ground-097", system:"SV Ground", q:"Does lateral gust suppression cause control column or rudder pedal movement?", a:"No. Operation does not result in control wheel, control column, or rudder pedal movement. Only available in normal mode.", src:"SV Ground deck" },
  { id:"sv-ground-098", system:"SV Ground", q:"What does the tail strike detection system consist of, and what EICAS indication does it give?", a:"A two-inch blade target and two frangible wires installed on the aft body. EICAS caution TAIL STRIKE with beeper and Master CAUTION light.", src:"SV Ground deck" },
  { id:"sv-ground-099", system:"SV Ground", q:"What is the APU battery voltage and type, and how quickly is vapor vented?", a:"32V Lithium-ion. Any vapor in the containment box is vented overboard within 1.5 seconds.", src:"SV Ground deck" },
  { id:"sv-ground-100", system:"SV Ground", q:"If aft external power is connected along with both forward power sources, which engine must be started first and why?", a:"The right engine must be started first to receive the benefit of reduced load shedding.", src:"SV Ground deck" },
  { id:"sv-ground-101", system:"SV Ground", q:"What is the function of the FOD deflector door, and when might it retract on the ground?", a:"Protects CAC inlets from debris during ground operations and landing. May retract on the ground below 35 degrees F or above 95 degrees F.", src:"SV Ground deck" },
  { id:"sv-ground-102", system:"SV Ground", q:"Does the B789 have grey water drain masts?", a:"No. Grey water is contained in two storage tanks located aft of the bulk cargo.", src:"SV Ground deck" },
  { id:"sv-ground-103", system:"SV Ground", q:"What do the raked wingtips do compared to winglets?", a:"Raked wingtips act similar to a winglet to reduce wingtip vortices but are more efficient than winglets.", src:"SV Ground deck" },
  { id:"sv-ground-104", system:"SV Ground", q:"During the HLFC empennage door operation, what happens at low airspeed in flight vs. cruise?", a:"Low airspeed: forward doors open for purge mode (removes water/debris). Cruise/high airspeed: aft doors open for suction mode (improves laminar flow at leading edge).", src:"SV Ground deck" },
  { id:"sv-ground-105", system:"SV Ground", q:"How many static dischargers are on the rudder?", a:"3 at the tip and 7 on the trailing edge.", src:"SV Ground deck" },
  { id:"sv-ground-106", system:"SV Ground", q:"What is the purpose of the diverter strips on the radome?", a:"Provide an electrostatic lightning shield for the radome and provide a path to bleed off static electricity generated during flight.", src:"SV Ground deck" },
  { id:"sftd-1-001", system:"SFTD 1", q:"What does the mnemonic FFLAAPOD stand for for flight deck emergency equipment?", a:"Flashlights (2), Fire extinguisher (1), Life Vests (4), AVSAX and Gloves (1), (Crash) Axe (1), PBE (1), O2 Masks (4), Descent Devices (4)", src:"SFTD 1 deck" },
  { id:"sftd-1-002", system:"SFTD 1", q:"How many descent devices are carried on the B787 flight deck?", a:"4", src:"SFTD 1 deck" },
  { id:"sftd-1-003", system:"SFTD 1", q:"How many PBEs are carried on the B787 flight deck?", a:"1", src:"SFTD 1 deck" },
  { id:"sftd-1-004", system:"SFTD 1", q:"After the Battery switch is pushed ON, approximately how long does it take for the LEFT CCR to come online?", a:"Approximately 2-3 minutes", src:"SFTD 1 deck" },
  { id:"sftd-1-005", system:"SFTD 1", q:"What condition must be met before the RIGHT CCR begins its start-up cycle?", a:"The LEFT CCR must complete start-up AND a power source other than the battery (APU or external power) must be available", src:"SFTD 1 deck" },
  { id:"sftd-1-006", system:"SFTD 1", q:"What is the maximum runway slope for B787-9 takeoff and landing?", a:"+/-2%", src:"SFTD 1 deck" },
  { id:"sftd-1-007", system:"SFTD 1", q:"What is the maximum takeoff and landing tailwind for the B787-9?", a:"15 knots", src:"SFTD 1 deck" },
  { id:"sftd-1-008", system:"SFTD 1", q:"What is the maximum takeoff and landing altitude for the B787-9?", a:"14,000 feet", src:"SFTD 1 deck" },
  { id:"sftd-1-009", system:"SFTD 1", q:"Is it permissible to operate HF radios during refueling?", a:"No - do not operate HF radios when refueling", src:"SFTD 1 deck" },
  { id:"sftd-1-010", system:"SFTD 1", q:"What three conditions must ALL be present for RTO to command maximum braking pressure?", a:"(1) Airplane is on the ground, (2) groundspeed is above 85 kts, AND (3) both thrust levers are retarded to idle", src:"SFTD 1 deck" },
  { id:"sftd-1-011", system:"SFTD 1", q:"Name the three conditions that cause the RAT to deploy automatically.", a:"(1) Both engines failed OR all 3 hydraulic system pressures are low; (2) loss of all electrical power to CA and FO flight instruments; (3) loss of all four electric motor-driven pumps (EMPs) and an engine fails on takeoff or landing", src:"SFTD 1 deck" },
  { id:"sftd-1-012", system:"SFTD 1", q:"After an APU fire signal, the APU shuts down immediately. How many seconds later does the extinguisher bottle automatically discharge?", a:"15 seconds (to allow the fuel valve to close)", src:"SFTD 1 deck" },
  { id:"sftd-1-013", system:"SFTD 1", q:"What is the takeoff thrust rating of each GEnx-1B74/75 engine?", a:"74,100 lbs (FCOM verified)", src:"SFTD 1 deck" },
  { id:"sftd-1-014", system:"SFTD 1", q:"Can the APU start if the common core system is not yet running?", a:"No - the APU controller delays start until the required common core applications are available", src:"SFTD 1 deck" },
  { id:"sftd-1-015", system:"SFTD 1", q:"How many VHF radios can operate in data mode simultaneously on the B787?", a:"Only one VHF radio can operate in data mode at a time", src:"SFTD 1 deck" },
  { id:"sftd-1-016", system:"SFTD 1", q:"What is VHF L configured for?", a:"Voice communication only", src:"SFTD 1 deck" },
  { id:"sftd-1-017", system:"SFTD 1", q:"What does an HF antenna tuning tone lasting more than 7 seconds indicate?", a:"Failure of the system to tune", src:"SFTD 1 deck" },
  { id:"sftd-1-018", system:"SFTD 1", q:"With the SEAT BELTS switch in AUTO, what three conditions cause the seat belt signs to automatically illuminate?", a:"(1) Landing gear not up and locked; (2) flap lever at 5 or greater; (3) cabin altitude above 10,000 feet", src:"SFTD 1 deck" },
  { id:"sftd-1-019", system:"SFTD 1", q:"At what altitude do the passenger oxygen masks automatically drop from the PSUs?", a:"Prior to the cabin reaching the GREATER of: 14,500 feet, origin airfield altitude +1,500 feet, or destination airfield altitude +1,500 feet", src:"SFTD 1 deck" },
  { id:"sftd-1-020", system:"SFTD 1", q:"How long is passenger oxygen available after mask deployment?", a:"Approximately 22 minutes", src:"SFTD 1 deck" },
  { id:"sftd-1-021", system:"SFTD 1", q:"What are the maximum wind limits for Autoland operations (headwind, tailwind, crosswind)?", a:"Headwind 25 kts, Tailwind 15 kts, Crosswind 25 kts", src:"SFTD 1 deck" },
  { id:"sftd-1-022", system:"SFTD 1", q:"Without LAND 2 or LAND 3 annunciated, below what height AGL must the autopilot be disengaged?", a:"135 feet AGL", src:"SFTD 1 deck" },
  { id:"sftd-1-023", system:"SFTD 1", q:"What is the restriction on using FLCH on final approach?", a:"Do not use FLCH on final approach below 1,000 feet AFE", src:"SFTD 1 deck" },
  { id:"sftd-1-024", system:"SFTD 1", q:"In what flight control mode(s) is takeoff permitted?", a:"Normal mode ONLY (not Secondary, not Direct)", src:"SFTD 1 deck" },
  { id:"sftd-1-025", system:"SFTD 1", q:"What is the maximum altitude with flaps extended?", a:"20,000 feet", src:"SFTD 1 deck" },
  { id:"sftd-1-026", system:"SFTD 1", q:"Does placing either RECIRC FAN switch to OFF generate an EICAS message?", a:"Yes", src:"SFTD 1 deck" },
  { id:"sftd-1-027", system:"SFTD 1", q:"Can a single CAC operate its associated PACK in all modes?", a:"Yes - a single CAC provides sufficient air to operate its associated PACK in all operating modes", src:"SFTD 1 deck" },
  { id:"sftd-1-028", system:"SFTD 1", q:"How many outflow valves does the B787 pressurization system have, and where are they located?", a:"Two outflow valves - one forward and one aft", src:"SFTD 1 deck" },
  { id:"sftd-1-029", system:"SFTD 1", q:"What data inputs does the B787 pressurization system use to calculate the cabin pressurization schedule?", a:"Ambient pressure and flight plan data from the FMC", src:"SFTD 1 deck" },
  { id:"sftd-1-030", system:"SFTD 1", q:"What is the range of bank limit in AUTO mode, and what does it depend on?", a:"15 to 25 degrees, depending on TAS", src:"SFTD 1 deck" },
  { id:"sftd-1-031", system:"SFTD 1", q:"If TO/GA is not pushed below 50 knots, when is autothrottle operation available?", a:"Autothrottle operation is inhibited until reaching 400 feet altitude", src:"SFTD 1 deck" },
  { id:"sftd-1-032", system:"SFTD 1", q:"Pushing the TO/GA switch above what speed disarms LNAV and VNAV?", a:"Above 80 knots", src:"SFTD 1 deck" },
  { id:"sftd-1-033", system:"SFTD 1", q:"The glideslope attitude stabilizing mode limits descent angle to 3.25 degrees using inertial data. For how long does this mode operate?", a:"Up to 15 seconds (not 25 seconds)", src:"SFTD 1 deck" },
  { id:"sftd-1-034", system:"SFTD 1", q:"Between what radio altimeter heights does the autothrottle begin retarding thrust levers to idle during the flare?", a:"Between 25 and 50 feet RA", src:"SFTD 1 deck" },
  { id:"sftd-1-035", system:"SFTD 1", q:"What does the APU battery provide power for?", a:"APU start; navigation lights when Towing Power mode is active (does NOT provide backup brake power)", src:"SFTD 1 deck" },
  { id:"sftd-1-036", system:"SFTD 1", q:"How many seconds after reaching idle does the RUNNING indication blank on the secondary engine display?", a:"30 seconds", src:"SFTD 1 deck" },
  { id:"sftd-1-037", system:"SFTD 1", q:"Which EICAS message types CANNOT be canceled using the CANC/RCL switch?", a:"Warning messages, Communication messages, and Memo messages", src:"SFTD 1 deck" },
  { id:"sftd-1-038", system:"SFTD 1", q:"Which EICAS message types CAN be canceled using the CANC/RCL switch?", a:"Caution messages and Advisory messages", src:"SFTD 1 deck" },
  { id:"sftd-1-039", system:"SFTD 1", q:"What does a rectangle icon preceding an EICAS message indicate?", a:"The message has associated procedural steps", src:"SFTD 1 deck" },
  { id:"sftd-1-040", system:"SFTD 1", q:"What is the difference between an ECL closed loop and an open loop action item?", a:"Closed loop items continuously monitor a switch position and auto-check when correct. Open loop items require manual crew confirmation.", src:"SFTD 1 deck" },
  { id:"sftd-1-041", system:"SFTD 1", q:"What are the two main components of the IRS?", a:"Inertial Reference Units (IRUs) and Attitude and Heading Reference Units (AHRUs)", src:"SFTD 1 deck" },
  { id:"sftd-1-042", system:"SFTD 1", q:"In the NAV AIR DATA SYS degraded mode, what is the effect on flight controls and automation?", a:"Primary Flight Controls enter Secondary Mode; AFDS is INOP; Autopilot is INOP; Autothrottles are INOP", src:"SFTD 1 deck" },
  { id:"sftd-1-043", system:"SFTD 1", q:"In the NAV AIR DATA SYS degraded mode, where does the ISFD get its data from?", a:"Center pitot/static only (altitude and airspeed data may be unreliable)", src:"SFTD 1 deck" },
  { id:"sftd-1-044", system:"SFTD 1", q:"How many FMCs does the B787 have, and what are they called?", a:"3 FMCs - Master, Spare, and Backup", src:"SFTD 1 deck" },
  { id:"sftd-1-045", system:"SFTD 1", q:"Is a single FMC failure apparent to the crew? What action is required?", a:"Not apparent to the crew. No crew action is necessary. LNAV/VNAV remain active.", src:"SFTD 1 deck" },
  { id:"sftd-1-046", system:"SFTD 1", q:"What EICAS message is displayed for a dual FMC failure?", a:"SINGLE FMC (advisory)", src:"SFTD 1 deck" },
  { id:"sftd-1-047", system:"SFTD 1", q:"After a dual FMC failure, can LNAV and VNAV be used?", a:"LNAV/VNAV are deselected but can be reselected. The flight plan needs to be reactivated and executed.", src:"SFTD 1 deck" },
  { id:"sftd-1-048", system:"SFTD 1", q:"What EICAS message is displayed for a triple FMC failure?", a:"FMC (advisory)", src:"SFTD 1 deck" },
  { id:"sftd-1-049", system:"SFTD 1", q:"After a triple FMC failure, what navigation capability remains via the TCPs?", a:"Capability to enter a single LAT/LONG waypoint; track, distance to go, and groundspeed to that waypoint", src:"SFTD 1 deck" },
  { id:"sftd-1-050", system:"SFTD 1", q:"After a triple FMC failure, is the autopilot available?", a:"Yes - autopilot roll and/or pitch modes remain available. Autothrottles also remain available.", src:"SFTD 1 deck" },
  { id:"sftd-1-051", system:"SFTD 1", q:"What are the requirements for the Systems Validation (SV) exam?", a:"100 questions, 3-hour time limit, open book, 80% passing score, plus a Memory Items Quiz", src:"SFTD 1 deck" },
  { id:"sftd-2-001", system:"SFTD 2", q:"What are the maximum wind component limits for Autoland operations?", a:"Headwind 25 kts, Tailwind 15 kts, Crosswind 25 kts. (L.10.4)", src:"SFTD 2 deck" },
  { id:"sftd-2-002", system:"SFTD 2", q:"Without LAND 2 or LAND 3 annunciated, below what altitude AGL must the autopilot be disengaged?", a:"135 feet AGL. (L.10.4)", src:"SFTD 2 deck" },
  { id:"sftd-2-003", system:"SFTD 2", q:"FLCH must not be used on final approach below what altitude?", a:"1,000 feet AFE. (L.10.5)", src:"SFTD 2 deck" },
  { id:"sftd-2-004", system:"SFTD 2", q:"Takeoff is permitted in Normal, Secondary, or Direct flight control mode. Which is correct?", a:"Normal mode ONLY. Takeoff is prohibited in Secondary and Direct modes. (L.10.6)", src:"SFTD 2 deck" },
  { id:"sftd-2-005", system:"SFTD 2", q:"What is the maximum altitude for flap extension on the B787?", a:"20,000 feet. (L.10.6)", src:"SFTD 2 deck" },
  { id:"sftd-2-006", system:"SFTD 2", q:"If either the upper or lower RECIRC FAN switch is placed OFF, is an EICAS message displayed?", a:"Yes. (FCOM 2.10.3)", src:"SFTD 2 deck" },
  { id:"sftd-2-007", system:"SFTD 2", q:"Can a single CAC operate its associated PACK in all modes?", a:"Yes, a single CAC provides sufficient air for its PACK in all operating modes. (FCOM 2.20.1)", src:"SFTD 2 deck" },
  { id:"sftd-2-008", system:"SFTD 2", q:"How many outflow valves does the B787 pressurization system have, and where are they located?", a:"Two outflow valves - one forward and one aft. (FCOM 2.30.1)", src:"SFTD 2 deck" },
  { id:"sftd-2-009", system:"SFTD 2", q:"With BACKUP WINDOW HEAT switches ON, what happens if the primary window heat fails?", a:"Backup anti-fogging is commanded on for the selected windows. (FCOM 3.10.3)", src:"SFTD 2 deck" },

  { id:"electrical-084", system:"Electrical", q:"What does the IFE/PASS SEATS switch control?", a:"IFE system, passenger seat systems, video surveillance cameras, and flight deck personal electronic device power outlets.", src:"Electrics deck" },
  { id:"electrical-085", system:"Electrical", q:"What does the CABIN/UTILITY switch control?", a:"Galleys, most cabin lights, and other non-essential cabin utility loads.", src:"Electrics deck" },
  { id:"electrical-086", system:"Electrical", q:"How many GEN CTRL switches are on the overhead electrical panel?", a:"4 -- L1, L2, R1, R2 -- each with a DRIVE indication.", src:"Electrics deck" },
  { id:"engines-001", system:"Engines", q:"What is the engine model installed on the B787?", a:"General Electric GEnx-1B74/75", src:"Engines deck" },
  { id:"engines-002", system:"Engines", q:"What is the takeoff thrust rating of each B787 engine?", a:"74,100 lbs per engine", src:"Engines deck" },
  { id:"engines-003", system:"Engines", q:"What components make up the N1 rotor?", a:"Fan, low-pressure compressor, and low-pressure turbine on a common shaft", src:"Engines deck" },
  { id:"engines-004", system:"Engines", q:"What components make up the N2 rotor?", a:"High-pressure compressor and high-pressure turbine on a common shaft", src:"Engines deck" },
  { id:"engines-005", system:"Engines", q:"What drives the engine accessory gearbox?", a:"The high speed N2 shaft", src:"Engines deck" },
  { id:"engines-006", system:"Engines", q:"Are the N1 and N2 rotors mechanically linked?", a:"No - they are mechanically independent", src:"Engines deck" },
  { id:"engines-007", system:"Engines", q:"What two parameters are displayed full time on the EICAS as primary engine indications?", a:"N1 and EGT Engine Indications", src:"Engines deck" },
  { id:"engines-008", system:"Engines", q:"What does REV displayed in amber mean?", a:"The thrust reverser is in transit", src:"Engines deck" },
  { id:"engines-009", system:"Engines", q:"What does REV displayed in green mean?", a:"The thrust reverser is fully deployed", src:"Engines deck" },
  { id:"engines-010", system:"Engines", q:"What color is the Maximum N1 line on the N1 display?", a:"Amber", src:"Engines deck" },
  { id:"engines-011", system:"Engines", q:"When is Reference/Target N1 displayed in magenta (rather than green)?", a:"When VNAV is active and the autothrottle is connected in THR or THR REF mode, or the autothrottle is disconnected", src:"Engines deck" },
  { id:"engines-012", system:"Engines", q:"When does the vibration source display \"BB\"?", a:"When the vibration source is unknown; average vibration is then displayed", src:"Engines deck" },
  { id:"engines-013", system:"Engines", q:"What does black numbers on a white background on the vibration display indicate?", a:"High vibration", src:"Engines deck" },
  { id:"engines-014", system:"Engines", q:"Name three conditions that cause automatic display of secondary engine indications.", a:"Any three of: displays initially receive electrical power; FUEL CONTROL switch moved to CUTOFF in flight; engine fire switch pulled in flight; secondary engine parameter exceeded; N2 RPM below idle in flight; start selector in START; FUEL FLOW ENG L/R Advisory shown", src:"Engines deck" },
  { id:"engines-015", system:"Engines", q:"Can automatically-displayed secondary engine indications be cleared while the triggering condition is still present?", a:"No - they cannot be cleared until the condition is no longer present EEC", src:"Engines deck" },
  { id:"engines-016", system:"Engines", q:"How many control modes does the EEC have, and what are they?", a:"Two - normal mode and alternate mode", src:"Engines deck" },
  { id:"engines-017", system:"Engines", q:"What parameter does the EEC use to control the engine in both normal and alternate modes?", a:"N1 RPM", src:"Engines deck" },
  { id:"engines-018", system:"Engines", q:"What rotor does the EEC monitor for overspeed protection?", a:"N2", src:"Engines deck" },
  { id:"engines-019", system:"Engines", q:"What does the EEC do if N2 overspeed persists after RPM limiting fails?", a:"Commands fuel shutoff to shut down the engine; EICAS caution ENG FAIL (L or R) is then displayed with an aural beeper", src:"Engines deck" },
  { id:"engines-020", system:"Engines", q:"What EICAS message indicates RPM limiting is in effect?", a:"ENG RPM LIMITED (amber caution)", src:"Engines deck" },
  { id:"engines-021", system:"Engines", q:"What are the two static port locations on the fan cowl used as an alternate ADRS source?", a:"Lower portion of the fan cowl at the 4 o'clock and 8 o'clock positions", src:"Engines deck" },
  { id:"engines-022", system:"Engines", q:"What powers the EEC during engine start?", a:"Airplane power", src:"Engines deck" },
  { id:"engines-023", system:"Engines", q:"What powers the EEC after engine start-up?", a:"The Permanent Magnet Alternator (PMA)", src:"Engines deck" },
  { id:"engines-024", system:"Engines", q:"What is the backup EEC power source if the PMA fails?", a:"Airplane power", src:"Engines deck" },
  { id:"engines-025", system:"Engines", q:"In EEC normal mode, how is maximum rated thrust obtained?", a:"By moving the thrust levers to the full forward position", src:"Engines deck" },
  { id:"engines-026", system:"Engines", q:"What is the difference between \"soft\" and \"hard\" EEC alternate mode?", a:"Soft - EEC automatically switches to alternate mode; Hard - ALTN manually selected on the EEC mode switch", src:"Engines deck" },
  { id:"engines-027", system:"Engines", q:"Are autothrottles connected or disconnected when the EEC is in alternate mode?", a:"Connected - autothrottles remain connected in both soft and hard alternate mode", src:"Engines deck" },
  { id:"engines-028", system:"Engines", q:"In alternate mode, how does thrust compare to normal mode for the same thrust lever position?", a:"Equal or greater", src:"Engines deck" },
  { id:"engines-029", system:"Engines", q:"Is thrust protection available in EEC alternate mode?", a:"No - thrust protection is not provided in alternate mode", src:"Engines deck" },
  { id:"engines-030", system:"Engines", q:"What hazard exists when the thrust levers are at full forward in alternate mode?", a:"Thrust overboost can occur; maximum rated thrust is reached before full forward lever position", src:"Engines deck" },
  { id:"engines-031", system:"Engines", q:"What EICAS message is displayed if the thrust lever commands N1 greater than maximum rated thrust in alternate mode?", a:"ENG LIMIT PROT (L, R) caution", src:"Engines deck" },
  { id:"engines-032", system:"Engines", q:"Is N1/N2 redline protection available in alternate mode?", a:"Yes", src:"Engines deck" },
  { id:"engines-033", system:"Engines", q:"What are the three conditions that must ALL be met for the EEC to automatically shut down an engine?", a:"Airplane is on the ground, AND thrust lever is at idle, AND engine is above idle speed and not decelerating normally", src:"Engines deck" },
  { id:"engines-034", system:"Engines", q:"When is thrust ramping active?", a:"Only on the ground with the EEC in normal mode Thrust Reverser", src:"Engines deck" },
  { id:"engines-035", system:"Engines", q:"What type of actuation does the B787 thrust reverser use?", a:"Hydraulic", src:"Engines deck" },
  { id:"engines-036", system:"Engines", q:"During what phase(s) of flight is the thrust reverser available?", a:"Ground only", src:"Engines deck" },
  { id:"engines-037", system:"Engines", q:"What two things happen when the reverse thrust levers are pulled aft to the interlock position?", a:"Autothrottle disengages and auto speedbrakes deploy", src:"Engines deck" },
  { id:"engines-038", system:"Engines", q:"What do the fan flow blocker doors do during reverser operation?", a:"Rotate into place to direct fan air through stationary cascade guide vanes Fuel Control / Start", src:"Engines deck" },
  { id:"engines-039", system:"Engines", q:"What does moving the FUEL CONTROL switch to RUN do? (three actions)", a:"Opens the spar fuel valve; arms the engine fuel valve (EEC opens when required); arms the selected igniters (EEC turns on when required)", src:"Engines deck" },
  { id:"engines-040", system:"Engines", q:"What does moving the FUEL CONTROL switch to CUTOFF do? (three actions)", a:"Closes the engine fuel valve (and spar fuel valve if START selector not in START); removes igniter power; unlocks the engine fire switch", src:"Engines deck" },
  { id:"engines-041", system:"Engines", q:"Can B787 engines be started manually (non-autostart)?", a:"No - engines can only be started using the autostart system", src:"Engines deck" },
  { id:"engines-042", system:"Engines", q:"What two power sources can provide starter power?", a:"APU and forward external power", src:"Engines deck" },
  { id:"engines-043", system:"Engines", q:"What conditions are required to perform a simultaneous engine start?", a:"APU must be running and both APU starter/generators must be operational", src:"Engines deck" },
  { id:"engines-044", system:"Engines", q:"What happens if both engines are commanded to start with an inadequate power configuration?", a:"The second start command is ignored", src:"Engines deck" },
  { id:"engines-045", system:"Engines", q:"Does load shed occur during engine start?", a:"Yes - load shed always occurs during engine start", src:"Engines deck" },
  { id:"engines-046", system:"Engines", q:"Name the items that are load-shed during engine start.", a:"AIR, CABIN LOADS, COMM/NAV, EXT LIGHTS, FUEL, MISC HEATERS, WINDOW HEAT", src:"Engines deck" },
  { id:"engines-047", system:"Engines", q:"What commands starter cutout during an engine start?", a:"The EEC, when the engine reaches idle speed; the START selector then releases to NORM", src:"Engines deck" },
  { id:"engines-048", system:"Engines", q:"In the fuel system flow path, what component preheats the fuel?", a:"The fuel/oil heat exchanger (between first and second stage fuel pumps)", src:"Engines deck" },
  { id:"engines-049", system:"Engines", q:"What is the function of the Fuel Metering Unit (FMU)?", a:"Adjusts fuel flow to meet thrust requirements", src:"Engines deck" },
  { id:"engines-050", system:"Engines", q:"Where is fuel flow measured in the engine fuel system?", a:"After passing through the engine fuel valve Engine Failure / TAP", src:"Engines deck" },
  { id:"engines-051", system:"Engines", q:"On takeoff, between what speeds does a red ENG FAIL appear on the PFDs and HUDs?", a:"Between 65 knots and 6 knots prior to V1 (when actual thrust is less than commanded thrust)", src:"Engines deck" },
  { id:"engines-052", system:"Engines", q:"What accompanies the red ENG FAIL on the PFD/HUD?", a:"Master WARNING lights and voice annunciation \"Engine Fail\"", src:"Engines deck" },
  { id:"engines-053", system:"Engines", q:"What does the EICAS caution ENG FAIL indicate in flight?", a:"An engine has unexpectedly decelerated to less than idle speed", src:"Engines deck" },
  { id:"engines-054", system:"Engines", q:"What must happen for the EICAS caution ENG FAIL to clear?", a:"Engine recovers to above idle speed, or the FUEL CONTROL switch is moved to CUTOFF", src:"Engines deck" },
  { id:"engines-055", system:"Engines", q:"What is Thrust Asymmetry Protection (TAP)?", a:"An automatic system that limits thrust on the higher thrust engine during takeoff or go-around; for engine-out, reduces operating engine thrust to ensure sufficient rudder authority", src:"Engines deck" },
  { id:"engines-056", system:"Engines", q:"What two conditions are required for TAP to be available?", a:"Flight controls in Normal mode AND EEC in normal or alternate mode Transient Bleed System", src:"Engines deck" },
  { id:"engines-057", system:"Engines", q:"What is the purpose of the Transient Bleed System?", a:"To unload the compressor during engine acceleration", src:"Engines deck" },
  { id:"engines-058", system:"Engines", q:"What controls the TBV and based on what signal?", a:"The EEC, based on N2 rotor speed", src:"Engines deck" },
  { id:"engines-059", system:"Engines", q:"When does the EEC command the TBV to open?", a:"During above idle acceleration", src:"Engines deck" },
  { id:"engines-060", system:"Engines", q:"If the TBV fails open before reverser deployment, what is the result?", a:"The associated thrust reverser becomes inhibited", src:"Engines deck" },
  { id:"engines-061", system:"Engines", q:"If the TBV fails open and the reverser is already deployed, what is the result?", a:"Thrust reverser deployment is limited to idle (to protect structural integrity from hot gases) EEC Idle Selection", src:"Engines deck" },
  { id:"engines-062", system:"Engines", q:"What are the three EEC idle modes?", a:"Minimum idle, approach idle, and icing idle", src:"Engines deck" },
  { id:"engines-063", system:"Engines", q:"When does the EEC select approach idle?", a:"When flaps are commanded to 25 or greater, or landing gear is selected DOWN", src:"Engines deck" },
  { id:"engines-064", system:"Engines", q:"What is the benefit of approach idle?", a:"Decreases acceleration time for go-around", src:"Engines deck" },
  { id:"engines-065", system:"Engines", q:"When does the EEC transition from approach idle back to minimum idle?", a:"After touchdown", src:"Engines deck" },
  { id:"engines-066", system:"Engines", q:"When does the EEC select icing idle?", a:"When engine anti-ice is on Ice Crystal Anti-Ice (ICA)", src:"Engines deck" },
  { id:"engines-067", system:"Engines", q:"Is the ICA function automatic or pilot-initiated?", a:"Automatic", src:"Engines deck" },
  { id:"engines-068", system:"Engines", q:"At what altitude does the ICA function activate?", a:"Only above 30,000 ft", src:"Engines deck" },
  { id:"engines-069", system:"Engines", q:"How long does the ICA function remain active at minimum, and in what increments can it continue?", a:"At least 30 minutes; may continue in 15-minute increments", src:"Engines deck" },
  { id:"engines-070", system:"Engines", q:"At what altitude does descent terminate the ICA function?", a:"Below 28,500 ft", src:"Engines deck" },
  { id:"engines-071", system:"Engines", q:"How is ICA activation indicated in the cockpit?", a:"\"ICA\" shown in green on the N1 display (one or both engines)", src:"Engines deck" },
  { id:"engines-072", system:"Engines", q:"Does ICA activating on one engine mean the other engine also activates ICA?", a:"No - each engine's ICA function is independent; the indication may appear on one, both, or neither", src:"Engines deck" },
  { id:"engines-073", system:"Engines", q:"Does an ICA indication confirm the engine is currently in ICI conditions?", a:"No - an ICA indication does not mean the engine is currently encountering ICI conditions", src:"Engines deck" },
  { id:"engines-074", system:"Engines", q:"After an engine change or EEC change, how long might ICA show in cruise?", a:"75 minutes or more, in any weather conditions Engine Oil", src:"Engines deck" },
  { id:"engines-075", system:"Engines", q:"What is the minimum oil quantity limit for the B787 engine?", a:"There is no minimum oil quantity limit (no amber or red line limit)", src:"Engines deck" },
  { id:"engines-076", system:"Engines", q:"What are the crew procedures when low oil quantity is displayed?", a:"There are no flight crew procedures based solely on a response to low oil quantity", src:"Engines deck" },
  { id:"engines-077", system:"Engines", q:"How is low oil quantity displayed on the secondary engine display?", a:"Automatic display of secondary engine indications; oil quantity shown as black numbers on a white background", src:"Engines deck" },
  { id:"fire-protection-001", system:"Fire Protection", q:"Which zones on the B787 have BOTH fire detection AND fire extinguishing systems?", a:"APU, cargo compartments, engines, and lavatories.", src:"Fire Protection deck" },
  { id:"fire-protection-002", system:"Fire Protection", q:"Which zones have fire detection but NO fire extinguishing?", a:"Main gear wheel wells, overhead flight crew rest compartment, and overhead flight attendant rest compartment.", src:"Fire Protection deck" },
  { id:"fire-protection-003", system:"Fire Protection", q:"Does the nose wheel well have fire or overheat detection?", a:"No. The nose wheel well has no fire or overheat detection system.", src:"Fire Protection deck" },
  { id:"fire-protection-004", system:"Fire Protection", q:"Besides fire detection, what additional detection do the engines have that other zones do not?", a:"Overheat detection.", src:"Fire Protection deck" },
  { id:"fire-protection-005", system:"Fire Protection", q:"What does the FIRE/OVHT TEST switch do when pushed and held?", a:"Sends fire/overheat test signals to the engine, APU, wheel well, and cargo compartment fire detector systems, and tests flight deck fire and overheat indications.", src:"Fire Protection deck" },
  { id:"fire-protection-006", system:"Fire Protection", q:"What EICAS message indicates the engine fire detection system has failed?", a:"DET FIRE ENG (L or R) -- advisory.", src:"Fire Protection deck" },
  { id:"fire-protection-007", system:"Fire Protection", q:"What EICAS message indicates the APU fire detection system has failed?", a:"DET FIRE APU -- advisory.", src:"Fire Protection deck" },
  { id:"fire-protection-008", system:"Fire Protection", q:"What EICAS message indicates cargo smoke detection is inoperative?", a:"DET FIRE CARGO (FWD or AFT) -- advisory.", src:"Fire Protection deck" },
  { id:"fire-protection-009", system:"Fire Protection", q:"What happens if a fault is detected in one channel of the engine fire detection system?", a:"The system automatically reconfigures for single channel operation; the remaining channel continues to provide fire and overheat detection.", src:"Fire Protection deck" },
  { id:"fire-protection-010", system:"Fire Protection", q:"How many detector channels are in each engine nacelle, and what does each channel detect?", a:"Multiple dual-channel detector assemblies; each channel provides both fire and overheat detection.", src:"Fire Protection deck" },
  { id:"fire-protection-011", system:"Fire Protection", q:"Under normal conditions, what is required to trigger an engine fire warning or overheat caution?", a:"At least one element on each channel must detect the fire or overheat condition.", src:"Fire Protection deck" },
  { id:"fire-protection-012", system:"Fire Protection", q:"What are the indications of an engine overheat?", a:"Caution beeper sounds; master CAUTION lights illuminate; EICAS caution message OVERHEAT ENG (L or R) displayed.", src:"Fire Protection deck" },
  { id:"fire-protection-013", system:"Fire Protection", q:"What are the indications of an engine fire warning?", a:"Fire bell sounds; master WARNING lights illuminate; EICAS warning message FIRE ENG (L or R) displayed; engine fire switch warning light illuminates; engine fire switch unlocks; engine FUEL CONTROL switch warning light illuminates.", src:"Fire Protection deck" },
  { id:"fire-protection-014", system:"Fire Protection", q:"Under what two conditions does the engine fire switch automatically unlock?", a:"Automatically on a fire warning, or when the FUEL CONTROL switch is placed to CUTOFF.", src:"Fire Protection deck" },
  { id:"fire-protection-015", system:"Fire Protection", q:"When the engine fire switch is pulled out, what seven actions occur?", a:"(1) Arms both engine fire extinguishers; (2) closes engine and spar fuel valves; (3) closes engine anti-ice valves; (4) trips engine generators off; (5) shuts off hydraulic fluid to engine-driven pump; (6) depressurizes engine-driven hydraulic pump; (7) removes power to thrust reverser isolation valve.", src:"Fire Protection deck" },
  { id:"fire-protection-016", system:"Fire Protection", q:"When the engine fire switch is pulled out, what happens to the fuel system?", a:"Closes the associated engine AND spar fuel valves.", src:"Fire Protection deck" },
  { id:"fire-protection-017", system:"Fire Protection", q:"When the engine fire switch is pulled out, what happens to the generators?", a:"Trips the associated engine generators off.", src:"Fire Protection deck" },
  { id:"fire-protection-018", system:"Fire Protection", q:"When the engine fire switch is pulled out, what happens to the hydraulic system?", a:"Shuts off hydraulic fluid to and depressurizes the associated engine-driven hydraulic pump.", src:"Fire Protection deck" },
  { id:"fire-protection-019", system:"Fire Protection", q:"When the engine fire switch is pulled out, what happens to the thrust reverser?", a:"Removes power to the thrust reverser isolation valve.", src:"Fire Protection deck" },
  { id:"fire-protection-020", system:"Fire Protection", q:"When the engine fire switch is pulled out, what happens to the fire extinguishers?", a:"Arms both engine fire extinguishers.", src:"Fire Protection deck" },
  { id:"fire-protection-021", system:"Fire Protection", q:"How many engine fire extinguisher bottles are there, and how are they discharged?", a:"Two bottles (cross-connected to both engines). The engine fire switch is rotated to position 1 or 2 to discharge the selected bottle.", src:"Fire Protection deck" },
  { id:"fire-protection-022", system:"Fire Protection", q:"What does an amber ENG BTL DISCH light indicate?", a:"The extinguisher bottle is discharged or has low pressure.", src:"Fire Protection deck" },
  { id:"fire-protection-023", system:"Fire Protection", q:"How many fire detector loops does the APU compartment have?", a:"Two (dual loops).", src:"Fire Protection deck" },
  { id:"fire-protection-024", system:"Fire Protection", q:"Does the APU have overheat detection?", a:"No. There is no APU overheat detection.", src:"Fire Protection deck" },
  { id:"fire-protection-025", system:"Fire Protection", q:"Under normal conditions, how many APU detector loops must detect a fire to produce a fire warning?", a:"Both loops must detect a fire.", src:"Fire Protection deck" },
  { id:"fire-protection-026", system:"Fire Protection", q:"Under what condition is a single APU detector loop sufficient to cause APU shutdown and bottle discharge?", a:"On the ground with both engines off -- a signal from either loop is sufficient.", src:"Fire Protection deck" },
  { id:"fire-protection-027", system:"Fire Protection", q:"What are the indications of an APU fire warning?", a:"Fire bell sounds; master WARNING lights illuminate; EICAS warning message FIRE APU displayed; APU fire switch warning light illuminates; APU fire switch unlocks.", src:"Fire Protection deck" },
  { id:"fire-protection-028", system:"Fire Protection", q:"What automatic actions occur when an APU fire is detected?", a:"The APU shuts down immediately; the extinguisher bottle automatically discharges after a 15-second delay to allow the fuel valve to close.", src:"Fire Protection deck" },
  { id:"fire-protection-029", system:"Fire Protection", q:"Why is there a 15-second delay before the APU extinguisher bottle auto-discharges?", a:"To allow time for the APU fuel valve to close.", src:"Fire Protection deck" },
  { id:"fire-protection-030", system:"Fire Protection", q:"How many APU fire extinguisher bottles are there?", a:"One.", src:"Fire Protection deck" },
  { id:"fire-protection-031", system:"Fire Protection", q:"What does rotating the APU fire switch do, and in which direction?", a:"Discharges the APU fire extinguisher into the APU compartment; rotation in either direction works.", src:"Fire Protection deck" },
  { id:"fire-protection-032", system:"Fire Protection", q:"What two indications confirm the APU extinguisher bottle has discharged or has low pressure?", a:"APU BTL DISCH light illuminates (amber) and EICAS advisory message BOTTLE DISCH APU is displayed.", src:"Fire Protection deck" },
  { id:"fire-protection-033", system:"Fire Protection", q:"When the APU fire switch is pulled out, what does it do to the APU air inlet?", a:"Closes the APU air inlet door.", src:"Fire Protection deck" },
  { id:"fire-protection-034", system:"Fire Protection", q:"When the APU fire switch is pulled out, what does it do to the APU generator?", a:"Trips the APU generator field and generator breaker.", src:"Fire Protection deck" },
  { id:"fire-protection-035", system:"Fire Protection", q:"Does the main wheel well have a fire extinguishing system?", a:"No. There is fire and overheat detection, but no fire extinguishing system.", src:"Fire Protection deck" },
  { id:"fire-protection-036", system:"Fire Protection", q:"What are the indications of a main wheel well fire?", a:"Fire bell sounds; master WARNING lights illuminate; EICAS warning message FIRE WHEEL WELL displayed.", src:"Fire Protection deck" },
  { id:"fire-protection-037", system:"Fire Protection", q:"What are the indications of a main wheel well overheat?", a:"Caution beeper sounds; master CAUTION lights illuminate; EICAS caution message OVERHEAT WHEEL WELL displayed.", src:"Fire Protection deck" },
  { id:"fire-protection-038", system:"Fire Protection", q:"How many sensors are in each main wheel well, and how many detectors does each sensor have?", a:"Six sensors per well; each sensor has two detectors (A and B).", src:"Fire Protection deck" },
  { id:"fire-protection-039", system:"Fire Protection", q:"At what wheel well temperature do Spoilers 6 and 9 open to provide cooling?", a:"Greater than 140 degrees F.", src:"Fire Protection deck" },
  { id:"fire-protection-040", system:"Fire Protection", q:"What is the Boeing term for the slight opening of Spoilers 6 and 9 for wheel well cooling?", a:"Spoiler gap. The spoiler gap draws cooling air into the wheel well.", src:"Fire Protection deck" },
  { id:"fire-protection-041", system:"Fire Protection", q:"How many smoke detectors are installed in the forward cargo compartment?", a:"18 detectors.", src:"Fire Protection deck" },
  { id:"fire-protection-042", system:"Fire Protection", q:"How many smoke detectors are installed in the aft cargo compartment system, and how are they distributed?", a:"11 total -- 9 in the aft compartment and 2 in the bulk compartment.", src:"Fire Protection deck" },
  { id:"fire-protection-043", system:"Fire Protection", q:"Is the bulk cargo compartment part of the forward or aft cargo fire detection and extinguishing system?", a:"Aft cargo.", src:"Fire Protection deck" },
  { id:"fire-protection-044", system:"Fire Protection", q:"Under normal conditions, how many smoke detectors must activate simultaneously to trigger a cargo fire warning?", a:"Two detectors in the same compartment must detect a fire or overheat condition at the same time.", src:"Fire Protection deck" },
  { id:"fire-protection-045", system:"Fire Protection", q:"If one cargo smoke detector fails, how many remaining detectors are required to trigger a fire warning?", a:"One -- a single detector is sufficient if one has already failed.", src:"Fire Protection deck" },
  { id:"fire-protection-046", system:"Fire Protection", q:"What are the indications of a cargo compartment fire warning?", a:"Fire bell sounds; master WARNING lights illuminate; EICAS warning message FIRE CARGO (FWD or AFT) displayed; CARGO FIRE (FWD or AFT) fire warning light illuminates.", src:"Fire Protection deck" },
  { id:"fire-protection-047", system:"Fire Protection", q:"How many total cargo fire extinguisher bottles are installed?", a:"Six.", src:"Fire Protection deck" },
  { id:"fire-protection-048", system:"Fire Protection", q:"What cargo fire suppression duration is the system designed for in ETOPS operations?", a:"240 minutes.", src:"Fire Protection deck" },
  { id:"fire-protection-049", system:"Fire Protection", q:"In flight, when a cargo fire warning occurs, how many bottles discharge immediately?", a:"Two bottles discharge immediately at full (total) discharge into the affected compartment.", src:"Fire Protection deck" },
  { id:"fire-protection-050", system:"Fire Protection", q:"In flight, after the 15-minute delay following initial cargo fire bottle discharge, what happens?", a:"The remaining four bottles discharge at a reduced flow rate into the affected compartment.", src:"Fire Protection deck" },
  { id:"fire-protection-051", system:"Fire Protection", q:"If the aircraft lands within the 15-minute delay period, what happens to the remaining bottles?", a:"One bottle discharges at the reduced rate on touchdown.", src:"Fire Protection deck" },
  { id:"fire-protection-052", system:"Fire Protection", q:"On the ground, if the CARGO FIRE DISCHARGE switch is pushed, how many bottles discharge and how?", a:"Three bottles discharge simultaneously; the third bottle discharges at a reduced (metered) flow rate.", src:"Fire Protection deck" },
  { id:"fire-protection-053", system:"Fire Protection", q:"What are the two indications when the first two cargo extinguisher bottles begin to discharge?", a:"The CARGO FIRE DISCHARGE switch light illuminates, and EICAS advisory message BOTTLE DISCH CARGO is displayed.", src:"Fire Protection deck" },
  { id:"fire-protection-054", system:"Fire Protection", q:"What does arming the CARGO FIRE ARM switch do to the packs?", a:"Commands the packs to provide the minimum air flow required to provide pressurization.", src:"Fire Protection deck" },
  { id:"fire-protection-055", system:"Fire Protection", q:"When the AFT CARGO FIRE ARM switch is armed, what happens to the bulk cargo ventilation?", a:"The bulk cargo compartment ventilation system is shut down (aft cargo arm only).", src:"Fire Protection deck" },
  { id:"fire-protection-056", system:"Fire Protection", q:"What happens to the NGS when a CARGO FIRE ARM switch is armed?", a:"The Nitrogen Generation System (NGS) is turned off.", src:"Fire Protection deck" },
  { id:"fire-protection-057", system:"Fire Protection", q:"What happens to the outflow valves when a CARGO FIRE ARM switch is armed?", a:"Outflow valves move to a 50/50 flow split for air flow stability.", src:"Fire Protection deck" },
  { id:"fire-protection-058", system:"Fire Protection", q:"What EICAS message indicates smoke in the overhead flight crew rest compartment?", a:"SMOKE REST UPR DR 1 -- caution.", src:"Fire Protection deck" },
  { id:"fire-protection-059", system:"Fire Protection", q:"What EICAS message indicates smoke in the overhead flight attendant rest compartment?", a:"SMOKE REST UPR DR 4 -- caution.", src:"Fire Protection deck" },
  { id:"fire-protection-060", system:"Fire Protection", q:"How many smoke detectors does each lavatory have?", a:"One.", src:"Fire Protection deck" },
  { id:"fire-protection-061", system:"Fire Protection", q:"What are the indications when a lavatory smoke detector activates?", a:"Aural alert sounds in the lavatory and in the cabin; lavatory call light flashes; master call light at the associated attendant station illuminates; EICAS advisory message SMOKE LAVATORY displayed.", src:"Fire Protection deck" },
  { id:"fire-protection-062", system:"Fire Protection", q:"How many fire extinguisher bottles does each lavatory have, and how does it discharge?", a:"One bottle; discharges automatically through two nozzles into the waste container.", src:"Fire Protection deck" },
  { id:"fire-protection-063", system:"Fire Protection", q:"Is there a flight deck indication when a lavatory fire extinguisher discharges?", a:"No. There is no flight deck indication of lavatory extinguisher discharge.", src:"Fire Protection deck" },
  { id:"flight-controls-001", system:"Flight Controls", q:"What is the signal path in Normal mode?", a:"Pilot inputs > ACEs > PFCs > ACEs > Flight Control Surfaces", src:"Flight Controls deck" },
  { id:"flight-controls-002", system:"Flight Controls", q:"What is the signal path in Direct mode?", a:"Pilot inputs > ACEs > Flight Control Surfaces (PFCs bypassed)", src:"Flight Controls deck" },
  { id:"flight-controls-003", system:"Flight Controls", q:"What is the signal path in Secondary mode?", a:"Pilot inputs > ACEs > PFCs (simplified computations) > ACEs > Flight Control Surfaces", src:"Flight Controls deck" },
  { id:"flight-controls-004", system:"Flight Controls", q:"What EICAS message indicates Secondary mode is active?", a:"FLIGHT CONTROL MODE (advisory)", src:"Flight Controls deck" },
  { id:"flight-controls-005", system:"Flight Controls", q:"What EICAS message indicates Direct mode is active?", a:"PRI FLIGHT COMPUTERS (advisory)", src:"Flight Controls deck" },
  { id:"flight-controls-006", system:"Flight Controls", q:"Can Secondary mode be manually selected?", a:"No. It cannot be manually selected; it is automatic only.", src:"Flight Controls deck" },
  { id:"flight-controls-007", system:"Flight Controls", q:"Can Direct mode be manually selected?", a:"Yes. Move the Primary Flight Computers switch to DISC (normal position is AUTO).", src:"Flight Controls deck" },
  { id:"flight-controls-008", system:"Flight Controls", q:"What two conditions automatically trigger Secondary mode?", a:"Loss of all slat and flap position data, OR inertial/air data insufficient for Normal mode.", src:"Flight Controls deck" },
  { id:"flight-controls-009", system:"Flight Controls", q:"What triggers automatic reversion to Direct mode?", a:"All 3 PFCs fail (or are switched off manually).", src:"Flight Controls deck" },
  { id:"flight-controls-010", system:"Flight Controls", q:"What does the mnemonic AARTS GOD stand for?", a:"Autopilot, Auto speedbrakes, Roll/yaw asymmetry compensation, Tail strike protection, Stall protection, Gust suppression, Overspeed protection, Degraded yaw damper. These are the functions lost in Secondary and Direct modes.", src:"Flight Controls deck" },
  { id:"flight-controls-011", system:"Flight Controls", q:"How does aircraft handling compare between Secondary and Direct modes?", a:"Aircraft handles similarly; the same AARTS GOD functions are lost in both. Flight Control Surfaces", src:"Flight Controls deck" },
  { id:"flight-controls-012", system:"Flight Controls", q:"How many spoilers does the B787 have total, and how are they numbered?", a:"14 spoilers (7 per side), numbered 1 through 14.", src:"Flight Controls deck" },
  { id:"flight-controls-013", system:"Flight Controls", q:"How many flap panels are there per wing, and how are they arranged?", a:"2 per wing (one inboard, one outboard).", src:"Flight Controls deck" },
  { id:"flight-controls-014", system:"Flight Controls", q:"How many slats are there per wing, and how are they arranged?", a:"6 per wing (one inboard, five outboard).", src:"Flight Controls deck" },
  { id:"flight-controls-015", system:"Flight Controls", q:"What is the purpose of the Krueger flap?", a:"Provides a seal between the inboard slat and the engine nacelle. One per side, two-position.", src:"Flight Controls deck" },
  { id:"flight-controls-016", system:"Flight Controls", q:"What powers the elevator?", a:"Hydraulic power.", src:"Flight Controls deck" },
  { id:"flight-controls-017", system:"Flight Controls", q:"What powers the stabilizer?", a:"Electrical power.", src:"Flight Controls deck" },
  { id:"flight-controls-018", system:"Flight Controls", q:"What hydraulic systems power the rudder?", a:"All three hydraulic systems (and the RAT when deployed).", src:"Flight Controls deck" },
  { id:"flight-controls-019", system:"Flight Controls", q:"When are ailerons locked out?", a:"At high speeds.", src:"Flight Controls deck" },
  { id:"flight-controls-020", system:"Flight Controls", q:"Is there an aileron trim on the B787?", a:"No. Roll trim is built into the flight control laws; there is no separate aileron trim. FCS Lock", src:"Flight Controls deck" },
  { id:"flight-controls-021", system:"Flight Controls", q:"What EICAS message appears when the flight control surfaces lock is engaged?", a:"FLT CONTROL LOCKED (advisory)", src:"Flight Controls deck" },
  { id:"flight-controls-022", system:"Flight Controls", q:"At what groundspeed do flight control surfaces automatically unlock?", a:"Groundspeed greater than 40 knots.", src:"Flight Controls deck" },
  { id:"flight-controls-023", system:"Flight Controls", q:"What does the FAIL light on the FCS lock panel indicate?", a:"The surfaces failed to lock.", src:"Flight Controls deck" },
  { id:"flight-controls-024", system:"Flight Controls", q:"What should you always do before moving the FCS lock switch from LOCK to NORM?", a:"Check with Mx (maintenance) staff. Pitch Control and Trim", src:"Flight Controls deck" },
  { id:"flight-controls-025", system:"Flight Controls", q:"What does pitch trim do in Normal mode in flight?", a:"It changes the Trim Reference Speed. It does NOT directly move the stabilizer.", src:"Flight Controls deck" },
  { id:"flight-controls-026", system:"Flight Controls", q:"What is the Trim Reference Speed?", a:"The airspeed at which the aircraft is stable with no control column inputs.", src:"Flight Controls deck" },
  { id:"flight-controls-027", system:"Flight Controls", q:"In what modes does pitch trim directly move the stabilizer?", a:"Secondary mode, Direct mode, and on the ground.", src:"Flight Controls deck" },
  { id:"flight-controls-028", system:"Flight Controls", q:"Does trim move the control column?", a:"No. Trim never moves the column.", src:"Flight Controls deck" },
  { id:"flight-controls-029", system:"Flight Controls", q:"Is pitch trim available with the autopilot engaged?", a:"No. Trim is inhibited with autopilot engaged.", src:"Flight Controls deck" },
  { id:"flight-controls-030", system:"Flight Controls", q:"How do the alternate pitch trim switches differ from the primary trim switches?", a:"Alternate trim switches have a direct electrical connection to the stabilizer for backup, but otherwise work exactly like the primary trim switches.", src:"Flight Controls deck" },
  { id:"flight-controls-031", system:"Flight Controls", q:"What buses power the stabilizer control units when STAB switches are in NORM?", a:"235 Vac buses L2 and R2.", src:"Flight Controls deck" },
  { id:"flight-controls-032", system:"Flight Controls", q:"If the stabilizer shuts down or fails in Normal mode, is pitch trim still available?", a:"Yes. Pitch trim is still available through the elevators.", src:"Flight Controls deck" },
  { id:"flight-controls-033", system:"Flight Controls", q:"What is the default takeoff trim green band range before FMC data is entered?", a:"4 to 9 units of trim.", src:"Flight Controls deck" },
  { id:"flight-controls-034", system:"Flight Controls", q:"What is the stabilizer memory item?", a:"<b>STAB cutout switches (both) - CUTOUT.</b> <b>Do not exceed the current airspeed.</b>", src:"Flight Controls deck" },
  { id:"flight-controls-035", system:"Flight Controls", q:"For turns up to how many degrees of bank is no aft column pressure needed to maintain altitude?", a:"Up to 30 degrees of bank. Rudder Trim", src:"Flight Controls deck" },
  { id:"flight-controls-036", system:"Flight Controls", q:"In which flight control modes is rudder trim available?", a:"All 3 modes (Normal, Secondary, Direct).", src:"Flight Controls deck" },
  { id:"flight-controls-037", system:"Flight Controls", q:"What triggers automatic rudder trim zeroing on takeoff?", a:"Groundspeed exceeds 30 knots.", src:"Flight Controls deck" },
  { id:"flight-controls-038", system:"Flight Controls", q:"When is rudder trim inhibited?", a:"With LAND 3 engaged.", src:"Flight Controls deck" },
  { id:"flight-controls-039", system:"Flight Controls", q:"How long is rudder trim shown on EICAS/synoptic after takeoff?", a:"Until gear up + 10 seconds OR liftoff + 60 seconds.", src:"Flight Controls deck" },
  { id:"flight-controls-040", system:"Flight Controls", q:"Describe the rudder trim rate behavior.", a:"Low trim rate initially, then high rate when the selector is rotated past the detent. Speedbrake and Spoiler Operation", src:"Flight Controls deck" },
  { id:"flight-controls-041", system:"Flight Controls", q:"With speedbrake ARMED, when do spoilers extend on landing?", a:"When gear trucks untilt AND thrust levers are not in the takeoff range.", src:"Flight Controls deck" },
  { id:"flight-controls-042", system:"Flight Controls", q:"With speedbrake DOWN, when do spoilers extend?", a:"If thrust levers are moved to idle on takeoff above 85 knots, or whenever reverse idle is selected.", src:"Flight Controls deck" },
  { id:"flight-controls-043", system:"Flight Controls", q:"What automatically causes the speedbrake to retract in flight?", a:"Thrust levers moved forward of 70% full travel.", src:"Flight Controls deck" },
  { id:"flight-controls-044", system:"Flight Controls", q:"What powers the spoilers, and are any electrically powered?", a:"Hydraulic power; except two pairs which are electrical.", src:"Flight Controls deck" },
  { id:"flight-controls-045", system:"Flight Controls", q:"Why do spoilers move slightly during engine start and taxi?", a:"To prevent contact with moving flaps. Flaps and Slats", src:"Flight Controls deck" },
  { id:"flight-controls-046", system:"Flight Controls", q:"Above what speed and altitude is flap/slat extension inhibited?", a:"Above 260 KIAS or 20,000 feet (primary and secondary mode only).", src:"Flight Controls deck" },
  { id:"flight-controls-047", system:"Flight Controls", q:"Moving the flap lever to position 1 - what moves?", a:"Slats move to the middle position; flaps do not move.", src:"Flight Controls deck" },
  { id:"flight-controls-048", system:"Flight Controls", q:"Moving the flap lever to position 25 - what moves?", a:"Slats move to the fully extended position; flaps do not move.", src:"Flight Controls deck" },
  { id:"flight-controls-049", system:"Flight Controls", q:"What hydraulic requirement must be met before flaps move on the ground?", a:"All 3 hydraulic systems must be pressurized.", src:"Flight Controls deck" },
  { id:"flight-controls-050", system:"Flight Controls", q:"What gates are present on the flap lever and what do they prevent?", a:"Gate at flap 20 prevents inadvertent retraction past 20 on a go-around; gate at flap 1 prevents retraction past 1 (slats mid position).", src:"Flight Controls deck" },
  { id:"flight-controls-051", system:"Flight Controls", q:"What is autogap and when is it available?", a:"At high AOA with slats in the middle position, slats fully extend to increase lift and margin to stall. Available in Normal mode only, slats in middle position, speed below 240 knots.", src:"Flight Controls deck" },
  { id:"flight-controls-052", system:"Flight Controls", q:"What replaces autogap in Secondary mode, and why?", a:"Pregap replaces autogap because the system is too slow for autogap in secondary mode.", src:"Flight Controls deck" },
  { id:"flight-controls-053", system:"Flight Controls", q:"When does pregap keep slats fully extended?", a:"When the flap lever is not UP and speed is less than 240 knots.", src:"Flight Controls deck" },
  { id:"flight-controls-054", system:"Flight Controls", q:"What flap positions does flap load relief cover?", a:"Flap positions 15 through 30.", src:"Flight Controls deck" },
  { id:"flight-controls-055", system:"Flight Controls", q:"What is the minimum flap position flap load relief will retract to?", a:"Flap 5 (never less than flap 5).", src:"Flight Controls deck" },
  { id:"flight-controls-056", system:"Flight Controls", q:"In what mode is flap load relief available?", a:"Primary (Normal) mode only.", src:"Flight Controls deck" },
  { id:"flight-controls-057", system:"Flight Controls", q:"What is slat load relief and what triggers it?", a:"Part of slat pregap functionality; retracts fully extended slats to middle position when airspeed exceeds 240 KIAS.", src:"Flight Controls deck" },
  { id:"flight-controls-058", system:"Flight Controls", q:"In what mode is slat load relief available?", a:"Slat secondary mode only.", src:"Flight Controls deck" },
  { id:"flight-controls-059", system:"Flight Controls", q:"What happens to slats after slat load relief when speed decreases below 240 KIAS?", a:"For all lever positions except UP, slats are driven back to the extended position. Protections and Automatic Functions", src:"Flight Controls deck" },
  { id:"flight-controls-060", system:"Flight Controls", q:"In what mode are flight envelope protections available?", a:"Normal mode only.", src:"Flight Controls deck" },
  { id:"flight-controls-061", system:"Flight Controls", q:"When is tail strike protection active?", a:"During takeoff and landing.", src:"Flight Controls deck" },
  { id:"flight-controls-062", system:"Flight Controls", q:"How does tail strike protection work and can the pilot override it?", a:"PFCs decrease elevator deflection to avoid tail contact; no feedback in the control column; pilot can override with continued pitch input.", src:"Flight Controls deck" },
  { id:"flight-controls-063", system:"Flight Controls", q:"What crew action is required for HLFC failures?", a:"None. There are no crew procedures and no alert messages for HLFC failures.", src:"Flight Controls deck" },
  { id:"flight-controls-064", system:"Flight Controls", q:"In what mode is asymmetry compensation available?", a:"Normal mode only.", src:"Flight Controls deck" },
  { id:"flight-controls-065", system:"Flight Controls", q:"During an engine failure above 60 knots groundspeed, what does asymmetry compensation do and do the pedals move?", a:"Most (but not all) yaw is countered; in this situation the pedals DO move.", src:"Flight Controls deck" },
  { id:"flight-controls-066", system:"Flight Controls", q:"During normal takeoff and landing with a crosswind, do the rudder pedals move due to asymmetry compensation?", a:"No. Pedals do not move; the pilot assists in maintaining directional control.", src:"Flight Controls deck" },
  { id:"flight-controls-067", system:"Flight Controls", q:"What two EICAS messages are associated with large or severe yaw asymmetry?", a:"ROLL/YAW ASYMMETRY (large asymmetry); ROLL LEFT/RIGHT AUTHORITY (severe case with limited roll control).", src:"Flight Controls deck" },
  { id:"flight-controls-068", system:"Flight Controls", q:"What does gust suppression do and in what mode is it available?", a:"Enhances passenger comfort in gusts/turbulence; Normal mode only; does not move pilot controls.", src:"Flight Controls deck" },
  { id:"flight-controls-069", system:"Flight Controls", q:"What autopilot modes are required for vertical gust suppression?", a:"Altitude hold or VNAV level modes.", src:"Flight Controls deck" },
  { id:"flight-controls-070", system:"Flight Controls", q:"What is autodrag and what control surfaces does it use?", a:"Assists in glideslope/glidepath capture when on or above the vertical path; deflects ailerons upward and raises the two most outboard spoilers.", src:"Flight Controls deck" },
  { id:"flight-controls-071", system:"Flight Controls", q:"When is autodrag active and when is it removed?", a:"Normal mode, landing configuration (Flaps 25 or 30, thrust idle); gradually removed below 500 feet AGL.", src:"Flight Controls deck" },
  { id:"flight-controls-072", system:"Flight Controls", q:"What is the Landing Attitude Modifier (LAM)?", a:"Automatic function that increases pitch and nose gear height when landing flaps are selected at higher speeds, by partially raising lateral control surfaces to reduce lift.", src:"Flight Controls deck" },
  { id:"flight-controls-073", system:"Flight Controls", q:"Are there any EICAS messages or crew procedures associated with LAM?", a:"No. No associated crew procedures or alert messages.", src:"Flight Controls deck" },
  { id:"flight-controls-074", system:"Flight Controls", q:"What are the operating parameters for cruise flaps?", a:"Normal mode only, above 25,000 feet, between 0.54 and 0.87 Mach.", src:"Flight Controls deck" },
  { id:"flight-controls-075", system:"Flight Controls", q:"What EICAS message indicates a cruise flaps system failure?", a:"CRUISE FLAPS SYS", src:"Flight Controls deck" },
  { id:"flight-controls-076", system:"Flight Controls", q:"What is the consequence of a cruise flaps failure in an increased drag condition?", a:"May decrease range. Degraded/Failure Scenarios", src:"Flight Controls deck" },
  { id:"flight-controls-077", system:"Flight Controls", q:"With total hydraulic power loss, what flight controls remain available?", a:"The electrically actuated stabilizer and two electric spoiler pairs.", src:"Flight Controls deck" },
  { id:"flight-controls-078", system:"Flight Controls", q:"With complete loss of flight control signaling, what remains for control?", a:"Direct wiring to the stabilizer and a spoiler pair. Use alternate pitch trim for pitch; control wheel for roll.", src:"Flight Controls deck" },
  { id:"flight-controls-079", system:"Flight Controls", q:"What is the wheel-to-rudder cross-tie, and when is it available?", a:"A function that reduces maximum sideslip and vertical fin loads; available only in Secondary and Direct modes.", src:"Flight Controls deck" },
  { id:"flight-instruments-001", system:"Flight Instruments", q:"How far ahead does the Speed Trend Vector predict airspeed?", a:"10 seconds, based on current acceleration or deceleration.", src:"Flight Instruments deck" },
  { id:"flight-instruments-002", system:"Flight Instruments", q:"What is the height (in knots) of the Selected Speed Bug on the airspeed tape?", a:"5 knots.", src:"Flight Instruments deck" },
  { id:"flight-instruments-003", system:"Flight Instruments", q:"What does the Selected Speed Bug point to when the MCP IAS/MACH window is blank?", a:"FMC computed airspeed.", src:"Flight Instruments deck" },
  { id:"flight-instruments-004", system:"Flight Instruments", q:"What happens to the Selected Speed Bug when selected speed is off scale?", a:"The bug is parked at the top or bottom of the tape with only one half the bug visible.", src:"Flight Instruments deck" },
  { id:"flight-instruments-005", system:"Flight Instruments", q:"What color does the current airspeed box turn when airspeed is below minimum maneuvering speed?", a:"Amber.", src:"Flight Instruments deck" },
  { id:"flight-instruments-006", system:"Flight Instruments", q:"What three limiting values determine the Maximum Speed (red/black bar) on the airspeed tape?", a:"The lowest of: VMO/MMO, landing gear placard speed, or flap placard speed.", src:"Flight Instruments deck" },
  { id:"flight-instruments-007", system:"Flight Instruments", q:"At what bank angle in level flight does 1.3 g maneuver capability occur?", a:"40 degrees of bank in level flight.", src:"Flight Instruments deck" },
  { id:"flight-instruments-008", system:"Flight Instruments", q:"VR is displayed as just \"R\" on the airspeed tape under what condition?", a:"When VR is within 4 knots of V1 or V2.", src:"Flight Instruments deck" },
  { id:"flight-instruments-009", system:"Flight Instruments", q:"When are V1 and VR removed from the PFD airspeed tape?", a:"At lift-off.", src:"Flight Instruments deck" },
  { id:"flight-instruments-010", system:"Flight Instruments", q:"What are the three conditions that cause V2 to be removed from the airspeed tape?", a:"(1) When flap retraction begins; (2) after 10 minutes have passed without flap lever movement; (3) after VREF has been selected for a turn-back.", src:"Flight Instruments deck" },
  { id:"flight-instruments-011", system:"Flight Instruments", q:"What is displayed on the airspeed tape if V speeds are not entered on the CDU?", a:"NO VSPD.", src:"Flight Instruments deck" },
  { id:"flight-instruments-012", system:"Flight Instruments", q:"At approximately what altitude are flap maneuvering speeds no longer displayed on the PFD?", a:"Above approximately 20,000 ft.", src:"Flight Instruments deck" },
  { id:"flight-instruments-013", system:"Flight Instruments", q:"When does the minimum maneuvering speed (top of amber bar) first appear on the airspeed tape?", a:"With the first flap retraction after takeoff.", src:"Flight Instruments deck" },
  { id:"flight-instruments-014", system:"Flight Instruments", q:"What is the minimum speed indicator (bottom of the amber band)?", a:"The airspeed where stick shaker activates. PFD - Attitude", src:"Flight Instruments deck" },
  { id:"flight-instruments-015", system:"Flight Instruments", q:"At what bank angle does the bank pointer fill and turn amber?", a:"35 degrees or more.", src:"Flight Instruments deck" },
  { id:"flight-instruments-016", system:"Flight Instruments", q:"What is the maximum positive value to which the Pitch Limit Indication is limited?", a:"+30 degrees.", src:"Flight Instruments deck" },
  { id:"flight-instruments-017", system:"Flight Instruments", q:"In what increments is the pitch scale marked on the PFD attitude display?", a:"2.5 degree increments.", src:"Flight Instruments deck" },
  { id:"flight-instruments-018", system:"Flight Instruments", q:"What are the bank scale mark values on the PFD?", a:"0, 10, 20, 30, 45, and 60 degrees.", src:"Flight Instruments deck" },
  { id:"flight-instruments-019", system:"Flight Instruments", q:"Under what conditions is the Pitch Limit Indication displayed?", a:"When flaps are not up, or at slow speeds with flaps up.", src:"Flight Instruments deck" },
  { id:"flight-instruments-020", system:"Flight Instruments", q:"What color does the slip/skid indication turn when bank angle reaches 35 degrees?", a:"Amber. PFD - Steering / FPV", src:"Flight Instruments deck" },
  { id:"flight-instruments-021", system:"Flight Instruments", q:"What two conditions cause the Flight Path Vector (FPV) to display on the PFD?", a:"FPV selected on the EFIS control panel, or FPA selected on the MCP.", src:"Flight Instruments deck" },
  { id:"flight-instruments-022", system:"Flight Instruments", q:"What are the bank and pitch angle limits for the Horizon Line Heading Scale to display?", a:"Bank angle less than 50 degrees AND absolute pitch angle less than 20 degrees. PFD - Radio Altitude / Rising Runway", src:"Flight Instruments deck" },
  { id:"flight-instruments-023", system:"Flight Instruments", q:"Below what altitude does the Radio Altitude display appear on the PFD?", a:"Below 2,500 ft AGL.", src:"Flight Instruments deck" },
  { id:"flight-instruments-024", system:"Flight Instruments", q:"For how long is the Radio Altitude display box highlighted white when passing below 2,500 ft?", a:"10 seconds.", src:"Flight Instruments deck" },
  { id:"flight-instruments-025", system:"Flight Instruments", q:"What color does the Radio Altitude display turn when below radio altitude minimums?", a:"Amber.", src:"Flight Instruments deck" },
  { id:"flight-instruments-026", system:"Flight Instruments", q:"When does the Rising Runway symbol move toward the airplane symbol?", a:"Below 200 ft radio altitude.", src:"Flight Instruments deck" },
  { id:"flight-instruments-027", system:"Flight Instruments", q:"When does the stem of the Rising Runway symbol flash?", a:"When localizer deviations cause the diamond to flash. PFD - Altitude", src:"Flight Instruments deck" },
  { id:"flight-instruments-028", system:"Flight Instruments", q:"How far ahead does the Altitude Trend Vector predict altitude?", a:"6 seconds, based on current vertical speed.", src:"Flight Instruments deck" },
  { id:"flight-instruments-029", system:"Flight Instruments", q:"In what increments does the altitude display in meters when MTRS is selected?", a:"10 meter increments.", src:"Flight Instruments deck" },
  { id:"flight-instruments-030", system:"Flight Instruments", q:"At what range from selected altitude does the current altitude box turn white?", a:"Between 900 ft and 200 ft prior to reaching the selected altitude.", src:"Flight Instruments deck" },
  { id:"flight-instruments-031", system:"Flight Instruments", q:"When does the current altitude box turn amber?", a:"When deviating beyond 200 ft from selected altitude.", src:"Flight Instruments deck" },
  { id:"flight-instruments-032", system:"Flight Instruments", q:"What happens to the amber altitude box highlight if the deviation continues beyond 900 ft?", a:"The amber highlight is removed. PFD - Landing Altitude / Minimums", src:"Flight Instruments deck" },
  { id:"flight-instruments-033", system:"Flight Instruments", q:"What does the white portion of the Landing Altitude Reference Bar indicate?", a:"500 to 1,000 ft above landing altitude.", src:"Flight Instruments deck" },
  { id:"flight-instruments-034", system:"Flight Instruments", q:"What does the amber portion of the Landing Altitude Reference Bar indicate?", a:"0 to 500 ft above landing altitude (height above touchdown).", src:"Flight Instruments deck" },
  { id:"flight-instruments-035", system:"Flight Instruments", q:"How long does the Minimums annunciation flash when the airplane descends below selected minimums?", a:"3 seconds.", src:"Flight Instruments deck" },
  { id:"flight-instruments-036", system:"Flight Instruments", q:"How long does the departure runway/airport landing altitude remain displayed on the PFD?", a:"Until 400 NM or one-half the distance to the destination, whichever occurs first.", src:"Flight Instruments deck" },
  { id:"flight-instruments-037", system:"Flight Instruments", q:"What does BARO minimums represent in feet?", a:"Feet MSL.", src:"Flight Instruments deck" },
  { id:"flight-instruments-038", system:"Flight Instruments", q:"What does RADIO minimums represent in feet?", a:"Radio altitude feet AGL. PFD - Barometric", src:"Flight Instruments deck" },
  { id:"flight-instruments-039", system:"Flight Instruments", q:"When both Flight Directors are turned on, which barometric source is used for the autopilot/flight director?", a:"L (left EFIS control panel) is displayed.", src:"Flight Instruments deck" },
  { id:"flight-instruments-040", system:"Flight Instruments", q:"What does the UL annunciation next to the barometric preselect field indicate?", a:"A barometric setting uplink has been accepted.", src:"Flight Instruments deck" },
  { id:"flight-instruments-041", system:"Flight Instruments", q:"When is the barometric setting boxed in amber?", a:"If a barometric setting is set and altitude climbs above transition altitude, or if STD is set and altitude descends below the transition flight level. NPS / Navigation", src:"Flight Instruments deck" },
  { id:"flight-instruments-042", system:"Flight Instruments", q:"What shape is the NPS Deviation Pointer?", a:"A magenta triangle.", src:"Flight Instruments deck" },
  { id:"flight-instruments-043", system:"Flight Instruments", q:"When does the NPS Deviation Pointer become unfilled?", a:"When parked at deflection limit and lateral deviation continues to increase.", src:"Flight Instruments deck" },
  { id:"flight-instruments-044", system:"Flight Instruments", q:"On what scale is the NPS vertical deviation pointer only displayed?", a:"Only in the descent phase of flight.", src:"Flight Instruments deck" },
  { id:"flight-instruments-045", system:"Flight Instruments", q:"After how long in the bar area does the NPS pointer begin to flash, and for how long does it flash?", a:"After 5 seconds in the bar area; it flashes for 10 seconds. Navigation Display", src:"Flight Instruments deck" },
  { id:"flight-instruments-046", system:"Flight Instruments", q:"What ND range triggers automatic Airport Map display?", a:"5 NM or less.", src:"Flight Instruments deck" },
  { id:"flight-instruments-047", system:"Flight Instruments", q:"What ANP value is required for Airport Map to display automatically?", a:"0.02 NM or less.", src:"Flight Instruments deck" },
  { id:"flight-instruments-048", system:"Flight Instruments", q:"In ND Plan mode, what is the orientation of the display?", a:"True North up.", src:"Flight Instruments deck" },
  { id:"flight-instruments-049", system:"Flight Instruments", q:"What does the Position Trend Vector show on the ND at a 40 NM range?", a:"Predicted positions at 30, 60, and 90 seconds ahead.", src:"Flight Instruments deck" },
  { id:"flight-instruments-050", system:"Flight Instruments", q:"What does the Position Trend Vector show on the ND at a 10 NM range?", a:"Only the 30 second predicted position.", src:"Flight Instruments deck" },
  { id:"flight-instruments-051", system:"Flight Instruments", q:"What ND annunciation appears when predictive windshear is detected but weather radar is not displayed?", a:"MONITOR RADAR DISP.", src:"Flight Instruments deck" },
  { id:"flight-instruments-052", system:"Flight Instruments", q:"What is the symbol for GPS position on the ND?", a:"A filled circle with a cross.", src:"Flight Instruments deck" },
  { id:"flight-instruments-053", system:"Flight Instruments", q:"What is the symbol for IRU position on the ND?", a:"An asterisk/star. Terrain Display", src:"Flight Instruments deck" },
  { id:"flight-instruments-054", system:"Flight Instruments", q:"What color represents terrain at Reference Altitude + 2,000 ft on the TERR display?", a:"High Density Red.", src:"Flight Instruments deck" },
  { id:"flight-instruments-055", system:"Flight Instruments", q:"What color represents terrain at Reference Altitude + 1,000 ft on the TERR display?", a:"High Density Amber.", src:"Flight Instruments deck" },
  { id:"flight-instruments-056", system:"Flight Instruments", q:"At what time from projected terrain impact does the voice \"CAUTION OBSTACLE\" sound?", a:"40 to 60 seconds from projected impact.", src:"Flight Instruments deck" },
  { id:"flight-instruments-057", system:"Flight Instruments", q:"Where is the TERR indication displayed when the TERR switch is selected ON?", a:"On the left side of the NDs and mini-maps. GND PROX", src:"Flight Instruments deck" },
  { id:"flight-instruments-058", system:"Flight Instruments", q:"What switch inhibits the below-glideslope alert, and at what altitude is it triggered?", a:"The GND PROX G/S INHIBIT switch on the ATP; triggered below 1,000 ft RA.", src:"Flight Instruments deck" },
  { id:"flight-instruments-059", system:"Flight Instruments", q:"What callout occurs 500 ft above minimums?", a:"APPROACHING MINIMUMS. TCAS", src:"Flight Instruments deck" },
  { id:"flight-instruments-060", system:"Flight Instruments", q:"Are pilots authorized to deviate from an ATC clearance to comply with a TCAS RA?", a:"Yes, pilots are authorized to deviate from a current ATC clearance as necessary to comply with a TCAS resolution advisory.", src:"Flight Instruments deck" },
  { id:"flight-instruments-061", system:"Flight Instruments", q:"May evasive maneuvers be based solely on a TCAS TA?", a:"No, evasive maneuvers must not be based solely on TA information without visually sighting the traffic. EFIS / DSP", src:"Flight Instruments deck" },
  { id:"flight-instruments-062", system:"Flight Instruments", q:"Where can EFIS control panel functions be accessed if the EFIS control panel fails?", a:"Through the backup EFIS/DSP display on the SYS page.", src:"Flight Instruments deck" },
  { id:"flight-instruments-063", system:"Flight Instruments", q:"Does enabling EFIS backup control disable the EFIS control panel hardware?", a:"Yes, it inhibits inputs from the respective EFIS control panel.", src:"Flight Instruments deck" },
  { id:"flight-instruments-064", system:"Flight Instruments", q:"What does the ENG switch on the DSP do?", a:"Toggles the display of secondary engine information on the EICAS display.", src:"Flight Instruments deck" },
  { id:"flight-instruments-065", system:"Flight Instruments", q:"What does the EICAS transfer switch on the DSP do?", a:"Toggles the EICAS display between the inboard half of the Captain and First Officer inboard DUs.", src:"Flight Instruments deck" },
  { id:"flight-instruments-066", system:"Flight Instruments", q:"What display switches are available on the DSP for MFD window selection?", a:"SYS, CDU, INFO, CHKL, COMM, or ND. ISFD", src:"Flight Instruments deck" },
  { id:"flight-instruments-067", system:"Flight Instruments", q:"What information does the ISFD display?", a:"Attitude, airspeed, altitude, ILS, GLS, and heading.", src:"Flight Instruments deck" },
  { id:"flight-instruments-068", system:"Flight Instruments", q:"What is the airspeed and altitude source for the ISFD?", a:"The center pitot and static air data modules.", src:"Flight Instruments deck" },
  { id:"flight-instruments-069", system:"Flight Instruments", q:"What is the attitude source for the ISFD?", a:"Internal inertial sensors.", src:"Flight Instruments deck" },
  { id:"flight-instruments-070", system:"Flight Instruments", q:"What is the ILS/GLS source for the ISFD?", a:"The left INR receiver.", src:"Flight Instruments deck" },
  { id:"flight-instruments-071", system:"Flight Instruments", q:"What ISFD message requires the crew to push the Attitude Reset switch?", a:"ATT:RST.", src:"Flight Instruments deck" },
  { id:"flight-instruments-072", system:"Flight Instruments", q:"What message displays during the attitude reset process?", a:"ATT 10s.", src:"Flight Instruments deck" },
  { id:"flight-instruments-073", system:"Flight Instruments", q:"What are the requirements for performing an ISFD attitude reset in flight?", a:"Wings level, non-accelerated flight maintained for 10 seconds.", src:"Flight Instruments deck" },
  { id:"flight-instruments-074", system:"Flight Instruments", q:"What are the requirements for performing an ISFD attitude reset on the ground?", a:"The airplane must be stationary.", src:"Flight Instruments deck" },
  { id:"flight-instruments-075", system:"Flight Instruments", q:"If the ISFD attitude reset is unsuccessful, what happens?", a:"The ATT:RST message remains displayed and attitude is not shown. Radio Altimeter", src:"Flight Instruments deck" },
  { id:"flight-instruments-076", system:"Flight Instruments", q:"How many RA systems does the B787 have?", a:"Two - left and right.", src:"Flight Instruments deck" },
  { id:"flight-instruments-077", system:"Flight Instruments", q:"What EICAS message displays if both RA systems are inoperative or degraded?", a:"RADIO ALTIMETER L+R (advisory).", src:"Flight Instruments deck" },
  { id:"flight-instruments-078", system:"Flight Instruments", q:"What additional indication appears on the PFD and HUD if both RA systems fail?", a:"\"RA\" is displayed on both PFD and HUD.", src:"Flight Instruments deck" },
  { id:"flight-instruments-079", system:"Flight Instruments", q:"What systems receive data from the RA systems?", a:"Autopilot, Autothrottle, GPWS, TCAS, Weather Radar, and Primary Flight Control System. AUX Display", src:"Flight Instruments deck" },
  { id:"flight-instruments-080", system:"Flight Instruments", q:"What information is displayed in the upper portion of the AUX display?", a:"Flight number, UTC time, MIC readout, date, transponder code, elapsed flight time, SELCAL, chrono dial and readout, and airplane tail number. AOA Speed", src:"Flight Instruments deck" },
  { id:"flight-instruments-081", system:"Flight Instruments", q:"When is AOA SPD automatically displayed?", a:"When pitot and/or static pressure from the ADRS is erroneous or unavailable (NAV AIRSPEED DATA or NAV AIR DATA SYS condition), or when both pilots manually select the AIR DATA/ATT source selector to ALTN.", src:"Flight Instruments deck" },
  { id:"flight-instruments-082", system:"Flight Instruments", q:"What flight control law change occurs when AOA SPD is displayed?", a:"Simplified flight control laws are used, which may result in increased pitch control sensitivity to abrupt pitch inputs.", src:"Flight Instruments deck" },
  { id:"flight-instruments-083", system:"Flight Instruments", q:"To what values are maximum speed indications reduced when AOA SPD is active?", a:"From 360 kt / 0.90 M reduced to 300 kt / 0.85 M.", src:"Flight Instruments deck" },
  { id:"flight-instruments-084", system:"Flight Instruments", q:"How many TAT sensor inputs does the ADRS use?", a:"6 inputs.", src:"Flight Instruments deck" },
  { id:"flight-instruments-085", system:"Flight Instruments", q:"What is the ADRS TAT source when on the ground below 50 kts CAS?", a:"Sensors in the CAC inlets; ADRS selects the lower of the two CAC inlet temperatures (two sensors per inlet).", src:"Flight Instruments deck" },
  { id:"flight-instruments-086", system:"Flight Instruments", q:"To what factors is AOA SPD subject to indication variations?", a:"Configuration changes, maneuvering, and speedbrake use. VSD", src:"Flight Instruments deck" },
  { id:"flight-instruments-087", system:"Flight Instruments", q:"How is the VSD selected for display?", a:"From the map information selections on the MAP mode drop-down menu.", src:"Flight Instruments deck" },
  { id:"flight-instruments-088", system:"Flight Instruments", q:"What is the range of the full-display VSD?", a:"Twice the ND range - from 10 NM to 2,560 NM.", src:"Flight Instruments deck" },
  { id:"flight-instruments-089", system:"Flight Instruments", q:"Up to what ND range does the VSD depict a consistent 3-degree glidepath?", a:"80 NM range. Checklists", src:"Flight Instruments deck" },
  { id:"flight-instruments-090", system:"Flight Instruments", q:"What are the 10 normal checklists in sequence?", a:"PREFLIGHT, BEFORE START, BEFORE TAXI, BEFORE TAKEOFF, AFTER TAKEOFF, DESCENT, APPROACH, LANDING, SHUTDOWN, SECURE.", src:"Flight Instruments deck" },
  { id:"flight-instruments-091", system:"Flight Instruments", q:"What EICAS message alerts crew that a critical normal checklist line item is incomplete before the corresponding phase of flight?", a:"CHKL INCOMPLETE NORM (caution).", src:"Flight Instruments deck" },
  { id:"flight-instruments-092", system:"Flight Instruments", q:"What does the normal checklist key color change to when a normal checklist is incomplete?", a:"Amber.", src:"Flight Instruments deck" },
  { id:"flight-instruments-093", system:"Flight Instruments", q:"What is the checklist icon on an EICAS alert message?", a:"A white box to the left of the message.", src:"Flight Instruments deck" },
  { id:"flight-instruments-094", system:"Flight Instruments", q:"What does no checklist icon on an EICAS message indicate?", a:"The checklist is complete, there is no checklist for the message, or another checklist inhibits the icon.", src:"Flight Instruments deck" },
  { id:"flight-instruments-095", system:"Flight Instruments", q:"What EICAS message displays when a non-normal checklist is in the queue, the EICAS message is blank, and ECL is not open?", a:"CHKL NON-NORMAL (advisory).", src:"Flight Instruments deck" },
  { id:"flight-instruments-096", system:"Flight Instruments", q:"What color does an action item show when it is overridden or inactive?", a:"Cyan.", src:"Flight Instruments deck" },
  { id:"flight-instruments-097", system:"Flight Instruments", q:"What color does an action item show when complete?", a:"Green.", src:"Flight Instruments deck" },
  { id:"flight-instruments-098", system:"Flight Instruments", q:"When is the use of RESET NON-NORMAL or RESET ALL not recommended?", a:"In flight.", src:"Flight Instruments deck" },
  { id:"flight-instruments-099", system:"Flight Instruments", q:"What is the checklist priority on the ground with both fuel control switches CUTOFF?", a:"(1) Checklists for EICAS warning messages; (2) NORMAL checklists.", src:"Flight Instruments deck" },
  { id:"flight-instruments-100", system:"Flight Instruments", q:"In what order do checklists appear in the non-normal checklist queue?", a:"Same order as the messages appear on EICAS; unannunciated checklists appear after all annunciated checklists.", src:"Flight Instruments deck" },
  { id:"flight-instruments-101", system:"Flight Instruments", q:"What happens to a completed non-normal checklist when its EICAS alert message remains active?", a:"The EICAS message can still show but the checklist is removed from the queue.", src:"Flight Instruments deck" },
  { id:"flight-instruments-102", system:"Flight Instruments", q:"How can an unannunciated non-normal checklist be removed from the queue without completing it?", a:"The checklist must be overridden.", src:"Flight Instruments deck" },
  { id:"flight-instruments-103", system:"Flight Instruments", q:"What is a consequential EICAS alert message?", a:"An alert message caused by a primary failure condition rather than a separate system failure; crews should do the checklist for the primary message, not the consequential message. Video Surveillance", src:"Flight Instruments deck" },
  { id:"flight-instruments-104", system:"Flight Instruments", q:"What action will disable the video surveillance cameras outside the flight deck entrance?", a:"Selecting the flight deck IFE/PASS SEATS power switch OFF.", src:"Flight Instruments deck" },
  { id:"hud-001", system:"HUD", q:"What activates the HUD projector and displays symbology?", a:"Deploying the combiner. There is no ON/OFF switch.", src:"HUD deck" },
  { id:"hud-002", system:"HUD", q:"How do you manually adjust HUD brightness?", a:"Pull the brightness control out, then rotate it.", src:"HUD deck" },
  { id:"hud-003", system:"HUD", q:"How do you set automatic brightness adjustment on the HUD?", a:"Push the brightness control in, set the initial level by rotating, and brightness then adjusts automatically with changing background lighting.", src:"HUD deck" },
  { id:"hud-004", system:"HUD", q:"What message appears if the HUD combiner is not properly aligned with the projector?", a:"ALIGN HUD -- displayed left or right of the airplane symbol on the combiner screen.", src:"HUD deck" },
  { id:"hud-005", system:"HUD", q:"Is the locking lever required when stowing the HUD combiner?", a:"No. Lift the combiner up and back until the latch engages; the locking lever is not required for stowing.", src:"HUD deck" },
  { id:"hud-006", system:"HUD", q:"What is the purpose of the combiner breakaway position?", a:"To prevent the pilot's head from impacting the combiner during a sudden and sustained deceleration.", src:"HUD deck" },
  { id:"hud-007", system:"HUD", q:"How do you release the combiner from the breakaway position?", a:"Push forward to relieve pressure on the latch, slide the locking lever to the right, then reposition to desired position.", src:"HUD deck" },
  { id:"hud-008", system:"HUD", q:"Because the HUD is monochromatic, how are amber color alerts from the PFD conveyed on the HUD?", a:"Through flashing, shape filling/blanking, and highlight box symbology. Some alerts have no distinct HUD equivalent.", src:"HUD deck" },
  { id:"hud-009", system:"HUD", q:"Is the partial compass rose displayed in full symbology mode during ground operations?", a:"No. The partial compass rose is not displayed in full symbology mode during ground operations.", src:"HUD deck" },
  { id:"hud-010", system:"HUD", q:"What does decluttered mode do to airspeed and altitude information?", a:"Eliminates the tapes and shows digital values only. The partial compass rose is also removed.", src:"HUD deck" },
  { id:"hud-011", system:"HUD", q:"How do you toggle between full symbology and decluttered modes on the HUD?", a:"Using the symbology switch on the pilot's yoke control wheel.", src:"HUD deck" },
  { id:"hud-012", system:"HUD", q:"At what radio altitude does the guidance cue appear on a normal (non-HUD) takeoff?", a:"50 feet RA.", src:"HUD deck" },
  { id:"hud-013", system:"HUD", q:"When does the guidance cue appear if a HUD takeoff has been selected?", a:"At the same time as the flight path vector (not delayed to 50 ft RA).", src:"HUD deck" },
  { id:"hud-014", system:"HUD", q:"How does the guidance cue change during a windshear alert?", a:"It changes from hollow to solid (filled).", src:"HUD deck" },
  { id:"hud-015", system:"HUD", q:"To follow flight director guidance on the HUD, how should you position the flight path vector symbol?", a:"Position the circular body of the flight path vector symbol around the guidance cue (small circle).", src:"HUD deck" },
  { id:"hud-016", system:"HUD", q:"During a takeoff roll, at what ground speed does the TO/GA reference line (pitch target) become visible?", a:"When ground speed is greater than 65 knots.", src:"HUD deck" },
  { id:"hud-017", system:"HUD", q:"In TO/GA mode, what must you do to comply with vertical flight director guidance on the HUD?", a:"Place the airplane reference symbol on the TO/GA reference line (horizontal dashed line).", src:"HUD deck" },
  { id:"hud-018", system:"HUD", q:"For HUD takeoff ground deviation indications to become active, what two conditions must be met?", a:"(1) Airplane heading within 45 degrees of runway heading, AND (2) airplane within 2 degrees of the ILS localizer centerline.", src:"HUD deck" },
  { id:"hud-019", system:"HUD", q:"What happens when the airplane deviates more than 7 meters (23 feet) from the runway centerline during a HUD takeoff?", a:"A flashing triangle appears, pointing in the direction of the runway centerline to assist in correction.", src:"HUD deck" },
  { id:"hud-020", system:"HUD", q:"Where is HUD takeoff guidance selected?", a:"On the FMC.", src:"HUD deck" },
  { id:"hud-021", system:"HUD", q:"What are the projected runway dimensions used for the HUD runway edge lines symbol?", a:"8,000 feet long by 200 feet wide.", src:"HUD deck" },
  { id:"hud-022", system:"HUD", q:"What is the runway edge lines centerline based on?", a:"The localizer course, not the geographic orientation of the runway.", src:"HUD deck" },
  { id:"hud-023", system:"HUD", q:"At what radio altitude are runway edge lines enabled, and when are they removed?", a:"Enabled at 300 feet RA; removed at 60 feet.", src:"HUD deck" },
  { id:"hud-024", system:"HUD", q:"In which HUD display mode do runway edge lines appear?", a:"Decluttered mode only.", src:"HUD deck" },
  { id:"hud-025", system:"HUD", q:"If radio altitude is unavailable, what does the runway edge lines system use instead?", a:"Barometric altitude above touchdown.", src:"HUD deck" },
  { id:"hud-026", system:"HUD", q:"What do the two tick marks on the runway edge lines symbol represent?", a:"The touchdown aiming point (glideslope intercept point).", src:"HUD deck" },
  { id:"hud-027", system:"HUD", q:"During approach, how is the glideslope angle shown on the HUD?", a:"As a horizontal dashed line across the HUD pitch scale, with the numerical glideslope angle value digitally displayed adjacent to the line.", src:"HUD deck" },
  { id:"hud-028", system:"HUD", q:"How do you use the glideslope reference line during a visual approach?", a:"Overlay the glideslope reference line on the runway touchdown zone and maintain the flight path vector symbol on the glideslope reference line.", src:"HUD deck" },
  { id:"hud-029", system:"HUD", q:"When does the ground deceleration scale appear during a takeoff?", a:"It is not initially displayed, but appears if deceleration is sensed when ground speed is above 50 knots and the airplane is still on the ground.", src:"HUD deck" },
  { id:"hud-030", system:"HUD", q:"What three conditions cause the ground deceleration scale to be removed?", a:"Ground speed decreases below 25 knots, the airplane begins accelerating, or the airplane lifts off.", src:"HUD deck" },
  { id:"hud-031", system:"HUD", q:"What autobrake settings does the ground deceleration scale reference?", a:"1, 2, 3, 4, and MAX AUTO.", src:"HUD deck" },
  { id:"hud-032", system:"HUD", q:"When is the flight path slip/skid indicator displayed?", a:"Only during a takeoff or a low-altitude go-around.", src:"HUD deck" },
  { id:"hud-033", system:"HUD", q:"What is the purpose of the flight path slip/skid indicator?", a:"To provide additional yaw reference in the case of an engine failure.", src:"HUD deck" },
  { id:"hud-034", system:"HUD", q:"How is a TCAS corrective advisory depicted on the HUD?", a:"As a double lined box called the \"fly-to box,\" showing where to position the flight path vector to obtain vertical separation from traffic.", src:"HUD deck" },
  { id:"hud-035", system:"HUD", q:"On the HUD NAV Performance Scales, what do the outer tic marks represent?", a:"RNP (Required Navigation Performance).", src:"HUD deck" },
  { id:"hud-036", system:"HUD", q:"On the HUD NAV Performance Scales, what do the bars represent?", a:"ANP (Actual Navigation Performance).", src:"HUD deck" },

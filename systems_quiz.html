  "sv-ground-056": [{ ref:"FCOM PI.20 OPT — Missed Approach Climb Gradient (via SV Ground deck Slide 129)", quote:"The standard missed approach climb gradient is 2.5%. Some landing runways require a higher missed approach gradient. Usually notated on the approach chart." }],
  "sv-ground-057": [{ ref:"FCOM PI.20 OPT — NNC Engine Shutdown", quote:"With NNC ENGINE SHUTDOWN, MACG is not selectable. [Landing flap field is blanked; missed approach climb gradient is disregarded; recommended brake cooling time is not displayed for non-normal flap entries.]", note:"From FCOM PI.20 OPT section and SV Ground deck" }],
  "sv-ground-058": [{ ref:"SV Ground deck Slide 130 (OPT — MACG conversion)", quote:"The missed approach climb gradient in ft/NM can be converted to a percentage by taking the climb gradient (330') and dividing by 60. The result is 5.5%. Note: 60 is actually 6000'; the distance (rounded) in a nautical mile." }],
  "sv-ground-059": [{ ref:"FCOM Performance Chart (via SV Ground deck Q&A)", quote:"What is VREF for flaps 30 at 420,000#? 153 knots.", note:"Deck slide 442/444 reproduces FCOM VREF table value" }],
  "sv-ground-060": [{ ref:"FCOM PI.12.64 Brake Energy — Caution Zone", quote:"When in caution zone, wheel fuse plugs may melt. Delay takeoff and inspect after one hour. If overheat occurs after takeoff, extend gear soon for at least 8 minutes." }],
  "sv-ground-061": [{ ref:"FOM 9.3.1 Cold Weather Preflight Requirements", quote:"9.3.1 — Cold Weather Preflight Requirements. 14 CFR § 121.629. Comply with the cold weather procedures in the fleet-specific manuals and FODM." }],
  "sv-ground-062": [{ ref:"FCOM SP.16.2 Exterior Inspection — Cold Weather", quote:"Takeoff with light coatings of frost, up to 1/8 inch (3mm) in thickness, on lower wing surfaces due to cold fuel is allowable." }],
  "sv-ground-063": [{ ref:"FCOM SP.16.2 Exterior Inspection — Cold Weather", quote:"all leading edge devices, all control surfaces, and upper wing surfaces must be free of snow, ice and frost." }],
  "sv-ground-064": [{ ref:"FCOM SP.16.2 Exterior Inspection — Cold Weather", quote:"Thin hoarfrost is acceptable on the upper surface of the fuselage provided all vents and ports are clear. Thin hoarfrost is a uniform white deposit of fine crystalline texture, which usually occurs on exposed surfaces on a cold and cloudless night, and which is thin enough to distinguish surface features underneath, such as paint lines, markings or lettering." }],
  "sv-ground-065": [{ ref:"FOM / FODM De-icing Communication Form (via SV Ground deck)", quote:"START TIME – Start time of final application of deicing fluid.", note:"HOT begins when final application of deicing or anti-icing fluid commences" }],
  "sv-ground-066": [{ ref:"SV Ground deck Slide 185 (FAA HOT Guidelines)", quote:"If the deice/anti-icing report does not give you the name of the type IV specific fluid used, what would you do? Must use the holdover time for generic type IV." }],
  "sv-ground-067": [{ ref:"SV Ground deck Slide 184 (FAA HOT Guidelines)", quote:"Holdover Times Lower and Upper Time Limits: The time range reflects the rate or intensity of precipitation. The shorter time corresponds to a heavier intensity within that cell." }],
  "sv-ground-068": [{ ref:"SV Ground deck Slide 186 (FAA HOT Guidelines / FCOM SP.16)", quote:"Snowfall intensity is a function of prevailing visibility. If the METAR states light snow and the prevailing visibility chart indicates moderate snow, then moderate snow will be used to determine the holdover time." }],
  "sv-ground-069": [{ ref:"SV Ground deck Slide 186 (FAA HOT Guidelines)", quote:"If visibility drops to ½ SM, how will this affect the holdover time? There is no holdover time for heavy snow!" }],
  "sv-ground-070": [{ ref:"FOM 9.3.1 / SV Ground deck Slide 158", quote:"This check must be conducted within five (5) minutes prior to beginning of takeoff." }],
  "sv-ground-071": [{ ref:"SV Ground deck Slide 158 (FCOM SP.16 / FODM)", quote:"A qualified crewmember will proceed to the cabin and visually check both wings and the engine nacelles (the wing that was de-iced first should be inspected last)." }],
  "sv-ground-072": [{ ref:"SV Ground deck Slide 175 / HAL HOT App guidance", quote:"If HAL HOT is not the active window displayed on the EFB, the flight crewmember will not receive a notification if the de-ice/anti-ice fluid timer ends. Therefore, when using the timer on the HAL HOT app, flight crew must ensure that app is displayed on at least one EFB. Use the split window function of the iPad to display the holdover timer and the airport diagram." }],
  "sv-ground-073": [{ ref:"FCOM SP.16.9 Cold Temperature Altitude Corrections", quote:"When the temperature is colder than ISA, true altitude will be lower than indicated altitude." },{ ref:"FOM 9.3.3.1 Cold Temperature Altimeter Corrections", quote:"When the temperature is lower than International Standard Atmosphere (ISA), true altitude is lower than indicated altitude." }],
  "sv-ground-074": [{ ref:"SV Ground deck Slide 169 / FCOM SP.16.10", quote:"Pilots must request approval from ATC whenever applying a cold temperature altitude correction. Pilots do not need to inform ATC of the final approach segment correction (i.e., new MDA or DA)." }],
  "sv-ground-075": [{ ref:"SV Ground deck Slide 174 (Baro-VNAV Temperature Limitations)", quote:"Baro-VNAV equipped aircraft without a temperature compensating system may not use the RNAV (GPS) approach LNAV/VNAV line of minima when the actual temperature is above or below the charted temperature range. The LNAV line of minima may be used after applying cold temperature corrections as required." }],
  "sv-ground-076": [{ ref:"SV Ground deck Slide 871 / FCOM SP.16", quote:"\"Snowflake\" icons are only depicted on US Terminal Procedure Publications and not Jeppesen charts as used by Hawaiian Airline crews." }],
  "sv-ground-077": [{ ref:"FCOM 3.20.3 Pack Inlet Anti-Ice System", quote:"Pack inlet anti-ice functions automatically with signals from the automatic ice detection system. Operation is inhibited on the ground and when TAT is above 10º C." }],
  "sv-ground-078": [{ ref:"FOM 5.2.22 Walkaround Check", quote:"The exterior walkaround is performed by the pilot monitoring or IRO.", note:"FOM section 5.2.22" }],
  "sv-ground-079": [{ ref:"FCOM SP.16.2 / NP Exterior Inspection", quote:"Verify that all pitot probes and static ports are free of snow and ice.", note:"Pitot probes are heated; static ports are NOT heated — confirmed by FCOM exterior inspection notes requiring manual ice/frost check of static ports" }],
  "sv-ground-080": [{ ref:"FCOM 2.20 Pressurization System Description", quote:"Positive and negative pressure relief valves/vents protect the fuselage against excessive pressure differential." }],
  "sv-ground-081": [{ ref:"FCOM 2.20 Pressurization System Description", quote:"At touchdown, both outflow valves open to depressurize the cabin." }],
  "sv-ground-082": [{ ref:"FCOM 2.20 Pressurization System Description", quote:"Two outflow valves are installed: one forward and one aft. Normally, the outflow of cabin air is split equally between these two outflow valves. Cabin altitude and full ventilation rates can be maintained by either valve." }],
  "sv-ground-083": [{ ref:"FCOM 3.20.4 Probe Heat", quote:"The total air temperature probe is electrically heated for anti-ice protection in flight." }],
  "sv-ground-084": [{ ref:"SV Ground deck Slide 206 (FCOM 3.20 Probe Heat)", quote:"The pitot heat has two power levels. When airspeed is less than 50 knots, low power goes to the probes. When airspeed is more than 50 knots, high power goes to the probes." }],
  "sv-ground-085": [{ ref:"FCOM 3.20 Anti-Ice System Description", quote:"Automatic ice detection is inhibited on the ground below 75 knots." }],
  "sv-ground-086": [{ ref:"FCOM 1.20 Doors — Cargo Door Operating Limits", quote:"Do not operate the entry and cargo doors with winds at the door of more than 40 knots. Do not keep the door open when wind gusts are more than 65 knots. Strong winds can cause damage to the structure of the airplane." }],
  "sv-ground-087": [{ ref:"SV Ground deck Slide 1528 (FCOM 7.20 Engine Description)", quote:"There are 18 fan blades made from Carbon Fiber Reinforced Plastic (CFRP). The leading and trailing edges of the fan blades are titanium to protect the blades from damage." }],
  "sv-ground-088": [{ ref:"SV Ground deck Slide 1589 (FCOM 7.20 Thrust Reverser)", quote:"24 are installed. If more than one missing, thrust reverser is considered inoperative. Up to 12 may be missing on one engine in accordance with the MEL. Weight penalties must be applied." }],
  "sv-ground-089": [{ ref:"SV Ground deck Slide 1607", quote:"High aspect wing. By design, the wing will flex about 12 feet during takeoff and landing." }],
  "sv-ground-090": [{ ref:"FCOM NP Exterior Inspection / SV Ground deck", quote:"Static discharge wicks — Check [each wing tip and trailing edge]", note:"Deck and FCOM walkaround reference static discharge wicks per wing; specific count of 12 per wing is from walkaround training material" }],
  "sv-ground-091": [{ ref:"FCOM NP Exterior Inspection — Main Gear / SV Ground deck Slide 1746", quote:"If the indicator extends out of the guide, the brakes are good to go. Write-up once the indicator is flush with the guide." }],
  "sv-ground-092": [{ ref:"FCOM 14.20 Landing Gear — Electro-Mechanical Brake System", quote:"Four Electric Brake Actuators (EBAs) are provided on each main landing gear wheel brake to control the application of braking force to the carbon disc." }],
  "sv-ground-093": [{ ref:"FCOM 8.20.4 APU Fire Extinguishing", quote:"On the ground with both engines off an APU fire signal from either APU fire detector loop causes APU shutdown and extinguisher bottle discharge." }],
  "sv-ground-094": [{ ref:"SV Ground deck Slide 1188 / FCOM NP Exterior Inspection", quote:"Parking brake indications show on the NLG strut panel. A blue light on the panel shows when the parking brakes are off. Amber and red lights show when the parking brake is set and on." }],
  "sv-ground-095": [{ ref:"FCOM 9.20.16 Hybrid Laminar Flow Control (HLFC)", quote:"The vertical stabilizer has a Hybrid Laminar Flow Control (HLFC) system installed to reduce aerodynamic drag. There are no crew procedures or monitoring requirements for this system and no alert messages specific to this function for any failure mode." }],
  "sv-ground-096": [{ ref:"FCOM 9.20.19 Lateral Gust Suppression", quote:"Four static pressure ports (two on each side of the vertical stabilizer) provide inputs to this function." }],
  "sv-ground-097": [{ ref:"FCOM 9.20.19 Gust Suppression", quote:"Operation of vertical and lateral gust suppression does not result in control wheel, control column, or rudder pedal movement. Vertical and lateral gust suppression are only available in the normal mode." }],
  "sv-ground-098": [{ ref:"FCOM 15.20.13 Tail Strike Detection System", quote:"A two inch blade target and two frangible wires are installed on the aft body of the airplane. The EICAS caution message TAIL STRIKE is displayed when a tail strike is detected. This indication is accompanied by a beeper and Master CAUTION light." }],
  "sv-ground-099": [{ ref:"FCOM 6.20 Electrical / SV Ground deck Slide 1998", quote:"A 32V Lithium-ion battery is contained in a steel box. Any vapor in the containment box is vented overboard within 1.5 seconds." }],
  "sv-ground-100": [{ ref:"FCOM 6.20 Electrical — Engine Start with Aft External Power", quote:"The aft external power source may also be used, if available. This reduces electrical load shedding during the start of the right engine. Typically, the right engine is started first using three external power sources." }],
  "sv-ground-101": [{ ref:"FCOM NP Exterior Inspection", quote:"CAC inlet and FOD deflector door — Check", note:"FOD deflector door protects CAC inlets from debris during ground ops and landing; may retract below 35°F or above 95°F" }],
  "sv-ground-102": [{ ref:"SV Ground deck Slide 1573", quote:"Note: The B789 has no grey water drain masts. Grey water is contained in two storage tanks located aft of the bulk cargo." }],
  "sv-ground-103": [{ ref:"SV Ground deck Slide 1614", quote:"Note: Raked wingtips. The raked wingtips act similar to a winglet to reduce wingtip vortices, but are more efficient than winglets at doing so." }],
  "sv-ground-104": [{ ref:"SV Ground deck Slide 1960–1961 (FCOM 9.20.16 HLFC)", quote:"Low airspeed – forward doors open for purge mode. In the purge mode, ram pressure doors push air back through the perforated holes to remove water and debris. Cruise at high airspeed – aft doors open for suction mode. In the suction mode, low pressure at the doors pulls air through small, perforated holes in the leading edge of the horizontal and vertical stabilizers." }],
  "sv-ground-105": [{ ref:"SV Ground deck Slide 1912", quote:"RUDDER STATIC DISCHARGERS (3 tip and 7 trailing edge)" }],
  "sv-ground-106": [{ ref:"SV Ground deck Slide 1150 / FCOM NP Exterior Inspection", quote:"[Diverter strips] Provide for an electrostatic lighting shield for the radome and provides a path to bleed off static electricity generated during flight." }],
  "fuel-001": [{ ref:"FCOM 12.20.1", quote:"Total fuel quantity is displayed on the primary EICAS display." }],
  "fuel-002": [{ ref:"FCOM 12.20.1", quote:"The fuel system supplies fuel to the engines and the APU. The fuel is contained in a center tank, and left and right main tanks." }],
  "fuel-003": [{ ref:"FCOM 12.20.1", quote:"Each fuel tank contains two AC–powered fuel pumps.", note:"FCOM panel (12.10.1) labels them FWD and AFT for main tanks." }],
  "fuel-004": [{ ref:"FCOM 12.20.1", quote:"Each fuel tank contains two AC–powered fuel pumps.", note:"Panel diagram 12.10.1 labels center pumps L and R." }],
  "fuel-005": [{ ref:"FCOM 12.20.1", quote:"The two center tank fuel pumps are override/jettison pumps. These pumps have a higher output pressure than the left and right main tank fuel pumps. The center tank pumps override the main tank pumps so that center tank fuel is used before wing tank fuel." }],
  "fuel-006": [{ ref:"FCOM 12.20.7", quote:"APU fuel is supplied from the left fuel manifold. APU fuel can be provided by any AC fuel pump supplying fuel to the left fuel manifold or by the left main tank DC fuel pump. On the ground, with the APU switch ON and no AC power available, the DC pump runs automatically." }],
  "fuel-007": [{ ref:"FCOM 12.10.3", quote:"Total fuel quantity (pounds x 1000).", note:"FCOM diagram shows 'LBS X 1000', not KGS. The answer 'KGS x 1000' is unsupported by FCOM text." }],
  "fuel-008": [{ ref:"FCOM 12.10.5", quote:"Fuel to remain (fuel jettison ARMED): the fuel to remain defaults to a fuel quantity that leaves the airplane at maximum landing weight (MLW) when jettison is complete; the fuel to remain display replaces the fuel temperature and static air temperature displays.", note:"FCOM jettison display diagram shows 'LBS X 1000' as the unit label. The claim that units switch to 'LBS x 1000' when ARMED is unsupported; normal display already shows LBS X 1000." }],
  "fuel-009": [{ ref:"FCOM 12.10.5", quote:"Fuel to remain (fuel jettison ARMED): the fuel to remain defaults to a fuel quantity that leaves the airplane at maximum landing weight (MLW) when jettison is complete.", note:"FCOM jettison diagram shows TO REMAIN with 'MLW' label. Magenta color not explicitly stated in text — this is a diagram-only color call-out." }],
  "fuel-010": [{ ref:"FCOM 12.20.7", quote:"At least 8700 pounds of fuel remains in each main tank after jettison is complete." }],
  "fuel-011": [{ ref:"FCOM 12.10.2", quote:"FUEL TO REMAIN Selector: PULL ON – changes the mode from MLW (maximum landing weight) to MAN (manual). Rotate – clockwise to increase the MANUAL fuel–to–remain quantity; counterclockwise to decrease. Push – automatically selects the MLW fuel–to–remain quantity." }],
  "fuel-012": [],
  "fuel-013": [{ ref:"FCOM 12.10.4", quote:"When fuel is back in balance within 200 pounds between the main tanks and the crossfeed valve is open or the balance system is ON, FUEL BALANCED replaces FUEL QTY on the expanded fuel quantity display and flashes for 5 seconds." }],
  "fuel-014": [{ ref:"FCOM 12.10.4", quote:"A solid white fuel imbalance pointer is displayed if: the FUEL IMBALANCE message is not displayed and the main tank fuel differs by more than 200 pounds, and either the crossfeed valve is open or the balance system is ON." }],
  "fuel-015": [{ ref:"FCOM 12.20.9", quote:"The Nitrogen Generation System (NGS) provides automatic full time flammability protection for the fuel system. It generates nitrogen enriched air to displace fuel vapors in all fuel tanks. The nitrogen enriched air minimizes fuel flammability during normal flight and ground operations." }],
  "fuel-016": [{ ref:"FCOM 12.20.1", quote:"The indications that a fuel pump has load shed are that the pump switch PRESS light is illuminated and the pump is labeled LOAD SHED on the fuel synoptic." }],
  "fuel-017": [{ ref:"FCOM 12.30.1–12.30.2", quote:"FUEL QTY LOW Caution ... FUEL FLOW ENG L, R Advisory ... FUEL IMBALANCE Advisory", note:"Per FCOM EICAS table: FUEL QTY LOW is Caution; FUEL FLOW ENG and FUEL IMBALANCE are Advisory, not Caution. INSUFFICIENT FUEL is an FMS advisory message (FCOM 12.30.1). The answer grouping all four as 'alert (caution) level' is not accurate per FCOM." }],
  "fuel-018": [{ ref:"FCOM 12.30.1–12.30.2", quote:"FUEL IN CENTER Advisory — The center tank fuel quantity is at the level where the pump switches must be ON. FUEL LOW CENTER Advisory — The center tank fuel quantity is at the level where the pump switches must be off." }],
  "fuel-019": [{ ref:"FCOM 12.20.3", quote:"The fuel manifolds are arranged so that any fuel tank pump can supply either engine. The crossfeed valve is closed during normal operations. The closed crossfeed valve isolates the left and right systems. The valve can be opened to feed an engine from the opposite fuel tank." }],
  "fuel-020": [{ ref:"FCOM 12.20.8", quote:"MIN FUEL TEMP / FUEL TEMP ... TO REMAIN ... MLW / JETT TIME ... 30 MIN", note:"Jettison schematic diagram labels (12.20.8) show these four fields in the synoptic footer. No single prose sentence lists all four together." }],
  "fuel-021": [{ ref:"FCOM 12.10.1", quote:"CROSSFEED VALVE Light: Illuminated (amber) – the crossfeed valve is not in the selected position." }],
  "fuel-022": [{ ref:"FCOM 12.10.4", quote:"The expanded FUEL QTY display (left main, center, and right main tank quantities) appears for any of the following conditions:", note:"Diagram on 12.10.4 shows L MAIN | CENTER | R MAIN left-to-right order." }],
  "fuel-023": [{ ref:"FCOM L.10.11", quote:"Maximum tank fuel temperature at takeoff is 49° C (120° F) for Jet A, Jet A-1, JP-5, JP-8 or TS-1. Tank fuel temperature prior to takeoff must not be less than -29° C (-20° F). In-flight tank fuel temperature must be maintained at least -42° C, as well as 3° C above the freezing point of the fuel being used.", note:"No # memorization symbol on any fuel temperature limitation in this section. Inflight max 65° C also stated." }],
  "fuel-024": [{ ref:"FCOM 12.10.5", quote:"Fuel to remain (fuel jettison ARMED): the fuel to remain defaults to a fuel quantity that leaves the airplane at maximum landing weight (MLW) when jettison is complete.", note:"Jettison indications diagram (12.10.5) shows both GROSS WT and TO REMAIN MLW on the primary EICAS display." }],
  "fuel-x-001": [{ ref:"FCOM 12.20.7", quote:"APU fuel is supplied from the left fuel manifold." }],
  "fuel-x-002": [{ ref:"FCOM 12.20.7", quote:"With AC power available, the left aft AC fuel pump operates automatically, regardless of fuel pump switch position, and the DC fuel pump turns off." }],
  "fuel-x-003": [{ ref:"FCOM 12.20.7", quote:"On the ground, with the APU switch ON and no AC power available, the DC pump runs automatically." }],
  "fuel-x-004": [{ ref:"FCOM 12.20.1", quote:"Each fuel tank contains two AC–powered fuel pumps." }],
  "fuel-x-005": [{ ref:"FCOM 12.20.1", quote:"A single pump can supply sufficient fuel to operate one engine under all conditions." }],
  "fuel-x-006": [{ ref:"FCOM 12.20.1", quote:"The two center tank fuel pumps are override/jettison pumps. These pumps have a higher output pressure than the left and right main tank fuel pumps." }],
  "fuel-x-007": [{ ref:"FCOM 12.20.1", quote:"The center tank pumps override the main tank pumps so that center tank fuel is used before wing tank fuel." }],
  "fuel-x-008": [{ ref:"FCOM 12.20.1", quote:"The indications that a fuel pump has load shed are that the pump switch PRESS light is illuminated and the pump is labeled LOAD SHED on the fuel synoptic." }],
  "fuel-x-009": [{ ref:"FCOM 12.20.2", quote:"At high altitude, thrust deterioration or engine flameout may occur as a result of the fuel flow reduction." }],
  "fuel-x-010": [{ ref:"FCOM 12.20.2", quote:"As the airplane climbs, dissolved air is released from the fuel in the tank due to the decrease in air pressure. This air may collect in the suction feed line and restrict fuel flow." }],
  "fuel-x-011": [{ ref:"FCOM 12.20.2", quote:"Continued crossfeed use results in a progressive fuel imbalance." }],
  "fuel-x-012": [{ ref:"FCOM 12.20.3", quote:"The fuel manifolds are arranged so that any fuel tank pump can supply either engine.", note:"Crossfeed = tank-to-engine (FCOM 12.20.3). Balance = tank-to-tank: 'Fuel can be transferred from main tank to main tank using the fuel balance system' (FCOM 12.20.3)." },{ ref:"FCOM 12.20.3", quote:"Fuel can be transferred from main tank to main tank using the fuel balance system." }],
  "fuel-x-013": [{ ref:"FCOM 12.10.1", quote:"fuel balance is automatically commanded off for one of the following: fuel is balanced; jettison system is active; FUEL DISAGREE message is displayed; FUEL QTY LOW message is displayed; airplane is on ground and either engine running." }],
  "fuel-x-014": [{ ref:"FCOM 12.10.4", quote:"A solid white fuel imbalance pointer is displayed if: the FUEL IMBALANCE message is not displayed and the main tank fuel differs by more than 200 pounds, and either the crossfeed valve is open or the balance system is ON.", note:"Flashing white (vs. solid white) when crossfeed/balance is going in the wrong direction: 'The pointer flashes if fuel balance or crossfeed is going in the wrong direction.'" }],
  "fuel-x-015": [{ ref:"FCOM 12.10.4", quote:"A solid white fuel imbalance pointer is displayed if: the FUEL IMBALANCE message is not displayed and the main tank fuel differs by more than 200 pounds, and either the crossfeed valve is open or the balance system is ON." }],
  "fuel-x-016": [{ ref:"FCOM 12.10.4", quote:"When fuel is back in balance within 200 pounds between the main tanks and the crossfeed valve is open or the balance system is ON, FUEL BALANCED replaces FUEL QTY on the expanded fuel quantity display and flashes for 5 seconds." }],
  "fuel-x-017": [{ ref:"FCOM 12.10.2", quote:"Fuel Jettison ARM Switch: ARMED – arms the jettison system; initializes fuel–to–remain at the MLW fuel quantity." }],
  "fuel-x-018": [{ ref:"FCOM 12.10.5", quote:"the fuel to remain display replaces the fuel temperature and static air temperature displays." }],
  "fuel-x-019": [{ ref:"FCOM 12.20.7", quote:"The jettison system automatically sets the fuel–to–remain to the maximum landing weight (MLW) fuel quantity." }],
  "fuel-x-020": [{ ref:"FCOM 12.20.7", quote:"In flight, jettison time is displayed in minutes on the fuel synoptic when the jettison arm switch is positioned on while in the air." }],
  "fuel-x-021": [{ ref:"FCOM 12.20.7", quote:"Jettison automatically stops when a value just above the FUEL TO REMAIN quantity is reached." }],
  "fuel-x-022": [{ ref:"FCOM 12.20.1", quote:"When less than all engines/generators are operating, there may not be sufficient electrical power to operate all fuel pumps. In such cases, the fuel system automatically determines the best pumps to operate depending on how much electrical power is available. Certain fuel pumps may be load shed until enough electrical power is available." }],
  "fuel-x-023": [{ ref:"FCOM 12.20.1", quote:"The two center tank fuel pumps are override/jettison pumps. These pumps have a higher output pressure than the left and right main tank fuel pumps. The center tank pumps override the main tank pumps so that center tank fuel is used before wing tank fuel." }],
  "fuel-x-024": [{ ref:"FCOM 12.20.5", quote:"Total ... Gallons 33,380 ... Pounds 223,646", note:"FCOM tank capacities table (12.20.5): Total usable fuel at level attitude, fuel density = 6.7 lb/US gallon." }],
  "fuel-x-025": [{ ref:"FCOM 12.20.7", quote:"On the ground, with the APU switch ON and no AC power available, the DC pump runs automatically.", note:"APU feeds from left manifold (not right). The DC pump is the left main tank DC pump." }],
  "fuel-x-026": [{ ref:"FCOM 12.10.4", quote:"The expanded FUEL QTY display (left main, center, and right main tank quantities) appears for any of the following conditions: crossfeed valve open; one or more fuel tank quantity indications are inoperative; the FUEL IN CENTER alert message is displayed; the FUEL QTY LOW alert message is displayed; the FUEL LOW CENTER alert message is displayed; the FUEL FLOW ENG alert message is displayed; the INSUFFICIENT FUEL alert message is displayed; the FUEL IMBALANCE alert message is displayed; the airplane is on the ground and both engine(s) off; the balance system is active; the balance system is se" }],
  "fuel-x-027": [{ ref:"FCOM 12.20.2", quote:"The dissolved air in the fuel tank eventually depletes after reaching cruise altitude. The depletion time is dependent upon airplane altitude, fuel temperature, and type of fuel. Once the dissolved air is depleted, the engine should effectively operate on suction feed." }],
  "apu-001": [{ ref:"FCOM 7.30.1", quote:"The auxiliary power unit (APU) is a self–contained gas turbine engine located in the airplane tailcone." }],
  "apu-002": [{ ref:"FCOM 7.30.1", quote:"The APU can be started and operated to the airplane maximum certified altitude.", note:"Max certified altitude is 43,100 ft per FCOM L.10.2" },{ ref:"FCOM L.10.2", quote:"# Maximum Operating Altitude 43,100 ft pressure altitude" }],
  "apu-003": [{ ref:"FCOM 7.30.1", quote:"The APU fuel burn is 480 lb/hr for all typical ground operations." }],
  "apu-004": [{ ref:"FCOM 6.20.2", quote:"The APU has two 235V AC variable frequency starter/generators, designated left (L) and right (R). The electrical system automatically selects a single starter/generator to provide sufficient torque for APU start." }],
  "apu-005": [{ ref:"FCOM 6.20.2", quote:"Electrical power for APU start can be provided by forward external power, APU battery, or engine generated power." }],
  "apu-006": [{ ref:"FCOM 7.10.14", quote:"ON (APU operating position) – • opens the APU fuel spar valve and inlet door • activates AC or DC fuel pump • powers the APU controller" }],
  "apu-007": [{ ref:"FCOM 7.10.14", quote:"OFF – • initiates normal shutdown • resets auto shutdown fault logic" }],
  "apu-008": [{ ref:"FCOM 7.10.14", quote:"START (momentary position, spring–loaded to ON) – • initiates automatic start sequence" }],
  "apu-009": [{ ref:"FCOM 7.10.15", quote:"Illuminated (amber): • APU fault and/or fire is detected • APU shutdown due to fault and/or fire • momentarily during APU controller self–test" }],
  "apu-010": [{ ref:"FCOM 7.10.14", quote:"Note: If the common core system is not running, the APU controller delays start until the required common core applications are available." }],
  "apu-011": [{ ref:"FCOM 7.30.1", quote:"The APU battery powers the APU controller (APUC), air inlet door, and the right starter if required." }],
  "apu-012": [{ ref:"FCOM 7.30.1", quote:"The main airplane battery powers the APU fuel shutoff valve, DC fuel pump, and fire detection system." }],
  "apu-013": [{ ref:"FCOM 7.30.1", quote:"The APU battery powers the APU controller (APUC), air inlet door, and the right starter if required. The main airplane battery powers the APU fuel shutoff valve, DC fuel pump, and fire detection system." }],
  "apu-014": [{ ref:"FCOM 7.30.1", quote:"Note: If starting the APU from an unpowered airplane (battery switch recently moved to ON), the APUC waits until the common core system (CCS) applications are available before proceeding with the start. The CCS fire detection and fuel management applications are necessary to start the APU and are available when the CDU page is visible on the lower display unit." }],
  "apu-015": [{ ref:"FCOM 7.30.2", quote:"When the APU air inlet door reaches the full open position, and the required CCS programs are running, the starter engages." }],
  "apu-016": [{ ref:"FCOM 6.20.2", quote:"For APU starts with the APU battery as the power source (no engine running and forward external power not ON), the right starter/generator is always used." }],
  "apu-017": [{ ref:"FCOM 7.30.2", quote:"When the APU reaches starter cutout speed (approximately 50% rpm), the starter disengages and ignition is turned off." }],
  "apu-018": [{ ref:"FCOM 7.30.2", quote:"When the APU is running (95% of target speed + 2 seconds), the EICAS memo message APU RUNNING is displayed and the APU is ready to power the airplane." }],
  "apu-019": [{ ref:"FCOM 7.30.2", quote:"If the start fails, the APU shuts down automatically. The EICAS advisory message APU SHUTDOWN is displayed. Moving the APU selector from ON to OFF clears the message and resets the shutdown system to enable a restart attempt." }],
  "apu-020": [{ ref:"FCOM 7.30.2", quote:"The APU battery is designed to support two consecutive start attempts." }],
  "apu-021": [{ ref:"FCOM 7.30.2", quote:"If the APU fails to start after the second attempt, a 5 minute cooling period must be observed before a third attempt is made." }],
  "apu-022": [{ ref:"FCOM 7.30.2", quote:"The APU continues running in a two minute cooldown cycle." }],
  "apu-023": [{ ref:"FCOM 7.30.2", quote:"The EICAS memo message APU COOLDOWN is displayed." },{ ref:"FCOM 7.40.1", quote:"APU COOLDOWN Memo The APU is running in the cooldown mode." }],
  "apu-024": [{ ref:"FCOM 7.30.2", quote:"At any time during the cooldown period, the APU may be returned to its running condition by placing the APU selector back to ON." }],
  "apu-025": [{ ref:"FCOM 7.30.2", quote:"When the cooldown period finishes, an APU overspeed condition is simulated to test the overspeed and fuel shutoff protection. This shuts off fuel and the APU shuts down." }],
  "apu-026": [{ ref:"FCOM 7.30.2", quote:"At 15% rpm, the APUC commands the air inlet door to close and the normal shutdown sequence is complete." }],
  "apu-027": [{ ref:"FCOM 7.30.3", quote:"The attended mode operates when either engine is starting or running, or when the airplane is in flight." }],
  "apu-028": [{ ref:"FCOM 7.30.3", quote:"The unattended mode operates in all other configurations on the ground." }],
  "apu-029": [{ ref:"FCOM 7.30.3", quote:"In the attended mode, any of the following faults cause the APU to shut down immediately: • APU fire/inlet overtemperature • overspeed/loss of overspeed protection • APU controller failure • speed droop • APU start failure (no rotation, or no acceleration, or no light-off) • Air inlet door failed closed" }],
  "apu-030": [{ ref:"FCOM 7.30.3", quote:"For the following faults, the APU continues to operate and the EICAS caution message APU LIMIT displays: • high EGT • high oil temperature • low oil pressure" }],
  "apu-031": [{ ref:"FCOM 7.40.1", quote:"APU SHUTDOWN Advisory An APU automatic shutdown occurs." }],
  "apu-032": [{ ref:"FCOM 7.40.1", quote:"APU LIMIT Caution Beeper An APU limit exceedance occurs." }],
  "apu-033": [{ ref:"FCOM 7.30.3", quote:"There is no cooldown period. The EICAS advisory message, APU SHUTDOWN, displays.", note:"This statement appears under the APU Attended Mode immediate-shutdown fault list" }],
  "apu-034": [{ ref:"FCOM 7.30.3", quote:"There is no cooldown period when the APU is manually shut down after the APU LIMIT message is displayed." }],
  "apu-035": [{ ref:"FCOM 7.30.4", quote:"In the unattended mode, any of the following faults cause the APU to shutdown immediately: • APU fire/inlet overtemperature • overspeed/loss of overspeed protection • high EGT/loss of EGT signal • low oil pressure • high oil temperature • APU starter/generator oil filter approaching bypass • Air inlet door failed closed • APU controller failure • speed droop • APU starting failure (no rotation, or no acceleration, or no light-off)", note:"Faults additional to attended mode: high EGT/loss of EGT signal, APU starter/generator oil filter approaching bypass" }],
  "apu-036": [{ ref:"FCOM 12.20.7", quote:"APU fuel is supplied from the left fuel manifold. APU fuel can be provided by any AC fuel pump supplying fuel to the left fuel manifold or by the left main tank DC fuel pump." }],
  "apu-037": [{ ref:"FCOM 12.20.7", quote:"APU fuel is supplied from the left fuel manifold." },{ ref:"FCOM 7.30.1", quote:"APU fuel is supplied from the left fuel manifold by any operating AC fuel pump, or by the DC fuel pump in the left main tank." }],
  "apu-038": [{ ref:"FCOM 12.20.7", quote:"On the ground, with the APU switch ON and no AC power available, the DC pump runs automatically." }],
  "apu-039": [{ ref:"FCOM 12.20.7", quote:"With AC power available, the left aft AC fuel pump operates automatically, regardless of fuel pump switch position, and the DC fuel pump turns off." }],
  "apu-040": [{ ref:"FCOM 7.30.1", quote:"The APU is designed to be started with no pumps operating when on the ground or in-flight up to 14,000 feet." }],
  "apu-041": [{ ref:"FCOM 7.30.2", quote:"In flight, if three or more engine generators go offline, the APU automatically starts, regardless of APU selector position." }],
  "apu-042": [{ ref:"FCOM 7.30.2", quote:"When the automatic start condition is no longer valid, the APU can be shut down by positioning the selector to ON, then OFF." }],
  "apu-043": [{ ref:"FCOM 7.30.2", quote:"When the automatic start condition is valid, the APU can only be shut down by pulling the APU fire switch." }],
  "apu-044": [{ ref:"FCOM 8.20.4", quote:"The APU compartment has dual fire detector loops." }],
  "apu-045": [{ ref:"FCOM 8.20.4", quote:"There is no APU overheat detection." }],
  "apu-046": [{ ref:"FCOM 8.20.4", quote:"Normally, both loops must detect a fire to produce a fire warning." }],
  "apu-047": [{ ref:"FCOM 8.20.4", quote:"If a fault is detected in one loop, the system automatically switches to single loop operation. If the operating loop detects a fire, an APU fire warning occurs and the APU shuts down." }],
  "apu-048": [{ ref:"FCOM 8.20.4", quote:"The EICAS advisory message DET FIRE APU is displayed if the APU fire detection system fails." }],
  "apu-049": [{ ref:"FCOM 8.20.4", quote:"The indications of an APU fire warning are: • the fire bell sounds • the master WARNING lights illuminate • the EICAS warning message FIRE APU is displayed • the APU fire switch fire warning light illuminates • the APU fire switch unlocks" }],
  "apu-050": [{ ref:"FCOM 8.20.4", quote:"There is one APU fire extinguisher bottle." }],
  "apu-051": [{ ref:"FCOM 8.10.3", quote:"Out – • arms the APU fire extinguisher bottle • closes the APU fuel valve • closes the APU air inlet door • trips the APU generator field and generator breaker • shuts down the APU (if automatic shutdown does not occur)" }],
  "apu-052": [{ ref:"FCOM 8.10.3", quote:"Rotate – either direction discharges the APU fire extinguisher into the APU compartment." }],
  "apu-053": [{ ref:"FCOM 8.20.4", quote:"An APU fire signal causes the APU to shutdown immediately. The APU extinguisher bottle is automatically discharged after a 15 second delay to allow time for the fuel valve to close." }],
  "apu-054": [{ ref:"FCOM 8.20.4", quote:"On the ground with both engines off an APU fire signal from either APU fire detector loop causes APU shutdown and extinguisher bottle discharge." }],
  "apu-055": [{ ref:"FCOM 8.10.3", quote:"APU Bottle Discharge (APU BTL DISCH) Light Illuminated (amber) – the extinguisher bottle is discharged or has low pressure." }],
  "apu-056": [{ ref:"FCOM 8.20.4", quote:"If the bottle is discharged or has low pressure: • the APU BTL DISCH light illuminates • the EICAS advisory message BOTTLE DISCH APU is displayed" }],
  "apu-057": [{ ref:"FCOM PI.17.11", quote:"For APU operation during flight, increase fuel flow according to the following table. These increments include the APU fuel flow and the effect of increased drag from the APU door." }],
  "apu-058": [{ ref:"FCOM PI.17.11", quote:"PRESSURE ALTITUDE (1000 FT) ... APU FUEL FLOW PENALTY (LB/HR) 43 ... 190", note:"43,000 ft = 190 lb/hr penalty per the APU FUEL FLOW PENALTY table" }],
  "apu-059": [{ ref:"FCOM PI.17.11", quote:"PRESSURE ALTITUDE (1000 FT) ... APU FUEL FLOW PENALTY (LB/HR) 20 ... 370", note:"20,000 ft = 370 lb/hr penalty per the APU FUEL FLOW PENALTY table" }],
  "apu-060": [{ ref:"FCOM PI.17.11", quote:"PRESSURE ALTITUDE (1000 FT) ... APU FUEL FLOW PENALTY (LB/HR) 5 ... 530", note:"5,000 ft = 530 lb/hr penalty per the APU FUEL FLOW PENALTY table" }],
  "apu-061": [{ ref:"FCOM PI.17.11", quote:"These increments include the APU fuel flow and the effect of increased drag from the APU door.", note:"Table shows penalty increases as altitude decreases: 190 lb/hr at 43,000 ft to 530 lb/hr at 5,000 ft — penalty increases with lower altitude" }],
  "genops-001": [],
  "genops-002": [{ ref:"FCOM 1.40.34 / 1.45 region", quote:"The flight deck overhead door is hinged to fall inward when opened. Care should be taken to avoid injury when opening the overhead door.", note:"FCOM Ch.1 S.40 overhead door controls & indicators; door opens inward and hangs from the ceiling on hinges" }],
  "genops-003": [{ ref:"FCOM 1.40", quote:"The EICAS advisory message DOOR FD OVHD is displayed if the door is not closed and secure.", note:"FCOM Ch.1 S.40 overhead door section" }],
  "genops-004": [{ ref:"FCOM 1.30", quote:"Oxygen Flow Indicator — Shows a yellow cross when oxygen is flowing.", note:"FCOM Ch.1 S.30 oxygen controls & indicators" }],
  "genops-005": [{ ref:"FCOM 1.30", quote:"RESET/TEST Switch — Push — with the left oxygen panel door closed and the OXY ON flag displayed: turns oxygen off and deactivates the mask microphone; reactivates the boom microphone.", note:"FCOM Ch.1 S.30 oxygen controls & indicators" }],
  "genops-006": [{ ref:"FCOM 1.45.3", quote:"After discharge of an entire fire extinguisher, it can take up to 7 minutes for the agent to dissipate. Signs of smoke should be clear, and the agent dissipated before removal of oxygen masks or protective breathing equipment.", note:"FCOM Ch.1 S.45 Emergency Equipment — Halon/equivalent extinguisher warning" }],

  "limitations-078": [{ ref:"FCOM NP.21", quote:"If the FUEL IN CENTER message shows, set both CENTER FUEL PUMP switches to ON." }],
  "limitations-079": [{ ref:"FCOM NP.21", quote:"When the FUEL LOW CENTER message shows, set both CENTER FUEL PUMP switches to OFF." }],
  "limitations-080": [{ ref:"FCOM 12.30.1", quote:"FUEL LOW CENTER Advisory: The center tank fuel quantity is at the level where the pump switches must be off.", note:"Procedure: turn center pumps on when FUEL IN CENTER shows; turn off when FUEL LOW CENTER shows." }],
  "limitations-081": [{ ref:"FCOM L.10.10", quote:"Main tanks must be scheduled to be full if center tank fuel is loaded." }],
  "limitations-082": [{ ref:"FCOM L.10.10", quote:"Note: The center tank may contain up to 22000 pounds of fuel with less than full main tanks provided center tank fuel weight plus actual zero fuel weight does not exceed the maximum zero fuel weight, and center of gravity limits are observed." }],
  "limitations-083": [{ ref:"FCOM 12.10.x", quote:"At least 8700 pounds of fuel remains in each main tank after jettison is complete.", note:"Flaps 30 jettison prohibition sourced from the fuel jettison system description; specific 'Flaps 30' restriction not located as verbatim text in provided manual extracts." }],
  "limitations-084": [],
  "limitations-085": [],
  "limitations-086": [{ ref:"FCOM L.10.1", quote:"Assuming that the remaining items are available to the flight crew by reference, they do not need to be memorized.", note:"Fuel imbalance limits not marked # in FCOM Limitations chapter; the FUEL IMBALANCE advisory requires action but the specific trigger values are reference items." }],
  "limitations-087": [{ ref:"FCOM 1.46.1", quote:"The overhead flight crew rest is to be occupied by flight crew members trained in the use of the crew rest evacuation routes, fire fighting and depressurization procedures." }],
  "limitations-088": [],
  "limitations-089": [{ ref:"FCOM L.10.10", quote:"Do not use the terrain display for navigation." }],
  "limitations-090": [{ ref:"FCOM L.10.10", quote:"The use of look-ahead terrain alerting and terrain display functions are prohibited within 15 NM of takeoff, approach or landing at an airport or runway not contained in the GPWS terrain database." }],
  "landing-gear-001": [{ ref:"FCOM 14.20.1", quote:"Hydraulic power for retraction, extension, and steering is supplied by the center hydraulic system. An alternate extension system is also provided." }],
  "landing-gear-002": [{ ref:"FCOM 14.20.3", quote:"There are four EBACs that control all eight main wheel brakes, each EBAC controlling the brake force of a fore-aft wheel pair." }],
  "landing-gear-003": [{ ref:"FCOM 14.20.1", quote:"The Electro-Mechanical Brake System has four Electric Brake Actuator Controllers (EBACs) and thirty-two Electric Brake Actuators (EBAs), four per wheel brake." }],
  "landing-gear-004": [{ ref:"FCOM 14.20.3", quote:"EBAs use power only when they change position.", note:"Verbatim from training deck slide 13 (FCOM ch.14 source); not separately restated in FCOM prose but consistent with electric actuator design described in 14.20.3." }],
  "landing-gear-005": [{ ref:"FCOM 14.20.1", quote:"The system receives air/ground logic signals from sensors located on each main landing gear beam." }],
  "landing-gear-006": [{ ref:"FCOM 14.20.1", quote:"On the ground, the lever is held in the DN position by an automatic lever lock." }],
  "landing-gear-007": [{ ref:"FCOM 14.20.1", quote:"In flight, the lever lock is automatically released through air/ground sensing." }],
  "landing-gear-008": [{ ref:"FCOM 14.20.1", quote:"The lever lock can be manually overridden by pushing and holding the landing gear lever LOCK OVERRIDE switch." },{ ref:"FCOM 14.10.1", quote:"Landing Gear Lever Lock Override (LOCK OVRD) Switch — Push – releases the landing gear lever lock." }],
  "landing-gear-009": [{ ref:"FCOM 14.20.1", quote:"To improve performance, an early doors function automatically pre-opens the main landing gear doors one second after lift-off and prior to the pilot moving the gear lever to the UP position." }],
  "landing-gear-010": [{ ref:"FCOM 14.20.1", quote:"If the pilot does not move the gear lever to UP within 30 seconds, the main gear doors return to the closed position." }],
  "landing-gear-011": [{ ref:"FCOM 14.20.1", quote:"During a touch-and-go, the early doors function does not activate until the airplane has been on the ground for more than 30 seconds." }],
  "landing-gear-012": [{ ref:"FCOM 14.20.1", quote:"The EICAS landing gear position indication display changes from a green DOWN indication to a white crosshatch in-transit indication as the landing gear retract into the wheel wells." },{ ref:"FCOM 14.10.4", quote:"Crosshatched (white) – one or more landing gear are in transit." }],
  "landing-gear-013": [{ ref:"FCOM 14.20.1", quote:"The EICAS landing gear position indication changes to UP for 10 seconds and then blanks." }],
  "landing-gear-014": [{ ref:"FCOM 14.20.1", quote:"With the landing gear retracted and all doors closed, the landing gear hydraulic system is automatically depressurized." }],
  "landing-gear-015": [{ ref:"FCOM 14.20.3", quote:"During alternate extension, the EICAS message GEAR DOOR is displayed because all the hydraulically powered gear doors remain open." }],
  "landing-gear-016": [{ ref:"FCOM 14.20.3", quote:"The alternate landing gear extension system uses a dedicated DC powered electric hydraulic pump and center hydraulic system fluid to extend the landing gear." }],
  "landing-gear-017": [{ ref:"FCOM 14.10.4", quote:"Empty box (white) – all landing gear position indicators are inoperative." }],
  "landing-gear-018": [{ ref:"FCOM 14.10.4", quote:"Expanded Gear Position Indication (Non–Normal Display) — DN (green) – the associated landing gear is down and locked." }],
  "landing-gear-019": [{ ref:"FCOM 14.20.3", quote:"The tillers can turn the nosewheels up to 70º in either direction." },{ ref:"FCOM 14.10.1", quote:"Nose Wheel Steering Tiller — Rotate – turns the nose wheels up to 70º in either direction." }],
  "landing-gear-020": [{ ref:"FCOM 14.20.3", quote:"The rudder pedals can be used to turn the nosewheels up to 8º in either direction." },{ ref:"FCOM 14.10.2", quote:"Rudder/Brake Pedals — Push the full pedal – turns the nose wheel up to 8º in either direction." }],
  "landing-gear-021": [{ ref:"FCOM 14.20.3", quote:"Tiller inputs are summed with rudder pedal inputs.", note:"Combined max is capped at the tiller maximum of 70°; see also FCOM 14.10.1 tiller description." }],
  "landing-gear-022": [{ ref:"FCOM 14.10.1", quote:"Nose Wheel Steering Tillers — 1 Nose Wheel Steering Tiller / 2 Tiller Position Indicator", note:"FCOM prose does not explicitly state tillers are not interconnected; the training deck (Slide 10) states 'Left and right tillers are not interconnected.' No conflicting FCOM passage found." }],
  "landing-gear-023": [{ ref:"FCOM 14.10.2", quote:"Rudder Pedal Disconnect Switch — A rudder pedal disconnect switch is provided to temporarily disable the rudder pedal inputs. Note: The switch is used during a flight controls freedom of motion check. The switch must be held down to function and is spring loaded to the out position." }],
  "landing-gear-024": [{ ref:"FCOM 14.20.3", quote:"Each main gear wheel has a multiple disc carbon brake. The nosewheels have no brakes." }],
  "landing-gear-025": [{ ref:"FCOM 14.20.3", quote:"Each main gear wheel has a multiple disc carbon brake." }],
  "landing-gear-026": [{ ref:"FCOM 14.20.3", quote:"Four Electric Brake Actuators (EBAs) are provided on each main landing gear wheel brake to control the application of braking force to the carbon disc. The EBAs are controlled by an Electric Brake Actuator Controller (EBAC)." }],
  "landing-gear-027": [{ ref:"FCOM 14.20.4", quote:"Touchdown and hydroplaning protection is provided using airplane inertial groundspeed." }],
  "landing-gear-028": [{ ref:"FCOM 14.20.4", quote:"Locked wheel protection is provided using a comparison with other wheel speeds." }],
  "landing-gear-029": [{ ref:"FCOM 14.20.4", quote:"Antiskid protection is provided on an individual main gear wheel basis. When a wheel speed sensor detects a skid, the braking force is reduced until skidding stops.", note:"Training deck (Slide 14) specifies RDC as data source; FCOM 14.20.4 describes the wheel speed sensor basis without naming the RDC by acronym." }],
  "landing-gear-030": [{ ref:"FCOM 14.20.4", quote:"Antiskid protection is provided on an individual main gear wheel basis. When a wheel speed sensor detects a skid, the braking force is reduced until skidding stops.", note:"Training deck (Slide 14) explicitly states 'Antiskid system requires no flight crew interface'; FCOM 14.20.4 describes fully automatic operation without crew action." }],
  "landing-gear-031": [{ ref:"FCOM 14.20.4", quote:"The EICAS advisory message ANTISKID is displayed if an antiskid fault affecting the brake system is detected or if the system is completely inoperative." },{ ref:"FCOM 14.30.1", quote:"ANTISKID — Advisory — An antiskid system fault occurs." }],
  "landing-gear-032": [{ ref:"FCOM 14.20.4", quote:"The RTO autobrake setting commands maximum braking pressure if: • the airplane is on the ground, and • groundspeed is above 85 knots, and • both thrust levers are retarded to idle" }],
  "landing-gear-033": [{ ref:"FCOM 14.20.4", quote:"If an RTO is initiated at or below 85 knots, the RTO autobrake function does not operate." }],
  "landing-gear-034": [{ ref:"FCOM 14.20.4", quote:"The RTO mode can be selected only on the ground." }],
  "landing-gear-035": [{ ref:"FCOM 14.20.5", quote:"Five levels of deceleration can be selected for landing." }],
  "landing-gear-036": [{ ref:"FCOM 14.20.5", quote:"After landing, autobrake application begins when: • both thrust levers are retarded to idle, and • the wheels have spun up" }],
  "landing-gear-037": [{ ref:"FCOM 14.20.5", quote:"If MAX AUTO is selected, deceleration is limited to the AUTOBRAKE 4 level until pitch angle is less than one degree, then deceleration is increased to the MAX AUTO level." }],
  "landing-gear-038": [{ ref:"FCOM 14.20.5", quote:"The deceleration level can be changed (without disarming the system) by rotating the selector." }],
  "landing-gear-039": [{ ref:"FCOM 14.20.5", quote:"The autobrake system disarms and the EICAS advisory message AUTOBRAKE is displayed if any of the following occur: • pedal braking applied • either thrust lever advanced after landing • speedbrake lever is moved to the DOWN detent after the speedbrakes have deployed on the ground • DISARM or OFF position selected on the AUTOBRAKE selector • autobrake fault • normal antiskid system fault • loss of inertial data from the Inertial Reference Units (IRUs)" }],
  "landing-gear-040": [{ ref:"FCOM 14.20.5", quote:"When the autobrake system disarms after landing, the AUTOBRAKE selector automatically moves to the DISARM position, and removes power from the autobrake system." }],
  "landing-gear-041": [{ ref:"FCOM 14.20.5", quote:"When the autobrake system disarms during takeoff, the AUTOBRAKE selector remains in the RTO position, but automatically moves to OFF after takeoff." }],
  "landing-gear-042": [{ ref:"FCOM 14.20.5", quote:"During each manual brake application, the brake control system applies one-half of the brakes on each main landing gear (if wheel speeds are less than 30 knots)" }],
  "landing-gear-043": [{ ref:"FCOM 14.20.5", quote:"The brake pedal must be fully released to transition to the other two brakes on a main landing gear." }],
  "landing-gear-044": [{ ref:"FCOM 14.10.3", quote:"CONTROL STAND — 1 Parking Brake Lever — Pull – sets the parking brake when both brake pedals are simultaneously depressed.", note:"Diagram label 'CONTROL STAND' on page 14.10.3 places the lever on the control stand." }],
  "landing-gear-045": [{ ref:"FCOM 14.20.6", quote:"The parking brake is set by fully depressing both brake pedals, pulling the parking brake lever up, then releasing the pedals." }],
  "landing-gear-046": [{ ref:"FCOM 14.20.6", quote:"The parking brake is released by depressing the pedals until the parking brake lever releases." },{ ref:"FCOM 14.10.3", quote:"Parking Brake Lever — Release – simultaneously depress both brake pedals." }],
  "landing-gear-047": [{ ref:"FCOM 14.20.6", quote:"The parking brake electric actuators are clamped in position during parking brake application and require no active power to maintain the clamping force." }],
  "landing-gear-048": [{ ref:"FCOM 14.20.6", quote:"The parking brake system has a \"park and adjust\" feature which monitors the condition of the brakes after application and adjusts the clamping force as needed during brake cooling." }],
  "landing-gear-049": [{ ref:"FCOM 14.20.6", quote:"BSCUs keep braking power ON for 60 minutes to allow EBACs to adjust EBAs for thermal changes.", note:"Verbatim from training deck Slide 21 (sourced to FCOM ch.14). FCOM prose describes 'park and adjust' feature; the 60-minute duration is from the training deck." }],
  "landing-gear-050": [{ ref:"FCOM 14.20.6", quote:"If airplane power goes OFF: BSCUs use main battery power for the remaining part of the 60-minute period.", note:"From training deck Slide 21. Consistent with FCOM electrical ch. description of brake power supply backup via main battery (FCOM 5.20)." }],
  "landing-gear-051": [{ ref:"FCOM 14.20.6", quote:"When the parking brake is set, the EICAS memo message PARKING BRAKE SET is displayed." },{ ref:"FCOM 14.30.1", quote:"PARKING BRAKE SET — Memo — The parking brake is set." }],
  "landing-gear-052": [{ ref:"QRH 14.2", quote:"BRAKE TEMP — 3 Unless needed, do not set the parking brake." }],
  "landing-gear-053": [{ ref:"FCOM 14.20.6", quote:"Numerical values related to wheel brake temperature are displayed adjacent to each wheel/brake symbol. These values range from 0.0 to 9.9 in increments of 0.1." }],
  "landing-gear-054": [{ ref:"FCOM 14.20.6", quote:"Normal range values of 0 to 4.9 are white." },{ ref:"FCOM 14.10.7", quote:"Brake Normal (white) — Brake temperature value in normal range from 0.0 to 4.9." }],
  "landing-gear-055": [{ ref:"FCOM 14.10.7", quote:"Hottest Brake (solid white) — Brake temperature value from 3.0 to 4.9. Only one hottest brake symbol per truck is displayed at any time." }],
  "landing-gear-056": [{ ref:"FCOM 14.10.7", quote:"Brake Overheat (solid amber) — Brake temperature value from 5.0 to 9.9. Multiple brake overheat symbols may appear simultaneously." }],
  "landing-gear-057": [{ ref:"FCOM 14.20.6", quote:"An EICAS advisory message, BRAKE TEMP, displays when any brake registers 5.0 or higher on the gear synoptic display until all brake temperatures are below 3.0." }],
  "landing-gear-058": [{ ref:"FCOM 14.20.6", quote:"An EICAS advisory message, BRAKE TEMP, displays when any brake registers 5.0 or higher on the gear synoptic display until all brake temperatures are below 3.0." }],
  "landing-gear-059": [{ ref:"FCOM PD.12.10", quote:"do not dispatch until the BRAKE TEMP message is no longer displayed." }],
  "landing-gear-060": [{ ref:"FCTM 6.24", quote:"This system indicates a stabilized value approximately fifteen minutes after brake energy absorption. Therefore, an immediate or reliable indication of tire or hydraulic fluid fire, wheel bearing problems, or wheel fracture is not available." },{ ref:"FCTM 6.24", quote:"Note: Brake energy data provided in the QRH should be used to identify potential overheat situations." }],
  "landing-gear-061": [{ ref:"FCOM 14.20.6", quote:"Spoilers 6 and 9 are also used to provide wheel well cooling: raising these spoilers draws cooling air into the wheel well; occurs automatically when temperatures reach a certain value.", note:"From training deck Slide 23 (sourced to FCOM ch.14). No separate verbatim paragraph found in FCOM 14.20 prose; spoiler-based wheel well cooling is a system function described in the deck." }],
  "landing-gear-062": [{ ref:"FCOM 14.20.6", quote:"Normal values are depicted in white." },{ ref:"FCOM 14.10.7", quote:"Tire Pressure Normal (white) — [symbol showing tire pressure in normal range]" }],
  "landing-gear-063": [{ ref:"FCOM 14.10.7", quote:"Tire Pressure Abnormal (amber) — Indicates respective tire pressure in abnormal high or low range." },{ ref:"FCOM 14.20.6", quote:"Above or below normal range values are depicted in amber." }],
  "landing-gear-064": [{ ref:"FCOM 14.20.7", quote:"The EICAS advisory message TIRE PRESS is displayed if one or more tire pressures are not normal while on the ground, or if two or more tire pressures are not normal while in the air." },{ ref:"FCOM 14.30.1", quote:"TIRE PRESS — Advisory — One or more tire pressures are not normal while on the ground, or if two or more tire pressures are not normal while in the air." }],
  "landing-gear-065": [{ ref:"FCOM PI.15", quote:"For normal operations, the tires have a speed limit of 204 knots (235 MPH)." }],
  "landing-gear-066": [{ ref:"FCOM PI.15", quote:"For non-normal landings, the tires are allowed to exceed this speed limit, but may not exceed the maximum tire speed limit of 226 knots (260 MPH)." }],
  "landing-gear-067": [{ ref:"FCOM 14.20.6", quote:"A logbook entry shall be made for a landing exceeding 204 knots tire speed.", note:"From training deck Slide 25. Not found verbatim in FCOM 14.20 prose text; consistent with maintenance action thresholds described in the deck." }],
  "landing-gear-068": [{ ref:"FCOM 14.10.2", quote:"Rudder Pedal Adjust Crank — Adjusts the rudder pedals forward or aft.", note:"Training deck Slide 27 specifies 'no faster than one turn per second'; FCOM 14.10.2 describes the crank function without stating the speed limit explicitly." }],
  "landing-gear-069": [{ ref:"FCOM 14.10.2", quote:"Rudder Pedal Adjust Crank — Note: To avoid inadvertent rudder pedal movement, the crank handle should be stowed when not in use." }],
  "landing-gear-070": [{ ref:"FCOM 14.20.6", quote:"Tire pressures are displayed inside each individual gear symbol on the GEAR synoptic." }],
  "engines-001": [{ ref:"FCOM 7.20.1", quote:"The airplane is powered by two General Electric GEnx-1B74/75 engines." }],
  "engines-002": [{ ref:"FCOM 7.20.1", quote:"The engines are rated at 74,100 pounds of takeoff thrust each." }],
  "engines-003": [{ ref:"FCOM 7.20.1", quote:"The N1 rotor consists of a fan, a low pressure compressor section, and low pressure turbine section on a common shaft." }],
  "engines-004": [{ ref:"FCOM 7.20.1", quote:"The N2 rotor consists of a high pressure compressor section and a high pressure turbine section on a common shaft." }],
  "engines-005": [{ ref:"FCOM 7.20.1", quote:"The engine accessory gearbox is driven by the high speed N2 engine shaft." }],
  "engines-006": [{ ref:"FCOM 7.20.1", quote:"The N1 and N2 rotors are mechanically independent." }],
  "engines-007": [{ ref:"FCOM 7.20.2", quote:"N1 and EGT are the primary engine indications. The primary engine indications are displayed full-time on the EICAS display." }],
  "engines-008": [{ ref:"FCOM 7.20.17", quote:"the reverser indication REV is displayed in amber above each digital N1 indication (REV is displayed in amber when the reverser is in transit)" }],
  "engines-009": [{ ref:"FCOM 7.20.17", quote:"the REV indication changes to green when the reverser is fully deployed" }],
  "engines-010": [{ ref:"FCOM 7.10.3", quote:"Maximum N1 Line — Displayed (amber)." }],
  "engines-011": [{ ref:"FCOM 7.10.3", quote:"Reference/Target N1 — Displayed (green) – reference N1 limit. Displayed (magenta) – target FMC commanded N1 when VNAV is active and: autothrottle connected in THR or THR REF mode, or autothrottle disconnected" }],
  "engines-012": [{ ref:"FCOM 7.20.19", quote:"The vibration source indication (N1, N2, or BB) is also displayed. If the vibration monitoring system cannot determine the source, BB (broadband) is displayed for the affected engine." }],
  "engines-013": [{ ref:"FCOM 7.10.11", quote:"Engine Vibration — Displayed: (white) – normal operating range; (black numbers on a white background) – high vibration" }],
  "engines-014": [{ ref:"FCOM 7.20.2", quote:"The secondary engine indications are automatically displayed when: the displays initially receive electrical power; a FUEL CONTROL switch is moved to CUTOFF in flight; an engine fire switch is pulled in flight; a secondary engine parameter is exceeded; engine N2 RPM is below idle in flight; a start selector is in the START position; FUEL FLOW ENG L/R Advisory is shown" }],
  "engines-015": [{ ref:"FCOM 7.20.2", quote:"When secondary engine parameters are automatically displayed on EICAS due to any of the above conditions, they cannot be cleared until the condition is no longer present." }],
  "engines-016": [{ ref:"FCOM 7.20.4", quote:"Each EEC has full authority over engine operation. The EEC uses thrust lever inputs to automatically control forward and reverse thrust. The EEC has two control modes: normal and alternate." }],
  "engines-017": [{ ref:"FCOM 7.20.4", quote:"In both normal and alternate modes, the EEC uses N1 RPM as the controlling parameter." }],
  "engines-018": [{ ref:"FCOM 7.20.5", quote:"Overspeed protection is provided on the N2 shaft (N1 is indirectly protected by the N2 protection)." }],
  "engines-019": [{ ref:"FCOM 7.20.5", quote:"If RPM limiting fails and an overspeed condition persists, the EEC commands fuel shut off to shutdown the engine. The EICAS caution message ENG FAIL (L or R) is displayed with an aural beeper once the engine falls below idle speed." }],
  "engines-020": [{ ref:"FCOM 7.20.5", quote:"The EICAS advisory message ENG RPM LIMITED (L or R) is displayed when RPM limiting is in effect." }],
  "engines-021": [{ ref:"FCOM 7.20.4", quote:"As an alternate source to the ADRS, there are two static ports located on the lower portion of the fan cowls, at the 4 o'clock and the 8 o'clock positions." }],
  "engines-022": [{ ref:"FCOM 7.20.4", quote:"During engine start, initial EEC power is supplied by the airplane until a Permanent Magnet Alternator (PMA) is able to provide sufficient power." }],
  "engines-023": [{ ref:"FCOM 7.20.4", quote:"During engine start, initial EEC power is supplied by the airplane until a Permanent Magnet Alternator (PMA) is able to provide sufficient power." }],
  "engines-024": [{ ref:"FCOM 7.20.4", quote:"The airplane also serves as an alternate EEC power source whenever a PMA is unavailable." }],
  "engines-025": [{ ref:"FCOM 7.20.4", quote:"Maximum rated thrust is available in any phase of flight by moving the thrust levers to the full forward positions." }],
  "engines-026": [{ ref:"FCOM 7.20.5", quote:"Soft – When the EEC automatically switches an engine to the alternate mode and the EEC mode switch remains in NORM, the EEC is in the soft alternate mode … at a fixed thrust lever position, thrust does not change. Hard – When ALTN is manually selected on an EEC mode switch, that engine is switched to the hard alternate mode … Thrust may change to set the commanded N1 when ALTN is manually selected" }],
  "engines-027": [{ ref:"FCOM 7.20.5", quote:"The autothrottles remain connected whenever the EEC automatically switches to the alternate mode.", note:"Note also states: Autothrottles remain connected in the soft or hard alternate mode." }],
  "engines-028": [{ ref:"FCOM 7.20.5", quote:"The alternate mode schedule (N1 schedule) provides equal or greater thrust than the normal mode for the same thrust lever position." }],
  "engines-029": [{ ref:"FCOM 7.20.5", quote:"Thrust protection is not provided in the alternate mode and maximum rated thrust is reached at a thrust lever position less than full forward." }],
  "engines-030": [{ ref:"FCOM 7.20.5", quote:"Thrust protection is not provided in the alternate mode and maximum rated thrust is reached at a thrust lever position less than full forward. As a result, thrust overboost can occur at full forward thrust lever positions." }],
  "engines-031": [{ ref:"FCOM 7.20.5", quote:"The EICAS caution message ENG LIMIT PROT (L, R) is displayed if the thrust lever position commands an N1 greater than the maximum rated thrust (maximum N1)." }],
  "engines-032": [{ ref:"FCOM 7.20.5", quote:"N1 and N2 red line protection is still available in the alternate control mode." }],
  "engines-033": [{ ref:"FCOM 7.20.6", quote:"The EEC commands shutdown of the affected engine when the: airplane is on the ground, and thrust lever is at idle, and engine is above idle speed and not decelerating normally" }],
  "engines-034": [{ ref:"FCOM 7.20.6", quote:"Thrust ramping is only active on the ground with the EEC in normal mode." }],
  "engines-035": [{ ref:"FCOM 7.20.16", quote:"Each engine has a hydraulically actuated fan air thrust reverser." }],
  "engines-036": [{ ref:"FCOM 7.20.16", quote:"Reverse thrust is available only on the ground." }],
  "engines-037": [{ ref:"FCOM 7.20.17", quote:"When the reverse thrust levers are pulled aft to the interlock position: the autothrottle disengages; the auto speedbrakes deploy" }],
  "engines-038": [{ ref:"FCOM 7.20.17", quote:"the fan flow blocker doors rotate into place to direct fan air through stationary cascade guide vanes" }],
  "engines-039": [{ ref:"FCOM 7.10.13", quote:"FUEL CONTROL Switch — RUN: opens the spar fuel valve; arms the engine fuel valve (the EEC opens the valve when required); arms the selected igniters (the EEC turns the igniters on when required)" }],
  "engines-040": [{ ref:"FCOM 7.10.13", quote:"FUEL CONTROL Switch — CUTOFF: closes the engine fuel valve (and spar fuel valve if start switch not in START); removes igniter power; unlocks the engine fire switch" }],
  "engines-041": [{ ref:"FCOM 7.20.10", quote:"The engines can only be started using the autostart system." }],
  "engines-042": [{ ref:"FCOM 7.20.10", quote:"There are two power sources that can provide starter power; the APU and the forward external power." }],
  "engines-043": [{ ref:"FCOM 7.20.10", quote:"Simultaneous engine start is only allowed when the APU is running and both APU starter/generators are operational." }],
  "engines-044": [{ ref:"FCOM 7.20.10", quote:"If both engines are commanded to start with an inadequate power configuration, the second start command is ignored." }],
  "engines-045": [{ ref:"FCOM 7.20.10", quote:"Load shed always occurs during engine start." }],
  "engines-046": [{ ref:"FCOM 7.20.10", quote:"Load shed always occurs during engine start. Shed systems appear on their respective synoptic with the majority appearing on the electrical synoptic.", note:"FCOM does not enumerate specific shed items by name; the quiz answer list (AIR, CABIN LOADS, etc.) appears to originate from the training deck rather than a verbatim FCOM passage." }],
  "engines-047": [{ ref:"FCOM 7.20.10", quote:"The EEC monitors the start and commands starter cutout when the engine reaches idle speed. The START selector then releases to the NORM position." }],
  "engines-048": [{ ref:"FCOM 7.20.14", quote:"It flows through a fuel/oil heat exchanger where it is preheated. The fuel then passes through the second stage engine fuel pump where additional pressure is added." }],
  "engines-049": [{ ref:"FCOM 7.20.14", quote:"The fuel metering unit adjusts fuel flow to meet thrust requirements." }],
  "engines-050": [{ ref:"FCOM 7.20.14", quote:"Fuel flow is measured after passing through the engine fuel valve." }],
  "engines-051": [{ ref:"FCOM 7.20.19", quote:"A red ENG FAIL is displayed on both PFDs, and ENG FAIL is displayed on both HUDs if actual thrust is less than commanded thrust during takeoff with airspeed between 65 knots and 6 knots prior to V1." }],
  "engines-052": [{ ref:"FCOM 7.20.19", quote:"The PFD and HUD displays are accompanied by the voice annunciation \"Engine Fail,\" and the Master WARNING lights illuminating." }],
  "engines-053": [{ ref:"FCOM 7.20.19", quote:"The EICAS caution message ENG FAIL (L or R) is displayed if an engine unexpectedly decelerates to less than idle speed." }],
  "engines-054": [{ ref:"FCOM 7.20.19", quote:"The message remains displayed until the engine recovers or the fuel control switch is moved to CUTOFF." }],
  "engines-055": [{ ref:"FCOM 7.20.7", quote:"TAP is an automatic feature that provides protection against asymmetric thrust during takeoff or go-around by limiting thrust on the higher thrust engine." }],
  "engines-056": [{ ref:"FCOM 7.20.8", quote:"TAP is only available when the flight controls are operating in normal mode, and the EEC is in normal or alternate modes." }],
  "engines-057": [{ ref:"FCOM 7.20.8", quote:"The purpose of the transient bleed system is to unload the compressor during engine acceleration for increased engine stall margin." }],
  "engines-058": [{ ref:"FCOM 7.20.8", quote:"The system is composed of one fuel operated transient bleed valve (TBV) per engine controlled by the EEC and based on N2 rotor speed." }],
  "engines-059": [{ ref:"FCOM 7.20.9", quote:"The EEC commands the TBV to open during an above idle acceleration." }],
  "engines-060": [{ ref:"FCOM 7.20.9", quote:"the associated thrust reverser is inhibited if the TBV fails open prior to thrust reverser deployment" }],
  "engines-061": [{ ref:"FCOM 7.20.9", quote:"or is limited to idle if the failure occurs while the thrust reverser is deployed. In either case, the EICAS advisory message ENG REV LIMITED (L or R) is displayed." }],
  "engines-062": [{ ref:"FCOM 7.20.9", quote:"The EEC selects minimum idle, approach idle, icing idle automatically." }],
  "engines-063": [{ ref:"FCOM 7.20.9", quote:"Approach idle is selected in flight when: the flaps are commanded to 25 or greater, or the landing gear is selected DOWN" }],
  "engines-064": [{ ref:"FCOM 7.20.9", quote:"Approach idle decreases engine acceleration time for go-around." }],
  "engines-065": [{ ref:"FCOM 7.20.9", quote:"Approach idle is maintained until after touchdown when the EEC selects minimum idle." }],
  "engines-066": [{ ref:"FCOM 7.20.9", quote:"Icing idle is selected when: engine anti-ice on" }],
  "engines-067": [{ ref:"FCOM 7.20.9", quote:"Ice Crystal Anti-Ice (ICA) is an automatic feature that provides engine protection against ice crystal icing (ICI)." }],
  "engines-068": [{ ref:"FCOM 7.20.9", quote:"The ICA function activates only above 30,000 feet." }],
  "engines-069": [{ ref:"FCOM 7.20.9", quote:"The ICA function activates for at least 30 minutes and may continue in additional 15 minute increments, for as long as ICI conditions are encountered." }],
  "engines-070": [{ ref:"FCOM 7.20.9", quote:"If the airplane descends below 28,500 feet the ICA function terminates." }],
  "engines-071": [{ ref:"FCOM 7.10.3", quote:"Ice Crystal Anti-Ice Indication (ICA) — Displayed (green): ice crystal anti-ice function is on; ice crystal icing conditions may not be present" }],
  "engines-072": [{ ref:"FCOM 7.20.10", quote:"Each engine's ice crystal icing function is independent from the other. Each engine's parameters may fluctuate differently, and each engine's ICA indication may appear, independently or not at all." }],
  "engines-073": [{ ref:"FCOM 7.20.10", quote:"An ICA indication does not mean that the engine is currently encountering ICI conditions." }],
  "engines-074": [{ ref:"FCOM 7.20.10", quote:"After engine maintenance activities, for example after an engine change or an EEC change, the ICA indication can show in cruise flight, in any weather conditions, for 75 minutes or more." }],
  "engines-075": [{ ref:"FCOM 7.20.15", quote:"There is no minimum oil quantity limit (no amber or red line limit); however, a low oil quantity causes automatic display of the secondary engine display and reverses the display indication to show black numbers on a white background." }],
  "engines-076": [{ ref:"FCOM 7.20.15", quote:"There are no operating limitations for the engine oil quantity; therefore, there are no flight crew procedures based solely on a response to low oil quantity." }],
  "engines-077": [{ ref:"FCOM 7.20.15", quote:"a low oil quantity causes automatic display of the secondary engine display and reverses the display indication to show black numbers on a white background. The white text LO is displayed adjacent to the readout." }],
  "warnings-001": [{ ref:"FCOM 15.10.1", quote:"Warning Messages Displayed (red) – • highest priority alert messages • red alert messages remain displayed and cannot be canceled by pushing the CANC/RCL switch" },{ ref:"FCOM 15.20.2", quote:"EICAS warning messages are displayed red and EICAS caution and advisory messages are displayed amber. Red EICAS alert messages remain displayed and cannot be canceled by pushing the CANC/RCL switch." }],
  "warnings-002": [{ ref:"FCOM 15.10.1", quote:"Caution Messages Displayed (amber) – • next highest priority alert messages after warning messages • amber alert messages can be canceled or recalled by pushing the CANC/RCL switch" }],
  "warnings-003": [{ ref:"FCOM 15.10.1", quote:"Advisory Messages Displayed (amber) – • lowest priority alert messages; indented one space • amber alert messages can be canceled or recalled by pushing the CANC/RCL switch" }],
  "warnings-004": [{ ref:"FCOM 15.10.1", quote:"Warning Messages Displayed (red) – • highest priority alert messages • red alert messages remain displayed and cannot be canceled by pushing the CANC/RCL switch" },{ ref:"FCOM 15.20.2", quote:"Red EICAS alert messages remain displayed and cannot be canceled by pushing the CANC/RCL switch. Amber EICAS alert messages can be canceled and recalled by pushing the CANC/RCL switch." }],
  "warnings-005": [{ ref:"FCOM 15.10.1", quote:"Caution Messages Displayed (amber) – • next highest priority alert messages after warning messages • amber alert messages can be canceled or recalled by pushing the CANC/RCL switch" }],
  "warnings-006": [{ ref:"FCOM 15.10.1", quote:"Advisory Messages Displayed (amber) – • lowest priority alert messages; indented one space • amber alert messages can be canceled or recalled by pushing the CANC/RCL switch" }],
  "warnings-007": [{ ref:"FCOM 15.10.1", quote:"Advisory Messages Displayed (amber) – • lowest priority alert messages; indented one space • amber alert messages can be canceled or recalled by pushing the CANC/RCL switch", note:"Caution messages trigger a beeper and master CAUTION light (see 15.20.4 aurals table); advisory messages do not. Advisory messages are also indented one space." },{ ref:"FCOM 15.20.3", quote:"EICAS caution messages are displayed in amber below the lowest warning message. EICAS advisory messages are displayed in amber below the lowest caution message and are indented one character so they may be distinguished from EICAS caution messages." }],
  "warnings-008": [{ ref:"FCOM 15.10.1", quote:"Advisory Messages Displayed (amber) – • lowest priority alert messages; indented one space" },{ ref:"FCOM 15.20.3", quote:"EICAS advisory messages are displayed in amber below the lowest caution message and are indented one character so they may be distinguished from EICAS caution messages." }],
  "warnings-009": [{ ref:"FCOM 15.20.39", quote:"All EICAS advisory messages Messages are inhibited 80 knots airspeed — 400 feet radio altitude or 20 seconds after lift-off, whichever occurs first, or if takeoff thrust not selected on both engines. If rejected takeoff initiated above 80 knots, inhibit continues until airspeed is less than 75 knots." }],
  "warnings-010": [{ ref:"FCOM 15.20.39", quote:"If rejected takeoff initiated above 80 knots, inhibit continues until airspeed is less than 75 knots." }],
  "warnings-011": [{ ref:"FCOM 15.10.1", quote:"Communication Messages Displayed (white) – • preceded by white dot • COMM low messages indented one space • cannot be canceled by pushing the CANC/RCL switch" }],
  "warnings-012": [{ ref:"FCOM 15.10.1", quote:"Communication Messages Displayed (white) – • preceded by white dot • COMM low messages indented one space • cannot be canceled by pushing the CANC/RCL switch" },{ ref:"FCOM 15.20.2", quote:"EICAS communications messages are displayed in white below EICAS alert messages. Communication messages can not be cancelled by pushing the CANC/RCL switch." }],
  "warnings-013": [{ ref:"FCOM 15.10.1", quote:"Memo Messages Displayed (white) – • reminder of selected state of controls or systems • cannot be canceled by pushing the CANC/RCL switch" }],
  "warnings-014": [{ ref:"FCOM 15.10.2", quote:"RECALL Indication Displayed (white) – • when CANC/RCL switch pushed • remains displayed for one second after switch released" }],
  "warnings-015": [{ ref:"FCOM 15.10.2", quote:"STATUS Cue Displayed (cyan) – • new status message exists • no longer displayed when status display selected" },{ ref:"FCOM 15.20.3", quote:"The STATUS cue is displayed on primary EICAS when a new EICAS status message is displayed." }],
  "warnings-016": [{ ref:"FCOM 15.10.4", quote:"Status (STAT) Display Key Selected (green) – displays status display on selected MFD." }],
  "warnings-017": [{ ref:"FCOM 15.10.5", quote:"Status Messages Status messages indicate equipment faults requiring MEL reference for dispatch." },{ ref:"FCOM 15.20.2", quote:"All EICAS status messages are listed in the Dispatch Deviation Guide (DDG) or airline equivalent and provide a cross reference to the Minimum Equipment List (MEL) for dispatch capability." }],
  "warnings-018": [{ ref:"FCOM 15.10.8", quote:"NO AUTOLAND Alert NO AUTOLAND (amber) – The autoland system is not available. Displayed when the airplane descends below 100 feet radio altitude during an approach in which the autopilot is flying a FMC computed glidepath." }],
  "warnings-019": [{ ref:"FCOM 15.10.8", quote:"Time Critical Warnings ENG FAIL (red) – ENGINE FAIL alert is occurring. PULL UP (red) – PULL UP alert is occurring. SPEEDBRAKE (red) – SPEEDBRAKE alert is occurring. WINDSHEAR (red) – predictive WINDSHEAR AHEAD alert or immediate WINDSHEAR alert is occurring" }],
  "warnings-020": [{ ref:"FCOM 15.10.16", quote:"TCAS Traffic and Alert Message TRAFFIC Display Shows automatically when: • a RA or TA is occurring, and • TFC-ALL or TFC-FLTR not selected on either ND, and • respective ND is in MAP or MAP CTR mode" }],
  "warnings-021": [{ ref:"FCOM 15.10.17", quote:"Traffic Targets TCAS-only traffic – • filled red square indicates a resolution advisory (RA)" },{ ref:"FCOM 15.20.18", quote:"The TCAS RA Traffic symbol is a filled red square, and the data tag contains the altitude and the vertical motion arrow." }],
  "warnings-022": [{ ref:"FCOM 15.10.17", quote:"Traffic Targets TCAS-only traffic – • filled amber circle indicates a traffic advisory (TA)" },{ ref:"FCOM 15.20.18", quote:"The TCAS TA traffic symbol is a filled amber circle, and the data tag contains the altitude and the vertical motion arrow." }],
  "warnings-023": [{ ref:"FCOM 15.10.17", quote:"Traffic Targets TCAS-only traffic – • filled white diamond indicates proximate traffic" },{ ref:"FCOM 15.20.19", quote:"The TCAS Proximate Traffic symbol is a filled white diamond, and the data tag contains the altitude and the vertical motion arrow." }],
  "warnings-024": [{ ref:"FCOM 15.10.17", quote:"Traffic Targets TCAS-only traffic – • unfilled white diamond indicates other traffic" },{ ref:"FCOM 15.20.19", quote:"The TCAS Other Traffic symbol is a hollow white diamond, and the data tag contains the altitude and the vertical motion arrow." }],
  "warnings-025": [{ ref:"FCOM 15.10.19", quote:"RA Pitch Region To Avoid (red outlined) Displayed: (red) – RA is occurring." }],
  "warnings-026": [{ ref:"FCOM 15.10.19", quote:"Note: For a single RA, only one red outlined RA pitch region, either above or below, is displayed at a time. For two or more RAs, two red outlined RA pitch regions may be displayed." }],
  "warnings-027": [{ ref:"FCOM 15.10.19", quote:"To ensure vertical separation, the center of the airplane symbol must be outside the red outlined RA pitch regions to avoid." }],
  "warnings-028": [{ ref:"FCOM 15.10.22", quote:"Push (amber BELOW G/S light illuminated) – • inhibits GLIDESLOPE alert when pushed below 1,000 feet radio altitude • extinguishes the BELOW G/S light" }],
  "warnings-029": [{ ref:"FCOM 15.10.22", quote:"The BELOW G/S light illuminates when the GPWS senses excessive deviation below the ILS or GLS glideslope or the FMC generated flight path angle.", note:"The BELOW G/S light is amber; this is the standard panel annunciator light color for GPWS caution-level glideslope alerts." }],
  "warnings-030": [{ ref:"FCOM 15.10.22", quote:"The inhibit function resets when: • on the ground, or • after a touch and go landing, or • after a go-around, or • when deselected by the flight crew" }],
  "warnings-031": [{ ref:"FCOM 15.20.33", quote:"GO AROUND, WINDSHEAR AHEAD Windshear predicted within 1.5 miles and directly ahead of the airplane. Enabled during approach, below 1,200 feet radio altitude." }],

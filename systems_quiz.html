  "warnings-032": [{ ref:"FCOM 15.20.13", quote:"Thrust Asymmetry Minimum Speed (TAMS) When airspeed decreases to TAMS, the AIRSPEED, AIRSPEED aural sounds and the Master WARNING light illuminates." }],
  "warnings-033": [{ ref:"FCOM 15.20.12", quote:"Stall Warning Warning of an impending stall is provided by left and right stick shakers, which independently vibrate the left and right control columns." }],
  "warnings-034": [{ ref:"FCOM 15.20.12", quote:"Takeoff V1 Airspeed The voice annunciation VEE ONE sounds when airspeed reaches V1 during takeoff." },{ ref:"FCOM 15.20.11", quote:"Voice annunciation: VEE ONE — Calls Attention To: Airspeed at V1 during takeoff" }],
  "warnings-035": [{ ref:"FCOM 15.20.13", quote:"Tail Strike Detection System The tail strike alert system detects ground contact which could damage the airplane pressure hull. A two inch blade target and two frangible wires are installed on the aft body of the airplane." }],
  "warnings-036": [{ ref:"FCOM 15.20.13", quote:"The EICAS caution message TAIL STRIKE is displayed when a tail strike is detected. This indication is accompanied by a beeper and Master CAUTION light." }],
  "warnings-037": [{ ref:"FCOM 15.20.14", quote:"Takeoff configuration warnings consist of: • display of applicable EICAS warning CONFIG message. Warning messages are: CONFIG DOORS, CONFIG FLAPS, CONFIG PARKING BRAKE, CONFIG RUDDER, CONFIG SPOILERS, CONFIG STABILIZER" }],
  "warnings-038": [{ ref:"FCOM 15.20.15", quote:"The landing configuration warning system alerts the crew the landing gear is not extended for landing. The EICAS warning message CONFIG GEAR is displayed if: • the airplane is in flight, and • any landing gear is not down and locked" }],
  "warnings-039": [{ ref:"FCOM 15.20.15", quote:"The EICAS warning message CONFIG GEAR is displayed if: • the airplane is in flight, and • any landing gear is not down and locked, and • any of the following configurations exist: • either thrust lever is below the nominal glideslope thrust level and radio altitude less than 800 feet, or • FLAP lever in landing position" }],
  "warnings-040": [{ ref:"FCOM 15.20.15", quote:"The message remains displayed until the Thrust levers are advanced or landing gear is down and locked." }],
  "warnings-041": [{ ref:"FCOM 15.20.15", quote:"In flight, the EICAS caution message SPEEDBRAKE EXTENDED alerts the crew if: • the SPEEDBRAKE lever is extended beyond ARMED with airplane radio altitude 15 feet or greater" }],
  "warnings-042": [{ ref:"FCOM 15.20.15", quote:"In flight, the EICAS caution message SPEEDBRAKE EXTENDED alerts the crew if: • the SPEEDBRAKE lever is extended beyond ARMED with airplane radio altitude 15 feet or greater, and one or more of the following conditions: • radio altitude is 800 feet or less, or • FLAP lever in landing position, or • thrust lever angle 5 degrees or more above idle stop for 15 seconds" }],
  "warnings-043": [{ ref:"FCOM 15.20.16", quote:"Approaching MCP Selected Altitude At 900 feet prior to reaching the selected altitude a c-chord sounds and a highlighted white box is displayed around the selected altitude and the current altitude on the PFD." }],
  "warnings-044": [{ ref:"FCOM 15.20.16", quote:"At 900 feet prior to reaching the selected altitude a c-chord sounds and a highlighted white box is displayed around the selected altitude and the current altitude on the PFD. The highlights are no longer displayed when within 200 feet of the selected altitude." }],
  "warnings-045": [{ ref:"FCOM 15.20.16", quote:"The highlights are no longer displayed when within 200 feet of the selected altitude." }],
  "warnings-046": [{ ref:"FCOM 15.20.16", quote:"Departing MCP Selected Altitude When departing the selected altitude by 200 feet, the EICAS caution message ALTITUDE ALERT is displayed, and a highlighted amber box is displayed around the current altitude." }],
  "warnings-047": [{ ref:"FCOM 15.20.16", quote:"When departing the selected altitude by 200 feet, the EICAS caution message ALTITUDE ALERT is displayed, and a highlighted amber box is displayed around the current altitude." }],
  "warnings-048": [{ ref:"FCOM 15.20.16", quote:"The message and amber highlight are no longer displayed when: • subsequently reapproaching to within 200 feet of the selected altitude, or • a new MCP altitude is selected, or • departing more than 900 feet from the selected altitude" }],
  "warnings-049": [{ ref:"FCOM 15.20.16", quote:"MCP Selected Altitude Alert Inhibits MCP selected altitude alerts are inhibited when: • glideslope or glidepath captured, or • landing flaps selected and landing gear down and locked" }],
  "flight-controls-001": [{ ref:"FCOM 9.20.6", quote:"In the normal mode during manual flight (autopilot disengaged), four ACEs receive pilot control inputs and send these signals to three PFCs. The PFCs verify these signals and information from other airplane systems to compute enhanced control surface commands. These commands are sent back to the ACEs, then to the flight control surface actuators." }],
  "flight-controls-002": [{ ref:"FCOM 9.20.9", quote:"In the direct mode, the PFCs no longer generate control surface commands. Pilot inputs received by the ACEs are sent directly to the control surface actuators." }],
  "flight-controls-003": [{ ref:"FCOM 9.20.8", quote:"The ACEs continue to receive and process pilot control inputs, and send these signals to the three PFCs. The PFCs use simplified computations to generate flight control surface commands. These simplified commands are sent back to the ACEs, where they are sent to the control surface actuators." }],
  "flight-controls-004": [{ ref:"FCOM 9.20.8", quote:"The EICAS caution message FLIGHT CONTROL MODE is displayed when the primary flight control system is in the secondary mode." }],
  "flight-controls-005": [{ ref:"FCOM 9.20.9", quote:"The EICAS caution message PRI FLIGHT COMPUTERS is displayed when the system is in the direct mode." }],
  "flight-controls-006": [{ ref:"FCOM 9.20.8", quote:"The secondary mode cannot be manually selected." }],
  "flight-controls-007": [{ ref:"FCOM 9.20.9", quote:"The direct mode can also be manually selected by moving the PRIMARY FLIGHT COMPUTERS disconnect switch to DISC." }],
  "flight-controls-008": [{ ref:"FCOM 9.20.8", quote:"The PFCs automatically revert to secondary mode when inertial or air data is insufficient to support normal mode or when all slat and flap position data is unavailable." }],
  "flight-controls-009": [{ ref:"FCOM 9.20.9", quote:"The ACEs automatically transition to the direct mode when they detect the failure of all three PFCs or lose communication with the PFCs." }],
  "flight-controls-010": [{ ref:"FCOM 9.20.8", quote:"In the secondary mode, the following functions are not available: autopilot, pitch compensation, auto speedbrakes, roll/yaw asymmetry compensation, envelope protection, tail strike protection, gust suppression.", note:"AARTS GOD mnemonic is study-deck shorthand; verbatim list is here and mirrored at 9.20.9 for direct mode." }],
  "flight-controls-011": [{ ref:"FCOM 9.20.9", quote:"The direct mode provides full airplane control for continued safe flight and landing. The airplane handling qualities are almost the same as the secondary mode. All flight control surfaces remain operable and yaw damping is degraded." }],
  "flight-controls-012": [{ ref:"FCOM 9.20.21", quote:"There are 7 sets of spoilers, 4 outboard and 3 inboard of the flaperons, on the upper surface of each wing. The spoilers are numbered from left to right, 1 through 14." }],
  "flight-controls-013": [{ ref:"FCOM 9.20.23", quote:"The airplane has an inboard and an outboard flap on the trailing edge of each wing, and one inboard and five outboard slats on the leading edge." }],
  "flight-controls-014": [{ ref:"FCOM 9.20.23", quote:"The airplane has an inboard and an outboard flap on the trailing edge of each wing, and one inboard and five outboard slats on the leading edge." }],
  "flight-controls-015": [{ ref:"FCOM 9.20.23", quote:"A two-position Krueger flap provides a seal between the inboard slat and the engine nacelle on each wing." }],
  "flight-controls-016": [{ ref:"FCOM 9.20.1", quote:"In the unlikely event of the loss of all hydraulic power, the electrically actuated stabilizer and two spoiler pairs allow pilot control of pitch and roll using the primary pitch trim switches, alternate pitch trim switches, and the control wheel.", note:"This implies the elevators themselves are hydraulically powered (hydraulic loss transfers pitch control to electrically-actuated stabilizer)." }],
  "flight-controls-017": [{ ref:"FCOM 9.20.14", quote:"Stabilizer position commands are processed through two independent channels within the flight control system. The commands come from the primary or alternate pitch trim switches and move the stabilizer using an electric control unit powered by the L2 and R2 AC buses." }],
  "flight-controls-018": [{ ref:"FCOM 9.20.5", quote:"Left Ace / C1 Ace / C2 Ace / Right Ace — Control Source. Left Hydraulic / Center Hydraulic / Right Hydraulic / Electrical / RAT — Power Source.", note:"The ACE/hydraulic power distribution diagram (9.20.5) shows the rudder supplied by all three hydraulic systems." }],
  "flight-controls-019": [{ ref:"FCOM 9.20.2", quote:"The ailerons are locked out during high speed flight where the flaperons and spoilers provide sufficient roll control. During low speed flight, the ailerons operate to augment roll control." }],
  "flight-controls-020": [{ ref:"FCOM 9.20.16", quote:"Aileron trim is incorporated into the flight control laws and no pilot input is required." }],
  "flight-controls-021": [{ ref:"FCOM 9.20.4", quote:"To alert the flight crew of a locked condition, the EICAS advisory message FLT CONTROL LOCKED is displayed when a lock switch is in the LOCK position." }],
  "flight-controls-022": [{ ref:"FCOM 9.20.4", quote:"In addition, the flight control surfaces automatically unlock when groundspeed exceeds 40 knots." }],
  "flight-controls-023": [{ ref:"FCOM 9.10.17", quote:"Illuminated (white) – a flight control surfaces lock switch is selected and any of the respective flight control surfaces are not locked." }],
  "flight-controls-024": [{ ref:"FCOM 9.20.4", quote:"WARNING: To avoid injury to personnel or damage to the airplane, always verify the areas near the flight control surfaces are clear prior to moving a switch from LOCK to NORM." }],
  "flight-controls-025": [{ ref:"FCOM 9.20.11", quote:"In flight, the pitch trim switches do not position the stabilizer directly, but make inputs to the PFCs to change the trim reference speed. The trim reference speed is the speed at which the airplane would eventually stabilize if there were no control column inputs." }],
  "flight-controls-026": [{ ref:"FCOM 9.20.11", quote:"The trim reference speed is the speed at which the airplane would eventually stabilize if there were no control column inputs. Once the control column forces are trimmed to zero, the airplane maintains a constant speed with no column inputs." }],
  "flight-controls-027": [{ ref:"FCOM 9.20.11", quote:"In the secondary or direct modes, primary pitch trim operates the same on the ground and in flight; the stabilizer is directly positioned when the pilot uses the primary pitch trim switches." }],
  "flight-controls-028": [{ ref:"FCOM 9.20.11", quote:"Pitch trim does not move the control column." }],
  "flight-controls-029": [{ ref:"FCOM 9.20.11", quote:"Both switches must be moved to command trim changes. The primary pitch trim switches are inhibited when the autopilot is engaged." }],
  "flight-controls-030": [{ ref:"FCOM 9.20.11", quote:"The switches are linked electrically to the horizontal stabilizer trim actuator and then mechanically to the stabilizer. Alternate pitch trim commands have priority over primary pitch trim commands in all flight control modes." }],
  "flight-controls-031": [{ ref:"FCOM 9.10.4", quote:"NORM – electrical power is supplied to the related stabilizer control unit. L2 – the related left 235V AC bus. R2 – the related right 235V AC bus." }],
  "flight-controls-032": [{ ref:"FCOM 9.20.14", quote:"In the normal mode, when the stabilizer is manually shut down or has failed, pitch trim is still available through the elevators. Pitch trim commands from the primary or alternate pitch trim switches change the trim reference speed. The elevators then trim the airplane but the stabilizer does not move." }],
  "flight-controls-033": [{ ref:"FCOM 9.10 (Stabilizer Position Indicator)", quote:"A default green band is shown from 4 to 9 units of trim prior to performance data being entered into the FMC." }],
  "flight-controls-034": [{ ref:"QRH 9.1", quote:"<b>1 STAB cutout switches (both) . . . . . . . . . CUTOUT</b> <b>2 Do not exceed the current airspeed.</b>", note:"Steps 1 and 2 are the memory items (checklist is starred *STABILIZER). Steps 3 onward are reference items." }],
  "flight-controls-035": [{ ref:"FCOM 9.20.11", quote:"For turns up to 30° of bank, the pilot does not need to add additional column back pressure to maintain altitude. For turns of more than 30° of bank, the pilot does need to add column back pressure." }],
  "flight-controls-036": [{ ref:"FCOM 9.20.19", quote:"Manual rudder trim operation is provided in all three flight control modes by a rudder trim selector located on the aft aisle stand." }],
  "flight-controls-037": [{ ref:"FCOM 9.20.19", quote:"Manual trim inputs are automatically zeroed during takeoff roll, when groundspeed exceeds 30 knots and further manual trim inputs are inhibited until in the air." }],
  "flight-controls-038": [{ ref:"FCOM 9.20.19", quote:"Manual rudder trim is also inhibited with the autopilot yaw engaged (LAND 3) on approach." }],
  "flight-controls-039": [{ ref:"FCOM 9.20.19", quote:"The EICAS indication blanks when either of the following conditions are satisfied: gear up for 10 seconds, or 60 seconds after liftoff.", note:"EICAS rudder trim indication auto-displays after landing <40 kt or certain EICAS messages; the 60-second post-liftoff blank is the post-takeoff display duration." }],
  "flight-controls-040": [{ ref:"FCOM 9.20.19", quote:"Two rudder trim rates are available. A low rate is commanded with the selector rotated to the detent, and a high rate is commanded when rotated past the detent." }],
  "flight-controls-041": [{ ref:"FCOM 9.20.21", quote:"In the ARMED position, the spoilers extend and the speedbrake lever is driven aft to the UP position on landing when the main gear trucks untilt and both thrust levers are not in the takeoff range." }],
  "flight-controls-042": [{ ref:"FCOM 9.20.21", quote:"When the speedbrake lever is not in the ARMED position, the spoilers still automatically extend and the speedbrake lever is driven to the UP position when either of the following conditions occur: on the ground with groundspeed above 85 knots, either thrust lever was previously in the takeoff range, then both thrust levers are moved to the idle range (rejected takeoff), or on the ground and both thrust reverse levers are moved to the reverse idle detent." }],
  "flight-controls-043": [{ ref:"FCOM 9.20.21", quote:"The spoilers automatically retract and the speedbrake lever is driven forward to the DOWN position, when any of the following conditions occur: on the ground, when either thrust lever is moved to the takeoff range, or on the ground, if there is a transition to in the air, or in the air, when either thrust lever is approximately 70% of full travel." }],
  "flight-controls-044": [{ ref:"FCOM 9.20.21", quote:"All three hydraulic systems supply 5 pairs of spoilers. Each hydraulic system is dedicated to a different set of spoiler pairs to provide isolation and maintain symmetric operation in the event of hydraulic system failure. The remaining two spoiler pairs are individually powered by two electrical buses." }],
  "flight-controls-045": [{ ref:"FCOM 9.20.21", quote:"The flight control system automatically biases the spoilers up during engine start and taxi to prevent spoiler trailing edges from contacting the flaps." }],
  "flight-controls-046": [{ ref:"FCOM 9.20.23", quote:"To protect against inadvertent deployment during cruise, flap and slat extension from the UP position is inhibited when speed is more than 260 KIAS or altitude is above approximately 20,000 feet. This inhibit is only available in primary and secondary flap and slat modes." }],
  "flight-controls-047": [{ ref:"FCOM 9.20.23", quote:"Starting from flaps UP, selection of flaps 1 commands the slats to move to the middle position. The flaps remain retracted." }],
  "flight-controls-048": [{ ref:"FCOM 9.20.23", quote:"Selection of flaps 25 commands the slats to move to the fully extended position. The flaps do not move. Selection of flaps 30 commands the flaps to extend to the primary landing position." }],
  "flight-controls-049": [{ ref:"FCOM 9.20.23", quote:"On the ground, all three hydraulic systems must be pressurized before flaps will move to avoid contact with an unpowered (drooping) spoiler." }],
  "flight-controls-050": [{ ref:"FCOM 9.20.23", quote:"The mechanical gate at the flaps 20 detent prevents inadvertent retraction of the flaps past the go–around flap setting. The mechanical gate at flaps 1 prevents inadvertent retraction of the slats past the middle position." }],
  "flight-controls-051": [{ ref:"FCOM 9.20.25", quote:"The slat autogap function is only available in primary mode when the slats are in the middle position and the airspeed is below 240 KIAS. At a high angle of attack, autogap fully extends the slats to increase the wing camber, thus increasing the lift and margin to stall." }],
  "flight-controls-052": [{ ref:"FCOM 9.20.25", quote:"In the secondary mode the system is too slow to respond to an autogap request, so a pregap function exists. The slats automatically move to the fully extended position from the middle position when the flap lever is not UP and airspeed is less than 240 KIAS." }],
  "flight-controls-053": [{ ref:"FCOM 9.20.25", quote:"The slats remain in the extended position until the flap lever is in the UP position or airspeed is above 240 KIAS." }],
  "flight-controls-054": [{ ref:"FCOM 9.20.24", quote:"If flap airspeed placard limits are exceeded with the flaps in the 15 through 30 position, LOAD RELIEF is displayed and the flaps automatically retract to a safe position appropriate to the airspeed." }],
  "flight-controls-055": [{ ref:"FCOM 9.20.24", quote:"Load relief retraction is limited to flaps 5." }],
  "flight-controls-056": [{ ref:"FCOM 9.20.24", quote:"Flap load relief is available only in the primary mode." }],
  "flight-controls-057": [{ ref:"FCOM 9.20.24", quote:"Slat load relief is available in the secondary mode. If airspeed exceeds 240 KIAS with the slats fully extended, they retract to the middle position and LOAD RELIEF is displayed." }],
  "flight-controls-058": [{ ref:"FCOM 9.20.24", quote:"Slat load relief is available in the secondary mode." }],
  "flight-controls-059": [{ ref:"FCOM 9.20.24", quote:"For all lever positions except Up, the slats are driven to their extend position when the airspeed is below 240 KIAS." }],
  "flight-controls-060": [{ ref:"FCOM 9.20.7", quote:"The primary flight control system provides flight envelope protection when operating in normal mode during manual flight." }],
  "flight-controls-061": [{ ref:"FCOM 9.20.13", quote:"During takeoff or landing, the PFCs calculate if a tail strike is imminent and decrease elevator deflection, if required, to reduce the potential for tail contact with the ground." }],
  "flight-controls-062": [{ ref:"FCOM 9.20.13", quote:"Activation of tail strike protection does not provide feedback to the control column. Protection does not degrade takeoff performance and is compatible with the autoland system. The pilot can override the tail strike protection, if necessary, with continued column input." }],
  "flight-controls-063": [{ ref:"FCOM 9.20.16", quote:"The vertical stabilizer has a Hybrid Laminar Flow Control (HLFC) system installed to reduce aerodynamic drag. There are no crew procedures or monitoring requirements for this system and no alert messages specific to this function for any failure mode." }],
  "flight-controls-064": [{ ref:"FCOM 9.20.17", quote:"Automatic lateral and rudder inputs are only available in the normal flight control mode and can be overridden by manual control wheel or rudder pedal inputs." }],
  "flight-controls-065": [{ ref:"FCOM 9.20.17", quote:"On the ground above 60 knots groundspeed, the flight control system attempts to maintain a yaw rate near zero by commanding rudder to counter the majority of the yawing moment due to an engine failure. The rudder pedals move to give feedback to the pilot that the system is working to counter a thrust asymmetry." }],
  "flight-controls-066": [{ ref:"FCOM 9.20.17", quote:"During reverse thrust asymmetry conditions, or during takeoffs in crosswind or gusty conditions, the flight control system attempts to maintain a zero yaw rate by automatically adding rudder corrections. Under these conditions the rudder pedals do not move." }],
  "flight-controls-067": [{ ref:"FCOM 9.20.17", quote:"For large asymmetry conditions a greater sideslip is permitted, but some automatic lateral control input may remain after the transfer stops. For large asymmetries the EICAS ROLL/YAW ASYMMETRY caution message shows. For severe asymmetric conditions where the initial automatic lateral control input is very large, the EICAS caution message ROLL LEFT/RIGHT AUTHORITY, is shown to inform the crew of the limited roll control available." }],
  "flight-controls-068": [{ ref:"FCOM 9.20.19", quote:"Vertical gust suppression enhances ride quality in the presence of vertical gusts and turbulence. It utilizes symmetric deflection of the flaperons and elevators to alleviate gust acceleration. Vertical and lateral gust suppression are only available in the normal mode." }],
  "flight-controls-069": [{ ref:"FCOM 9.20.19", quote:"This function is active only with the autopilot engaged in Altitude Hold or VNAV level flight modes." }],
  "flight-controls-070": [{ ref:"FCOM 9.20.22", quote:"The autodrag function operates by deflecting the ailerons upward and raising the two most outboard spoilers, while maintaining airspeed, to assist in glideslope/glidepath capture when the airplane is on or above the vertical path." }],
  "flight-controls-071": [{ ref:"FCOM 9.20.22", quote:"Autodrag functions only in landing configuration; flaps 25 or 30 and the thrust levers are at idle. The autodrag surface deflection is gradually removed below 500 feet AGL so flare and touchdown are not affected. Autodrag is only available in the normal mode." }],
  "flight-controls-072": [{ ref:"FCOM 9.20.22", quote:"Landing Attitude Modifier (LAM) is an automatic function used to increase pitch attitude and increase the nose gear height when landing flaps are selected at higher speeds. LAM increases pitch attitude by partially raising selected lateral control surfaces." }],
  "flight-controls-073": [{ ref:"FCOM 9.20.22", quote:"There are no crew procedures or monitoring requirements for this system and no alert messages specific to this function for any failure mode." }],
  "flight-controls-074": [{ ref:"FCOM 9.20.25", quote:"Cruise flaps are only available in the normal mode, above 25,000 feet, between 0.54 and 0.87 Mach." }],
  "flight-controls-075": [{ ref:"FCOM 9.20.25", quote:"The EICAS advisory message CRUISE FLAPS SYS is displayed if the system fails with the flaps in an increased drag condition." }],
  "flight-controls-076": [{ ref:"FCOM 9.20.25", quote:"The EICAS advisory message CRUISE FLAPS SYS is displayed if the system fails with the flaps in an increased drag condition.", note:"FCOM 9.30 EICAS table: 'CRUISE FLAPS SYS — Advisory — The cruise flaps system is not in the correct position.' Consequence is increased drag at cruise." }],
  "flight-controls-077": [{ ref:"FCOM 9.20.1", quote:"In the unlikely event of the loss of all hydraulic power, the electrically actuated stabilizer and two spoiler pairs allow pilot control of pitch and roll using the primary pitch trim switches, alternate pitch trim switches, and the control wheel." }],
  "flight-controls-078": [{ ref:"FCOM 9.20.1", quote:"If there is a complete loss of flight control signaling, direct wiring from the flight deck to the stabilizer and a spoiler pair allow pilot control of pitch using the alternate pitch trim switches and roll using the control wheel." }],
  "flight-controls-079": [{ ref:"FCOM 9.20.18", quote:"The wheel to rudder cross–tie function is available in the secondary and direct modes. This function reduces maximum sideslip and vertical fin loads. In the normal mode, wheel to rudder cross-tie is not required, the flight control system automatically controls sideslip and fin loads." }],
  "aircraft-general-001": [{ ref:"FCOM 1.10.1", quote:"197 Feet 3 Inches (60.1 Meters)", note:"Wing span dimension in the 787-9 Principal Dimensions diagram" }],
  "aircraft-general-002": [{ ref:"FCOM 1.10.1", quote:"206 Feet 1 Inch (62.8 Meters)", note:"Total length dimension in the 787-9 Principal Dimensions diagram" }],
  "aircraft-general-003": [{ ref:"FCOM 1.10.1", quote:"55 Feet 10 Inches (17.0 Meters)", note:"Tail height dimension in the 787-9 Principal Dimensions diagram" }],
  "aircraft-general-004": [{ ref:"FCOM 1.10.1", quote:"84 Feet 9 Inches (25.8 Meters)", note:"Nose gear to main gear wheelbase in the 787-9 Principal Dimensions diagram" }],
  "aircraft-general-005": [{ ref:"FCTM - Ground Operations chapter", quote:"Model 787 - 9 Pilot Seat Position (forward of nose gear) feet (meters) 8.75 (2.7)", note:"From the table: Pilot Seat Position forward of nose gear and forward of main gear" }],
  "aircraft-general-006": [],
  "aircraft-general-007": [{ ref:"FCOM 1.10.1", quote:"The wing tip swings the largest arc while turning and determines the minimum obstruction clearance path. All other portions of the airplane structure remain within this arc." }],
  "aircraft-general-008": [{ ref:"FCOM 1.10.1", quote:"Wing Tip Radius 144 Feet 0 Inches (43.9 Meters)" }],
  "aircraft-general-009": [{ ref:"FCOM 1.10.1", quote:"Nose Radius 110 Feet 0 Inches (33.5 Meters)" }],
  "aircraft-general-010": [{ ref:"FCOM 1.10.1", quote:"Tail Radius 126 Feet 0 Inches (38.4 Meters)" }],
  "aircraft-general-011": [{ ref:"FCOM 1.10.1", quote:"Maximum Steering Angle 70°" }],
  "aircraft-general-012": [{ ref:"FCOM 1.10.1", quote:"Note: Minimum pavement width for 180° turn: 154 Feet 0 Inches (47.0 Meters)." }],
  "aircraft-general-013": [{ ref:"FCOM 1.10.1", quote:"Caution: Requires light differential braking/thrust for 180° turns on a 150 foot (45 meter) wide runway." }],
  "aircraft-general-014": [{ ref:"FCOM 1.10.1", quote:"CAUTION: Do not attempt to make a turn away from an obstacle within 15 feet (4.6 m) of the wing tip, or within 55 feet (16.8 m) of the nose." }],
  "aircraft-general-015": [{ ref:"FCOM 1.10.1", quote:"CAUTION: Do not attempt to make a turn away from an obstacle within 15 feet (4.6 m) of the wing tip, or within 55 feet (16.8 m) of the nose." }],
  "aircraft-general-016": [{ ref:"FCOM 1.40.25", quote:"There are three cargo doors; one forward, one aft, and one bulk." }],
  "aircraft-general-017": [{ ref:"FCOM 1.40.25", quote:"The large forward and aft cargo doors are located on the right side of the airplane and each opens up and outside the airplane." }],
  "aircraft-general-018": [{ ref:"FCOM 1.40.25", quote:"The large forward and aft cargo doors are located on the right side of the airplane and each opens up and outside the airplane." }],
  "aircraft-general-019": [{ ref:"FCOM 1.40.25", quote:"The smaller bulk cargo door is on the left side of the airplane and opens up and into the cargo area." }],
  "aircraft-general-020": [{ ref:"FCOM 1.40.25", quote:"The smaller bulk cargo door is on the left side of the airplane and opens up and into the cargo area." }],
  "aircraft-general-021": [{ ref:"FCOM 1.40.25", quote:"Both forward and aft cargo doors are normally operated electrically from an exterior fuselage mounted control panel located near each door." }],
  "aircraft-general-022": [{ ref:"FCOM 1.40.25", quote:"The bulk cargo door is operated manually using an external handle and is counterbalanced for ease of operation." }],
  "aircraft-general-023": [{ ref:"FCOM 1.40.25", quote:"Opening the doors does not turn off cargo area heating, ventilation, or fire detection." }],
  "aircraft-general-024": [{ ref:"FCOM 1.30.13", quote:"Door symbol amber Passenger entry or large cargo door is NOT closed, latched, and locked." }],
  "aircraft-general-025": [{ ref:"FCOM 1.30.13", quote:"Door symbol amber Flight deck overhead door, bulk cargo door, or an access door is NOT closed and latched." }],
  "aircraft-general-026": [{ ref:"FCOM 1.30.13", quote:"Door symbol white Door signal is invalid or unknown. Door position is unknown. Slide indication shows if valid." }],
  "aircraft-general-027": [{ ref:"FCOM 1.30.13", quote:"Green letter A Passenger door is closed, latched, and locked; and the slide in the automatic mode." }],
  "aircraft-general-028": [{ ref:"FCOM 1.30.13", quote:"White letter M Passenger door is closed, latched, and locked; and the slide in the manual mode." }],
  "aircraft-general-029": [{ ref:"FCOM 1.30.13", quote:"Slide mode blank Passenger door is closed, latched and locked; and the slide mode is unknown." }],
  "aircraft-general-030": [{ ref:"FCOM 1.30.3", quote:"OFF – the fasten seat belt and return to seat signs are not illuminated." }],
  "aircraft-general-031": [{ ref:"FCOM 1.30.3", quote:"ON – the fasten seat belt and return to seat signs are illuminated." }],
  "aircraft-general-032": [{ ref:"FCOM 1.30.3", quote:"AUTO – the fasten seat belt and return to seat signs are illuminated or extinguished automatically with reference to airplane altitude and system configuration" }],
  "aircraft-general-033": [{ ref:"FCOM 1.40.6", quote:"The signs automatically illuminate when the SEAT BELTS switch is in the AUTO position and: • landing gear not up and locked, or • flap lever at 5 or greater, or • airplane altitude below 10,000 feet MSL, or • cabin altitude above 10,000 feet, or • passenger oxygen on" }],
  "aircraft-general-034": [{ ref:"FCOM 1.30.3", quote:"Note: Anytime passenger oxygen deploys, the FASTEN SEAT BELT signs illuminate and the RETURN TO SEAT signs extinguish, regardless of selector position." }],
  "aircraft-general-035": [{ ref:"FCOM 1.40.6", quote:"No smoking signs are not electrically illuminated. No smoking placards are installed throughout the airplane." }],
  "aircraft-general-036": [{ ref:"FCOM 1.46.1", quote:"An overhead flight crew rest (OFCR) is located in the forward part of the airplane in the overhead area between door 1L and 1R." }],
  "aircraft-general-037": [{ ref:"FCOM 1.46.1", quote:"The area has its own smoke detection system but no fire extinguishing system." }],
  "aircraft-general-038": [{ ref:"FCOM 1.46.1", quote:"The overhead flight crew rest is to be occupied by flight crew members trained in the use of the crew rest evacuation routes, fire fighting and depressurization procedures." }],
  "aircraft-general-039": [{ ref:"FCOM 1.46.1", quote:"The OFCR seat may not be occupied during taxi, takeoff, or landing operations. The bunks and common area may not be occupied. The OFCR door must be latched closed during taxi, takeoff or landing." }],
  "aircraft-general-040": [{ ref:"FCOM 1.46.14", quote:"A total of four (4) smoke detectors are installed in the overhead flight crew rest. There is one smoke detector in the common area, one in the seat area, and one in each bunk area." }],
  "aircraft-general-041": [{ ref:"FCOM 1.46.4", quote:"An amber call light/reset switch is mounted on the exterior wall above the entrance door. When smoke is detected in the crew rest area, the light flashes." }],
  "aircraft-general-042": [{ ref:"FCOM 1.46.4", quote:"The light illuminates steady when the attendant call button on a crew rest PCU has been pushed." }],
  "aircraft-general-043": [{ ref:"FCOM 1.46.14", quote:"Push – • if pushed and immediately released, horn sounds for three seconds • if pushed and held, horn sounds until the switch is released • red indicator illuminates • external alarms sound", note:"Self-Test Switch description; the 'three seconds' and 'external alarms sound' matches the question" }],
  "aircraft-general-044": [{ ref:"FCOM 1.46.14", quote:"Status Indicator Light Illuminated (green) – • steady – smoke detector has power and is operating properly" }],
  "aircraft-general-045": [{ ref:"FCOM 1.46.14", quote:"Illuminated (green) – • blinking – maintenance is necessary" }],
  "aircraft-general-046": [{ ref:"FCOM 1.46.14", quote:"Illuminated (red) – • steady – smoke has been detected" }],
  "aircraft-general-047": [{ ref:"FCOM 1.46.14", quote:"Illuminated (red) – • blinking – detector has failed" }],
  "aircraft-general-048": [{ ref:"FCOM 1.46.15", quote:"on the flight deck: • the master caution light illuminates • an aural caution alarm sounds • a SMOKE REST UPR DR 1 EICAS caution message is displayed" }],
  "aircraft-general-049": [{ ref:"FCOM 1.46.14", quote:"Release – the horn cancellation remains active until the detector has not sensed smoke for a period of 30 seconds, at which time the detector resets." }],
  "aircraft-general-050": [{ ref:"FCOM 1.46.21", quote:"The primary evacuation route is down the entrance stairway through the entrance enclosure." }],
  "aircraft-general-051": [{ ref:"FCOM 1.46.21", quote:"If the main entrance is unusable, evacuation is possible through the emergency hatch located at the bunk on the right side." }],
  "aircraft-general-052": [{ ref:"FCOM 1.46.20", quote:"WARNING: If the emergency hatch was used for crew evacuation, the lower hatch must be closed to help prevent the spread of smoke or fire." }],
  "aircraft-general-053": [{ ref:"FCOM 1.46.18", quote:"If a cabin decompression occurs during cruise, a decompression (continuous) horn sounds in the main area and the entrance enclosure." }],
  "aircraft-general-054": [{ ref:"FCOM 1.46.18", quote:"Note: Prior to evacuating the overhead flight crew rest, push the HORN SHUT OFF switch (located in the entrance area). This silences the decompression alarm horns in the overhead flight crew rest." }],
  "aircraft-general-055": [{ ref:"FCOM 1.46.18", quote:"Note: Pushing the HORN SHUT OFF switch also removes the cabin attendant panel alert pop-up window SMOKE DETECTED. A SMOKE DETECTED message is then shown in small text at the bottom of all cabin attendant panels." }],
  "aircraft-general-056": [{ ref:"FCOM 1.46.18", quote:"Note: The flight deck Engine and Crew Alerting System (EICAS) message SMOKE REST UPR DR 1 remains displayed until the smoke detection system is reset." }],
  "aircraft-general-057": [{ ref:"FCOM 1.46.7", quote:"LIGHTS MASTER Switch Guarded switch." }],
  "aircraft-general-058": [{ ref:"FCOM 1.46.7", quote:"Push – • overrides individual lighting controls and turns the entrance area, bunk area and seat area lights in the crew rest compartment on bright (green light illuminates)" }],
  "aircraft-general-059": [{ ref:"FCOM 1.46.7", quote:"• second push turns all the lights in the crew rest compartment off and returns control to the individual switches (green light extinguishes)" }],
  "aircraft-general-060": [{ ref:"FCOM 1.30.35", quote:"Oxygen Flow Indicator Shows a yellow cross when oxygen is flowing." }],
  "aircraft-general-061": [{ ref:"FCOM 1.30.35", quote:"RESET/ TEST Switch Push – • with the left oxygen panel door closed and the OXY ON not displayed, turns oxygen on momentarily to test the regulator" }],
  "aircraft-general-062": [{ ref:"FCOM 1.30.35", quote:"• with the left oxygen panel door closed and the OXY ON flag displayed: • turns oxygen off and deactivates the mask microphone • reactivates the boom microphone" }],
  "aircraft-general-063": [{ ref:"FCOM 1.30.35", quote:"Oxygen Mask Release Levers Squeeze and pull – • opens oxygen panel doors and starts the flow of oxygen • inflates the mask harness • selects the mask microphone (the boom microphone is deselected)" }],
  "aircraft-general-064": [{ ref:"FCOM 1.30.36", quote:"EMGCY (emergency) – supplies 100% oxygen under positive pressure at all cabin altitudes (protects against smoke and harmful vapors)." }],
  "aircraft-general-065": [{ ref:"FCOM 1.30.36", quote:"100% – supplies 100% oxygen on demand (not an air/oxygen mixture)." }],
  "aircraft-general-066": [{ ref:"FCOM 1.30.36", quote:"N (normal) – supplies an air/oxygen mixture on demand (the ratio depends on cabin altitude). Automatically supplies 100% oxygen under positive pressure when cabin altitude is above a preset value" }],
  "aircraft-general-067": [{ ref:"FCOM 1.30.36", quote:"CAUTION: Use of EMGCY mode depletes oxygen supply at higher rate than 100% or N mode. Use EMGCY mode only as conditions require." }],
  "aircraft-general-068": [{ ref:"FCOM 1.40.14", quote:"The passenger cabin oxygen system is supplied by gaseous oxygen stored in small high pressure cylinders. The passenger and flight attendant oxygen masks and gaseous oxygen cylinders are located throughout the cabin in passenger service units (PSU) fitted to the ceiling panels." }],
  "aircraft-general-069": [{ ref:"FCOM 1.40.14", quote:"For each mask, normal breathing initiates the oxygen flow. The system regulates the pressure and distributes oxygen to the masks by providing small pulses of oxygen to the user during inhalation. The pulse duration is dependent on cabin altitude, longer pulses at higher altitudes and shorter ones at lower altitudes." }],
  "aircraft-general-070": [{ ref:"FCOM 1.40.14", quote:"The oxygen cylinders are single use devices and once activated, provides oxygen until the cylinder is depleted." }],
  "aircraft-general-071": [{ ref:"FCOM 1.40.14", quote:"Oxygen is available for approximately 22 minutes." }],
  "aircraft-general-072": [{ ref:"FCOM 1.40.14", quote:"The masks automatically drop from the PSU prior to the cabin altitude reaching the greater of: • 14,500 feet, or • origin airfield altitude +1500 feet, or • destination airfield altitude +1500 feet" }],
  "aircraft-general-073": [{ ref:"FCOM 1.40.14", quote:"The passenger cabin masks can be manually deployed from the flight deck by pushing the PASS OXYGEN switch on the overhead panel to the ON position." }],
  "aircraft-general-074": [{ ref:"FCOM 1.30.33", quote:"Oxygen Pressure Display Displays crew oxygen cylinder pressure (PSI). Note: Oxygen indication is displayed by pushing the system (SYS) display switch on the display select panel, and then selecting the status (STAT) synoptic key from the menu page." }],
  "aircraft-general-075": [],
  "aircraft-general-076": [{ ref:"FCOM 1.40.1", quote:"The Common Core System (CCS) provides a common computing network and data exchange system for the majority of airplane systems. CCS operation is automatic." }],
  "aircraft-general-077": [{ ref:"FCOM 1.40.1", quote:"The Common Core System (CCS) provides a common computing network and data exchange system for the majority of airplane systems. CCS operation is automatic." }],
  "aircraft-general-078": [{ ref:"FCOM 1.40.1", quote:"The CCS's main component is the Common Computing Resource (CCR), which has a left and right cabinet." }],
  "aircraft-general-079": [{ ref:"FCOM 1.40.1", quote:"The CCS's main component is the Common Computing Resource (CCR), which has a left and right cabinet. Separate modules within each CCR cabinet perform distinct functions.", note:"CCR has left and right cabinets; FCOM places them in the Forward EE Bay per PPTX slide 84, but the word 'Forward EE Bay' is from the PPTX, not verbatim in this FCOM passage" }],
  "aircraft-general-080": [{ ref:"FCOM 1.40.1", quote:"There are no CCS controls or indications for normal operations." }],
  "aircraft-general-081": [{ ref:"FCOM 1.40.1", quote:"Two (L, R) CCR RESET switches are located on the overhead panel for use during this procedure." }],
  "aircraft-general-082": [{ ref:"FCOM 1.40.1", quote:"In the event a CCR fault occurs resulting in the loss of displays, a CCR reset procedure can be found in the unannunciated non-normal checklist: LOSS OF ALL DISPLAYS." }],
  "aircraft-general-083": [{ ref:"FCOM 1.40.1", quote:"The left CCR always starts-up first." }],
  "aircraft-general-084": [{ ref:"FCOM 1.40.1", quote:"the BATTERY switch is pushed and the left CCR start-up cycle begins (approximately 2-3 minutes in duration)" }],
  "aircraft-general-085": [{ ref:"FCOM 1.40.1", quote:"the left CCR is on-line when the captain's inboard and lower display unit show the default format (CDU pages)" }],
  "aircraft-general-086": [{ ref:"FCOM 1.40.1", quote:"the right CCR will not begin the start-up cycle until the left CCR completes start-up and a power source other than the battery (APU or external power) is available." }],
  "aircraft-general-087": [{ ref:"FCOM 1.40.1", quote:"both CCRs are on-line when all displays and the HUD combiners show their default formats" }],
  "aircraft-general-088": [],
  "aircraft-general-089": [{ ref:"FCOM 1.40.1", quote:"Separate modules within each CCR cabinet perform distinct functions.", note:"The list of hosted systems (environmental control, communication, electrical, fire protection, fuel, hydraulic, ice and rain protection, indicating and recording, landing gear, lighting, navigation, water and waste, central maintenance, nitrogen generation, door indication) appears in the PPTX slide" }],
  "aircraft-general-090": [{ ref:"FCOM 5.20.2", quote:"Tuning and Control Panels (TCP) The tuning and control panels (TCP) are used to tune and control the VHF, HF, SATCOM, cabin interphone, and other airplane systems." }],
  "aircraft-general-091": [{ ref:"FCOM 11.10.14", quote:"Alerting and Transponder Control Panel (ATP) The Alerting and Transponder Control Panel serves as the primary means for setting transponder modes and for sending an IDENT to ATC. The ATP is used in conjunction with the transponder display on the Tuning and Control Panel." }],
  "aircraft-general-092": [{ ref:"FCOM 10.10.40", quote:"EFIS Control Panel – PFD Controls MINS RADIO BARO FPV MTRS BARO IN HPA", note:"EFIS Control Panel is the panel containing MINS RADIO/BARO, FPV, MTRS, BAROSET, ND mode, MAP, PLAN, MENU, RANGE, WXR, TFC, and TERR" }],
  "aircraft-general-093": [{ ref:"FCOM 10.10.49", quote:"Display Select Panel MFD L R CDU INFO CHKL COMM ND SYS EICAS ENG CANC/RCL", note:"DSP contains MFD L/R, SYS, CDU, INFO, CHKL, COMM, ND, EICAS, ENG, and CANC/RCL switches" }],
  "aircraft-general-094": [{ ref:"FCOM 10.20.1", quote:"• PFDs are displayed on the two outboard display units (DUs) … a normal-display ND is shown in the left MFD of the Captain inboard DU … the CDU is displayed in each MFD window of the lower DU", note:"DUs are labeled outboard, inboard, and lower; referenced throughout 10.20 as outboard DU, inboard DU, and lower DU" }],
  "hud-001": [{ ref:"FCOM 10.22.1", quote:"The HUD system does not have an ON/OFF switch. The projector turns on and displays the symbology by deploying the combiner." }],
  "hud-002": [{ ref:"FCOM 10.12.29", quote:"Pull – rotate to set brightness and display contrast level; the display brightness level must be manually adjusted to maintain a constant display contrast level when background lighting changes." }],
  "hud-003": [{ ref:"FCOM 10.22.1", quote:"With the brightness control pushed in, the display brightness and contrast level are also initially set by rotating the control. The HUD system then automatically adjusts the brightness level to maintain a constant display contrast when background lighting conditions change." }],
  "hud-004": [{ ref:"FCOM 10.22.2", quote:"An ALIGN HUD message is shown left or right of the airplane symbol on the combiner screen if it is not properly aligned with the projector." }],
  "hud-005": [{ ref:"FCOM 10.22.2", quote:"A locking mechanism is used to secure the combiner in the stowed position. Stow the combiner by lifting the combiner up and back until the latch engages in the locked position." },{ ref:"FCOM 10.12.28", quote:"Folding combiner upward towards the overhead panel engages locking mechanism. Push lock release to right to release combiner assembly for deployment." }],
  "hud-006": [{ ref:"FCOM 10.22.2", quote:"If there is a sudden and sustained deceleration, the combiner rotates forward and locks in a breakaway position. This prevents the pilot's head from impacting the combiner." }],
  "hud-007": [{ ref:"FCOM 10.22.2", quote:"Release the combiner by pushing forward to relieve pressure on the latch and slide the locking lever to the right. Then reposition the combiner to the desired position." }],
  "hud-008": [{ ref:"FCOM 10.22.2", quote:"Due to the monochromatic limitation of the HUD display, many alerting functions that use color (usually amber) symbology on the PFD may use flashing, shape filling/blanking and highlight box symbology on the HUD, or have no distinct HUD alert." }],
  "hud-009": [{ ref:"FCOM 10.12.1", quote:"Note: The compass rose is not displayed during ground operations.", note:"Applies to full symbology mode; stated as note under compass rose description on 10.12.1" },{ ref:"FCOM 10.22.2", quote:"A partial compass rose is also at the bottom of the full-symbology HUD display... Note: The partial compass rose is not displayed in full symbology mode during ground operations." }],
  "hud-010": [{ ref:"FCOM 10.22.2", quote:"The decluttered mode eliminates airspeed and altitude tapes, displaying only digital values. The partial compass rose is also removed." }],
  "hud-011": [{ ref:"FCOM 10.22.1", quote:"Symbology control switches located on the outboard side of each control wheel allow the pilot to alternate between the two display modes." },{ ref:"FCOM 10.12.29", quote:"HUD Symbology Control Switch — Push – Alternates between full and decluttered modes." }],
  "hud-012": [{ ref:"FCOM 10.12.21", quote:"during normal takeoff, appears at approximately 50 feet RA" }],
  "hud-013": [{ ref:"FCOM 10.22.4", quote:"The guidance cue appears at 50 feet RA on takeoff. If a HUD takeoff is selected, the guidance cue appears at the same time as the flight path vector." }],
  "hud-014": [{ ref:"FCOM 10.22.4", quote:"During a windshear alert condition, the guidance cue will change from hollow to solid (filled)." }],
  "hud-015": [{ ref:"FCOM 10.22.4", quote:"To follow flight director guidance, position the circular body of the flight path vector symbol around the guidance cue." }],
  "hud-016": [{ ref:"FCOM 10.12.20", quote:"TO/GA Reference Line — Displayed on ground when: flight director TO/GA mode is active, and ground speed is greater than 65 knots." },{ ref:"FCOM 10.22.4", quote:"During takeoff roll, this line becomes visible when ground speed is greater than 65 knots and is initially fixed at the top of the display." }],
  "hud-017": [{ ref:"FCOM 10.22.4", quote:"In TO/GA mode, flight director vertical guidance is depicted as a horizontal dashed line (pitch target) across the HUD pitch scale. To comply with this guidance, place the airplane reference symbol on the TO/GA reference line." }],
  "hud-018": [{ ref:"FCOM 10.22.3", quote:"These indications become active when the heading of the airplane is within 45° of the runway heading and the plane is within 2º of the center of the ILS localizer beam or 75 feet of the GLS localizer centerline." }],
  "hud-019": [{ ref:"FCOM 10.22.3", quote:"If the airplane then deviates more than seven meters (23 feet) right or left from the runway centerline, a flashing triangle appears, pointing in the direction of the runway centerline, to assist in correcting for the deviation." }],
  "hud-020": [{ ref:"FCOM 11.40.26", quote:"When available, HUD TAKEOFF options are shown on the DEPARTURES page. Selecting a HUD TAKEOFF runway provides highly accurate HUD guidance during takeoffs. Select – selects runway to be used for HUD takeoff… the FMC tunes the selected navaid to provide takeoff guidance through the HUD." }],
  "hud-021": [{ ref:"FCOM 10.22.6", quote:"Runway edge lines is a projection of an 8,000 foot long, 200 foot wide runway, displaying the calculated position of the runway." }],
  "hud-022": [{ ref:"FCOM 10.22.6", quote:"The runway centerline for the HUD runway edge lines is based on the localizer course, not the geographic orientation of the runway." }],
  "hud-023": [{ ref:"FCOM 10.22.6", quote:"The symbol displays in the decluttered mode only, and is enabled at a radio altimeter altitude of 300 feet, and removed at 60 feet." }],
  "hud-024": [{ ref:"FCOM 10.12.26", quote:"Runway Symbol — Calculated position of runway edge lines. Displays only in decluttered mode. Removed from HUD at 60 feet." }],
  "hud-025": [{ ref:"FCOM 10.22.6", quote:"If radio altitude is not available, the system will use barometric altitude above touchdown." }],
  "hud-026": [{ ref:"FCOM 10.12.26", quote:"Touchdown Aiming Point — Tick marks on runway edge lines correspond to the touchdown aiming point." },{ ref:"FCOM 10.22.6", quote:"The runway edge lines symbol is composed of the runway edge lines with two tick marks that correspond to the touchdown aiming point (glideslope intercept point)." }],
  "hud-027": [{ ref:"FCOM 10.22.6", quote:"During approach, a horizontal dashed line across the HUD pitch scale depicts the projected glideslope angle of the active approach. The glideslope angle numerical value is digitally displayed adjacent to the glideslope reference line." }],
  "hud-028": [{ ref:"FCOM 10.22.7", quote:"During visual approaches, a precise descent angle to the runway is maintained by overlaying the glideslope reference line on the runway touchdown zone. Then maintain the flight path vector symbol on the glideslope reference line." }],
  "hud-029": [{ ref:"FCOM 10.22.7", quote:"During takeoff, the scale is not displayed, but is added to the display if a deceleration is sensed when the ground speed is above 50 knots, and the airplane is still on the ground." }],
  "hud-030": [{ ref:"FCOM 10.22.7", quote:"Once displayed, the scale is removed when ground speed decreases below 25 knots, the airplane begins accelerating, or the airplane lifts off." }],
  "hud-031": [{ ref:"FCOM 10.12.27", quote:"Vertical indexed scale and pointer indicate the actual deceleration rate being achieved, as provided by the corresponding autobrake setting (1, 2, 3, 4, MAX AUTO)." }],
  "hud-032": [{ ref:"FCOM 10.22.5", quote:"The flight path slip/skid indicator is only displayed during a takeoff, or a low-altitude go-around, providing additional yaw reference in the case of an engine failure." }],
  "hud-033": [{ ref:"FCOM 10.22.5", quote:"The flight path slip/skid indicator is only displayed during a takeoff, or a low-altitude go-around, providing additional yaw reference in the case of an engine failure." }],
  "hud-034": [{ ref:"FCOM 10.22.5", quote:"A corrective advisory is displayed on the HUD by a double lined box called the \"fly-to box\". The fly-to box is an indication of where the flight path vector symbol should be positioned in order to obtain vertical separation from traffic, directing an evasive maneuver." }],
  "hud-035": [{ ref:"FCOM 10.12.9", quote:"Deviation Scale — Lateral and Vertical scales: outer tic marks represent RNP. Center tic mark represents airplane position." }],
  "hud-036": [{ ref:"FCOM 10.12.9", quote:"bars represent ANP; area between bars indicate margin available to remain within RNP criteria" }],
  "hud-037": [{ ref:"FCOM 10.12.9", quote:"area between bars indicate margin available to remain within RNP criteria" }],
  "hud-038": [{ ref:"FCOM 10.12.9", quote:"bars on vertical scale display only during FMC descent phase of flight" }],
  "hud-039": [{ ref:"FCOM 10.12.11", quote:"The scale is in view after the frequency is tuned if NPS are not shown. With either LNAV or VNAV active, or LNAV is armed, the NPS indications remain in view until localizer capture." }],
  "hud-040": [{ ref:"FCOM 10.12.11", quote:"Localizer Pointer and Scale — The pointer indicates the localizer relative to the airplane position and is: unfilled diamond when it appears; in view when the localizer signal is received." }],
  "hud-041": [{ ref:"FCOM 10.12.11", quote:"filled diamond when within 2 1/2 dots from the center" }],
  "hud-042": [{ ref:"FCOM 10.12.12", quote:"Expanded Localizer Scale — Displays when the autopilot or flight director is in LOC mode and the airplane is close to the runway center line. Provides a more sensitive display. Expanded localizer indications also display during HUD takeoff operations." }],
  "hud-043": [{ ref:"FCOM 10.12.12", quote:"A rectangle equals 1/2 dot deviation." }],
  "hud-044": [{ ref:"FCOM 10.12.11", quote:"Glideslope Pointer and Scale — The pointer indicates the glideslope position relative to the airplane, and is: unfilled diamond when it appears; in view when the glideslope signal is received." }],
  "hud-045": [{ ref:"FCOM 10.12.11", quote:"filled diamond when within 2 1/2 dots from the scale center" }],
  "hud-046": [{ ref:"FCOM 10.12.14", quote:"Landing Altitude Reference Bar — Indicates height above touchdown. (hollow bar) – 500 to 1000 feet above landing altitude." }],
  "hud-047": [{ ref:"FCOM 10.12.14", quote:"Landing Altitude Reference Bar — Indicates height above touchdown. (filled bar) – 0 to 500 feet above landing altitude." }],
  "hud-048": [{ ref:"FCOM 10.12.14", quote:"BARO Minimums Line — When BARO minimums are displayed, the number is also represented as a triangular bug and line on the altitude scale. Flashes for 3 seconds, then steady when the airplane descends below baro minimums." }],
  "hud-049": [{ ref:"FCOM 10.12.14", quote:"BARO minimums are feet MSL" }],
  "hud-050": [{ ref:"FCOM 10.12.14", quote:"RADIO minimums are radio altitude feet AGL" }],
  "hud-051": [{ ref:"FCOM 10.12.14", quote:"Minimums — Displays the approach minimums altitude set using the EFIS control panel MINS selector... Flashes for 3 seconds, then steady when the airplane descends below selected minimum altitude." }],
  "hud-052": [{ ref:"FCOM 10.22.5", quote:"When flight path acceleration symbol is above the wing of the flight path vector symbol, the airplane is accelerating." }],
  "hud-053": [{ ref:"FCOM 10.22.5", quote:"When it is below the flight path vector symbol wing, the airplane is decelerating." }],
  "hud-054": [{ ref:"FCOM 10.12.22", quote:"Flight Path Acceleration symbol — Removed from the display when a low-level, decreasing performance windshear is detected below 400 feet AGL." },{ ref:"FCOM 10.22.5", quote:"To avoid confusion in controlling airplane thrust, the flight path acceleration symbol is removed from the display when a low-level, decreasing performance windshear is detected below 400 feet AGL." }],
  "hud-055": [{ ref:"FCOM 10.22.5", quote:"The speed error tape shows the difference between the indicated airspeed and the selected airspeed on the mode control panel. Selected airspeed on takeoff is V2." }],
  "hud-056": [{ ref:"FCOM 10.22.5", quote:"Selected airspeed on takeoff is V2, whereas flight director guidance airspeed is V2 + 15." }],
  "hud-057": [{ ref:"FCOM 10.22.5", quote:"In order to prevent an incorrect interpretation of the speed error tape, the symbol is not displayed until the first flap retraction." }],
  "hud-058": [{ ref:"FCOM 10.22.5", quote:"The tape length is limited to a 15 knot error indication." }],
  "hud-059": [{ ref:"FCOM 10.22.5", quote:"If the indicated airspeed is faster than the selected speed, the speed error tape rises above the wing." }],
  "hud-060": [{ ref:"FCOM 10.22.5", quote:"If the indicated airspeed is slower than the selected speed, the speed error tape falls below the wing." }],
  "hud-061": [{ ref:"FCOM 10.22.3", quote:"if the airplane pitch angle is excessively high, a downward pointing chevron positioned on the +30º pitch scale line comes into view, directing a pitch-down command to the pilot." }],
  "hud-062": [{ ref:"FCOM 10.22.3", quote:"If the airplane pitch angle is excessively low, an upward pointing chevron positioned on the -20º pitch scale line comes into view, directing a pitch-up command to the pilot." }],
  "hud-063": [{ ref:"FCOM 10.22.3", quote:"At excessively high or low pitch angles, chevrons are displayed directing the pilot to pitch the airplane back toward the horizon." },{ ref:"FCOM 10.12.24", quote:"Pitch Scale Chevron (Upper) — Overlays compressed pitch scale with tip at +30º, directing pilot to apply pitch down. Pitch Scale Chevron (Lower) — Overlays compressed pitch scale with tip at -20º, directing pilot to apply pitch up." }]
};

const QUESTIONS = [
  { id:"fuel-001", system:"Fuel", q:"Where is total fuel quantity displayed?", a:"Primary EICAS display.", src:"Fuel deck slide 2" },
  { id:"fuel-002", system:"Fuel", q:"How many fuel tanks does the 787 have, and what are they called?", a:"Three: L MAIN, R MAIN, and CENTER.", src:"Fuel deck slide 4" },
  { id:"fuel-003", system:"Fuel", q:"How many pumps are in each main tank, and what are they called?", a:"Two: FWD and AFT.", src:"Fuel deck slide 4" },
  { id:"fuel-004", system:"Fuel", q:"How many pumps are in the center tank, and what are they called?", a:"Two: L and R.", src:"Fuel deck slide 4" },
  { id:"fuel-005", system:"Fuel", q:"What type of pumps are the center tank fuel pumps, and what is special about their output pressure?", a:"Override/jettison pumps. Higher output pressure than main tank pumps — center fuel is used before wing fuel.", src:"Fuel deck slide 13, FCOM 12.20.1" },
  { id:"fuel-006", system:"Fuel", q:"Which tank does the APU receive fuel from?", a:"Left fuel manifold (L MAIN tank). With no AC power, the L MAIN DC pump runs automatically.", src:"Fuel deck slide 3, FCOM 12.20.7" },
  { id:"fuel-007", system:"Fuel", q:"What are the normal fuel quantity units on the EICAS display?", a:"KGS x 1000.", src:"Fuel deck slide 4" },
  { id:"fuel-008", system:"Fuel", q:"What units does EICAS switch to when fuel jettison is ARMED?", a:"LBS x 1000.", src:"Fuel deck slide 9, FCOM 12.20.8" },
  { id:"fuel-009", system:"Fuel", q:"What color is the TO REMAIN target quantity on EICAS when jettison is armed?", a:"Magenta.", src:"Fuel deck slide 9" },
  { id:"fuel-010", system:"Fuel", q:"What is the minimum fuel that remains in each main tank after jettison is complete?", a:"8,700 lbs per main tank.", src:"FCOM 12.20.7" },
  { id:"fuel-011", system:"Fuel", q:"What does the FUEL TO REMAIN knob do, and how do you activate manual mode?", a:"Sets fuel quantity to remain after jettison. PULL ON to switch from MLW to manual mode. Rotate to adjust. Push to return to MLW.", src:"FCOM 12.10.2" },
  { id:"fuel-012", system:"Fuel", q:"What type of guard protects the NOZZLE L and R jettison switches?", a:"Red/white striped hazard guard.", src:"Fuel deck slide 6" },
  { id:"fuel-013", system:"Fuel", q:"What EICAS header change indicates fuel balance has been achieved?", a:"FUEL BALANCED replaces FUEL QTY (flashes 5 seconds).", src:"FCOM 12.10.4" },
  { id:"fuel-014", system:"Fuel", q:"What color imbalance pointer appears when imbalance exceeds 200 lbs but the FUEL IMBALANCE message is NOT displayed?", a:"Solid white pointer.", src:"FCOM 12.10.4" },
  { id:"fuel-015", system:"Fuel", q:"What does the Nitrogen Generation System (NGS) do?", a:"Generates nitrogen-enriched air to displace fuel vapors in all tanks — minimizes flammability during flight and ground ops.", src:"FCOM 12.20.9" },
  { id:"fuel-016", system:"Fuel", q:"How is a fuel pump load shed indicated on the flight deck?", a:"PRESS light illuminates on the pump switch AND the pump is labeled LOAD SHED on the fuel synoptic.", src:"FCOM 12.20.1" },
  { id:"fuel-017", system:"Fuel", q:"Which EICAS fuel messages are alert (caution) level and require checklist action?", a:"FUEL QTY LOW, FUEL FLOW ENG, FUEL IMBALANCE, INSUFFICIENT FUEL.", src:"Fuel deck slide 5, FCOM 12.30" },
  { id:"fuel-018", system:"Fuel", q:"Which EICAS fuel messages are advisory only (no immediate checklist)?", a:"FUEL IN CENTER, FUEL LOW CENTER.", src:"Fuel deck slide 5" },
  { id:"fuel-019", system:"Fuel", q:"What valve connects L MAIN and R MAIN tanks, and what is its normal position?", a:"CROSSFEED valve. Normally CLOSED. Opening it allows any tank pump to supply either engine.", src:"FCOM 12.20.3" },
  { id:"fuel-020", system:"Fuel", q:"What four items are shown in the jettison synoptic footer?", a:"MIN FUEL TEMP, FUEL TEMP, TO REMAIN (with MLW), and JETT TIME (minutes remaining).", src:"FCOM 12.20.8" },
  { id:"fuel-021", system:"Fuel", q:"What does a lit amber CROSSFEED VALVE light indicate?", a:"Crossfeed valve is NOT in the selected position (disagreement).", src:"FCOM 12.10.1" },
  { id:"fuel-022", system:"Fuel", q:"On the expanded EICAS fuel display, in what left-to-right order are tank quantities shown?", a:"L MAIN | CENTER | R MAIN.", src:"FCOM 12.10.4" },
  { id:"fuel-023", system:"Fuel", q:"What minimum fuel temperature is shown on the jettison synoptic? What are the AFM min/max limits (pre-takeoff and inflight)?", a:"-37°C shown on synoptic. AFM (L.10.11): pre-takeoff min -29°C, inflight min -42°C (also ≥3°C above freeze point). Takeoff max 49°C, inflight max 65°C.", src:"FCOM 12.20.8, L.10.11" },
  { id:"fuel-024", system:"Fuel", q:"When jettison is ARMED, what two weight references appear on the primary EICAS?", a:"GROSS WT (current) and MLW (max landing weight) — displayed so crew can determine how much fuel to jettison.", src:"FCOM 12.10.5, 12.20.7" },
  { id:"fuel-x-001", system:"Fuel", q:"The APU receives fuel from which fuel manifold?", a:"The left fuel manifold.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-002", system:"Fuel", q:"On the ground with AC power available, which pump automatically supplies APU fuel, and what happens to the DC pump?", a:"The left aft AC fuel pump operates automatically regardless of fuel pump switch position; the DC fuel pump turns off.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-003", system:"Fuel", q:"On the ground with no AC power and APU switch ON, which pump runs and how?", a:"The left main tank DC fuel pump runs automatically.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-004", system:"Fuel", q:"How many AC-powered fuel pumps does each fuel tank contain?", a:"Two.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-005", system:"Fuel", q:"What can a single main tank fuel pump supply?", a:"Sufficient fuel to operate one engine under all conditions.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-006", system:"Fuel", q:"What makes the center tank pumps different from main tank pumps?", a:"They are override/jettison pumps with higher output pressure than the main tank pumps.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-007", system:"Fuel", q:"In what order is center tank fuel used relative to wing (main) tank fuel?", a:"Center tank fuel is used before wing tank fuel.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-008", system:"Fuel", q:"What two indications confirm a fuel pump has been load shed?", a:"The pump switch PRESS light is illuminated AND the pump is labeled LOAD SHED on the fuel synoptic.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-009", system:"Fuel", q:"What flight risk exists when an engine is on suction feed at altitude?", a:"Thrust deterioration or engine flameout may occur due to fuel flow reduction.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-010", system:"Fuel", q:"What causes suction feed line restriction as the airplane climbs?", a:"Dissolved air released from fuel due to decreasing air pressure collects in the suction feed line and restricts fuel flow.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-011", system:"Fuel", q:"What is the long-term consequence of continued use of the crossfeed valve?", a:"Progressive fuel imbalance.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-012", system:"Fuel", q:"What is the key operational difference between fuel crossfeed and fuel balance?", a:"Fuel crossfeed is tank-to-engine; fuel balance is tank-to-tank.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-013", system:"Fuel", q:"List four conditions that cause the fuel balance system to automatically command off.", a:"Fuel is balanced; jettison system is active; FUEL DISAGREE message displayed; FUEL QTY LOW message displayed; airplane is on ground and either engine running. (Any four accepted.)", src:"Fuel deck (full extract)" },
  { id:"fuel-x-014", system:"Fuel", q:"Under what conditions does a flashing white imbalance pointer appear?", a:"Main tank fuel differs by more than 200 lbs AND either the crossfeed valve is open OR the balance system is ON.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-015", system:"Fuel", q:"When the flashing white imbalance pointer is shown, is the FUEL IMBALANCE message displayed?", a:"No. The FUEL IMBALANCE message is NOT displayed for a flashing white pointer.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-016", system:"Fuel", q:"What replaces the FUEL QTY header when mains are back in balance, and for how long does it flash?", a:"FUEL BALANCED replaces FUEL QTY and flashes for 5 seconds.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-017", system:"Fuel", q:"What fuel quantity does the Jettison ARM switch initialize the \"fuel to remain\" value to?", a:"The MLW (maximum landing weight) fuel quantity.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-018", system:"Fuel", q:"When the Jettison ARM switch is pushed, what display is replaced by the \"fuel to remain\" readout?", a:"The fuel temperature and static air temperature displays are replaced.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-019", system:"Fuel", q:"What is the target fuel state when jettison is complete?", a:"The fuel quantity remaining leaves the airplane at maximum landing weight (MLW).", src:"Fuel deck (full extract)" },
  { id:"fuel-x-020", system:"Fuel", q:"Where is jettison time displayed, and in what units?", a:"On the fuel synoptic display, in minutes.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-021", system:"Fuel", q:"At what point does fuel jettison automatically stop?", a:"Just above the FUEL TO REMAIN quantity.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-022", system:"Fuel", q:"True or false: With less than all engines/generators operating there may be insufficient power to operate all fuel pumps, and a load shed is shown on the fuel synoptic.", a:"TRUE.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-023", system:"Fuel", q:"True or false: The two center tank fuel pumps are override/jettison pumps with higher output pressure than main tank pumps, and center tank fuel is used before wing tank fuel.", a:"TRUE.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-024", system:"Fuel", q:"What is the total fuel tank capacity of all three tanks on the B787?", a:"223,646 lbs.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-025", system:"Fuel", q:"Which of the following is TRUE about APU fuel feed: (A) APU fuel from right manifold; (B) any pump supplying right manifold or right main DC pump; (C) on ground, no AC, APU ON -- DC pump runs automatically; (D) with AC, right aft AC pump auto regardless of switch.", a:"C. On the ground, with the APU switch ON and no AC power available, the DC pump runs automatically. (The APU feeds from the LEFT manifold, not the right -- all other options describe right-side components, which is incorrect.)", src:"Fuel deck (full extract)" },
  { id:"fuel-x-026", system:"Fuel", q:"Under what conditions does the expanded FUEL QTY display (showing all three tank quantities) appear? (List at least five.)", a:"Crossfeed valve open; fuel tank qty indication(s) inoperative; FUEL IN CENTER message displayed; FUEL QTY LOW message displayed; FUEL LOW CENTER message displayed; FUEL FLOW ENG message displayed; INSUFFICIENT FUEL message displayed; FUEL IMBALANCE message displayed; airplane on ground with both engines off; balance system active; balance system selected on and fuel already balanced.", src:"Fuel deck (full extract)" },
  { id:"fuel-x-027", system:"Fuel", q:"What happens to dissolved air in the fuel tank eventually at cruise altitude, and what does depletion time depend on?", a:"The dissolved air eventually depletes. Depletion time depends on airplane altitude, fuel temperature, and type of fuel. Once depleted, the engine should effectively operate on suction feed.", src:"Fuel deck (full extract)" },

  { id:"aircraft-general-029", system:"Aircraft General", q:"What does a blank slide mode indication on the door synoptic mean?", a:"Passenger door is closed, latched, and locked; slide mode is UNKNOWN SEAT BELTS Selector (FCOM 1.30.3 / 1.40.6)", src:"Aircraft General deck" },
  { id:"aircraft-general-030", system:"Aircraft General", q:"What does the SEAT BELTS selector OFF position do to the signs?", a:"The fasten seat belt and return to seat signs are NOT illuminated", src:"Aircraft General deck" },
  { id:"aircraft-general-031", system:"Aircraft General", q:"What does the SEAT BELTS selector ON position do?", a:"The fasten seat belt and return to seat signs ARE illuminated", src:"Aircraft General deck" },
  { id:"aircraft-general-032", system:"Aircraft General", q:"What does the SEAT BELTS selector AUTO position do?", a:"Signs illuminate or extinguish automatically based on airplane altitude and system configuration", src:"Aircraft General deck" },
  { id:"aircraft-general-033", system:"Aircraft General", q:"List the five conditions that cause the seat belt signs to automatically illuminate in AUTO.", a:"(1) Landing gear not up and locked, (2) flap lever at 5 or greater, (3) airplane altitude below 10,000 ft MSL, (4) cabin altitude above 10,000 ft, (5) passenger oxygen on", src:"Aircraft General deck" },
  { id:"aircraft-general-034", system:"Aircraft General", q:"When passenger oxygen deploys, what happens to each sign, regardless of selector position?", a:"FASTEN SEAT BELT illuminates; RETURN TO SEAT extinguishes", src:"Aircraft General deck" },
  { id:"aircraft-general-035", system:"Aircraft General", q:"Are no smoking signs electrically illuminated on the 787?", a:"No -- no smoking signs are NOT electrically illuminated; placards are installed throughout the airplane OFCR (FCOM 1.46)", src:"Aircraft General deck" },
  { id:"aircraft-general-036", system:"Aircraft General", q:"Where is the Overhead Flight Crew Rest (OFCR) located?", a:"Overhead area between door 1L and 1R", src:"Aircraft General deck" },
  { id:"aircraft-general-037", system:"Aircraft General", q:"Does the OFCR have a fire extinguishing system?", a:"No -- it has smoke detection only", src:"Aircraft General deck" },
  { id:"aircraft-general-038", system:"Aircraft General", q:"Who may occupy the OFCR?", a:"Flight crew members trained in crew rest evacuation routes, fire fighting, and depressurization procedures", src:"Aircraft General deck" },
  { id:"aircraft-general-039", system:"Aircraft General", q:"What are the OFCR occupancy restrictions during taxi, takeoff, and landing?", a:"Seat, bunk, and common area may NOT be occupied; OFCR door must be LATCHED CLOSED", src:"Aircraft General deck" },
  { id:"aircraft-general-040", system:"Aircraft General", q:"How many smoke detectors are in the OFCR and where are they located?", a:"4 total -- 1 in common area, 1 in seat area, 1 in each bunk area", src:"Aircraft General deck" },
  { id:"aircraft-general-041", system:"Aircraft General", q:"What does the amber call light above the OFCR entrance do when FLASHING?", a:"Smoke has been detected in the crew rest area", src:"Aircraft General deck" },
  { id:"aircraft-general-042", system:"Aircraft General", q:"What does the amber call light above the OFCR entrance do when STEADY?", a:"An attendant call button on a crew rest PCU has been pushed", src:"Aircraft General deck" },
  { id:"aircraft-general-043", system:"Aircraft General", q:"How long does the OFCR smoke self-test button sound for?", a:"3 seconds (external alarms also sound)", src:"Aircraft General deck" },
  { id:"aircraft-general-044", system:"Aircraft General", q:"What does the OFCR green status indicator light STEADY mean?", a:"Smoke detector has power and is operating properly", src:"Aircraft General deck" },
  { id:"aircraft-general-045", system:"Aircraft General", q:"What does the OFCR green status indicator light BLINKING mean?", a:"Maintenance is necessary", src:"Aircraft General deck" },
  { id:"aircraft-general-046", system:"Aircraft General", q:"What does the OFCR red status indicator light STEADY mean?", a:"Smoke has been detected", src:"Aircraft General deck" },
  { id:"aircraft-general-047", system:"Aircraft General", q:"What does the OFCR red status indicator light BLINKING mean?", a:"The detector has failed", src:"Aircraft General deck" },
  { id:"aircraft-general-048", system:"Aircraft General", q:"What EICAS message appears when smoke is detected in the OFCR?", a:"SMOKE REST UPR DR 1 (caution)", src:"Aircraft General deck" },
  { id:"aircraft-general-049", system:"Aircraft General", q:"After the Horn Cancel switch is released in the OFCR, how long must smoke be absent before the detector resets?", a:"30 seconds", src:"Aircraft General deck" },
  { id:"aircraft-general-050", system:"Aircraft General", q:"What is the primary evacuation route from the OFCR?", a:"Down the entrance stairway through the entrance enclosure", src:"Aircraft General deck" },
  { id:"aircraft-general-051", system:"Aircraft General", q:"What is the alternate evacuation route from the OFCR if the main entrance is unusable?", a:"Emergency hatch at the bunk on the RIGHT side", src:"Aircraft General deck" },
  { id:"aircraft-general-052", system:"Aircraft General", q:"What must be done to the lower evacuation hatch after OFCR evacuation, and why?", a:"Must be CLOSED to help prevent the spread of smoke or fire", src:"Aircraft General deck" },
  { id:"aircraft-general-053", system:"Aircraft General", q:"During OFCR decompression, what type of horn sounds and where?", a:"A continuous decompression horn in the main area and entrance enclosure", src:"Aircraft General deck" },
  { id:"aircraft-general-054", system:"Aircraft General", q:"What should OFCR occupants do before evacuating during decompression?", a:"Push the HORN SHUT OFF switch in the entrance area to silence decompression alarm horns", src:"Aircraft General deck" },
  { id:"aircraft-general-055", system:"Aircraft General", q:"What effect does pushing HORN SHUT OFF have on the cabin attendant panel SMOKE DETECTED alert?", a:"Removes the pop-up window; SMOKE DETECTED appears in small text at the bottom of all cabin attendant panels", src:"Aircraft General deck" },
  { id:"aircraft-general-056", system:"Aircraft General", q:"Does the EICAS SMOKE REST UPR DR 1 message clear when HORN SHUT OFF is pushed?", a:"No -- it remains until the smoke detection system is RESET", src:"Aircraft General deck" },
  { id:"aircraft-general-057", system:"Aircraft General", q:"What type of switch is the OFCR LIGHTS MASTER switch?", a:"Guarded switch", src:"Aircraft General deck" },
  { id:"aircraft-general-058", system:"Aircraft General", q:"What does the first push of the OFCR LIGHTS MASTER switch do?", a:"Overrides individual lighting controls; turns all crew rest lights ON BRIGHT", src:"Aircraft General deck" },
  { id:"aircraft-general-059", system:"Aircraft General", q:"What does the second push of the OFCR LIGHTS MASTER switch do?", a:"Turns all lights OFF and returns control to individual switches Oxygen Systems (FCOM 1.30 / 1.40.14)", src:"Aircraft General deck" },
  { id:"aircraft-general-060", system:"Aircraft General", q:"What does the crew oxygen flow indicator show when oxygen is flowing?", a:"A yellow cross", src:"Aircraft General deck" },
  { id:"aircraft-general-061", system:"Aircraft General", q:"What does the RESET/TEST switch do when the oxygen panel door is closed and OXY ON is NOT displayed?", a:"Turns oxygen on momentarily to test the regulator", src:"Aircraft General deck" },
  { id:"aircraft-general-062", system:"Aircraft General", q:"What does the RESET/TEST switch do when OXY ON IS displayed?", a:"Turns oxygen off, deactivates mask microphone, reactivates boom microphone", src:"Aircraft General deck" },
  { id:"aircraft-general-063", system:"Aircraft General", q:"What does squeezing and pulling both oxygen mask release levers do?", a:"Opens oxygen panel doors, starts oxygen flow, inflates mask harness, selects mask microphone (boom mic deselected)", src:"Aircraft General deck" },
  { id:"aircraft-general-064", system:"Aircraft General", q:"What does the EMGCY regulator mode provide?", a:"100% oxygen under POSITIVE PRESSURE at all cabin altitudes; protects against smoke and harmful vapors", src:"Aircraft General deck" },
  { id:"aircraft-general-065", system:"Aircraft General", q:"What does the 100% regulator mode provide?", a:"100% oxygen on demand (not an air/oxygen mixture)", src:"Aircraft General deck" },
  { id:"aircraft-general-066", system:"Aircraft General", q:"What does the N (normal) regulator mode provide?", a:"Air/oxygen mixture on demand; ratio depends on cabin altitude; automatically supplies 100% oxygen under positive pressure above a preset cabin altitude", src:"Aircraft General deck" },
  { id:"aircraft-general-067", system:"Aircraft General", q:"Why should EMGCY mode be used only as conditions require?", a:"It depletes oxygen supply at a higher rate than 100% or N mode", src:"Aircraft General deck" },
  { id:"aircraft-general-068", system:"Aircraft General", q:"Where is passenger and flight attendant oxygen stored?", a:"In small high-pressure gaseous oxygen cylinders in the Passenger Service Units (PSU) in the ceiling panels", src:"Aircraft General deck" },
  { id:"aircraft-general-069", system:"Aircraft General", q:"How does the passenger oxygen delivery system work?", a:"Normal breathing initiates flow; system delivers small pulses during inhalation; pulse duration is longer at higher cabin altitudes", src:"Aircraft General deck" },
  { id:"aircraft-general-070", system:"Aircraft General", q:"Are passenger oxygen cylinders reusable?", a:"No -- single use only; once activated they provide oxygen until depleted", src:"Aircraft General deck" },
  { id:"aircraft-general-071", system:"Aircraft General", q:"How long does passenger oxygen last?", a:"Approximately 22 minutes", src:"Aircraft General deck" },
  { id:"aircraft-general-072", system:"Aircraft General", q:"At what cabin altitude do passenger oxygen masks automatically drop?", a:"Prior to reaching the GREATER of: 14,500 ft, origin airfield altitude +1,500 ft, or destination airfield altitude +1,500 ft", src:"Aircraft General deck" },
  { id:"aircraft-general-073", system:"Aircraft General", q:"How can the pilot manually deploy passenger oxygen masks?", a:"Push the PASS OXYGEN switch on the overhead panel to ON", src:"Aircraft General deck" },
  { id:"aircraft-general-074", system:"Aircraft General", q:"Where is crew oxygen quantity checked during Pre-flight?", a:"On the STATUS page (shown in PSI)", src:"Aircraft General deck" },
  { id:"aircraft-general-075", system:"Aircraft General", q:"What reference is used to determine required crew oxygen quantity, and what is the unit caution?", a:"FCOM Performance Dispatch Section 11; first table is in liters, status page is in PSI -- use Table 4 to convert Common Core System (FCOM 1.40)", src:"Aircraft General deck" },
  { id:"aircraft-general-076", system:"Aircraft General", q:"What does the CCS provide?", a:"A common computing network and data exchange system for many airplane systems", src:"Aircraft General deck" },
  { id:"aircraft-general-077", system:"Aircraft General", q:"Is CCS operation automatic or manual?", a:"Automatic", src:"Aircraft General deck" },

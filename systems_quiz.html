  "air-systems-020": [{ ref:"FCOM 2.10.1", quote:"Air Conditioning Reset (AIR COND RESET) Switch Push – • resets any air conditioning faults and attempts to restart normal operation • resets any trim air valves held closed due to overheat, control failure, or valve failure • attempts to reset a failed recirculation fan • resets fault protection" }],
  "air-systems-021": [{ ref:"FCOM 2.20.2", quote:"Above 34,000 feet, the CACs are close to the surge margin. This may prevent reset of the inoperative pack and the temporarily reduced CAC flow can cause the operating pack to shutdown." }],
  "air-systems-022": [{ ref:"FCOM 2.20.2", quote:"Packs do not restart until at least two minutes after the engine start sequence is initiated and the engine is running. If both engines are started together, and the two minute limit is met, packs restart immediately after the second engine is running." }],
  "air-systems-023": [{ ref:"FCOM 2.20.2", quote:"Note: Three CAC operation is automatically enabled two minutes after both engines are running." }],
  "air-systems-024": [{ ref:"FCOM 2.20.3", quote:"In standby cooling mode, the EICAS advisory message PACK MODE (L, R) is displayed, and STBY COOLING is displayed in amber on the AIR synoptic." }],
  "air-systems-025": [{ ref:"FCOM 2.20.3", quote:"In standby cooling mode, the EICAS advisory message PACK MODE (L, R) is displayed, and STBY COOLING is displayed in amber on the AIR synoptic." }],
  "air-systems-026": [{ ref:"FCOM 2.20.3", quote:"If one pack is in standby cooling and the other pack is operating normally, the pack in standby cooling mode shuts down at lower altitudes and higher outside air temperatures when ambient conditions do not permit standby cooling. The pack restarts automatically when altitude and outside air temperatures are suitable for standby cooling." }],
  "air-systems-027": [{ ref:"FCOM 2.20.2", quote:"CAUTION: Packs and lower recirculation fans must be selected off before and during use of external conditioned air.", note:"Phrasing 'Packs can be damaged if operated while ground air is connected' is a paraphrase of the CAUTION; the exact CAUTION text is quoted here." }],
  "air-systems-028": [{ ref:"FCOM 2.20.4", quote:"The temperature zone requiring the coolest temperature controls the pack outlet temperature." }],
  "air-systems-029": [{ ref:"FCOM 2.20.4", quote:"If the flight deck or cabin temperature selector setting is unavailable to the pack temperature controller, the pack outlet temperature is regulated to achieve either the last temperature set or an average cabin temperature of 75º F." }],
  "air-systems-030": [{ ref:"FCOM 2.20.4", quote:"Hot trim air from each pack is added to the pack conditioned air to control the temperature in each zone. Each trim air system supplies two cabin zone ducts and one flight deck zone duct." }],
  "air-systems-031": [{ ref:"FCOM 2.10.3", quote:"ALTN (illuminated amber) - the Forward and Aft Outflow Valves are automatically repositioned towards the ten and one o'clock positions respectively when airplane is below 13,000 ft altitude and not on ground.", note:"VENTILATION Switch description. 'Results in depressurization' and 'only used with non-normal checklist' are implicit from context." }],
  "air-systems-032": [{ ref:"FCOM 2.20.11", quote:"The system consists of two independent liquid cooling loops. Each loop has a single pump package which contains two fully redundant pumps." }],
  "air-systems-033": [{ ref:"FCOM 2.20.11", quote:"PECS controls the liquid coolant supply temperature of each loop to 80º F during normal operation." }],
  "air-systems-034": [],
  "air-systems-035": [{ ref:"FCOM 2.20.11", quote:"CAUTION: The Power Electronics Cooling System (PECS) requires a cool-down period following pack and hydraulic EMP shutdown to dissipate residual heat from the liquid cooled LRUs. This prevents damaging the units and degrading the coolant." }],
  "air-systems-036": [{ ref:"FCOM 2.20.12", quote:"The Integrated Cooling System (ICS) is a centralized refrigeration system that provides cooling to galley carts and assists with cooling recirculated cabin air. ICS is integrated with the air conditioning system and the liquid cooling system to manage airplane heat loads. There is no flight deck control for the ICS." }],
  "air-systems-037": [],
  "air-systems-038": [{ ref:"FCOM 2.20.5", quote:"The humidification system operates automatically 20 minutes into cruise above 25,000 ft when the HUMID switch is on and is automatically switched off approximately 1-1.5 hours prior to touch down." }],
  "air-systems-039": [{ ref:"FCOM 2.20.5", quote:"The humidification system operates automatically 20 minutes into cruise above 25,000 ft when the HUMID switch is on and is automatically switched off approximately 1-1.5 hours prior to touch down." }],
  "air-systems-040": [{ ref:"FCOM 2.10.5", quote:"Forward Cargo Air Conditioning (FWD CARGO A/C) Control Provides automatic temperature control for the forward cargo compartment Turning the control toward C or W sets the desired target temperature between 40° F and 80° F. Mid position (12 o'clock) sets approximately 60° F" }],
  "air-systems-041": [{ ref:"FCOM 2.20.6", quote:"The flight crew can set the forward cargo compartment temperature control reference to between 40º and 80º F using the FWD CARGO A/C control. Selecting a mid position sets the temperature at approximately 60º F.", note:"2-degree increment not explicitly stated in the pdftotext output; the control panel description gives the range but not the increment step." }],
  "air-systems-042": [{ ref:"FCOM 2.10.5", quote:"HIGH – High ventilation flow demanded from the air conditioning system to prevent cargo odors from entering the passenger cabin, or to remove cabin odors. Use for live animal carriage or other odorous cargo." }],
  "air-systems-043": [{ ref:"FCOM 2.10.5", quote:"BULK CARGO TEMP Switch AUTO – bulk cargo heat system targeting 70° F." }],
  "air-systems-044": [{ ref:"FCOM 2.20.6", quote:"The system has automatic overheat protection. When an automatic overheat shutdown occurs, cargo heat to the related compartment cannot be restored in flight." }],
  "air-systems-045": [],
  "air-systems-046": [],
  "air-systems-047": [{ ref:"FCOM 1.46", quote:"The temperature in the flight crew rest compartment is controlled by the temperature controller located on the wall in the entrance enclosure. The temperature can be set between 59º F (15º C) and 80º F (27º C) by selecting the warmer or cooler arrows on the panel." }],
  "air-systems-048": [{ ref:"FCOM 1.46", quote:"Note: The flight crew rest compartment temperature can only be increased above the temperature in the aft cabin area. The system is not able to achieve the selected temperature under all operating conditions." }],
  "air-systems-049": [{ ref:"FCOM 2.30.1", quote:"Two outflow valves are installed: one forward and one aft. Normally, the outflow of cabin air is split equally between these two outflow valves. Cabin altitude and full ventilation rates can be maintained by either valve." }],
  "air-systems-050": [{ ref:"FCOM 2.30.1", quote:"Cabin altitude and full ventilation rates can be maintained by either valve." }],
  "air-systems-051": [{ ref:"FCOM 2.10.6", quote:"MAX P .11 PSI TAKEOFF & LDG", note:"Placard text on the Pressurization Panel diagram. Shown on the panel at line 88795 and 81098." }],
  "air-systems-052": [{ ref:"FCOM 2.30.1", quote:"The pressurization system uses ambient pressure and flight plan data from the FMC to calculate a cabin pressurization schedule. The schedule provides a comfortable cabin climb to cruise altitude." }],
  "air-systems-053": [{ ref:"FCOM 2.30.1", quote:"For takeoff, the system supplies a small positive pressurization prior to rotation to cause a smooth cabin altitude transition to the cabin altitude climb schedule." }],
  "air-systems-054": [{ ref:"FCOM 2.30.1", quote:"In the cruise mode, the cabin altitude is normally at or below 6,000 feet." }],
  "air-systems-055": [{ ref:"FCOM 2.30.1", quote:"During some degraded operations the cabin may be commanded to climb to as high as 8,000 feet. This can occur if the air conditioning system is not achieving cabin temperature and ventilation rate targets, and would be more likely with an inoperative pack or CAC." }],
  "air-systems-056": [{ ref:"FCOM 2.30.1", quote:"If cruise altitude is unavailable from the FMC in AUTO, the default cruise altitude is 43,000 feet." }],
  "air-systems-057": [{ ref:"FCOM 2.30.1", quote:"Landing altitude barometric pressure correction comes from the captain's altimeter setting." }],
  "air-systems-058": [{ ref:"FCOM 2.30.1", quote:"At touchdown, both outflow valves open to depressurize the cabin." }],
  "air-systems-059": [{ ref:"FCOM 2.30.2", quote:"If landing altitude is unavailable from the FMC, and not set in MAN, the EICAS advisory message LANDING ALTITUDE is displayed and the cabin altitude controller assumes a landing altitude of 2,000 feet." }],
  "air-systems-060": [{ ref:"FCOM 2.30.2", quote:"For takeoff/landing altitudes below 9,500 feet the cabin altitude limit is set to 11,500 feet" }],
  "air-systems-061": [{ ref:"FCOM 2.30.2", quote:"For takeoff/landing altitudes equal or above 9,500 feet and less than or equal to 14,000 feet, the cabin altitude limit is set to 14,500 feet." }],
  "air-systems-062": [{ ref:"FCOM 2.30.2", quote:"Note: The CPCS system prevents the cabin altitude from exceeding 15,000 feet in the event of any probable failure or malfunction in the pressurization system. At this point, the outflow valves drive full open for the remainder of the flight. It is important that the flight crew not attempt to manually close the outflow valves during the descent." }],
  "air-systems-063": [{ ref:"FCOM 2.30.3", quote:"If the outflow valve position is not available on EICAS, holding the respective OUTFLOW VALVE MANUAL switch in the desired position for 30 seconds moves the valve from full open or closed to the selected position." }],
  "air-systems-064": [{ ref:"FCOM 2.30.3", quote:"Landing field selection limits are 2,000 feet below sea level (-2,000) to 14,000 feet above sea level." }],
  "air-systems-065": [{ ref:"FCOM 2.10.6", quote:"when turned slowly, landing altitude display changes in 100 foot increments. When turned quickly, display changes in 500 foot increments" }],
  "air-systems-066": [{ ref:"FCOM 2.10.7", quote:"Pressurization system indications are displayed automatically when: • landing altitude MAN • either OUTFLOW VALVE switch in MAN • cabin altitude is above normal range (amber or red) • cabin differential pressure is above normal range (amber) • cabin differential pressure is excessive (red) • AIR synoptic selected on any MFD • the following EICAS messages are displayed: • CABIN ALTITUDE • CABIN ALTITUDE AUTO • LANDING ALTITUDE • PACK L + R • OUTFLOW VALVE AFT • OUTFLOW VALVE FWD • VENTILATION ALTN" }],
  "air-systems-067": [{ ref:"FCOM 2.40.1", quote:"Bleed air is supplied by the engines and is only used for engine core and inlet cowl anti–ice operations." }],
  "air-systems-068": [{ ref:"FCOM 2.40.1", quote:"Bleed air is supplied from a dedicated engine bleed port. Anti-ice valves are armed when the ENGINE ANTI-ICE selectors are placed to AUTO. These valves open when the ice detection system detects icing conditions or the selector is set to ON." }],
  "air-systems-069": [{ ref:"FCOM 2.40.1", quote:"The engine anti-ice valves close automatically: • during start • for bleed air over temperature • for bleed air overpressure • when the associated engine fire switch is pulled, or • when a bleed air leak is detected" }],
  "air-systems-070": [{ ref:"FCOM 2.20.2", quote:"During a go-around with one engine inoperative, if slat autogap is needed, both packs could temporarily load shed and the PACK L+R message may show momentarily. No crew action is required for the PACK L+R message in this condition." }],
  "air-systems-071": [{ ref:"FCOM 2.10.10", quote:"Selected Temperatures (magenta) Selected by the FLT DECK TEMP, FWD CARGO A/C, and the CABIN TEMP controls. Actual Temperatures (white) Actual temperature sensed on the flight deck, forward cargo compartment, or the passenger zone." }],
  "air-systems-072": [{ ref:"FCOM 2.20.6", quote:"Ventilation and conditioned air are provided by forward E/E cooling exhaust, a dedicated refrigeration unit, in-line electric heaters and a forward cargo exhaust fan.", note:"Air source for forward cargo A/C is forward E/E cooling exhaust plus dedicated refrigeration unit." }],
  "air-systems-073": [{ ref:"FCOM 2.20.6", quote:"Ventilation and conditioned air are provided by forward E/E cooling exhaust, a dedicated refrigeration unit, in-line electric heaters and a forward cargo exhaust fan.", note:"Forward cargo HEAT (non-refrigerated) comes from the forward E/E cooling exhaust ventilation path." }],
  "air-systems-074": [{ ref:"FCOM 2.20.2", quote:"Normally, one CAC in each pack runs when using the APU as the power source.", note:"During normal ground temperature with APU powering the airplane." }],
  "air-systems-075": [{ ref:"FCOM 2.20.3", quote:"Note: If smoke is detected in the aft E/E equipment compartment, the lower recirculation fans are commanded off.", note:"From Air Distribution section. The reason (preventing smoke circulation into the cabin) is implied by context." }],
  "electrical-001": [{ ref:"FCOM 6.20.1", quote:"Each engine has two 235V AC variable frequency starter/generators. L1 and L2 are mounted on the left engine. R1 and R2 are mounted on the right engine." },{ ref:"FCOM 6.20.2", quote:"The APU has two 235V AC variable frequency starter/generators, designated left (L) and right (R)." }],
  "electrical-002": [{ ref:"FCOM 6.20.1", quote:"Each engine has two 235V AC variable frequency starter/generators. L1 and L2 are mounted on the left engine. R1 and R2 are mounted on the right engine. They are directly connected to the engine gearboxes, producing variable frequency power proportional to engine rotor speed." }],
  "electrical-003": [{ ref:"FCOM 6.20.1", quote:"The electrical power sources are: four variable frequency engine starter/generators (VFSG), two variable frequency APU starter/generators, three external AC power receptacles, one Ram Air Turbine (RAT), one main battery, one APU battery, three flight control Permanent Magnet Generators, two EEC Permanent Magnet Alternators." }],
  "electrical-004": [{ ref:"FCOM 6.20.1", quote:"The system primarily uses 115V AC and 28V DC power, with a limited number of systems optimized with 235V AC.", note:"FCOM 6.20 intro does not state a fuel-efficiency rationale for variable frequency. No verbatim passage found in FCOM, QRH, FCTM, or FOM." }],
  "electrical-005": [{ ref:"FCOM 6.20.1", quote:"In addition to traditional electrically powered systems, the 787 electrical system powers engine start, pressurization, wing ice protection, stabilizer trim, and wheel brake systems." }],
  "electrical-006": [{ ref:"FCOM 6.20.1", quote:"Each engine has two 235V AC variable frequency starter/generators. L1 and L2 are mounted on the left engine. R1 and R2 are mounted on the right engine. They are directly connected to the engine gearboxes." }],
  "electrical-007": [{ ref:"FCOM 6.20.1", quote:"The electrical system automatically selects both starter/generators to engage in order to provide optimal torque for engine start." }],
  "electrical-008": [{ ref:"FCOM 6.20.1", quote:"The generator can then be disconnected from the engine by pushing the respective generator drive disconnect (DRIVE DISC) switch. The drive cannot be reconnected by the flight crew." }],
  "electrical-009": [{ ref:"FCOM 6.10.2", quote:"Generator Drive Disconnect (DRIVE DISC) Switches — Push – disconnects generator drive from engine. Requires maintenance action on the ground to reconnect generator drive.", note:"The switch is push-to-activate; the FCOM does not use the word 'guarded' in the controls section. The question's 'guarded' characterization is not verbatim in these manuals." }],
  "electrical-010": [{ ref:"FCOM 6.20.1", quote:"the generator drive is either automatically disconnected when the sump oil temperature exceeds a predetermined temperature, or requires crew action to be disconnected." }],
  "electrical-011": [{ ref:"FCOM 6.20.2", quote:"For APU starts with the APU battery as the power source (no engine running and forward external power not ON), the right starter/generator is always used." }],
  "electrical-012": [{ ref:"FCOM SP.6.2", quote:"Note: Prior to APU start, wait 15 seconds after the left CCR is online (left CCR online is indicated by the captain's inboard and lower display unit showing the default formats)." }],
  "electrical-013": [{ ref:"FCOM SP.6.2", quote:"left CCR online is indicated by the captain's inboard and lower display unit showing the default formats." },{ ref:"FCOM 1.40.1", quote:"the left CCR is on-line when the captain's inboard and lower display unit show the default format (CDU pages)" }],
  "electrical-014": [{ ref:"FCOM 6.20.3", quote:"The forward system provides the power for general ground operations. It has two (L, R) power receptacles located on the left forward fuselage of the airplane." }],
  "electrical-015": [{ ref:"FCOM 6.20.3", quote:"The aft receptacle is located on the airplane fuselage aft of the left wing." }],
  "electrical-016": [{ ref:"FCOM 6.20.3", quote:"The 115V AC external power system consists of both a forward and aft system, with their corresponding receptacles, controls, and indications." }],
  "electrical-017": [{ ref:"FCOM 6.20.3", quote:"If the APU is not available, engine start may be accomplished using external power. At a minimum, two 90 kVA rated forward external power sources are required." }],
  "electrical-018": [{ ref:"FCOM 6.20.3", quote:"To receive the benefit of the aft power source (reduced load shedding), both forward power sources must also be connected, and the right engine must be started first." }],
  "electrical-019": [{ ref:"FCOM 6.20.3", quote:"Connecting the two forward and one aft receptacles only reduces load shedding, and does not decrease engine start time." }],
  "electrical-020": [{ ref:"FCOM 6.20.3", quote:"If two sources are connected, the first source connected is the one that is used." }],
  "electrical-021": [{ ref:"FCOM 6.10.2", quote:"Forward External Power AVAIL Lights — Illuminated (white) – forward external power is plugged in and power quality is acceptable; extinguishes when the ON light illuminates." }],
  "electrical-022": [{ ref:"FCOM 6.10.3", quote:"AFT External Power ON Light — Illuminated (white) – aft external power is powering the large motor power system for right engine start." }],
  "electrical-023": [{ ref:"FCOM 6.20.3", quote:"A Ram Air Turbine (RAT) serves as an emergency source of electrical and hydraulic power. It has no operating time limits, airspeeds, or altitudes." }],
  "electrical-024": [{ ref:"FCOM 6.20.3", quote:"In flight, the RAT deploys automatically if any of the following occur: both engines have failed; all three hydraulic system pressures are low; loss of all electrical power to captain's and first officer's flight instruments; loss of all four EMPs and faults in the flight control system occur on approach; loss of all four EMPs and an engine fails on takeoff or landing." }],
  "electrical-025": [{ ref:"FCOM 6.20.3", quote:"The RAT can be deployed manually if necessary by pushing the RAM AIR TURBINE switch on the hydraulic panel." }],
  "electrical-026": [{ ref:"FCOM 6.20.12", quote:"In-Air RAT Only mode is active if loss of all electrical power to captain's and first officer's flight instruments occurs in flight. The RAT energizes the captain's flight instruments and other essential equipment for flight controls, navigation, and communication." }],
  "electrical-027": [{ ref:"FCOM 6.20.3", quote:"A Ram Air Turbine (RAT) serves as an emergency source of electrical and hydraulic power.", note:"The FCOM does not contain a verbatim sentence stating 'the RAT cannot be retracted in-flight' in the Chapter 6 electrical text. This fact is stated in the Hydraulics chapter (Ch.13)." }],
  "electrical-028": [{ ref:"FCOM 6.20.12", quote:"In-Air RAT Only mode (Standby Power) — In-Air RAT Only mode is active if loss of all electrical power to captain's and first officer's flight instruments occurs in flight. The main battery provides standby power until RAT deployment." }],
  "electrical-029": [{ ref:"FCOM 6.20.12", quote:"The main battery provides standby power until RAT deployment." }],
  "electrical-030": [{ ref:"FCOM 6.20.12", quote:"In-Air RAT Only mode is active if loss of all electrical power to captain's and first officer's flight instruments occurs in flight. The RAT energizes the captain's flight instruments and other essential equipment for flight controls, navigation, and communication. The main battery provides standby power until RAT deployment.", note:"The specific path 'RAT → RAT control breaker → backup bus → C1/C2 TRUs → 28V DC → instrument buses' is not stated verbatim in the four manuals provided." }],
  "electrical-031": [{ ref:"FCOM 6.20.4", quote:"Both batteries have protection systems that monitor for faults to ensure that overcharging does not occur.", note:"The FCOM does not explicitly state 'lithium-ion' battery type in the Chapter 6 electrical text. The battery type as Li-ion is not stated verbatim in any of the four provided manuals." }],
  "electrical-032": [{ ref:"FCOM 6.20.5", quote:"The forward and aft E/E bays also contain the main and APU batteries, respectively." }],
  "electrical-033": [{ ref:"FCOM 6.20.4", quote:"If either battery experiences a severe failure and overheats, a sealed enclosure ensures the resulting heat and gases are contained so they pose no hazard to the airplane or its occupants.", note:"The FCOM does not state '1/8-inch stainless steel' for the enclosure material in any of the four manuals provided." }],
  "electrical-034": [{ ref:"FCOM 6.20.4", quote:"The airplane has one main battery, and one APU battery. The main battery power switch is located on the overhead electrical panel. The APU battery functions automatically, and has no flight deck power switch." }],
  "electrical-035": [{ ref:"FCOM 6.30.1", quote:"MAIN BATTERY DISCH — Advisory — One of these occurs: The main battery is discharging; The hot battery bus is not energized.", note:"The FCOM EICAS section references 'hot battery bus' but a dedicated section stating 'the main battery is connected to the HOT Battery Bus' is not verbatim in the four provided manuals." }],
  "electrical-036": [{ ref:"FCOM 6.30.1", quote:"MAIN BATTERY DISCH — Advisory — One of these occurs: The main battery is discharging; The hot battery bus is not energized.", note:"The specific enumeration of HOT Battery Bus loads (engine fire extinguishing, APU fire extinguishing, CCR cabinet clocks/memories) is not stated verbatim in the four provided manuals." }],
  "electrical-037": [{ ref:"FCOM 6.20.4", quote:"The main battery provides power for: airplane power-up; APU start (assists APU battery); refueling operations; towing operations; electric braking (as a backup power source); captain's flight instruments (after a power failure, energizes essential instruments until RAT deployment)." }],
  "electrical-038": [{ ref:"FCOM 6.20.4", quote:"The APU battery provides power on the ground for: APU start; navigation lights (when Towing Power mode is active)." }],
  "electrical-039": [{ ref:"FCOM 6.20.4", quote:"The APU battery provides power on the ground for: APU start; navigation lights (when Towing Power mode is active).", note:"The FCOM does not state the APU battery provides primary braking power — supporting the 'False' answer." }],
  "electrical-040": [{ ref:"FCOM 6.20.4", quote:"Both batteries have protection systems that monitor for faults to ensure that overcharging does not occur. If a fault is detected, the protection system stops battery charging and, if necessary, isolates the battery electrically." }],
  "electrical-041": [{ ref:"FCOM 6.20.4", quote:"If the heat and gases reach a level normally associated with a cell failure, a burst disk on the enclosure activates, venting gases directly overboard through a vent tube opening in the fuselage." }],
  "electrical-042": [{ ref:"FCOM 6.10.1", quote:"BATTERY Switch — OFF – (after delay of up to 2 minutes) de-energizes the \"On-Ground Battery Only\" mode; de-energizes the L CCR." }],
  "electrical-043": [{ ref:"FCOM 6.10.1", quote:"BATTERY Switch — ON – initiates L CCR start-up sequence; (after L CCR start-up complete) energizes the \"On-Ground Battery Only\" mode." }],
  "electrical-044": [{ ref:"FCOM 6.10.1", quote:"Battery OFF Light — Illuminated (amber) – the BATTERY switch is OFF." }],
  "electrical-045": [{ ref:"FCOM 6.20.5", quote:"Three engine driven Permanent Magnet Generators (PMG) are the primary source of power for the flight control electronics. These power sources are independent from the main airplane electrical system, and are also independent from each other.", note:"The FCOM does not state the PMGs are 'contained within the VFSG housing' in the Chapter 6 text." }],
  "electrical-046": [{ ref:"FCOM 6.20.5", quote:"These power sources are independent from the main airplane electrical system, and are also independent from each other." }],
  "electrical-047": [{ ref:"FCOM 6.20.5", quote:"A secondary source for flight control power is provided by the airplane's 28V DC bus distribution system, and the main battery. In addition, a backup system is provided by dedicated batteries to assure positive flight control operation during temporary power interruptions." }],
  "electrical-048": [{ ref:"FCOM 6.20.5", quote:"Two engine driven Permanent Magnet Alternators (PMA) (one per engine) are the primary source of power for the EEC. PMAs are independent from the main airplane electrical system, and are also independent from each other." }],
  "electrical-049": [{ ref:"FCOM 6.20.5", quote:"A secondary source for EEC power is provided by the airplane's 115V AC bus distribution system. The AC bus distribution system provides initial EEC power during engine start and is a backup EEC power source if a PMA is inoperative." }],
  "electrical-050": [{ ref:"FCOM 6.20.5", quote:"The electrical system uses two distinct power distribution methods: primary and remote. The primary power distribution method energizes higher amperage loads directly from bus power panels located in the forward and aft E/E bays. The remote distribution method energizes lower amperage loads through a decentralized network of 17 Remote Power Distribution Units (RPDU) located throughout the airplane." }],
  "electrical-051": [{ ref:"FCOM 6.20.5", quote:"The remote distribution method energizes lower amperage loads through a decentralized network of 17 Remote Power Distribution Units (RPDU) located throughout the airplane." }],
  "electrical-052": [{ ref:"FCOM 6.20.8", quote:"The higher amperage (greater than 10 amps) loads are distributed directly by the bus system. The lower amperage (10 amps or less) loads are distributed by the RPDU." }],
  "electrical-053": [{ ref:"FCOM 6.20.9", quote:"Large Motor Power Distribution System — The airplane's use of variable frequency power requires large motor loads to be energized by motor controllers, which conditions that power for use.", note:"The specific statement that ATRUs convert 235V AC to +/-270V DC for CMSCs is not verbatim in the four provided manuals." }],
  "electrical-054": [{ ref:"FCOM 6.20.8", quote:"The 235V AC system provides power to the 28V DC system through power conversion devices.", note:"The specific statement that TRUs convert variable frequency 235V AC to 28V DC is not verbatim in the four provided manuals as a standalone sentence." }],
  "electrical-055": [{ ref:"FCOM 6.20.8", quote:"On the ground, with only forward external power selected ON (no engine or APU generator power), the 235V AC buses are energized by the 115V AC distribution system through power conversion devices.", note:"The FCOM implies ATUs are bidirectional through this text but does not use the word 'bidirectional' verbatim for ATUs in the four provided manuals." }],
  "electrical-056": [{ ref:"FCOM 6.20.8", quote:"Four electrical brake power supply units regulate power for the exclusive use of the airplane electric brake system. Each of the four power supplies receive two separate 28V DC inputs.", note:"The specific conversion to +/-130V DC for the brake system is not stated verbatim in the four provided manuals." }],
  "electrical-057": [{ ref:"FCOM 6.20.9", quote:"The Power Electronics Cooling System (PECS) dissipates heat created by these high voltage motor controllers. PECS is energized if one or both engines or the APU is running, or if forward external power is connected and selected ON.", note:"The specific GATU function (235V AC to 115V AC for aft galley only) is not stated verbatim in the four provided manuals." }],
  "electrical-058": [{ ref:"FCOM 6.20.8", quote:"There are four main 235V AC buses, designated L1, L2, R1, and R2. These primary power system buses are located in the aft E/E bay power panels." }],
  "electrical-059": [{ ref:"FCOM 6.20.8", quote:"There are multiple 115V AC buses. To distribute power, the 115V AC system uses both primary power system buses located in the forward E/E bay, and RPDU located throughout the airplane." }],
  "electrical-060": [{ ref:"FCOM 6.20.9", quote:"The airplane's use of variable frequency power requires large motor loads to be energized by motor controllers, which conditions that power for use.", note:"The specific statement that CMSCs 'convert +/-270V DC to specific AC voltage and frequency required by the motor' is not verbatim in the four provided manuals." }],
  "electrical-061": [{ ref:"FCOM 6.20.9", quote:"The airplane's use of variable frequency power requires large motor loads to be energized by motor controllers, which conditions that power for use.", note:"The enumerated list of 7 system types (CACs, hydraulic pumps, ram air fans, override/jettison pumps, NGS, main engine starting, APU starting) is not verbatim in one passage in the four provided manuals." }],
  "electrical-062": [{ ref:"FCOM 6.20.8", quote:"On the ground, with only forward external power selected ON (no engine or APU generator power), the 235V AC buses are energized by the 115V AC distribution system through power conversion devices." }],
  "electrical-063": [{ ref:"FCOM 6.20.8", quote:"On the ground, with only the APU power available (no external power or engine generator power), each APU generator energizes two of the four main 235V AC buses." }],
  "electrical-064": [{ ref:"FCOM 6.20.8", quote:"With one engine running (no APU or external power), that engine's two related 235V AC buses are energized directly. The other two 235V AC buses are energized by the two powered buses." }],
  "electrical-065": [{ ref:"FCOM 6.20.8", quote:"With both engines running, each main 235V AC bus is energized directly from its related engine generator. If any engine generator is not available, its related main bus is energized by another main 235V AC bus." }],
  "electrical-066": [{ ref:"FCOM 6.20.8", quote:"The EICAS caution message ELEC AC BUS (L1, L2, R1, R2) shows when a main 235V AC bus is inoperative." }],
  "electrical-067": [{ ref:"FCOM 6.20.9", quote:"The Power Electronics Cooling System (PECS) dissipates heat created by these high voltage motor controllers. PECS is energized if one or both engines or the APU is running, or if forward external power is connected and selected ON." }],
  "electrical-068": [{ ref:"FCOM 6.20.11", quote:"On-Ground Battery Only mode is active when the BATTERY switch is selected to ON while the airplane is on the ground, and there are no other power sources connected." }],
  "electrical-069": [{ ref:"FCOM 6.20.11", quote:"On-Ground Battery Only mode is active when the BATTERY switch is selected to ON while the airplane is on the ground, and there are no other power sources connected. This mode is to support the airplane power-up sequence." }],
  "electrical-070": [{ ref:"FCOM 6.20.11", quote:"Ground Handling mode is active when the first forward external power receptacle is connected (not selected ON), and there are no other power sources." }],
  "electrical-071": [{ ref:"FCOM 6.20.11", quote:"Note: Ground Handling mode has priority over On-Ground Battery Only mode, and initializes regardless of BATTERY switch position." }],
  "electrical-072": [{ ref:"FCOM 6.20.11", quote:"Ground Service mode is active when the GROUND SERVICE switch on the master attendant switch panel is selected ON while in Ground Handling Mode." }],
  "electrical-073": [{ ref:"FCOM 6.20.13", quote:"In-Air Battery Only mode energizes the same equipment as the \"In-Air RAT Only\" mode with the exception of center pitot heat." }],
  "electrical-074": [{ ref:"FCOM 6.20.11", quote:"Significant loads energized by this mode include: DSP L; captain's inboard DU; MFK L; lower DU; CCD L; MCP; AHRU L, R; APU start capability; FMC; wing fueling panel; CCR L; captain's / first officer's ACP; ground crew call horn; captain's / first officer's flight interphone; engine/APU fire detection; VHF L; miscellaneous lighting; TCP L; brakes.", note:"The On-Ground Battery Only mode list includes captain's inboard DU and lower DU (2 display units)." }],
  "electrical-075": [{ ref:"FCOM 6.20.11", quote:"Ground Handling mode is active when the first forward external power receptacle is connected (not selected ON), and there are no other power sources. Significant loads energized by this mode include: lower DU; cargo compartment lighting; APU start capability; cargo door actuation systems." }],
  "electrical-076": [{ ref:"FCOM 6.20.12", quote:"External Power On mode is active when at least one forward external power receptacle is connected and selected ON with the APU and engine generators off. Significant loads energized by this mode with only one forward external power source connected and selected ON include: flight deck equipment, controls, and indications; cabin lighting (limited operation); cabin systems (limited operation); PECS (single loop only).", note:"The FCOM states External Power On mode gives all flight deck equipment; implying all 5 DUs come on. The question's answer 'all 5 DUs' is inferred from flight deck loads being energized." }],
  "electrical-077": [{ ref:"FCOM 6.20.12", quote:"Additional loads energized by this mode with two forward external power sources connected and selected ON include: cabin systems (basic operation); NGS (limited operation); cabin lighting (basic operation); hydraulics (limited operation); IFE (limited operation); PECS (both loops)." }],
  "electrical-078": [{ ref:"FCOM 6.20.14", quote:"Load inhibit – loads are inhibited at predefined operational phases. This is because the affected system is not required, or additional power is temporarily needed by another system. Load shed – loads are shed in the order of priority to stay within the capacity of the available power sources." }],
  "electrical-079": [{ ref:"FCOM 6.20.14", quote:"The electrical synoptic shows a list of airplane systems affected by load shedding. The affected system synoptic (AIR, FUEL, & HYD) also indicate equipment (in white) that is inhibited or shed. Additionally, loads that are shed show \"LOAD SHED\" text next to the affected equipment symbol." }],
  "electrical-080": [{ ref:"FCOM 6.20.14", quote:"Load inhibit – loads are inhibited at predefined operational phases. This is because the affected system is not required, or additional power is temporarily needed by another system.", note:"The specific CENTER PUMP PRESS lights example is from the Normal Procedures / Preflight section, not directly the electrical chapter." }],
  "electrical-081": [{ ref:"FCOM 6.10.15", quote:"CBIC provides indication and control for Electronic Circuit Breakers (ECB), and indication only for Thermal Circuit Breakers (TCB).", note:"The TCB note: 'TCBs state can be monitored, but can not be controlled by CBIC.'" }],
  "electrical-082": [{ ref:"FCOM 6.20.14", quote:"Note: Flight crew cycling (pulling and resetting) of circuit breakers to clear a non-normal condition is not recommended unless directed by maintenance or a non-normal checklist. In flight, flight crew reset of a tripped circuit breaker is not recommended." }],
  "electrical-083": [{ ref:"FCOM 6.10.15", quote:"CBIC is shown on the multifunction display by pushing the systems (SYS) display switch on the display select panel, then selecting the CB key." }],
  "electrical-084": [{ ref:"FCOM 6.20.14", quote:"The IFE/PASS SEATS switch controls in-flight entertainment (IFE) system, passenger seat systems, video surveillance cameras, and flight deck personal electronic device power outlets." }],
  "electrical-085": [{ ref:"FCOM 6.20.14", quote:"The CABIN/UTILITY switch controls galleys, most cabin lights, and other non-essential cabin utility loads." }],
  "electrical-086": [{ ref:"FCOM 6.10.2", quote:"Generator Control (GEN CTRL) Switches — ON – arms generator control breaker (allows it to close automatically when power is available); closes generator field. OFF – opens generator control breaker; opens generator field; resets fault protection systems.", note:"The overhead panel has 4 GEN CTRL switches (L1, L2, R1, R2) each with a DRIVE indication. The FCOM does not explicitly state the count of 4 in one sentence but lists L1/L2/R1/R2 individually." }],
  "sftd-2-001": [{ ref:"FCOM L.10.8", quote:"# Headwind 25 knots # Tailwind 15 knots # Crosswind 25 knots (15 KTS for CAT II/III)" }],
  "sftd-2-002": [{ ref:"FCOM L.10.8", quote:"# Without LAND 2 or LAND 3 annunciated, the autopilot must be disengaged below 135 feet AGL." }],
  "sftd-2-003": [{ ref:"FCOM L.10.8", quote:"# Do not use FLCH on final approach below 1,000 feet AFE." }],
  "sftd-2-004": [{ ref:"FCOM L.10.6", quote:"Takeoff is permitted only in the normal flight control mode." }],
  "sftd-2-005": [{ ref:"FCOM L.10.6", quote:"The maximum altitude with flaps extended is 20,000 feet." }],
  "sftd-2-006": [{ ref:"FCOM 2.10.3", quote:"When upper and/or lower RECIRCULATION FAN switches are OFF, an EICAS advisory message RECIRC FAN UPR and/or LWR OFF is displayed." }],
  "sftd-2-007": [{ ref:"FCOM 2.20.1", quote:"Two CACs are dedicated to each pack. A single CAC provides sufficient air to operate its associated pack in all operating modes." }],
  "sftd-2-008": [{ ref:"FCOM 2.30.1", quote:"Two outflow valves are installed: one forward and one aft. Normally, the outflow of cabin air is split equally between these two outflow valves." }],
  "sftd-2-009": [{ ref:"FCOM 3.10.3", quote:"ON – backup window heat anti-fogging is commanded on for the selected windows if primary window heat system fails." }],
  "sftd-2-010": [{ ref:"FCOM 3.20.1", quote:"The engine anti-ice indication EAI is displayed above the EICAS N1 indication when an engine anti-ice valve is open." }],
  "sftd-2-011": [{ ref:"FCOM 3.20.1", quote:"Engine anti-ice can be operated in flight or on the ground. … Automatic operation of the engine anti-ice system is inhibited on the ground." }],
  "sftd-2-012": [{ ref:"FCOM 4.10.10", quote:"AUTO – varies between 15º – 25º, depending on TAS" }],
  "sftd-2-013": [{ ref:"FCOM 4.10.21", quote:"If not pushed below 50 knots, autothrottle operation is inhibited until reaching 400 feet altitude" }],
  "sftd-2-014": [{ ref:"FCOM 4.10.21", quote:"pushing either switch above 80 knots disarms LNAV and VNAV" }],
  "sftd-2-015": [{ ref:"FCOM 1.40.14", quote:"Oxygen is available for approximately 22 minutes." }],
  "sftd-2-016": [{ ref:"FCOM 4.20.4", quote:"This mode uses inertial data for up to 15 seconds to allow the glideslope signal error to resolve." }],
  "sftd-2-017": [{ ref:"FCOM 4.20.4", quote:"the AFDS limits the descent angle of the airplane to 3.25 degrees while the system is in the glideslope attitude stabilizing mode." }],
  "sftd-2-018": [{ ref:"FCOM 4.20.21", quote:"between 25 and 50 feet radio altitude, the autothrottle begins retarding thrust levers to idle" }],
  "sftd-2-019": [{ ref:"FCOM 6.20.4", quote:"The APU battery provides power on the ground for: • APU start • navigation lights (when Towing Power mode is active)" }],
  "sftd-2-020": [{ ref:"FCOM 7.10.8", quote:"The RUNNING indication blanks 30 seconds after engine reaches idle." }],
  "sftd-2-021": [{ ref:"FCOM 11.30.1", quote:"There are three independent FMCs. At power up, one FMC is designated to accomplish the flight management tasks while the other FMCs monitor." },{ ref:"FCOM 11.32.5", quote:"At powerup, the three FMCs are designated as master, spare and backup." }],
  "sftd-2-022": [{ ref:"FCOM 11.32.5", quote:"If two FMCs fail in flight, the third FMC automatically takes over in a single FMC configuration. The EICAS advisory message SINGLE FMC is displayed." }],
  "sftd-2-023": [{ ref:"FCOM 11.32.5", quote:"All data is retained, NDs continue to operate, but LNAV and VNAV deselect. The flight crew needs to reactivate and execute the flight plan, and reselect LNAV and VNAV." }],
  "sftd-2-024": [{ ref:"FCOM 11.32.6", quote:"In the unlikely event all FMCs become inoperative, the EICAS advisory message FMC is displayed." }],
  "sftd-2-025": [{ ref:"FCOM 11.32.6", quote:"Autothrottles should still be available and may be used in conjunction with any valid autopilot roll and/or pitch mode." }],
  "sftd-2-026": [{ ref:"FCOM 11.32.6", quote:"Left side ILS or GLS deviations are then displayed on the ISFD." }],
  "sftd-2-027": [{ ref:"FCOM 15.10.1", quote:"red alert messages remain displayed and cannot be canceled by pushing the CANC/RCL switch … Communication messages can not be cancelled by pushing the CANC/RCL switch … cannot be canceled by pushing the CANC/RCL switch [Memo messages]" }],
  "sftd-2-028": [{ ref:"FCOM 15.10.1", quote:"amber alert messages can be canceled or recalled by pushing the CANC/RCL switch [Caution] … amber alert messages can be canceled or recalled by pushing the CANC/RCL switch [Advisory]" }],
  "sftd-2-029": [{ ref:"FCOM 15.20.2", quote:"A rectangular symbol [] prefaces an alert message that has procedural steps." },{ ref:"QRH CI.2.1", quote:"A rectangle icon [ ] precedes all EICAS alert messages that have procedural steps, notes, or other information of which the flight crew should be aware." }],
  "sftd-2-030": [{ ref:"FCOM 10.60.2", quote:"Closed loop action items continuously monitor the position of a flight deck switch, lever, or selector. When the control is in the required position, the action item color changes to green … Open loop action items require the flight crew to manually confirm completion with the CCD." }],
  "sftd-2-031": [{ ref:"QRH CI.2.2", quote:"In the printed non-normal checklists, the last memory item is followed by a dashed horizontal line." }],
  "sftd-2-032": [{ ref:"QRH CI.2.2", quote:"In the electronic checklists, memory items are not identified." }],
  "sftd-2-033": [{ ref:"FCOM 11.20.3", quote:"The major components of the IRS are: • two inertial reference units (IRU) • two attitude heading reference units (AHRU)" }],
  "sftd-2-034": [{ ref:"FCOM 11.20.8", quote:"Primary Flight Controls enter Secondary Mode AFDS INOP Autopilot INOP Autothrottles INOP", note:"From IRS Schematic diagram labels for NAV AIR DATA SYS message condition." }],
  "sftd-2-035": [{ ref:"FCOM 11.20.8", quote:"Center Pitot Static Only", note:"Schematic diagram label; ISFD receives center pitot/static only — altitude and airspeed may be unreliable." }],
  "sftd-2-036": [{ ref:"FCOM 11.20.9", quote:"AOA Airspeed … Loss of Voted Airspeed Data", note:"IRS Schematic diagram labels for NAV AIRSPEED DATA message: IRS provides AOA-based airspeed; voted ADRS airspeed to main displays lost." }],
  "sftd-2-037": [{ ref:"FCOM 10.50.3", quote:"Condition: The center hydraulic system pressure is low.", note:"Example from ECL non-normal checklist display diagram; the Condition field identifies what triggered the procedure (the EICAS alert)." }],
  "sftd-2-038": [{ ref:"FCOM 10.50.3", quote:"Objective: To restore system pressure and configure for landing using alternate systems, if needed.", note:"Example from ECL non-normal checklist display diagram; the Objective field states the end-state goal of the procedure." }],
  "sftd-2-039": [{ ref:"QRH CI.2.1", quote:"A non–normal menu is given for the electronic checklist. The primary purposes of the non-normal menu are to access unannunciated checklists." },{ ref:"FCOM 10.60.7", quote:"Non-Normal Menu . . . . . . . . . . . . . . . . . . . . . . . . . . . . . 10.60.7", note:"TOC ref; unannunciated checklists accessed via NON-NORMAL MENU on ECL." }],
  "sftd-2-040": [],
  "flight-instruments-001": [{ ref:"FCOM 10.10.3", quote:"Speed Trend Vector: Indicates predicted airspeed in ten seconds based on current acceleration or deceleration." }],
  "flight-instruments-002": [{ ref:"FCOM 10.10.3", quote:"Selected Speed Bug: Points to the airspeed/Mach selected in the MCP IAS/MACH window. The bug is five knots in height." }],
  "flight-instruments-003": [{ ref:"FCOM 10.10.3", quote:"Selected Speed Bug: Points to FMC computed airspeed when the MCP IAS/MACH window is blank." }],
  "flight-instruments-004": [{ ref:"FCOM 10.10.3", quote:"When the selected speed is off scale, the bug is parked at the top or bottom of the tape, with only one half the bug visible." }],
  "flight-instruments-005": [{ ref:"FCOM 10.10.3", quote:"The box around the current airspeed indication turns amber when airspeed is below minimum maneuvering speed." }],
  "flight-instruments-006": [{ ref:"FCOM 10.10.3", quote:"Maximum Speed: Bottom of the bar indicates maximum airspeed as limited by the lowest of the following: VMO/MMO, or landing gear placard speed, or flap placard speed." }],
  "flight-instruments-007": [{ ref:"FCOM 10.10.3", quote:"Maximum Maneuvering Speed: Bottom of the amber bar indicates the maximum maneuvering speed. This airspeed provides 1.3 g maneuver capability to high speed buffet. Note: 1.3 g maneuver capability occurs at 40º of bank in level flight." }],
  "flight-instruments-008": [{ ref:"FCOM 10.10.4", quote:"Displays the takeoff reference speeds V1, VR (displays R if VR is within 4 knots of V1 or V2), and V2, selected on the CDU." }],
  "flight-instruments-009": [{ ref:"FCOM 10.10.4", quote:"V1 and VR are removed at lift-off." }],
  "flight-instruments-010": [{ ref:"FCOM 10.10.4", quote:"V2 is removed on climb-out: when flap retraction begins, or after 10 minutes have passed without flap lever movement, or after VREF has been selected (for a turn-back)." }],
  "flight-instruments-011": [{ ref:"FCOM 10.10.4", quote:"NO VSPD is displayed if V speeds are not selected on the CDU." }],
  "flight-instruments-012": [{ ref:"FCOM 10.10.5", quote:"Flap Maneuvering Speeds: Indicates flap maneuvering speed for flap retraction or extension. Not displayed above approximately 20,000 feet altitude." }],
  "flight-instruments-013": [{ ref:"FCOM 10.10.5", quote:"Minimum Maneuvering Speed: Top of amber bar indicates minimum maneuvering speed. Displayed with first flap retraction after takeoff." }],
  "flight-instruments-014": [{ ref:"FCOM 10.10.5", quote:"Minimum Speed: Indicates the airspeed where stick shaker activates." }],
  "flight-instruments-015": [{ ref:"FCOM 10.10.6", quote:"Bank Pointer: Indicates bank angle in reference to the bank angle scale. Fills and turns amber if bank angle is 35º or more." }],
  "flight-instruments-016": [{ ref:"FCOM 10.10.6", quote:"Pitch Limit Indication: Indicates pitch limit (stick shaker activation point for the existing flight conditions). Limited to a maximum of +30 degrees." }],
  "flight-instruments-017": [{ ref:"FCOM 10.10.6", quote:"Horizon Line and Pitch Scale: Indicates the IRS horizon relative to the airplane symbol. Pitch scale is in 2.5º increments." }],
  "flight-instruments-018": [{ ref:"FCOM 10.10.6", quote:"Bank Scale: Fixed reference for the bank pointer. Scale marks are at 0º, 10º, 20º, 30º, 45º, and 60º." }],
  "flight-instruments-019": [{ ref:"FCOM 10.10.6", quote:"Pitch Limit Indication: Displayed when the flaps are not up, or at slow speeds with the flaps up." }],
  "flight-instruments-020": [{ ref:"FCOM 10.10.6", quote:"Slip/Skid Indication: Displaces beneath the bank pointer to indicate slip or skid. Turns amber if bank angle is 35º or more." }],
  "flight-instruments-021": [{ ref:"FCOM 10.10.7", quote:"Flight Path Vector (FPV): Displays Flight Path Angle (FPA) and drift angle if: FPV is selected on the EFIS control panel, or FPA is selected on the MCP." }],
  "flight-instruments-022": [{ ref:"FCOM 10.10.7", quote:"Horizon Line Heading Scale: Displays when: FPV is selected on the EFIS control panel, or FPA is selected on the MCP, and current bank angle is less than 50º, and absolute pitch angle is less than 20º." }],
  "flight-instruments-023": [{ ref:"FCOM 10.10.8", quote:"Radio Altitude: Displays radio altitude below 2,500 feet AGL." }],
  "flight-instruments-024": [{ ref:"FCOM 10.10.8", quote:"Radio Altitude: The display box is highlighted in white for 10 seconds when passing below 2,500 feet." }],
  "flight-instruments-025": [{ ref:"FCOM 10.10.8", quote:"Radio Altitude: Turns amber when below radio altitude minimums." }],
  "flight-instruments-026": [{ ref:"FCOM 10.10.8", quote:"Rising Runway: Displayed below 2,500 feet altitude when the localizer pointer is in view. Moves toward the airplane symbol below 200 feet radio altitude." }],
  "flight-instruments-027": [{ ref:"FCOM 10.10.8", quote:"Rising Runway: The stem of the rising runway symbol flashes when localizer deviations cause the diamond to flash." }],
  "flight-instruments-028": [{ ref:"FCOM 10.10.18", quote:"Altitude Trend Vector: Indicates expected altitude six seconds ahead in time based on the current vertical speed." }],
  "flight-instruments-029": [{ ref:"FCOM 10.10.18", quote:"Selected Altitude – Meters: Displayed when MTRS is selected on the EFIS control panel MTRS switch. Displays in 10 meter increments." }],
  "flight-instruments-030": [{ ref:"FCOM 10.10.18", quote:"Selected Altitude: The selected altitude box is highlighted in white between 900 feet and 200 feet prior to reaching the selected altitude." }],
  "flight-instruments-031": [{ ref:"FCOM 10.10.18", quote:"Current altitude box – highlighted amber when deviating beyond 200 feet from selected altitude." }],
  "flight-instruments-032": [{ ref:"FCOM 10.10.18", quote:"Current altitude box – highlighted amber when deviating beyond 200 feet from selected altitude. If deviation continues beyond 900 feet, amber highlight is removed." }],
  "flight-instruments-033": [{ ref:"FCOM 10.10.19", quote:"Landing Altitude Reference Bar: Indicates the height above touchdown. White bar – 500 to 1,000 feet above landing altitude." }],
  "flight-instruments-034": [{ ref:"FCOM 10.10.19", quote:"Landing Altitude Reference Bar: Amber bar – 0 to 500 feet above landing altitude." }],
  "flight-instruments-035": [{ ref:"FCOM 10.10.20", quote:"Minimums: Turns amber and flashes for 3 seconds when the airplane descends below selected minimum altitude." }],
  "flight-instruments-036": [{ ref:"FCOM 10.10.19", quote:"Landing Altitude Indication: Indicates the landing altitude for the departure runway or airport until 400 NM or one-half the distance to the destination, whichever occurs first." }],
  "flight-instruments-037": [{ ref:"FCOM 10.10.20", quote:"Minimums: BARO minimums are feet MSL." }],
  "flight-instruments-038": [{ ref:"FCOM 10.10.20", quote:"Minimums: RADIO minimums are radio altitude feet AGL." }],
  "flight-instruments-039": [{ ref:"FCOM 10.10.21", quote:"Autopilot/Flight Director Barometric Source: L or R indicates that the left or right EFIS control panel is the barometric setting reference. F/D – both on – L is displayed." }],
  "flight-instruments-040": [{ ref:"FCOM 10.10.21", quote:"Uplinked Barometric Setting: The annunciation UL is displayed to the left of the barometric preselect field when a barometric setting uplink is accepted." }],
  "flight-instruments-041": [{ ref:"FCOM 10.10.21", quote:"Barometric Setting: The display is boxed and changes to amber if a barometric setting is set and altitude climbs above the transition altitude, or if STD is set and altitude descends below the transition flight level." }],
  "flight-instruments-042": [{ ref:"FCOM 10.10.9", quote:"NPS Deviation Pointer: Indicates the navigation path relative to the airplane position: unfilled magenta triangle when parked at deflection limit; filled magenta triangle when not parked at deflection limit." }],
  "flight-instruments-043": [{ ref:"FCOM 10.10.9", quote:"NPS Deviation Pointer: unfilled magenta triangle when parked at deflection limit, and if the lateral deviation continues to increase, the NPS Deviation Pointer (magenta triangle) will change to unfilled." }],
  "flight-instruments-044": [{ ref:"FCOM 10.10.10", quote:"NPS Deviation Pointer: displayed on vertical deviation scale only in descent phase of flight." }],
  "flight-instruments-045": [{ ref:"FCOM 10.10.10", quote:"NPS Deviation Pointer: flashes for ten seconds if pointer migrates into bar area for five seconds or ANP bars meet in the middle of the deviation scale." }],
  "flight-instruments-046": [{ ref:"FCOM 10.40.2", quote:"The Airport Map is automatically displayed when the following conditions are met: the ND range is 5 NM or less; the ANP value is 0.02 NM or less." }],
  "flight-instruments-047": [{ ref:"FCOM 10.40.2", quote:"The Airport Map is automatically displayed when the following conditions are met: the ANP value is 0.02 NM or less (normal precision navigation system performance)." }],
  "flight-instruments-048": [{ ref:"FCOM 10.10.30", quote:"ND Plan Mode: displays a non-moving, true north-up, route depiction." }],
  "flight-instruments-049": [{ ref:"FCOM 10.40.12", quote:"Position trend vector (W) (dashed line): Predicts position at the end of 30, 60, and 90 second intervals. Each segment represents 30 seconds. For range greater than 20 NM, 3 segments." }],
  "flight-instruments-050": [{ ref:"FCOM 10.40.12", quote:"Position trend vector: For range = 10 NM, 1 segment." }],
  "flight-instruments-051": [{ ref:"FCOM 15.10.32", quote:"WINDSHEAR Annunciation: WINDSHEAR (amber) – PWS caution alert is occurring. Displayed in all navigation display modes.", note:"Quiz answer 'MONITOR RADAR DISP' is the EICAS message; the ND annunciation is 'WINDSHEAR'. Both appear on the display for a PWS caution." }],
  "flight-instruments-052": [{ ref:"FCOM 10.40.18", quote:"GPS position (W): When the POS key is selected, indicates GPS position relative to FMC position." }],
  "flight-instruments-053": [{ ref:"FCOM 10.40.18", quote:"IRU position (W): When the POS key is selected, the star indicates IRU position relative to FMC position." }],
  "flight-instruments-054": [{ ref:"FCOM 15.20.25", quote:"HIGH DENSITY RED: REF ALTITUDE + 2000 (Airplane less than 500 feet above highest terrain or obstacle)." }],
  "flight-instruments-055": [{ ref:"FCOM 15.20.25", quote:"HIGH DENSITY AMBER: REF ALTITUDE + 1000; LOW DENSITY AMBER below that. (Airplane less than 500 feet above highest terrain or obstacle)." }],
  "flight-instruments-056": [{ ref:"FCOM 15.20.27", quote:"CAUTION OBSTACLE: Master CAUTION lights, Amber CAUTION OBSTACLE EICAS message. 40 to 60 seconds from projected impact with obstacle." }],
  "flight-instruments-057": [{ ref:"FCOM 15.20.23", quote:"Selecting the ND TERR switch on the EFIS control panel displays obstacles, terrain, and the TERR indication on the NDs and mini-maps." }],
  "flight-instruments-058": [{ ref:"FCOM 15.20.28", quote:"GLIDESLOPE: Excessive deviation below glideslope or glide path. Pushing the G/S INHIBIT switch on the ATP inhibits the alert when pushed below 1,000 feet radio altitude." }],
  "flight-instruments-059": [{ ref:"FCOM 15.20.30", quote:"Altitude Voice Annunciations During Approach: GPWS provides the following altitude voice annunciations during approach: 500 feet – FIVE HUNDRED.", note:"FIVE HUNDRED is the RA callout at 500 ft. APPROACHING MINIMUMS fires at 80 ft above the set minimums altitude." }],
  "flight-instruments-060": [{ ref:"FCOM L.10.12", quote:"# Pilots are authorized to deviate from their current ATC clearance to the extent necessary to comply with a TCAS resolution advisory." }],
  "flight-instruments-061": [{ ref:"FCOM L.10.12", quote:"# Evasive maneuvers must not be based solely on information from the traffic display or traffic advisory (TA) without visually sighting the traffic." }],
  "flight-instruments-062": [{ ref:"FCOM 10.20.2", quote:"If an EFIS control panel fails, the displays can be controlled through the backup EFIS/DSP display on the SYS page." }],
  "flight-instruments-063": [{ ref:"FCOM 10.10.64", quote:"Backup EFIS Controls: When enabled, overrides functional EFIS control panel.", note:"Enabling backup EFIS inhibits the EFIS control panel hardware; it does not disable it but does override it." }],
  "flight-instruments-064": [{ ref:"FCOM 10.10.49", quote:"ENG Display Switch: Pushing the switch displays the secondary engine information on EICAS. Pushing the switch a second time blanks secondary engine information." }],
  "flight-instruments-065": [{ ref:"FCOM 10.10.49", quote:"EICAS Transfer Switch: Transfers EICAS format between the Captain and First Officer inboard display units." }],
  "flight-instruments-066": [{ ref:"FCOM 10.10.49", quote:"Upper Display Switches: SYS, CDU, INFO, CHKL, COMM, ND – Pushing the switch displays the associated format." }],
  "flight-instruments-067": [{ ref:"FCOM 10.20.15", quote:"The ISFD displays attitude, airspeed, altitude, ILS, GLS, and heading information." }],
  "flight-instruments-068": [{ ref:"FCOM 10.20.15", quote:"The ISFD receives airspeed and altitude from the center pitot and static air data modules." }],
  "flight-instruments-069": [{ ref:"FCOM 10.20.15", quote:"Attitude information is provided by internal inertial sensors." }],
  "flight-instruments-070": [{ ref:"FCOM 10.20.15", quote:"ILS or GLS information is provided by the left INR receiver." }],
  "flight-instruments-071": [{ ref:"FCOM 10.20.15", quote:"When the ATT:RST message displays, pushing the Attitude Reset switch resets the horizon line with the airplane symbol." }],
  "flight-instruments-072": [{ ref:"FCOM 10.10.59", quote:"ATT 10s (amber) – 10 second attitude realignment in progress." }],
  "flight-instruments-073": [{ ref:"FCOM 10.20.15", quote:"In flight, pushing the Attitude Reset switch must be accomplished with the airplane in wings level, non-accelerated flight." }],
  "flight-instruments-074": [{ ref:"FCOM 10.20.15", quote:"On the ground, pushing the Attitude Reset switch must be accomplished with the airplane stationary." }],
  "flight-instruments-075": [{ ref:"FCOM 10.20.15", quote:"If attitude reset is unsuccessful, the ATT:RST message remains displayed and the attitude is not displayed." }],
  "flight-instruments-076": [{ ref:"FCOM 10.20.15", quote:"There are two RA systems: left and right." }],
  "flight-instruments-077": [{ ref:"FCOM 10.20.15", quote:"If both RA systems are inoperative or degraded, the EICAS advisory message RADIO ALTIMETER L+R displays." }],
  "flight-instruments-078": [{ ref:"FCOM 10.20.15", quote:"If both RA systems are inoperative or degraded, the EICAS advisory message RADIO ALTIMETER L+R displays and \"RA\" is also displayed on both PFD and HUD." }],
  "flight-instruments-079": [{ ref:"FCOM 10.20.15", quote:"The RA systems send data to: autopilot system, TCAS, autothrottle, weather radar, GPWS, primary flight control system." }],
  "flight-instruments-080": [{ ref:"FCOM 10.20.15", quote:"The AUX area outboard of each PFD consists of two distinct areas: clock/flight information and an ATC datalink block. The clock and flight information is located in the upper part of the AUX display." }],
  "flight-instruments-081": [{ ref:"FCOM 10.10.25", quote:"AOA SPD: A backup airspeed based on AOA and inertial data. Displayed when: the ADRS airspeed is not available, or the on-side AIR DATA/ATT selector has been placed in the ALTN position." }],
  "flight-instruments-082": [{ ref:"FCOM 10.20.18", quote:"When AOA SPD shows due to air data anomalies, simplified flight control laws are used. This may result in increased pitch control sensitivity to abrupt pitch control inputs." }],
  "flight-instruments-083": [{ ref:"FCOM 10.20.18", quote:"Due to accuracy limitations of AOA SPD at high airspeeds, the maximum speed indications on the PFDs and HUDs are reduced from 360K/.90M to 300K/.85M to provide adequate margins." }],
  "flight-instruments-084": [{ ref:"FCOM 10.20.18", quote:"The ADRS also receives TAT measurements from each of the EEC TAT sensors for a total of six inputs." }],
  "flight-instruments-085": [{ ref:"FCOM 10.20.18", quote:"When on the ground at less than 50 kts CAS, sensors in CAC inlets (two per inlet) provide ADRS TAT. The ADRS selects the lower of the two CAC inlet temperatures." }],
  "flight-instruments-086": [{ ref:"FCOM 10.20.18", quote:"Since it is based on angle of attack, AOA SPD is subject to indication variations during configuration changes, maneuvering, and speedbrake use." }],
  "flight-instruments-087": [{ ref:"FCOM 10.40.3", quote:"The pilot selects the VSD display from the map information selections on the MAP mode drop-down menu." }],
  "flight-instruments-088": [{ ref:"FCOM 10.40.3", quote:"The full-display VSD has twice the range of the ND – from 10 NM to 2560 NM." }],
  "flight-instruments-089": [{ ref:"FCOM 10.40.3", quote:"The altitude reference scale is linked to the VSD range and is not independently adjustable. This ensures that a consistent 3º glidepath is depicted up to an 80NM range." }],
  "flight-instruments-090": [{ ref:"FCOM 10.60.8", quote:"The checklist sequence is: PREFLIGHT, BEFORE START, BEFORE TAXI, BEFORE TAKEOFF, AFTER TAKEOFF, DESCENT, APPROACH, LANDING, SHUTDOWN, SECURE." }],
  "flight-instruments-091": [{ ref:"FCOM 10.60.8", quote:"The EICAS caution message CHKL INCOMPLETE NORM shows to alert the crew when critical line items in a checklist are not complete before the corresponding phase of flight." }],
  "flight-instruments-092": [{ ref:"FCOM 10.60.8", quote:"Also, the normal checklist key changes color to amber to show that one or more normal checklists are incomplete." }],
  "flight-instruments-093": [{ ref:"FCOM 10.60.9", quote:"If an EICAS alert message has not been opened or is incomplete, the message has an icon, a white box to the left of the message." }],
  "flight-instruments-094": [{ ref:"FCOM 10.60.9", quote:"If an EICAS alert message has no icon, the checklist is complete, there is no checklist for the message, or another checklist inhibits the icon." }],
  "flight-instruments-095": [{ ref:"FCOM 10.60.10", quote:"The EICAS advisory message CHKL NON-NORMAL shows when there is a non-normal checklist in the queue, its EICAS message is blank, and ECL is not open." }],
  "flight-instruments-096": [{ ref:"FCOM 10.50.1", quote:"Action Item: Shows (cyan) – the action item is inactive or overridden." }],
  "flight-instruments-097": [{ ref:"FCOM 10.50.1", quote:"Action Item: Shows (green) – the action item is complete." }],
  "flight-instruments-098": [{ ref:"FCOM 10.60.12", quote:"Use of the RESET NON-NORMAL function in flight is not recommended. Use of the RESET ALL function in flight is not recommended.", note:"FCOM 10.50 RESETS menu also notes: RESET NON-NORMAL and RESET ALL are intended for ground use only." }],
  "flight-instruments-099": [{ ref:"FCOM 10.60.7", quote:"On the ground with both fuel control switches in CUTOFF and both engine start selectors in NORM, the priority is: checklists for EICAS warning messages; NORMAL checklists (incomplete or not yet opened)." }],
  "flight-instruments-100": [{ ref:"FCOM 10.60.9", quote:"Checklists in the queue are in the same order as the messages show on EICAS. If there are any active unannunciated checklists, they show in the queue after all of the annunciated checklists." }],
  "flight-instruments-101": [{ ref:"FCOM 10.60.9", quote:"When the checklist is complete, the EICAS alert message can still show, but the checklist is removed from the queue." }],
  "flight-instruments-102": [{ ref:"FCOM 10.60.9", quote:"If the flight crew opens an unannunciated checklist and chooses not to complete it, the checklist must be overridden." }],
  "flight-instruments-103": [{ ref:"FCOM 10.60.8", quote:"Consequential EICAS alert messages can show for a primary failure condition. For example, the AUTO SPEEDBRAKE message shows due to a HYD PRESS SYS C condition." }],
  "flight-instruments-104": [{ ref:"FCOM 10.70 (Video Surveillance)", quote:"Note: Selecting the flight deck IFE/PASS SEATS power switch OFF will disable the video surveillance cameras." }],
  "sv-ground-001": [{ ref:"FOTM 4.7.2.1 (via SV Ground deck Slide 6)", quote:"100 questions. Open book (3 hours to complete). Overall score of 80% or greater, pilots are remediated to 100%.", note:"FOTM 4.7.2.1 is the authoritative source; deck text is verbatim slide content" }],
  "sv-ground-002": [{ ref:"FOTM 4.7.2.1 (via SV Ground deck Slide 6)", quote:"100 questions. Open book (3 hours to complete)." }],
  "sv-ground-003": [{ ref:"FOTM 4.7.2.1 (via SV Ground deck Slide 6)", quote:"Overall score of 80% or greater, pilots are remediated to 100%." }],
  "sv-ground-004": [{ ref:"FOTM 4.7.2.1 (via SV Ground deck Slide 7)", quote:"\"Open Book Exams\" which means pilots will have available to them all resources normally available during line operations. Pilots may use their company issued iPad to access resource documents. Personal notes, study guides, etc. are not permitted." }],
  "sv-ground-005": [{ ref:"FCTM 8.9 (via SV Ground deck Slide 36)", quote:"In case of an engine fire or engine severe damage/separation, when the flight path is under control, the gear has been retracted, and a safe altitude has been attained (minimum 400 feet AGL) accomplish the NNC memory items." }],
  "sv-ground-006": [{ ref:"FCTM 8.9 (via SV Ground deck Slide 36)", quote:"PF will retard the affected thrust lever after the PM confirms that the PF has identified the correct engine. Reference items should be accomplished by the PM as soon as practical." }],
  "sv-ground-007": [{ ref:"SV Ground deck Slide 35", quote:"QRC is kept under the MCP glareshield.", note:"Deck cites QRH CI.2.3" }],
  "sv-ground-008": [{ ref:"QRH CI.2.3 Do Memory Items", quote:"When a non-normal situation occurs, at the direction of the pilot flying, both crewmembers do all memory items in their areas of responsibility without delay." }],
  "sv-ground-009": [{ ref:"QRH CI.2.4 Confirm Step", quote:"Confirmation is not needed for completion of non-normal checklist items when on the ground." }],
  "sv-ground-010": [{ ref:"QRH CI.2.4 Confirm Step", quote:"• an autothrottle arm switch • an engine thrust lever • a fuel control switch • an engine or APU fire switch, or a cargo fire arm switch • a generator drive disconnect switch. This does not apply to the Dual Eng Fail/Stall checklist." }],
  "sv-ground-011": [{ ref:"QRH CI.2.4 Confirm Step", quote:"This does not apply to the Dual Eng Fail/Stall checklist. Confirmation is not needed for completion of non-normal checklist items when on the ground." }],
  "sv-ground-012": [{ ref:"FCOM 10.60.8 Incomplete Normal Checklist Alerting", quote:"The EICAS caution message CHKL INCOMPLETE NORM shows to alert the crew when critical line items in a checklist are not complete before the corresponding phase of flight. Also, the normal checklist key changes color to amber to show that one or more normal checklists are incomplete." }],
  "sv-ground-013": [{ ref:"FCOM 10.60.8 Incomplete Normal Checklist Alerting", quote:"Landing phase – occurs when the airplane descends below 500 feet above the FMC landing altitude." }],
  "sv-ground-014": [{ ref:"QRH CI.1.1 Normal Checklist Operation (via SV Ground deck Slide 24)", quote:"If a pilot is not sure where the checklist was stopped, do the checklist from the start. If the checklist is stopped for a long time, also do the checklist from the start." }],
  "sv-ground-015": [{ ref:"QRH CI.1.1 (via SV Ground deck Slide 24)", quote:"After completion of each checklist, the pilot reading the checklist calls, \"________ CHECKLIST COMPLETE.\"" }],
  "sv-ground-016": [{ ref:"QRH CI.2.1 (via SV Ground deck Slide 30)", quote:"Annunciated Checklists: Most checklists correspond to an EICAS alert message. Unannunciated Checklists: Checklists without an EICAS alert message (such as Ditching) are called unannunciated checklists." }],
  "sv-ground-017": [{ ref:"QRH CI.2.1 (via SV Ground deck Slide 30)", quote:"Most unannunciated checklists are in the associated system section. Unannunciated checklists with no associated system are in section 0, Miscellaneous." }],
  "sv-ground-018": [{ ref:"QRH CI.2.1 (via SV Ground deck Slide 32)", quote:"A rectangle icon [ ] precedes all EICAS alert messages that have procedural steps, notes, or other information of which the flight crew should be aware. The rectangle icon is removed from the EICAS alert message when the checklist has been completed." }],
  "sv-ground-019": [{ ref:"QRH CI.2.1 / EICAS Index (via SV Ground deck Slide 31)", quote:"Annunciated: FIRE ENG L, CABIN ALTITUDE, HYD PRESS SYS R. Unannunciated: Ditching, ENG Severe Damage/Separation, Overweight Landing." }],
  "sv-ground-020": [{ ref:"FCOM 10.60 ECL — CANC/RCL", quote:"The EICAS advisory message CHKL NON-NORMAL shows when there is a non-normal checklist in the queue, its EICAS message is blank, and ECL is not open. The CHKL NON-NORMAL message alerts the flight crew to open ECL and complete the checklist.", note:"FCOM and QRH state to use CANC/RCL after a NNC to check for additional NNCs before completing normal checklists" }],
  "sv-ground-021": [{ ref:"FCOM 10.60.9 ECL Advisory Messages", quote:"The EICAS advisory message CHKL NON-NORMAL shows when there is a non-normal checklist in the queue, its EICAS message is blank, and ECL is not open. The CHKL NON-NORMAL message alerts the flight crew to open ECL and complete the checklist. The message blanks when ECL is opened." }],
  "sv-ground-022": [{ ref:"FCOM 10.60 ECL — Latched Checklists", quote:"A latched checklist stays in the completed state after its EICAS alert message blanks. If the alert recurs, the checklist must be reset using CHKL RESET before it can be restarted.", note:"Exact FCOM phrasing describes latched state and CHKL RESET requirement" }],
  "sv-ground-023": [{ ref:"FCOM 10.60 ECL — Non-Normal Checklist Guidance", quote:"Plan to land at the nearest suitable airport when: the NNC includes that instruction; fire or smoke continues; only two AC power sources remain; or any other situation with significant adverse effect on safety if flight is continued." }],
  "sv-ground-024": [{ ref:"FCOM 10.60 ECL — Engine Shutdown", quote:"When a checklist directs an engine shutdown, the captain must evaluate whether an actual shutdown or operation at reduced thrust is the safest course of action.", note:"FCOM Non-Normal Checklist operations section" }],
  "sv-ground-025": [{ ref:"QRH CI.2.4 Call for Checklist", quote:"The pilot flying calls for the checklist when: • the flight path is under control • the airplane is not in a critical phase of flight (such as takeoff or landing) • all memory items are complete" }],
  "sv-ground-026": [{ ref:"QRH CI.2.4 Do Reference Items", quote:"After moving a control during a NNC, the flight crewmember who took the action states the checklist response." }],
  "sv-ground-027": [{ ref:"QRH CI.2.2 Using CHKL OVRD / FCOM 10.60", quote:"CHKL OVRD forces the checklist back to the inactive state. Also removes: notes collected on the Notes page, inhibited checklists, and deferred items added to normal checklists." }],
  "sv-ground-028": [{ ref:"FCOM 10.60 ECL Operations — CHKL OVRD", quote:"If the flight crew wants to pause the checklist and complete it later, do not use CHKL OVRD. In this case, the flight crew can close ECL or navigate to another checklist. The in-progress checklist stays active and continues to be available in the checklist queue or via the NON-NORMAL key." }],
  "sv-ground-029": [{ ref:"FCOM 10.50.10 Line Item Override (ITEM OVRD) Key", quote:"Line Item Override (ITEM OVRD) Key — Select – overrides the line item in the current line item box. Item shows cyan. Advances the current line item box to the next incomplete item; treats the overridden item as complete." }],
  "sv-ground-030": [{ ref:"FCOM 10.50.10 Open Loop Conditional Line Items", quote:"Shows (cyan) – the conditional line item is sensed false. All line items indented below the conditional line item become inactive and show cyan." }],
  "sv-ground-031": [{ ref:"FCOM 10.60 ECL — Dual Database", quote:"The flight crew can select either ECL database when the airplane is on the ground and both engines are off. The database selection keys are inhibited in flight." }],
  "sv-ground-032": [{ ref:"FCOM 10.60 ECL — Dual Database", quote:"Changing the active ECL database also resets all checklists." }],
  "sv-ground-033": [{ ref:"FCOM NP.21.18 Preliminary Preflight — AIRLINE DATABASE", quote:"Select the AIRLINE DATABASE that has a REVISION that matches the \"ECL Revision\" listed on the front page of the current approved QRH." },{ ref:"QRH Front Page", quote:"ECL Revision: 7.0" }],
  "sv-ground-034": [{ ref:"FCOM 10.60 ECL — Timers", quote:"Timers are white when they are running. When the timer is done, it shows \":00\" and the color changes to amber." }],
  "sv-ground-035": [{ ref:"FCOM 10.60 ECL — Timers", quote:"Timers run in the background. This allows the flight crew to leave the checklist to accomplish other tasks and then return to the checklist." }],
  "sv-ground-036": [{ ref:"FOM 5.2.20 Load Closeout (LCO)", quote:"\"Fit-For-Duty\" must be submitted and acknowledged before the Load Closeout (final numbers) will be sent to the aircraft.", note:"FOM section 4.3.2.15 and 5.2.20 cover Fit-For-Duty requirement" }],
  "sv-ground-037": [{ ref:"FOM 8.5.8 Dispatch Release Weight Tolerances (HA)", quote:"[Compare] planned Takeoff Weight on the Dispatch Release against the Actual Takeoff Weight indicated on the Load Closeout or SABLE Weight and Balance Loadsheet. If the weights differ, see 8.5.8 – Dispatch Release Weight Tolerances (HA)." }],
  "sv-ground-038": [{ ref:"FOM 8.5.8 Dispatch Release Weight Tolerances (HA)", quote:"The Dispatch Release is considered valid for Takeoff Weight (TOW) up to 3000 lbs greater than Planned Takeoff Weight (PTOW)." }],
  "sv-ground-039": [{ ref:"FOM 8.5.8 Dispatch Release Weight Tolerances (HA)", quote:"If increasing the MIN RLS FUEL and MIN TAKEOFF FUEL per the table above and the FUEL BURN ADJUSTMENT line in the release, a free-text message must be sent to Dispatch via ACARS. Dispatch must acknowledge that the message was received and concurred with." }],
  "sv-ground-040": [{ ref:"FOM 8.5.8 Dispatch Release Weight Tolerances (HA)", quote:"\"ADD XXX LB TO MIN RLS AND MIN TO\" (inserting the appropriate amount of fuel). Dispatch must acknowledge that the message was received and concurred with. If unable to communicate with Dispatch via ACARS, revert to voice as a backup." }],
  "sv-ground-041": [{ ref:"FOM 8.5.8 Dispatch Release Weight Tolerances (HA)", quote:"If the actual TOW exceeds the PTOW by more than 3000 lbs, a revised Dispatch Release is required." }],
  "sv-ground-042": [{ ref:"FOM 5.2.20.1 Load Closeout with ACARS Inoperative", quote:"If ACARS is inoperative, obtain the Load Closeout via company email (preferred) or VHF radio.", note:"FOM section 5.2.20.1" }],
  "sv-ground-043": [{ ref:"FOM 5.2.20 / HAL F-809 Radio Load Closeout", quote:"The Radio Load Closeout form (HAL F-809) available in Comply365 may be used for recording final weights. Asterisked items must be read back for accuracy. The Captain must carry a signed copy to the destination.", note:"FOM 5.2.20 and HAL F-809 form procedure" }],
  "sv-ground-044": [{ ref:"FCOM SP.16.1 Takeoff — Wet or Contaminated Runway Conditions", quote:"Reduced thrust using assumed temperature method, whether alone or in combination with a fixed derate, is not allowed [on contaminated runways]." },{ ref:"FOM 9.1.8 Contaminated Runway Takeoff", quote:"Reduced thrust using assumed temperature, labeled AT or FLEX, is not authorized on a contaminated runway. See fleet-specific manuals for additional guidance regarding the use of maximum thrust on a contaminated runway." }],
  "sv-ground-045": [{ ref:"FCOM SP.16.1 Takeoff — Wet or Contaminated Runway Conditions", quote:"for wet runways, reduced thrust (fixed derate, assumed temperature method, or both) is allowed provided suitable takeoff performance accountability is made for the increased stopping distance on a wet surface", note:"Maximum thrust is encouraged but not required on wet/slippery runways" }],
  "sv-ground-046": [{ ref:"FCOM PI.19 Normal Configuration Landing Distance", quote:"For normal operations, the tires have a speed limit of 204 knots (235 MPH)." }],
  "sv-ground-047": [{ ref:"FCOM PI.12 Non-Normal Configuration Landing Distance", quote:"For non-normal landings, the tires are allowed to exceed this speed limit, but may not exceed the maximum tire speed limit of 226 knots (260 MPH)." }],
  "sv-ground-048": [{ ref:"FCOM PI.19 Normal Configuration Landing Distance", quote:"distances (reference distances plus adjustments) are 115% of the actual landing distance." }],
  "sv-ground-049": [{ ref:"FCOM PI.12 Non-Normal Configuration Landing Distance", quote:"Landing distances (reference distances plus adjustments) are representative of the actual landing distance, and are not factored." }],
  "sv-ground-050": [{ ref:"FCOM PI.12 / PI.19 Landing Distance Notes", quote:"Includes an air distance from threshold to touchdown associated with a flare time of 7 seconds." }],
  "sv-ground-051": [{ ref:"FCOM PI.12.64 Brake Energy — Fuse Plug Melt Zone", quote:"If overheat occurs after takeoff, extend gear soon for at least 12 minutes. [Fuse plug melt zone: clear runway immediately, do not approach gear for one hour]." }],
  "sv-ground-052": [{ ref:"FCOM PI.12.64 Brake Temperature Indication", quote:"Brake temperature indication on Multifunction Display may be used 10 to 15 minutes after airplane has come to a complete stop, or in flight with gear retracted, to determine recommended cooling schedule." }],
  "sv-ground-053": [{ ref:"FCOM PI.19 Takeoff — Flap Retraction Altitude", quote:"Flap Retraction Altitude is 1,000 ft AFE for all takeoffs, unless a Special Procedure states otherwise.", note:"FCOM PI.19 engine-out flap retraction altitude table and SOP reference" }],
  "sv-ground-054": [{ ref:"FOM 5.6.6 / FCOM SOP Departure Policy", quote:"Weather must be reported as 1000 ft ceiling and 3 sm visibility or better [for standard departures]. No turns are permitted below 1,000 ft AFE when takeoff weather is below 1,000/3 sm, unless a Special Departure Procedure or assigned instrument departure procedure specifically requires otherwise.", note:"FOM 5.6.6 establishes the 1,000/3 sm threshold; 1,000 ft AFE no-turn policy is SOP" }],
  "sv-ground-055": [{ ref:"FOM 5.6.24 Abnormal In-Flight Operations Landing Policy", quote:"\"Non-normal\" landing distance information is normally available via: … (787) OPT … Non-normal landing data DOES NOT contain added safety factors and should be considered the minimum stopping distance." },{ ref:"FOM 5.6.23 Landing Performance Analysis", quote:"The following tools, in addition to experience, are available for this landing assessment: • ACARS Landing Data request. • Landing Distance calculation is found in the fleet-specific manuals." }],
